# Decryption: AGE_KEY_FILE=/path/to/age.key sops -d secrets/<file>
# Encryption: sops --encrypt --in-place secrets/<file>
# Generate a key: age-keygen -o age.key  (commit only the public key below)
creation_rules:
  - path_regex: secrets/.*\.yaml$
    encrypted_regex: '^(data|stringData)$'
    age: 'REPLACE_WITH_PUBLIC_AGE_KEY'   # age-keygen outputs "Public key: age1..."
