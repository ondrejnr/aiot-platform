apiVersion: v1
items:
- apiVersion: v1
  data:
    train.py: |
      #!/usr/bin/env python3
      """
      Cluster Metrics Anomaly Detection & Capacity Forecasting
      - Trains IsolationForest for anomaly detection
      - Trains XGBoost for CPU/RAM capacity forecasting (next 1h)
      - Logs both models + metrics to MLflow
      """
      import os, sys, json, warnings
      warnings.filterwarnings("ignore")

      import pandas as pd
      import numpy as np
      import psycopg2
      from datetime import datetime, timedelta

      from sklearn.ensemble import IsolationForest
      from sklearn.preprocessing import StandardScaler
      from sklearn.model_selection import train_test_split
      from sklearn.metrics import mean_absolute_error, mean_squared_error
      import xgboost as xgb
      import mlflow
      import mlflow.sklearn
      import mlflow.xgboost
      import joblib

      # Config
      PG_DSN = "host=postgres.aiot.svc dbname=aiot user=aiot password=aiot123"
      MLFLOW_URI = "http://mlflow-server.mlflow.svc:5000"
      EXPERIMENT = "cluster-capacity-model"
      MIN_ROWS = 50  # minimum rows needed to train

      def load_data():
          conn = psycopg2.connect(PG_DSN)
          df = pd.read_sql("""
              SELECT ts, node_name, cpu_usage_percent, memory_usage_percent,
                     memory_available_bytes, disk_usage_percent,
                     disk_io_read_bytes_rate, disk_io_write_bytes_rate,
                     network_rx_bytes_rate, network_tx_bytes_rate,
                     load_avg_1m, load_avg_5m, load_avg_15m,
                     pods_running
              FROM cluster_metrics
              WHERE cpu_usage_percent IS NOT NULL
                AND ts > NOW() - INTERVAL '14 days'
              ORDER BY ts
          """, conn)
          conn.close()
          df["ts"] = pd.to_datetime(df["ts"])
          return df

      def add_features(df):
          """Add time-based and rolling features per node"""
          df = df.sort_values(["node_name", "ts"])
          df["hour"] = df["ts"].dt.hour
          df["day_of_week"] = df["ts"].dt.dayofweek
          df["minute_of_day"] = df["ts"].dt.hour * 60 + df["ts"].dt.minute

          for col in ["cpu_usage_percent", "memory_usage_percent", "load_avg_1m"]:
              if col in df.columns:
                  df[f"{col}_rolling_mean_12"] = df.groupby("node_name")[col].transform(
                      lambda x: x.rolling(12, min_periods=1).mean()
                  )
                  df[f"{col}_rolling_std_12"] = df.groupby("node_name")[col].transform(
                      lambda x: x.rolling(12, min_periods=1).std().fillna(0)
                  )
                  df[f"{col}_diff"] = df.groupby("node_name")[col].diff().fillna(0)

          # Target: next value (1 step = 5 min ahead)
          for target_col in ["cpu_usage_percent", "memory_usage_percent"]:
              df[f"{target_col}_next"] = df.groupby("node_name")[target_col].shift(-12)  # 1 hour ahead

          return df

      def train_anomaly_model(df, mlflow_run):
          """Train IsolationForest on all node metrics"""
          feature_cols = ["cpu_usage_percent", "memory_usage_percent", "load_avg_1m",
                          "load_avg_5m", "load_avg_15m", "disk_io_read_bytes_rate",
                          "disk_io_write_bytes_rate", "network_rx_bytes_rate",
                          "network_tx_bytes_rate", "pods_running"]
          feature_cols = [c for c in feature_cols if c in df.columns]
          X = df[feature_cols].dropna()

          if len(X) < MIN_ROWS:
              print(f"  Anomaly: only {len(X)} rows, need {MIN_ROWS}. Skipping.")
              return

          scaler = StandardScaler()
          X_scaled = scaler.fit_transform(X)

          model = IsolationForest(contamination=0.05, random_state=42, n_estimators=100)
          model.fit(X_scaled)

          scores = model.decision_function(X_scaled)
          anomalies = (model.predict(X_scaled) == -1).sum()

          mlflow.log_param("anomaly_features", len(feature_cols))
          mlflow.log_param("anomaly_samples", len(X))
          mlflow.log_metric("anomaly_count", int(anomalies))
          mlflow.log_metric("anomaly_pct", round(anomalies / len(X) * 100, 2))
          mlflow.log_metric("anomaly_score_mean", round(float(scores.mean()), 4))

          mlflow.sklearn.log_model(model, "anomaly_model")
          joblib.dump(scaler, "/tmp/anomaly_scaler.pkl")
          mlflow.log_artifact("/tmp/anomaly_scaler.pkl")

          print(f"  Anomaly model: {len(X)} samples, {anomalies} anomalies ({anomalies/len(X)*100:.1f}%)")

      def train_forecast_model(df, target_col, mlflow_run):
          """Train XGBoost to predict target_col 1 hour ahead"""
          target = f"{target_col}_next"
          feature_cols = ["cpu_usage_percent", "memory_usage_percent", "load_avg_1m",
                          "load_avg_5m", "load_avg_15m", "disk_usage_percent",
                          "pods_running", "hour", "day_of_week", "minute_of_day",
                          f"cpu_usage_percent_rolling_mean_12", f"cpu_usage_percent_rolling_std_12",
                          f"cpu_usage_percent_diff",
                          f"memory_usage_percent_rolling_mean_12", f"memory_usage_percent_rolling_std_12",
                          f"memory_usage_percent_diff"]
          feature_cols = [c for c in feature_cols if c in df.columns]

          data = df[feature_cols + [target]].dropna()
          if len(data) < MIN_ROWS:
              print(f"  Forecast {target_col}: only {len(data)} rows, need {MIN_ROWS}. Skipping.")
              return

          X = data[feature_cols]
          y = data[target]
          X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, shuffle=False)

          model = xgb.XGBRegressor(
              n_estimators=100, max_depth=6, learning_rate=0.1,
              random_state=42, objective="reg:squarederror"
          )
          model.fit(X_train, y_train, eval_set=[(X_test, y_test)], verbose=False)

          preds = model.predict(X_test)
          mae = mean_absolute_error(y_test, preds)
          rmse = np.sqrt(mean_squared_error(y_test, preds))

          short = target_col.replace("_usage_percent", "")
          mlflow.log_metric(f"{short}_forecast_mae", round(mae, 4))
          mlflow.log_metric(f"{short}_forecast_rmse", round(rmse, 4))
          mlflow.log_param(f"{short}_forecast_samples", len(data))
          mlflow.xgboost.log_model(model, f"{short}_forecast_model")

          print(f"  Forecast {short}: MAE={mae:.2f}%, RMSE={rmse:.2f}% ({len(data)} samples)")

      def main():
          print("=" * 50)
          print("Cluster ML Training Pipeline")
          print("=" * 50)

          mlflow.set_tracking_uri(MLFLOW_URI)
          mlflow.set_experiment(EXPERIMENT)
          try:
              mlflow.enable_system_metrics_logging()
              print("   System metrics logging enabled (cpu/mem/disk/net sampled each run)")
          except Exception as e:
              print(f"   WARN: system metrics not enabled: {e}")

          print("\n1. Loading data from PostgreSQL...")
          df = load_data()
          print(f"   Loaded {len(df)} rows, {df['node_name'].nunique()} nodes")
          print(f"   Date range: {df['ts'].min()} to {df['ts'].max()}")

          if len(df) < MIN_ROWS:
              print(f"\nNot enough data yet ({len(df)} < {MIN_ROWS}). Collect more metrics first.")
              print("CronJob runs every 5min × 6 nodes = 72 rows/hour. Need ~1 hour of data.")
              sys.exit(0)

          print("\n2. Feature engineering...")
          df = add_features(df)

          print("\n3. Training models...")
          with mlflow.start_run(run_name=f"cluster-train-{datetime.now().strftime('%Y%m%d-%H%M')}") as run:
              mlflow.log_param("total_rows", len(df))
              mlflow.log_param("nodes", df["node_name"].nunique())
              mlflow.log_param("date_range_start", str(df["ts"].min()))
              mlflow.log_param("date_range_end", str(df["ts"].max()))

              train_anomaly_model(df, run)
              train_forecast_model(df, "cpu_usage_percent", run)
              train_forecast_model(df, "memory_usage_percent", run)

              summary = {"rows": len(df), "nodes": int(df["node_name"].nunique()), "ts_min": str(df["ts"].min()), "ts_max": str(df["ts"].max()), "run_id": run.info.run_id}
              with open("/tmp/summary.json", "w") as f:
                  json.dump(summary, f, indent=2)
              mlflow.log_artifact("/tmp/summary.json")

              print(f"\n   MLflow run: {run.info.run_id}")

          print("\n4. Done!")
          print(f"   View results: mlflow.35.241.255.137.nip.io/#/experiments")

      if __name__ == "__main__":
          main()
