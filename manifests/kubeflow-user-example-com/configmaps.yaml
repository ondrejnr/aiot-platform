ngClassifier(n_estimators=150,max_depth=5,random_state=42))]:\n    print(f\"2. Training {algo}...\")\n    ts=time.strftime(\"%Y%m%d-%H%M%S\")\n    with mlflow.start_run(run_name=f\"{algo}-weekly-{ts}\") as run:\n        m=ctor(); m.fit(Xtr,ytr)\n        pred=m.predict(Xte)\n        f1=f1_score(yte,pred,average=\"weighted\")\n        acc=accuracy_score(yte,pred)\n        prec=precision_score(yte,pred,average=\"weighted\",zero_division=0)\n        rec=recall_score(yte,pred,average=\"weighted\")\n        mlflow.log_params({\"algo\":algo,\"features\":\",\".join(FEAT),\"n_train\":len(Xtr),\"n_test\":len(Xte)})\n        mlflow.log_metrics({\"f1\":f1,\"accuracy\":acc,\"precision\":prec,\"recall\":rec})\n        mlflow.sklearn.log_model(m, artifact_path=\"model\",\n            registered_model_name=MODEL_NAME)\n        _summary={\"algo\":algo,\"f1\":f1,\"accuracy\":acc,\"precision\":prec,\"recall\":rec,\"n_train\":len(Xtr),\"n_test\":len(Xte),\"features\":FEAT,\"run_id\":run.info.run_id}\n        open(\"/tmp/summary.json\",\"w\").write(json.dumps(_summary, indent=2))\n        mlflow.log_artifact(\"/tmp/summary.json\")\n        print(f\"   {algo}: f1={f1:.4f} acc={acc:.4f} run={run.info.run_id[:8]}\")\n        if best is None or f1 \u003e best[0]:\n            best=(f1, algo, run.info.run_id)\nprint(f\"3. Best: {best[1]} f1={best[0]:.4f} run={best[2][:8]}\")\n# Update description on latest version\nimport urllib.request\nqs=urllib.request.urlopen(ML+f\"/api/2.0/mlflow/model-versions/search?filter=name%3D%27{MODEL_NAME}%27\u0026max_results=5\u0026order_by=version_number+DESC\", timeout=30).read()\nvers=json.loads(qs).get(\"model_versions\",[])\nfor v in vers[:2]:\n    req=urllib.request.Request(ML+\"/api/2.0/mlflow/model-versions/update\",\n        data=json.dumps({\"name\":MODEL_NAME,\"version\":v[\"version\"],\n            \"description\":f\"Weekly retrain, algo=likely {best[1] if v['run_id']==best[2] else ('rf' if best[1]=='gb' else 'gb')}, f1={best[0]:.4f}\"}).encode(),\n        method=\"PATCH\", headers={\"Content-Type\":\"application/json\"})\n    try: urllib.request.urlopen(req, timeout=15)\n    except Exception as e: print(f\"   warn: desc update v{v['version']}: {e}\")\nprint(\"4. Done.\")\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"maintenance-retrain-script","namespace":"kubeflow-user-example-com"}}
