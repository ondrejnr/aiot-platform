- apiVersion: batch/v1
  kind: CronJob
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"labels":{"app":"aiot-ml-automation"},"name":"aiot-register-best","namespace":"kubeflow-user-example-com"},"spec":{"concurrencyPolicy":"Forbid","failedJobsHistoryLimit":3,"jobTemplate":{"spec":{"activeDeadlineSeconds":600,"backoffLimit":2,"template":{"metadata":{"annotations":{"sidecar.istio.io/inject":"false"},"labels":{"app":"aiot-register"}},"spec":{"containers":[{"args":["import os, json, urllib.request, urllib.parse\nML=os.environ[\"MLFLOW_URL\"]; NAME=os.environ[\"MODEL_NAME\"]\nMETRIC=os.environ[\"METRIC_KEY\"]; MIN_DELTA=float(os.environ[\"MIN_DELTA\"])\ndef api(path, data=None, method=\"GET\"):\n    req=urllib.request.Request(ML+path, method=method)\n    if data is not None:\n        req.data=json.dumps(data).encode(); req.add_header(\"Content-Type\",\"application/json\")\n    return json.loads(urllib.request.urlopen(req, timeout=30).read() or \"{}\")\nqs=urllib.parse.urlencode({\"filter\":\"name=\" + chr(39)+NAME+chr(39),\"max_results\":100,\"order_by\":\"version_number DESC\"})\nversions=api(\"/api/2.0/mlflow/model-versions/search?\"+qs).get(\"model_versions\",[])\nprint(\"Found {} versions of {}\".format(len(versions), NAME))\ncurrent=None; cands=[]\nfor v in versions:\n    if v[\"current_stage\"]==\"Archived\": continue\n    rid=v[\"run_id\"]; ver=int(v[\"version\"]); stage=v[\"current_stage\"]\n    r=api(\"/api/2.0/mlflow/runs/get?run_id=\"+rid)\n    metrics={m[\"key\"]:float(m[\"value\"]) for m in r[\"run\"][\"data\"].get(\"metrics\",[])}\n    score=metrics.get(METRIC, 0.0)\n    cands.append((score, ver, v))\n    if stage==\"Production\": current=(score, ver, v)\n    print(\"  v{:\u003e3}  stage={:\u003c10} {}={:.4f}  run={}\".format(ver, stage, METRIC, score, rid[:8]))\nif not cands:\n    print(\"No non-archived candidates found.\"); raise SystemExit(0)\ncands.sort(key=lambda x:(-x[0], -x[1]))\nbest=cands[0]\nprint(\"\\nBest candidate: v{} {}={:.4f}\".format(best[1], METRIC, best[0]))\nif current:\n    print(\"Current Production: v{} {}={:.4f}\".format(current[1], METRIC, current[0]))\nelse:\n    print(\"No current Production.\")\nif current and best[1]==current[1]:\n    print(\"RESULT: Best is already Production. Nothing to promote.\"); raise SystemExit(0)\nif current and (best[0]-current[0]) \u003c MIN_DELTA:\n    print(\"RESULT: Best gain ({:+.4f}) below MIN_DELTA ({}). Keeping v{}.\".format(best[0]-current[0], MIN_DELTA, current[1]))\n    raise SystemExit(0)\napi(\"/api/2.0/mlflow/model-versions/transition-stage\", method=\"POST\",\n    data={\"name\":NAME,\"version\":str(best[1]),\"stage\":\"Production\",\"archive_existing_versions\":True})\nprint(\"RESULT: Promoted v{} -\u003e Production (archived previous)\".format(best[1]))\n"],"command":["python3","-c"],"env":[{"name":"MODEL_NAME","value":"maintenance-predictor"},{"name":"METRIC_KEY","value":"f1"},{"name":"MIN_DELTA","value":"0.001"},{"name":"MLFLOW_URL","value":"http://mlflow-server.mlflow.svc.cluster.local:5000"}],"image":"python:3.11-slim","imagePullPolicy":"IfNotPresent","name":"register"}],"nodeSelector":{"node-role.kubernetes.io/ml-training":""},"restartPolicy":"Never","serviceAccountName":"default-editor","tolerations":[{"effect":"NoSchedule","key":"dedicated","operator":"Equal","value":"ml-training"}]}}}},"schedule":"0 5 * * 0","successfulJobsHistoryLimit":3}}
    labels:
      app: aiot-ml-automation
    name: aiot-register-best
    namespace: kubeflow-user-example-com
  spec:
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 3
    jobTemplate:
      metadata:
      spec:
        activeDeadlineSeconds: 600
        backoffLimit: 2
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "false"
            labels:
              app: aiot-register
          spec:
            containers:
            - args:
              - |
                import os, json, urllib.request, urllib.parse
                ML=os.environ["MLFLOW_URL"]; NAME=os.environ["MODEL_NAME"]
                METRIC=os.environ["METRIC_KEY"]; MIN_DELTA=float(os.environ["MIN_DELTA"])
                def api(path, data=None, method="GET"):
                    req=urllib.request.Request(ML+path, method=method)
                    if data is not None:
                        req.data=json.dumps(data).encode(); req.add_header("Content-Type","application/json")
                    return json.loads(urllib.request.urlopen(req, timeout=30).read() or "{}")
                qs=urllib.parse.urlencode({"filter":"name=" + chr(39)+NAME+chr(39),"max_results":100,"order_by":"version_number DESC"})
                versions=api("/api/2.0/mlflow/model-versions/search?"+qs).get("model_versions",[])
                print("Found {} versions of {}".format(len(versions), NAME))
                current=None; cands=[]
                for v in versions:
                    if v["current_stage"]=="Archived": continue
                    rid=v["run_id"]; ver=int(v["version"]); stage=v["current_stage"]
                    r=api("/api/2.0/mlflow/runs/get?run_id="+rid)
                    metrics={m["key"]:float(m["value"]) for m in r["run"]["data"].get("metrics",[])}
                    score=metrics.get(METRIC, 0.0)
                    cands.append((score, ver, v))
                    if stage=="Production": current=(score, ver, v)
                    print("  v{:>3}  stage={:<10} {}={:.4f}  run={}".format(ver, stage, METRIC, score, rid[:8]))
                if not cands:
                    print("No non-archived candidates found."); raise SystemExit(0)
                cands.sort(key=lambda x:(-x[0], -x[1]))
                best=cands[0]
                print("\nBest candidate: v{} {}={:.4f}".format(best[1], METRIC, best[0]))
                if current:
                    print("Current Production: v{} {}={:.4f}".format(current[1], METRIC, current[0]))
                else:
                    print("No current Production.")
                if current and best[1]==current[1]:
                    print("RESULT: Best is already Production. Nothing to promote."); raise SystemExit(0)
                if current and (best[0]-current[0]) < MIN_DELTA:
                    print("RESULT: Best gain ({:+.4f}) below MIN_DELTA ({}). Keeping v{}.".format(best[0]-current[0], MIN_DELTA, current[1]))
                    raise SystemExit(0)
                api("/api/2.0/mlflow/model-versions/transition-stage", method="POST",
                    data={"name":NAME,"version":str(best[1]),"stage":"Production","archive_existing_versions":True})
                print("RESULT: Promoted v{} -> Production (archived previous)".format(best[1]))
              command:
              - python3
              - -c
              env:
              - name: MODEL_NAME
                value: maintenance-predictor
              - name: METRIC_KEY
                value: f1
              - name: MIN_DELTA
                value: "0.00001"
              - name: MLFLOW_URL
                value: http://mlflow-server.mlflow.svc.cluster.local:5000
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              name: register
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
            dnsPolicy: ClusterFirst
            nodeSelector:
              node-role.kubernetes.io/ml-training: ""
            restartPolicy: Never
            schedulerName: default-scheduler
            securityContext: {}
            serviceAccount: default-editor
            serviceAccountName: default-editor
            terminationGracePeriodSeconds: 30
            tolerations:
            - effect: NoSchedule
              key: dedicated
              operator: Equal
              value: ml-training
    schedule: 0 5 * * 0
    successfulJobsHistoryLimit: 3
    suspend: false
  status:
    lastScheduleTime: "2026-04-19T05:00:00Z"
    lastSuccessfulTime: "2026-04-20T05:30:07Z"
