- apiVersion: batch/v1
  kind: CronJob
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"labels":{"app":"aiot-ml-automation"},"name":"aiot-rollout-model","namespace":"kubeflow-user-example-com"},"spec":{"concurrencyPolicy":"Forbid","failedJobsHistoryLimit":3,"jobTemplate":{"spec":{"activeDeadlineSeconds":600,"backoffLimit":2,"template":{"metadata":{"annotations":{"sidecar.istio.io/inject":"false"},"labels":{"app":"aiot-rollout"}},"spec":{"containers":[{"args":["import os, json, ssl, time, urllib.request, urllib.parse\nML=os.environ[\"MLFLOW_URL\"]; NAME=os.environ[\"MODEL_NAME\"]\nISVC=os.environ[\"ISVC_NAME\"]; NS=os.environ[\"NAMESPACE\"]\nr=urllib.request.urlopen(ML+\"/api/2.0/mlflow/registered-models/get-latest-versions?name=\"+NAME+\"\u0026stages=Production\", timeout=30).read()\nvers=json.loads(r).get(\"model_versions\",[])\nif not vers:\n    print(\"No Production version for \"+NAME+\". Aborting rollout.\"); raise SystemExit(1)\nprod=vers[0]\npv=prod[\"version\"]; pr=prod[\"run_id\"]\nprint(\"Production: v{} run={}\".format(pv, pr[:8]))\ntoken=open(\"/var/run/secrets/kubernetes.io/serviceaccount/token\").read().strip()\nca=\"/var/run/secrets/kubernetes.io/serviceaccount/ca.crt\"\nctx=ssl.create_default_context(cafile=ca)\nbase=\"https://kubernetes.default.svc\"\nurl=base+\"/apis/serving.kserve.io/v1beta1/namespaces/\"+NS+\"/inferenceservices/\"+ISVC\npatch={\"metadata\":{\"annotations\":{\"reconcile-trigger\":str(int(time.time())),\"aiot.ml/prod-version\":pv,\"aiot.ml/prod-run\":pr}}}\nreq=urllib.request.Request(url, data=json.dumps(patch).encode(), method=\"PATCH\",\n    headers={\"Content-Type\":\"application/merge-patch+json\",\"Authorization\":\"Bearer \"+token})\nresp=urllib.request.urlopen(req, context=ctx, timeout=30)\nprint(\"ISVC patch: HTTP {}\".format(resp.status))\nlabels=urllib.parse.quote(\"serving.kserve.io/inferenceservice=\"+ISVC)\npods_url=base+\"/api/v1/namespaces/\"+NS+\"/pods?labelSelector=\"+labels\npods_req=urllib.request.Request(pods_url, headers={\"Authorization\":\"Bearer \"+token})\npods=json.loads(urllib.request.urlopen(pods_req, context=ctx, timeout=30).read()).get(\"items\",[])\nfor p in pods:\n    pn=p[\"metadata\"][\"name\"]\n    d=urllib.request.Request(base+\"/api/v1/namespaces/\"+NS+\"/pods/\"+pn, method=\"DELETE\",\n        headers={\"Authorization\":\"Bearer \"+token})\n    urllib.request.urlopen(d, context=ctx, timeout=30)\n    print(\"Deleted pod \"+pn)\nprint(\"RESULT: Rollout triggered for v\"+pv)\n"],"command":["python3","-c"],"env":[{"name":"MODEL_NAME","value":"maintenance-predictor"},{"name":"ISVC_NAME","value":"maintenance-predictor"},{"name":"NAMESPACE","value":"kubeflow-user-example-com"},{"name":"MLFLOW_URL","value":"http://mlflow-server.mlflow.svc.cluster.local:5000"}],"image":"python:3.11-slim","imagePullPolicy":"IfNotPresent","name":"rollout"}],"nodeSelector":{"node-role.kubernetes.io/ml-training":""},"restartPolicy":"Never","serviceAccountName":"default-editor","tolerations":[{"effect":"NoSchedule","key":"dedicated","operator":"Equal","value":"ml-training"}]}}}},"schedule":"30 5 * * 0","successfulJobsHistoryLimit":3}}
    labels:
      app: aiot-ml-automation
    name: aiot-rollout-model
    namespace: kubeflow-user-example-com
  spec:
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 3
    jobTemplate:
      metadata:
      spec:
        activeDeadlineSeconds: 600
        backoffLimit: 2
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "false"
            labels:
              app: aiot-rollout
          spec:
            containers:
            - args:
              - |
                import os, json, ssl, time, urllib.request, urllib.parse
                ML=os.environ["MLFLOW_URL"]; NAME=os.environ["MODEL_NAME"]
                ISVC=os.environ["ISVC_NAME"]; NS=os.environ["NAMESPACE"]
                r=urllib.request.urlopen(ML+"/api/2.0/mlflow/registered-models/get-latest-versions?name="+NAME+"&stages=Production", timeout=30).read()
                vers=json.loads(r).get("model_versions",[])
                if not vers:
                    print("No Production version for "+NAME+". Aborting rollout."); raise SystemExit(1)
                prod=vers[0]
                pv=prod["version"]; pr=prod["run_id"]
                print("Production: v{} run={}".format(pv, pr[:8]))
                token=open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
                ca="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                ctx=ssl.create_default_context(cafile=ca)
                base="https://kubernetes.default.svc"
                url=base+"/apis/serving.kserve.io/v1beta1/namespaces/"+NS+"/inferenceservices/"+ISVC
                patch={"metadata":{"annotations":{"reconcile-trigger":str(int(time.time())),"aiot.ml/prod-version":pv,"aiot.ml/prod-run":pr}}}
                req=urllib.request.Request(url, data=json.dumps(patch).encode(), method="PATCH",
                    headers={"Content-Type":"application/merge-patch+json","Authorization":"Bearer "+token})
                resp=urllib.request.urlopen(req, context=ctx, timeout=30)
                print("ISVC patch: HTTP {}".format(resp.status))
                labels=urllib.parse.quote("serving.kserve.io/inferenceservice="+ISVC)
                pods_url=base+"/api/v1/namespaces/"+NS+"/pods?labelSelector="+labels
                pods_req=urllib.request.Request(pods_url, headers={"Authorization":"Bearer "+token})
                pods=json.loads(urllib.request.urlopen(pods_req, context=ctx, timeout=30).read()).get("items",[])
                for p in pods:
                    pn=p["metadata"]["name"]
                    d=urllib.request.Request(base+"/api/v1/namespaces/"+NS+"/pods/"+pn, method="DELETE",
                        headers={"Authorization":"Bearer "+token})
                    urllib.request.urlopen(d, context=ctx, timeout=30)
                    print("Deleted pod "+pn)
                print("RESULT: Rollout triggered for v"+pv)
              command:
              - python3
              - -c
              env:
              - name: MODEL_NAME
                value: maintenance-predictor
              - name: ISVC_NAME
                value: maintenance-predictor
              - name: NAMESPACE
                value: kubeflow-user-example-com
              - name: MLFLOW_URL
                value: http://mlflow-server.mlflow.svc.cluster.local:5000
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              name: rollout
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
            dnsPolicy: ClusterFirst
            nodeSelector:
              node-role.kubernetes.io/ml-training: ""
            restartPolicy: Never
            schedulerName: default-scheduler
            securityContext: {}
            serviceAccount: default-editor
            serviceAccountName: default-editor
            terminationGracePeriodSeconds: 30
            tolerations:
            - effect: NoSchedule
              key: dedicated
              operator: Equal
              value: ml-training
    schedule: 30 5 * * 0
    successfulJobsHistoryLimit: 3
    suspend: false
  status:
    lastScheduleTime: "2026-04-19T05:30:00Z"
    lastSuccessfulTime: "2026-04-20T05:30:17Z"
