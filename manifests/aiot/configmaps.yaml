    gateway.py: "from fastapi import FastAPI, Request\r\nfrom fastapi.concurrency
      import run_in_threadpool\r\nimport requests as req\r\nimport json, hashlib,
      math, time, os, re\r\nimport redis\r\n\r\napp = FastAPI(title=\"SambaNova AIoT
      Gateway\")\r\nbank = redis.Redis(host=\"redis-master.aiot.svc.cluster.local\",
      port=6379, db=5, decode_responses=True)\r\ncache = redis.Redis(host=\"redis-master.aiot.svc.cluster.local\",
      port=6379, db=6, decode_responses=True)\r\n\r\nQDRANT_URL = \"http://qdrant.aiot.svc.cluster.local:6333\"\r\nSAMBANOVA_URL
      = \"https://api.sambanova.ai/v1/chat/completions\"\r\nSAMBANOVA_KEY = os.environ.get(\"SAMBANOVA_API_KEY\",
      \"\")\r\nSAMBANOVA_MODEL = \"Meta-Llama-3.1-8B-Instruct\"\r\n\r\n# Groq fallback\r\nGROQ_URL
      = \"https://api.groq.com/openai/v1/chat/completions\"\r\nGROQ_KEY = os.environ.get(\"GROQ_API_KEY\",
      \"\")\r\nGROQ_MODEL = \"llama-3.1-8b-instant\"\r\n\r\nVECTOR_SIZE = 64\r\nLLM_CACHE_TTL
      = 300\r\nBANK_CACHE_TTL = 60\r\nRATE_LIMIT_RPM = 30\r\nRATE_LIMIT_KEY = \"llm:rate_counter\"\r\n\r\nSYSTEM_PROMPT
      = \"\"\"You are SambaNova AIoT - industrial IoT monitoring assistant.\r\nYou
      monitor a smart factory with 10 machines across 6 types: pump, motor, generator,
      turbine, compressor, conveyor.\r\nLocations: hall-A, hall-B, hall-C, basement,
      outdoor-1, outdoor-2.\r\nAnswer in SAME LANGUAGE as user question. Be precise
      with numbers.\r\nUnits: temperature=C, vibration=mm/s, pressure=bar, rpm=RPM.\r\nIMPORTANT:
      When answering about averages, maximums, or statistics by machine type,\r\nuse
      ONLY the pre-calculated STATISTICS section - do NOT recalculate from individual
      machine data.\r\nThe STATISTICS section contains accurate aggregated values
      from ALL machines.\"\"\"\r\n\r\nSIMPLE_KW = [\"summary\",\"status\",\"overview\",\"suhrn\",\"prehlad\",\"how
      many\",\"kolko\",\"pocet\",\"total\",\"celkom\",\r\n             \"critical\",\"kritick\",\"warning\",\"varov\",\"alarm\",\"list\",\"zoznam\",\"stav\",\"factory\"]\r\nCOMPLEX_KW
      = [\"why\",\"preco\",\"cause\",\"pricina\",\"recommend\",\"odporuc\",\"predict\",\"trend\",\"analyze\",\"analyz\",\r\n
      \             \"compare\",\"porovnaj\",\"explain\",\"vysvetli\",\"what if\",\"should\",\"plan\",\"optimiz\",\"improve\",\r\n
      \             \"priemern\",\"average\",\"najvy\",\"highest\",\"max\",\"min\",\"lowest\",\"top\",\"worst\",\"best\"]\r\nMACH_RE
      = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)[-_]?\\d+',
      re.I)\r\nTYPE_RE = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)',
      re.I)\r\n\r\n# Patterns that indicate a bad/error response that should NOT be
      cached\r\nBAD_RESPONSE_RE = re.compile(r'(rate limit|error|exception|cannot
      provide|illegal|harmful|denial.of.service|dosattack)', re.I)\r\n\r\ndef fast_embed(text):\r\n
      \   b = text.encode()\r\n    raw = b''\r\n    for salt in (b'\\x00', b'\\x01',
      b'\\x02', b'\\x03'):\r\n        raw += hashlib.sha256(salt + b).digest()\r\n
      \       if len(raw) >= VECTOR_SIZE * 4: break\r\n    vec = []\r\n    for i in
      range(VECTOR_SIZE):\r\n        val = (raw[i*2] << 8 | raw[i*2+1]) / 65535.0
      * 2 - 1\r\n        vec.append(val)\r\n    norm = sum(x*x for x in vec) ** 0.5\r\n
      \   return [x/norm for x in vec] if norm > 0 else vec\r\n\r\ndef is_complex(q):\r\n
      \   return any(k in q.lower() for k in COMPLEX_KW)\r\n\r\ndef is_simple(q):\r\n
      \   ql = q.lower()\r\n    if MACH_RE.search(ql) and not is_complex(q): return
      True\r\n    return any(k in ql for k in SIMPLE_KW) and not is_complex(q)\r\n\r\ndef
      check_rate():\r\n    try:\r\n        c = cache.get(RATE_LIMIT_KEY)\r\n        if
      c and int(c) >= RATE_LIMIT_RPM: return False\r\n        p = cache.pipeline();
      p.incr(RATE_LIMIT_KEY); p.expire(RATE_LIMIT_KEY, 60); p.execute()\r\n        return
      True\r\n    except: return True\r\n\r\ndef is_bad_response(text):\r\n    \"\"\"Check
      if response is an error/bad response that should not be cached.\"\"\"\r\n    if
      not text: return True\r\n    return bool(BAD_RESPONSE_RE.search(text))\r\n\r\ndef
      get_cache(q):\r\n    try: return cache.get(f\"llm:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}\")\r\n
      \   except: return None\r\n\r\ndef set_cache(q, r, ttl=None):\r\n    if is_bad_response(r):
      return  # Never cache error responses\r\n    try: cache.setex(f\"llm:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}\",
      ttl or LLM_CACHE_TTL, r)\r\n    except: pass\r\n\r\ndef machine_detail(mid):\r\n
      \   raw = bank.get(f\"bank:machines:{mid}\")\r\n    if not raw: return None\r\n
      \   m = json.loads(raw); mt = m.get(\"metrics\",{})\r\n    viols = \"; \".join([f\"{v['metric']}={v['value']}\"
      for v in m.get(\"violations\",[])])\r\n    line = f\"{mid} ({m.get('machine_type','')})
      [{m.get('status','')}] T={mt.get('temperature','-')}C V={mt.get('vibration','-')}mm/s
      P={mt.get('pressure','-')}bar RPM={mt.get('rpm','-')}\"\r\n    if viols: line
      += f\" VIOLATIONS: {viols}\"\r\n    return line\r\n\r\ndef bank_answer(query):\r\n
      \   q = query.lower()\r\n    try:\r\n        raw = bank.get(\"bank:summary\")\r\n
      \       if not raw: return None\r\n        s = json.loads(raw)\r\n        total,ok,warn,crit
      = s.get(\"total\",0),s.get(\"ok\",0),s.get(\"warning\",0),s.get(\"critical\",0)\r\n
      \       crit_list,warn_list = s.get(\"critical_machines\",[]),s.get(\"warning_machines\",[])\r\n
      \       m = MACH_RE.search(q)\r\n        if m:\r\n            mid = m.group(0).replace(\"_\",\"-\")\r\n
      \           return machine_detail(mid) or f\"Machine {mid} not found.\"\r\n
      \       if any(k in q for k in [\"summary\",\"status\",\"overview\",\"suhrn\",\"prehlad\",\"total\",\"celkom\",\"factory\",\"stav\"]):\r\n
      \           return f\"Factory: {total} machines | OK: {ok} | Warning: {warn}
      | Critical: {crit}\\nTop critical: {', '.join(crit_list[:10])}\"\r\n        if
      any(k in q for k in [\"critical\",\"kritick\",\"alarm\"]):\r\n            return
      f\"Critical ({crit}):\\n\" + \"\\n\".join(f\"  {n}\" for n in crit_list[:20])\r\n
      \       if any(k in q for k in [\"warning\",\"varov\",\"warn\"]):\r\n            return
      f\"Warning ({warn}):\\n\" + \"\\n\".join(f\"  {n}\" for n in warn_list[:20])\r\n
      \       if any(k in q for k in [\"how many\",\"kolko\",\"pocet\"]):\r\n            return
      f\"Total {total}: {ok} OK, {warn} warning, {crit} critical.\"\r\n    except:
      pass\r\n    return None\r\n\r\ndef compute_type_stats():\r\n    type_data =
      {}\r\n    try:\r\n        all_keys = bank.keys(\"bank:machines:*\")\r\n        if
      not all_keys: return {}\r\n        pipe = bank.pipeline()\r\n        for k in
      all_keys:\r\n            pipe.get(k)\r\n        results = pipe.execute()\r\n
      \       for raw_m in results:\r\n            if not raw_m: continue\r\n            try:\r\n
      \               md = json.loads(raw_m)\r\n                mt = md.get(\"machine_type\",\"\")\r\n
      \               if mt not in type_data:\r\n                    type_data[mt]
      = {\"temps\":[],\"vibs\":[],\"rpms\":[],\"pressures\":[],\"statuses\":{},\"machines\":[],\"count\":0}\r\n
      \               td = type_data[mt]\r\n                td[\"count\"] += 1\r\n
      \               metrics = md.get(\"metrics\",{})\r\n                mid = md.get(\"machine_id\",\"?\")\r\n
      \               temp = metrics.get(\"temperature\")\r\n                vib =
      metrics.get(\"vibration\")\r\n                rpm_val = metrics.get(\"rpm\")\r\n
      \               pres = metrics.get(\"pressure\")\r\n                if temp
      is not None: td[\"temps\"].append((float(temp), mid))\r\n                if
      vib is not None: td[\"vibs\"].append((float(vib), mid))\r\n                if
      rpm_val is not None: td[\"rpms\"].append((float(rpm_val), mid))\r\n                if
      pres is not None: td[\"pressures\"].append((float(pres), mid))\r\n                st
      = md.get(\"status\",\"OK\")\r\n                td[\"statuses\"][st] = td[\"statuses\"].get(st,0)
      + 1\r\n            except: continue\r\n    except: pass\r\n    return type_data\r\n\r\ndef
      bank_context_full(query):\r\n    ctx = []\r\n    q = query.lower()\r\n    try:\r\n
      \       raw = bank.get(\"bank:summary\")\r\n        if not raw: return \"No
      data available.\"\r\n        s = json.loads(raw)\r\n        ctx.append(f\"FACTORY
      OVERVIEW: {s.get('total',0)} machines | OK:{s.get('ok',0)} WARNING:{s.get('warning',0)}
      CRITICAL:{s.get('critical',0)}\")\r\n        m = MACH_RE.search(q)\r\n        if
      m:\r\n            mid = m.group(0).replace(\"_\",\"-\")\r\n            detail
      = machine_detail(mid)\r\n            if detail: ctx.append(f\"\\nMACHINE DETAIL:\\n{detail}\")\r\n
      \           hist = bank.lrange(f\"bank:history:{mid}\", 0, 9)\r\n            if
      hist:\r\n                ctx.append(\"HISTORY (last 10):\")\r\n                for
      e in hist:\r\n                    d = json.loads(e)\r\n                    ctx.append(f\"
      \ T={d.get('temperature','-')} V={d.get('vibration','-')} P={d.get('pressure','-')}
      RPM={d.get('rpm','-')} [{d.get('status','')}]\")\r\n            return \"\\n\".join(ctx)\r\n
      \       type_data = compute_type_stats()\r\n        if type_data:\r\n            ctx.append(\"\\n===
      PRE-CALCULATED STATISTICS (from ALL machines) ===\")\r\n            for mtype
      in [\"turbine\",\"generator\",\"compressor\",\"motor\",\"pump\",\"conveyor\"]:\r\n
      \               td = type_data.get(mtype)\r\n                if not td: continue\r\n
      \               line = f\"\\n{mtype.upper()} ({td['count']} machines):\"\r\n
      \               ctx.append(line)\r\n                if td[\"temps\"]:\r\n                    vals
      = [t[0] for t in td[\"temps\"]]\r\n                    avg_t = sum(vals)/len(vals)\r\n
      \                   max_t = max(td[\"temps\"], key=lambda x: x[0])\r\n                    min_t
      = min(td[\"temps\"], key=lambda x: x[0])\r\n                    ctx.append(f\"
      \ Temperature: avg={avg_t:.1f}C  max={max_t[0]:.1f}C ({max_t[1]})  min={min_t[0]:.1f}C
      ({min_t[1]})\")\r\n                if td[\"vibs\"]:\r\n                    vals
      = [v[0] for v in td[\"vibs\"]]\r\n                    avg_v = sum(vals)/len(vals)\r\n
      \                   max_v = max(td[\"vibs\"], key=lambda x: x[0])\r\n                    ctx.append(f\"
      \ Vibration:   avg={avg_v:.2f}mm/s  max={max_v[0]:.2f}mm/s ({max_v[1]})\")\r\n
      \               if td[\"rpms\"]:\r\n                    vals = [r[0] for r in
      td[\"rpms\"]]\r\n                    avg_r = sum(vals)/len(vals)\r\n                    max_r
      = max(td[\"rpms\"], key=lambda x: x[0])\r\n                    ctx.append(f\"
      \ RPM:         avg={avg_r:.0f}  max={max_r[0]:.0f} ({max_r[1]})\")\r\n                if
      td[\"pressures\"]:\r\n                    vals = [p[0] for p in td[\"pressures\"]]\r\n
      \                   avg_p = sum(vals)/len(vals)\r\n                    ctx.append(f\"
      \ Pressure:    avg={avg_p:.1f}bar\")\r\n                ctx.append(f\"  Status:
      \     {td['statuses']}\")\r\n                if td[\"temps\"]:\r\n                    top3
      = sorted(td[\"temps\"], key=lambda x: x[0], reverse=True)[:3]\r\n                    ctx.append(f\"
      \ Top 3 hottest: {', '.join(f'{mid}={t:.1f}C' for t,mid in top3)}\")\r\n        crit_list
      = s.get(\"critical_machines\",[])\r\n        if crit_list:\r\n            ctx.append(f\"\\n===
      CRITICAL MACHINES (top 10 of {len(crit_list)}) ===\")\r\n            for mid2
      in crit_list[:10]:\r\n                d = machine_detail(mid2)\r\n                if
      d: ctx.append(d)\r\n    except Exception as e:\r\n        ctx.append(f\"Error:
      {e}\")\r\n    return \"\\n\".join(ctx)[:15000]\r\n\r\ndef qdrant_search(query,
      limit=20):\r\n    try:\r\n        vec = fast_embed(query)\r\n        r = req.post(f\"{QDRANT_URL}/collections/sensor_history/points/search\",\r\n
      \           json={\"vector\": vec, \"limit\": limit, \"with_payload\": True},
      timeout=10)\r\n        if r.status_code == 200:\r\n            return [p[\"payload\"]
      for p in r.json().get(\"result\",[])]\r\n    except: pass\r\n    return []\r\n\r\ndef
      call_sambanova(context, query):\r\n    \"\"\"Call SambaNova API. Returns (response_text,
      success_bool).\"\"\"\r\n    try:\r\n        r = req.post(SAMBANOVA_URL, headers={\"Authorization\":
      f\"Bearer {SAMBANOVA_KEY}\"},\r\n            json={\"model\": SAMBANOVA_MODEL,\r\n
      \                 \"messages\": [{\"role\":\"system\",\"content\":SYSTEM_PROMPT},\r\n
      \                              {\"role\":\"user\",\"content\":f\"REAL-TIME SENSOR
      DATA:\\n{context}\\n\\nUSER QUESTION: {query}\"}],\r\n                  \"max_tokens\":
      2000, \"temperature\": 0.1}, timeout=30)\r\n        if r.status_code == 200:\r\n
      \           return r.json()[\"choices\"][0][\"message\"][\"content\"], True\r\n
      \       elif r.status_code == 429:\r\n            return None, False  # Rate
      limited - try fallback\r\n        else:\r\n            return f\"SambaNova Error
      ({r.status_code}): {r.text[:200]}\", False\r\n    except Exception as e:\r\n
      \       return f\"SambaNova Error: {e}\", False\r\n\r\ndef call_groq_fallback(context,
      query):\r\n    \"\"\"Fallback to Groq when SambaNova is unavailable.\"\"\"\r\n
      \   if not GROQ_KEY:\r\n        return \"LLM temporarily unavailable (rate limit).
      Try again later.\"\r\n    try:\r\n        r = req.post(GROQ_URL,\r\n            headers={\"Authorization\":
      f\"Bearer {GROQ_KEY}\", \"Content-Type\": \"application/json\"},\r\n            json={\"model\":
      GROQ_MODEL,\r\n                  \"messages\": [{\"role\":\"system\",\"content\":SYSTEM_PROMPT},\r\n
      \                              {\"role\":\"user\",\"content\":f\"REAL-TIME SENSOR
      DATA:\\n{context}\\n\\nUSER QUESTION: {query}\"}],\r\n                  \"max_tokens\":
      2000, \"temperature\": 0.1}, timeout=30)\r\n        if r.status_code == 200:\r\n
      \           return r.json()[\"choices\"][0][\"message\"][\"content\"]\r\n        else:\r\n
      \           return f\"LLM Error ({r.status_code})\"\r\n    except Exception
      as e:\r\n        return f\"LLM Error: {e}\"\r\n\r\ndef call_llm(context, query):\r\n
      \   \"\"\"Try SambaNova first, fall back to Groq if rate limited.\"\"\"\r\n
      \   ans, ok = call_sambanova(context, query)\r\n    if ok and ans:\r\n        return
      ans\r\n    # SambaNova failed (rate limit or error) - try Groq fallback\r\n
      \   return call_groq_fallback(context, query)\r\n\r\ndef generate(query):\r\n
      \   cached = get_cache(query)\r\n    if cached and not is_bad_response(cached):
      return cached\r\n    if is_simple(query):\r\n        ans = bank_answer(query)\r\n
      \       if ans: set_cache(query, ans, BANK_CACHE_TTL); return ans\r\n    if
      not check_rate():\r\n        ans = bank_answer(query)\r\n        return (ans
      + \"\\n(Rate limited)\") if ans else \"Rate limit: 30/min.\"\r\n    ctx = bank_context_full(query)\r\n
      \   qdrant_results = qdrant_search(query, limit=15)\r\n    if qdrant_results:\r\n
      \       ctx += \"\\n\\nHISTORICAL DATA:\\n\"\r\n        for p in qdrant_results[:10]:\r\n
      \           ctx += f\"  {p.get('text','')}\\n\"\r\n    ans = call_llm(ctx, query)\r\n
      \   if ans and not is_bad_response(ans):\r\n        set_cache(query, ans)\r\n
      \   return ans\r\n\r\n@app.get(\"/\")\r\ndef root(): return {\"service\":\"SambaNova
      AIoT\",\"version\":\"9.0-GROQ-FALLBACK\"}\r\n@app.get(\"/health\")\r\ndef health():\r\n
      \   return {\"status\":\"healthy\",\"service\":\"api-gateway\"}\r\n\r\n@app.get(\"/ready\")\r\ndef
      ready():\r\n    try:\r\n        r=req.get(f\"{QDRANT_URL}/collections/sensor_history\",timeout=3);
      info=r.json().get(\"result\",{})\r\n        return {\"status\":\"ready\",\"qdrant_points\":info.get(\"points_count\",0),\"bank_machines\":len(bank.keys(\"bank:machines:*\"))}\r\n
      \   except Exception as e: return {\"status\":\"degraded\",\"error\":str(e)}\r\n@app.get(\"/v1/models\")\r\ndef
      models(): return {\"object\":\"list\",\"data\":[{\"id\":\"sambanova-aiot\",\"object\":\"model\"}]}\r\n@app.post(\"/v1/chat/completions\")\r\nasync
      def chat(request:Request):\r\n    body=await request.json(); msgs=body.get(\"messages\",[]);
      um=[m for m in msgs if m.get(\"role\")==\"user\"]\r\n    q=um[-1][\"content\"].strip()
      if um else \"summary\"\r\n    content = await run_in_threadpool(generate, q)\r\n
      \   return {\"id\":f\"sambanova-{int(time.time())}\",\"object\":\"chat.completion\",\"model\":\"sambanova-aiot\",\r\n
      \           \"choices\":[{\"index\":0,\"message\":{\"role\":\"assistant\",\"content\":content},\"finish_reason\":\"stop\"}],\r\n
      \           \"usage\":{\"prompt_tokens\":0,\"completion_tokens\":0,\"total_tokens\":0}}\r\n"
  kind: ConfigMap
