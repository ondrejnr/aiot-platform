        {"apiVersion":"v1","data":{"twin.py":"import json\r\nimport logging\r\nimport os\r\nimport threading\r\nimport time\r\n\r\nfrom flask import Flask, jsonify\r\nimport paho.mqtt.client as mqtt\r\nfrom paho.mqtt.enums import CallbackAPIVersion\r\nimport redis\r\n\r\nlogging.basicConfig(level=logging.INFO)\r\nlog = logging.getLogger(\"digital-twin\")\r\n\r\nMQTT_HOST = os.getenv(\"MQTT_HOST\", \"emqx.emqx.svc.cluster.local\")\r\nMQTT_PORT = int(os.getenv(\"MQTT_PORT\", \"1883\"))\r\nMQTT_TOPIC = os.getenv(\"MQTT_TOPIC\", \"sensors/#\")\r\nREDIS_HOST = os.getenv(\"REDIS_HOST\", \"redis-master.aiot.svc.cluster.local\")\r\nREDIS_PORT = int(os.getenv(\"REDIS_PORT\", \"6379\"))\r\nSTATE_DB = int(os.getenv(\"STATE_DB\", \"4\"))\r\nBANK_DB = int(os.getenv(\"BANK_DB\", \"5\"))\r\nBANK_TTL = int(os.getenv(\"BANK_TTL\", \"86400\"))\r\nSUMMARY_EVERY = int(os.getenv(\"SUMMARY_EVERY\", \"25\"))\r\n\r\napp = Flask(__name__)\r\n\r\nLIMITS = {\r\n    \"pump\": {\"temperature\": (20, 60), \"vibration\": (0, 2.0), \"pressure\": (0, 6.0), \"rpm\": (800, 3500)},\r\n    \"compressor\": {\"temperature\": (20, 80), \"vibration\": (0, 3.0), \"pressure\": (0, 12.0), \"rpm\": (800, 4000)},\r\n    \"motor\": {\"temperature\": (20, 75), \"vibration\": (0, 2.5), \"pressure\": (0, 999), \"rpm\": (500, 2500)},\r\n    \"conveyor\": {\"temperature\": (20, 50), \"vibration\": (0, 1.5), \"pressure\": (0, 999), \"rpm\": (0, 220)},\r\n    \"turbine\": {\"temperature\": (20, 100), \"vibration\": (0, 4.0), \"pressure\": (0, 18.0), \"rpm\": (1000, 10000)},\r\n    \"generator\": {\"temperature\": (20, 90), \"vibration\": (0, 3.0), \"pressure\": (0, 999), \"rpm\": (800, 4000)},\r\n}\r\n\r\nstate = None\r\nbank = None\r\nsummary_counter = 0\r\nsummary_lock = threading.Lock()\r\n\r\n\r\ndef connect_redis(db, label):\r\n    while True:\r\n        try:\r\n            client = redis.Redis(host=REDIS_HOST, port=REDIS_PORT, db=db, decode_responses=True)\r\n            client.ping()\r\n            log.info(\"%s redis ready\", label)\r\n            return client\r\n        except Exception as exc:\r\n            log.warning(\"%s redis unavailable: %s\", label, exc)\r\n            time.sleep(5)\r\n\r\n\r\ndef infer_machine_type(machine_id, payload, topic):\r\n    if payload.get(\"machine_type\"):\r\n        return payload[\"machine_type\"]\r\n    if machine_id and \"-\" in machine_id:\r\n        return machine_id.rsplit(\"-\", 1)[0]\r\n    parts = topic.split(\"/\")\r\n    if len(parts) \u003e= 3:\r\n        return parts[2]\r\n    return \"unknown\"\r\n\r\n\r\ndef infer_location(payload, topic):\r\n    if payload.get(\"location\"):\r\n        return payload[\"location\"]\r\n    parts = topic.split(\"/\")\r\n    if len(parts) \u003e= 2:\r\n        return parts[1]\r\n    return \"unknown\"\r\n\r\n\r\ndef check_metrics(machine_type, payload):\r\n    limits = LIMITS.get(machine_type, {})\r\n    violations = []\r\n    for metric, bounds in limits.items():\r\n        value = payload.get(metric)\r\n        if value is None:\r\n            continue\r\n        try:\r\n            value = float(value)\r\n        except Exception:\r\n            continue\r\n        minimum, maximum = bounds\r\n        if value \u003e maximum:\r\n            violations.append({\"metric\": metric, \"value\": round(value, 2), \"limit\": maximum, \"type\": \"HIGH\"})\r\n        elif value \u003c minimum:\r\n            violations.append({\"metric\": metric, \"value\": round(value, 2), \"limit\": minimum, \"type\": \"LOW\"})\r\n    return violations\r\n\r\n\r\ndef derive_status(payload, violations):\r\n    raw_status = str(payload.get(\"status\", \"\")).strip().upper()\r\n    if raw_status in {\"OK\", \"WARNING\", \"CRITICAL\"}:\r\n        return raw_status\r\n    anomaly_score = float(payload.get(\"anomaly_score\") or 0)\r\n    if anomaly_score \u003e 0.7 or len(violations) \u003e= 2:\r\n        return \"CRITICAL\"\r\n    if violations:\r\n        return \"WARNING\"\r\n    return \"OK\"\r\n\r\n\r\ndef update_bank_summary():\r\n    try:\r\n        keys = bank.keys(\"bank:machines:*\")\r\n        machines = {}\r\n        for key in keys:\r\n            raw = bank.get(key)\r\n            if raw:\r\n                machines[key.replace(\"bank:machines:\", \"\")] = json.loads(raw)\r\n        critical = [name for name, value in machines.items() if value.get(\"status\") == \"CRITICAL\"]\r\n        warning = [name for name, value in machines.items() if value.get(\"status\") == \"WARNING\"]\r\n        ok = [name for name, value in machines.items() if value.get(\"status\") == \"OK\"]\r\n        bank.setex(\r\n            \"bank:summary\",\r\n            BANK_TTL,\r\n            json.dumps(\r\n                {\r\n                    \"total\": len(machines),\r\n                    \"ok\": len(ok),\r\n                    \"warning\": len(warning),\r\n                    \"critical\": len(critical),\r\n                    \"critical_machines\": critical,\r\n                    \"warning_machines\": warning,\r\n                    \"ok_machines\": ok,\r\n                    \"ts\": time.time(),\r\n                }\r\n            ),\r\n        )\r\n    except Exception as exc:\r\n        log.error(\"Bank summary error: %s\", exc)\r\n\r\n\r\ndef process_message(topic, payload):\r\n    global summary_counter\r\n\r\n    machine_id = payload.get(\"machine_id\") or payload.get(\"sensor_id\", \"unknown\")\r\n    machine_type = infer_machine_type(machine_id, payload, topic)\r\n    location = infer_location(payload, topic)\r\n    violations = payload.get(\"violations\") if isinstance(payload.get(\"violations\"), list) else check_metrics(machine_type, payload)\r\n    status = derive_status(payload, violations)\r\n    anomaly_score = float(payload.get(\"anomaly_score\") or 0)\r\n    metrics = {\r\n        \"temperature\": payload.get(\"temperature\"),\r\n        \"vibration\": payload.get(\"vibration\"),\r\n        \"pressure\": payload.get(\"pressure\"),\r\n        \"rpm\": payload.get(\"rpm\"),\r\n        \"humidity\": payload.get(\"humidity\"),\r\n        \"anomaly_score\": anomaly_score,\r\n    }\r\n    twin = {\r\n        \"machine_id\": machine_id,\r\n        \"machine_type\": machine_type,\r\n        \"location\": location,\r\n        \"status\": status,\r\n        \"violations\": violations,\r\n        \"metrics\": metrics,\r\n        \"limits\": LIMITS.get(machine_type, {}),\r\n        \"topic\": topic,\r\n        \"updated_at\": time.time(),\r\n    }\r\n\r\n    state.hset(\"digital-twin:machines\", machine_id, json.dumps(twin))\r\n    state.expire(\"digital-twin:machines\", 7200)\r\n    state.setex(\"digital-twin:last-update\", 60, str(time.time()))\r\n\r\n    previous_raw = state.hget(\"digital-twin:prev-status\", machine_id)\r\n    previous_status = json.loads(previous_raw).get(\"status\") if previous_raw else \"OK\"\r\n    if status != \"OK\" and status != previous_status:\r\n        alert = {\r\n            \"machine_id\": machine_id,\r\n            \"machine_type\": machine_type,\r\n            \"status\": status,\r\n            \"violations\": violations,\r\n            \"anomaly_score\": anomaly_score,\r\n            \"metrics\": metrics,\r\n            \"ts\": time.time(),\r\n        }\r\n        state.lpush(\"digital-twin:alerts\", json.dumps(alert))\r\n        state.ltrim(\"digital-twin:alerts\", 0, 49)\r\n        state.expire(\"digital-twin:alerts\", 7200)\r\n        bank.lpush(\"bank:alerts\", json.dumps(alert))\r\n        bank.ltrim(\"bank:alerts\", 0, 99)\r\n        bank.expire(\"bank:alerts\", BANK_TTL)\r\n        log.warning(\"ALERT %s: %s\", status, machine_id)\r\n\r\n    state.hset(\"digital-twin:prev-status\", machine_id, json.dumps({\"status\": status}))\r\n    state.expire(\"digital-twin:prev-status\", 7200)\r\n\r\n    bank.setex(f\"bank:machines:{machine_id}\", BANK_TTL, json.dumps(twin))\r\n    history_entry = {\r\n        \"temperature\": payload.get(\"temperature\"),\r\n        \"vibration\": payload.get(\"vibration\"),\r\n        \"pressure\": payload.get(\"pressure\"),\r\n        \"rpm\": payload.get(\"rpm\"),\r\n        \"humidity\": payload.get(\"humidity\"),\r\n        \"anomaly_score\": anomaly_score,\r\n        \"status\": status,\r\n        \"ts\": time.time(),\r\n    }\r\n    bank.lpush(f\"bank:history:{machine_id}\", json.dumps(history_entry))\r\n    bank.ltrim(f\"bank:history:{machine_id}\", 0, 59)\r\n    bank.expire(f\"bank:history:{machine_id}\", BANK_TTL)\r\n\r\n    with summary_lock:\r\n        summary_counter += 1\r\n        if summary_counter \u003e= SUMMARY_EVERY:\r\n            update_bank_summary()\r\n            summary_counter = 0\r\n\r\n\r\ndef on_connect(client, _userdata, _flags, reason_code, _properties=None):\r\n    if reason_code == 0:\r\n        client.subscribe(MQTT_TOPIC)\r\n        log.info(\"MQTT connected, subscribed to %s\", MQTT_TOPIC)\r\n    else:\r\n        log.error(\"MQTT connect failed with reason %s\", reason_code)\r\n\r\n\r\ndef on_message(_client, _userdata, message):\r\n    try:\r\n        data = json.loads(message.payload.decode(\"utf-8\"))\r\n        payload = data.get(\"payload\", data) if isinstance(data, dict) else {}\r\n        process_message(message.topic, payload)\r\n    except Exception as exc:\r\n        log.error(\"MQTT message error: %s\", exc)\r\n\r\n\r\ndef mqtt_loop():\r\n    while True:\r\n        try:\r\n            client = mqtt.Client(callback_api_version=CallbackAPIVersion.VERSION2, client_id=\"digital-twin\")\r\n            client.on_connect = on_connect\r\n            client.on_message = on_message\r\n            client.reconnect_delay_set(min_delay=1, max_delay=10)\r\n            client.connect(MQTT_HOST, MQTT_PORT, keepalive=60)\r\n            client.loop_forever()\r\n        except Exception as exc:\r\n            log.error(\"MQTT loop error: %s\", exc)\r\n            time.sleep(5)\r\n\r\n\r\n@app.route(\"/twin\")\r\ndef get_twin():\r\n    machines = state.hgetall(\"digital-twin:machines\")\r\n    result = {key: json.loads(value) for key, value in machines.items()}\r\n    critical = [key for key, value in result.items() if value[\"status\"] == \"CRITICAL\"]\r\n    warning = [key for key, value in result.items() if value[\"status\"] == \"WARNING\"]\r\n    ok = [key for key, value in result.items() if value[\"status\"] == \"OK\"]\r\n    return jsonify(\r\n        {\r\n            \"machines\": result,\r\n            \"count\": len(result),\r\n            \"summary\": {\r\n                \"ok\": len(ok),\r\n                \"warning\": len(warning),\r\n                \"critical\": len(critical),\r\n                \"critical_machines\": critical,\r\n                \"warning_machines\": warning,\r\n            },\r\n            \"timestamp\": time.time(),\r\n        }\r\n    )\r\n\r\n\r\n@app.route(\"/twin/\u003cmachine_id\u003e\")\r\ndef get_machine(machine_id):\r\n    data = state.hget(\"digital-twin:machines\", machine_id)\r\n    if not data:\r\n        return jsonify({\"error\": \"not found\"}), 404\r\n    return jsonify(json.loads(data))\r\n\r\n\r\n@app.route(\"/alerts\")\r\ndef get_alerts():\r\n    return jsonify({\"count\": len(state.lrange(\"digital-twin:alerts\", 0, 49)), \"alerts\": [json.loads(item) for item in state.lrange(\"digital-twin:alerts\", 0, 49)]})\r\n\r\n\r\n@app.route(\"/bank/summary\")\r\ndef bank_summary():\r\n    raw = bank.get(\"bank:summary\")\r\n    if not raw:\r\n        return jsonify({\"error\": \"no data\"}), 404\r\n    return jsonify(json.loads(raw))\r\n\r\n\r\n@app.route(\"/bank/machine/\u003cmachine_id\u003e\")\r\ndef bank_machine(machine_id):\r\n    raw = bank.get(f\"bank:machines:{machine_id}\")\r\n    if not raw:\r\n        return jsonify({\"error\": \"not found\"}), 404\r\n    return jsonify(json.loads(raw))\r\n\r\n\r\n@app.route(\"/bank/history/\u003cmachine_id\u003e\")\r\ndef bank_history(machine_id):\r\n    return jsonify({\"machine_id\": machine_id, \"count\": len(bank.lrange(f\"bank:history:{machine_id}\", 0, 59)), \"history\": [json.loads(item) for item in bank.lrange(f\"bank:history:{machine_id}\", 0, 59)]})\r\n\r\n\r\n@app.route(\"/bank/alerts\")\r\ndef bank_alerts():\r\n    return jsonify({\"count\": len(bank.lrange(\"bank:alerts\", 0, 99)), \"alerts\": [json.loads(item) for item in bank.lrange(\"bank:alerts\", 0, 99)]})\r\n\r\n\r\n@app.route(\"/bank/all\")\r\ndef bank_all():\r\n    keys = bank.keys(\"bank:machines:*\")\r\n    machines = {}\r\n    for key in keys:\r\n        raw = bank.get(key)\r\n        if raw:\r\n            machines[key.replace(\"bank:machines:\", \"\")] = json.loads(raw)\r\n    raw_summary = bank.get(\"bank:summary\")\r\n    summary = json.loads(raw_summary) if raw_summary else {}\r\n    return jsonify({\"machines\": machines, \"summary\": summary, \"recent_alerts\": [json.loads(item) for item in bank.lrange(\"bank:alerts\", 0, 19)], \"ts\": time.time()})\r\n\r\n\r\n@app.route(\"/health\")\r\ndef health():\r\n    last = state.get(\"digital-twin:last-update\")\r\n    age = time.time() - float(last) if last else 999\r\n    machines = state.hgetall(\"digital-twin:machines\")\r\n    result = {key: json.loads(value) for key, value in machines.items()}\r\n    critical = [key for key, value in result.items() if value[\"status\"] == \"CRITICAL\"]\r\n    warning = [key for key, value in result.items() if value[\"status\"] == \"WARNING\"]\r\n    return jsonify({\"status\": \"ok\" if age \u003c 30 else \"stale\", \"data_age_seconds\": round(age, 1), \"machines_monitored\": len(result), \"bank_machines\": len(bank.keys(\"bank:machines:*\")), \"critical\": len(critical), \"warning\": len(warning)})\r\n\r\n\r\nstate = connect_redis(STATE_DB, \"state\")\r\nbank = connect_redis(BANK_DB, \"bank\")\r\nupdate_bank_summary()\r\nthreading.Thread(target=mqtt_loop, daemon=True).start()\r\nlog.info(\"Digital Twin MQTT mode on port 8001\")\r\napp.run(host=\"0.0.0.0\", port=8001)\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"digital-twin-code","namespace":"aiot"}}
