, \"-\")\n            mraw = bank.get(f\"bank:machines:{mid}\")\n            if not mraw: return f\"Stroj {mid} sa nenasiel.\"\n            md = json.loads(mraw); mt = md.get(\"metrics\", {})\n            lines = [f\"{mid} | typ: {md.get('machine_type','-')} | stav: {md.get('status','-')}\",\n                     f\"Teplota: {mt.get('temperature','-')}C | Vibracie: {mt.get('vibration','-')}mm/s | Tlak: {mt.get('pressure','-')}bar | RPM: {mt.get('rpm','-')}\"]\n            for v in md.get(\"violations\",[]): lines.append(f\"Porusenia: {v['metric']}={v['value']}\")\n            hist = bank.lrange(f\"bank:history:{mid}\", 0, 4)\n            if hist:\n                lines.append(\"Historia (poslednych 5):\")\n                for e in hist:\n                    d = json.loads(e); lines.append(f\"  T={d.get('temperature','-')} V={d.get('vibration','-')} P={d.get('pressure','-')} [{d.get('status','-')}]\")\n            return \"\\n\".join(lines)\n        total,ok,warn,crit = s.get(\"total\",0),s.get(\"ok\",0),s.get(\"warning\",0),s.get(\"critical\",0)\n        if any(k in ql for k in [\"summary\",\"status\",\"overview\",\"suhrn\",\"prehlad\",\"total\",\"celkom\",\"factory\",\"stav\"]):\n            cn = \", \".join(s.get(\"critical_machines\",[])[:10])\n            return f\"Tovarena — prehlad:\\nCelkom: {total} strojov | OK: {ok} | Warning: {warn} | Critical: {crit}\\nTop critical: {cn}{'...' if crit\u003e10 else ''}\"\n        if any(k in ql for k in [\"critical\",\"kritick\",\"alarm\"]):\n            return f\"Kriticke stroje ({crit}):\\n\" + \"\\n\".join(f\"  {n}\" for n in s.get(\"critical_machines\",[])[:20])\n        if any(k in ql for k in [\"warning\",\"varov\",\"warn\"]):\n            return f\"Warning stroje ({warn}):\\n\" + \"\\n\".join(f\"  {n}\" for n in s.get(\"warning_machines\",[])[:20])\n        if any(k in ql for k in [\"how many\",\"kolko\",\"pocet\"]):\n            return f\"Celkom {total} strojov: {ok} OK, {warn} warning, {crit} critical.\"\n    except Exception as e: log.error(f\"Bank error: {e}\")\n    return None\n\nFOLLOWUP_ANSWERS = [\n    \"What is the factory status?\",\n    \"Show me critical machines\",\n    \"Which machines have warnings?\",\n    \"How many machines are running?\",\n    \"Show turbine-0340 details\"\n]\n\ndef call_sambanova(query):\n    try:\n        r = requests.post(f\"{SAMBANOVA_URL}/v1/chat/completions\",\n            json={\"model\":\"sambanova-aiot\",\"messages\":[{\"role\":\"user\",\"content\":query}]}, timeout=60)\n        if r.status_code == 200: return r.json()[\"choices\"][0][\"message\"][\"content\"]\n        log.warning(f\"SambaNova HTTP {r.status_code}\")\n    except Exception as e: log.error(f\"SambaNova error: {e}\")\n    return None\n\ndef make_response_json(content, msg_id=None):\n    return {\n        \"id\": msg_id or f\"rag-{int(time.time())}\",\n        \"object\": \"chat.completion\",\n        \"model\": \"sambanova-aiot\",\n        \"choices\": [{\"index\": 0, \"message\": {\"role\": \"assistant\", \"content\": content}, \"finish_reason\": \"stop\"}],\n        \"usage\": {\"prompt_tokens\": 0, \"completion_tokens\": 0, \"total_tokens\": 0}\n    }\n\ndef make_streaming_response(content, msg_id=None):\n    rid = msg_id or f\"rag-{int(time.time())}\"\n    def generate():\n        # Send content in chunks for natural streaming feel\n        chunk_size = 20\n        for i in range(0, len(content), chunk_size):\n            chunk = content[i:i+chunk_size]\n            data = {\n                \"id\": rid, \"object\": \"chat.completion.chunk\", \"model\": \"sambanova-aiot\",\n                \"choices\": [{\"index\": 0, \"delta\": {\"content\": chunk}, \"finish_reason\": None}]\n            }\n            yield f\"data: {json.dumps(data)}\\n\\n\"\n            time.sleep(0.02)\n        # Send finish\n        data = {\n            \"id\": rid, \"object\": \"chat.completion.chunk\", \"model\": \"sambanova-aiot\",\n            \"choices\": [{\"index\": 0, \"delta\": {}, \"finish_reason\": \"stop\"}]\n        }\n        yield f\"data: {json.dumps(data)}\\n\\n\"\n        yield \"data: [DONE]\\n\\n\"\n    return Response(generate(), mimetype=\"text/event-stream\", headers={\"Cache-Control\": \"no-cache\", \"X-Accel-Buffering\": \"no\"})\n\ndef resolve_query(q):\n    ck = f\"rag:chat:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}\"\n    cached = rd.get(ck)\n    if cached:\n        stats[\"cache_hits\"] += 1; return cached, \"cache\"\n    if is_simple(q):\n        ba = answer_from_bank(q)\n        if ba:\n            stats[\"bank_hits\"] += 1; rd.setex(ck, BANK_TTL, ba); return ba, \"bank\"\n    stats[\"llm_calls\"] += 1\n    content = call_sambanova(q) or \"Inicializujem...\"\n    if content and \"Error\" not in content: rd.setex(ck, ANSWER_TTL, content)\n    return content, \"llm\"\n\n@app.route(\"/\")\ndef root(): return jsonify({\"service\":\"RAG Worker v10\",\"mode\":\"bank-first+junk-filter+streaming\"})\n\n@app.route(\"/status\")\ndef status_ep():\n    try:\n        raw = bank.get(\"bank:summary\")\n        if raw: return jsonify({\"summary\":json.loads(raw),\"source\":\"bank\"})\n    except: pass\n    return jsonify({\"error\":\"No data\"}), 404\n\n@app.route(\"/v1/chat/completions\", methods=[\"POST\"])\ndef chat():\n    body = flask_request.json or {}\n    msgs = body.get(\"messages\", [])\n    stream = body.get(\"stream\", False)\n    user = [m for m in msgs if m.get(\"role\") == \"user\"]\n    q = user[-1][\"content\"].strip() if user else \"summary\"\n    stats[\"queries\"] += 1\n\n    # Block junk queries\n    if is_junk(q):\n        stats[\"blocked\"] += 1\n        content = \"\\n\".join(FOLLOWUP_ANSWERS)\n        source = \"blocked-junk\"\n        log.info(f\"query='{q[:50]}' source={source}\")\n        if stream:\n            return make_streaming_response(content)\n        return jsonify(make_response_json(content))\n\n    content, source = resolve_query(q)\n    log.info(f\"query='{q[:50]}' source={source}\")\n\n    if stream:\n        return make_streaming_response(content)\n    return jsonify(make_response_json(content))\n\n@app.route(\"/v1/models\")\ndef models(): return jsonify({\"object\":\"list\",\"data\":[{\"id\":\"sambanova-aiot\",\"object\":\"model\"}]})\n\n@app.route(\"/stats\")\ndef stats_ep2(): return jsonify({**stats, \"uptime_s\": int(time.time()-stats[\"start_time\"])})\n\nlog.info(\"RAG Worker v10 — bank-first, junk-filter, streaming, complex-\u003eLLM\")\napp.run(host=\"0.0.0.0\", port=7000)\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"rag-worker-code","namespace":"aiot"}}
    name: rag-worker-code
    namespace: aiot
- apiVersion: v1
  data:
    redis-master.conf: |
      bind 0.0.0.0
      port 6379
      save 60 1000
      save 300 100
      save 900 1
      maxmemory 400mb
      maxmemory-policy allkeys-lru
      appendonly yes
      appendfsync everysec
      min-replicas-to-write 0
      min-replicas-max-lag 10
    redis-slave.conf: |
      bind 0.0.0.0
      port 6379
      replicaof redis-0.redis-headless.aiot.svc.cluster.local 6379
      save 60 1000
      save 300 100
      maxmemory 400mb
      maxmemory-policy allkeys-lru
      appendonly yes
      appendfsync everysec
    sentinel-entrypoint.sh: |
      #!/bin/sh
      cp /config/sentinel.conf /tmp/sentinel.conf
      exec redis-sentinel /tmp/sentinel.conf
    sentinel.conf: |
      port 26379
      sentinel monitor mymaster redis-0.redis-headless.aiot.svc.cluster.local 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      sentinel resolve-hostnames yes
      sentinel announce-hostnames yes
    slave-entrypoint.sh: |
      #!/bin/sh
      # Počkaj kým master je ready
      until redis-cli -h redis-0.redis-headless.aiot.svc.cluster.local ping 2>/dev/null; do
        echo "Waiting for master..."
        sleep 2
      done
      exec redis-server /config/redis-slave.conf
