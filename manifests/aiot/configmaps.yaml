- apiVersion: v1
  data:
    indexer.py: "import hashlib\r\nimport json\r\nimport logging\r\nimport os\r\nimport
      threading\r\nimport time\r\nfrom typing import List\r\n\r\nimport paho.mqtt.client
      as mqtt\r\nfrom paho.mqtt.enums import CallbackAPIVersion\r\nfrom qdrant_client
      import QdrantClient\r\nfrom qdrant_client.http import models as qmodels\r\n\r\nlogging.basicConfig(level=logging.INFO)\r\nlog
      = logging.getLogger(\"qdrant-indexer\")\r\n\r\n\r\ndef parse_host_port(host_value,
      port_value, default_host, default_port):\r\n    host = host_value or default_host\r\n
      \   port = port_value or str(default_port)\r\n    if isinstance(host, str) and
      host.startswith(\"tcp://\"):\r\n        host = host.removeprefix(\"tcp://\")\r\n
      \       if \":\" in host:\r\n            host, inferred_port = host.rsplit(\":\",
      1)\r\n            port = inferred_port\r\n    if isinstance(port, str) and port.startswith(\"tcp://\"):\r\n
      \       port = port.removeprefix(\"tcp://\")\r\n        if \":\" in port:\r\n
      \           host, port = port.rsplit(\":\", 1)\r\n    return host, int(port)\r\n\r\nMQTT_HOST
      = os.getenv(\"MQTT_HOST\", \"emqx.emqx.svc.cluster.local\")\r\nMQTT_PORT = int(os.getenv(\"MQTT_PORT\",
      \"1883\"))\r\nMQTT_TOPIC = os.getenv(\"MQTT_TOPIC\", \"sensors/#\")\r\nQDRANT_HOST,
      QDRANT_PORT = parse_host_port(\r\n    os.getenv(\"QDRANT_HOST\"),\r\n    os.getenv(\"QDRANT_PORT\"),\r\n
      \   \"qdrant.aiot.svc.cluster.local\",\r\n    6333,\r\n)\r\nCOLLECTION = os.getenv(\"QDRANT_COLLECTION\",
      \"sensor_history\")\r\nRETENTION_SECS = int(os.getenv(\"RETENTION_SECS\", \"3600\"))\r\nMAX_POINTS
      = int(os.getenv(\"MAX_POINTS\", \"50000\"))\r\nBATCH_SIZE = int(os.getenv(\"BATCH_SIZE\",
      \"64\"))\r\nFLUSH_INTERVAL = float(os.getenv(\"FLUSH_INTERVAL\", \"2\"))\r\n\r\nqdrant
      = QdrantClient(host=QDRANT_HOST, port=QDRANT_PORT, timeout=30)\r\nbuffer = []\r\nbuffer_lock
      = threading.Lock()\r\n\r\n\r\ndef fast_embed(text):\r\n    raw_text = text.encode(\"utf-8\")\r\n
      \   raw = b\"\"\r\n    for salt in (b\"\\x00\", b\"\\x01\", b\"\\x02\", b\"\\x03\"):\r\n
      \       raw += hashlib.sha256(salt + raw_text).digest()\r\n        if len(raw)
      >= 64 * 4:\r\n            break\r\n    vector = []\r\n    for index in range(64):\r\n
      \       value = (raw[index * 2] << 8 | raw[index * 2 + 1]) / 65535.0 * 2 - 1\r\n
      \       vector.append(value)\r\n    norm = sum(value * value for value in vector)
      ** 0.5\r\n    return [value / norm for value in vector] if norm > 0 else vector\r\n\r\n\r\ndef
      ensure_collection():\r\n    collections = {item.name for item in qdrant.get_collections().collections}\r\n
      \   if COLLECTION not in collections:\r\n        qdrant.create_collection(\r\n
      \           collection_name=COLLECTION,\r\n            vectors_config=qmodels.VectorParams(size=64,
      distance=qmodels.Distance.COSINE),\r\n        )\r\n        qdrant.create_payload_index(COLLECTION,
      \"machine_id\", qmodels.PayloadSchemaType.KEYWORD)\r\n        qdrant.create_payload_index(COLLECTION,
      \"machine_type\", qmodels.PayloadSchemaType.KEYWORD)\r\n        qdrant.create_payload_index(COLLECTION,
      \"location\", qmodels.PayloadSchemaType.KEYWORD)\r\n        qdrant.create_payload_index(COLLECTION,
      \"ts\", qmodels.PayloadSchemaType.FLOAT)\r\n        log.info(\"Created Qdrant
      collection %s\", COLLECTION)\r\n\r\n\r\ndef infer_location(payload, topic):\r\n
      \   if payload.get(\"location\"):\r\n        return payload[\"location\"]\r\n
      \   parts = topic.split(\"/\")\r\n    if len(parts) >= 2:\r\n        return
      parts[1]\r\n    return \"unknown\"\r\n\r\n\r\ndef infer_machine_type(machine_id,
      payload, topic):\r\n    if payload.get(\"machine_type\"):\r\n        return
      payload[\"machine_type\"]\r\n    if machine_id and \"-\" in machine_id:\r\n
      \       return machine_id.rsplit(\"-\", 1)[0]\r\n    parts = topic.split(\"/\")\r\n
      \   if len(parts) >= 3:\r\n        return parts[2]\r\n    return \"unknown\"\r\n\r\n\r\ndef
      text_for_embedding(payload, machine_id, machine_type, location):\r\n    return
      (\r\n        f\"machine {machine_id} type {machine_type} location {location}
      \"\r\n        f\"temperature {payload.get('temperature')} vibration {payload.get('vibration')}
      \"\r\n        f\"pressure {payload.get('pressure')} rpm {payload.get('rpm')}
      humidity {payload.get('humidity')} \"\r\n        f\"status {payload.get('status')}
      anomaly {payload.get('anomaly_score')}\"\r\n    )\r\n\r\n\r\ndef point_id(machine_id,
      ts_value, payload):\r\n    raw = json.dumps([machine_id, ts_value, payload],
      sort_keys=True)\r\n    return int(hashlib.sha1(raw.encode(\"utf-8\")).hexdigest()[:15],
      16)\r\n\r\n\r\ndef build_points(items: List[dict]):\r\n    points = []\r\n    for
      item in items:\r\n        points.append(\r\n            qmodels.PointStruct(\r\n
      \               id=item[\"id\"],\r\n                vector=fast_embed(item[\"text\"]),\r\n
      \               payload=item[\"payload\"],\r\n            )\r\n        )\r\n
      \   return points\r\n\r\n\r\ndef flush_items(items):\r\n    if not items:\r\n
      \       return\r\n    qdrant.upsert(collection_name=COLLECTION, points=build_points(items),
      wait=False)\r\n    log.info(\"Upserted %s Qdrant points\", len(items))\r\n\r\n\r\ndef
      flush_loop():\r\n    while True:\r\n        time.sleep(FLUSH_INTERVAL)\r\n        items
      = []\r\n        with buffer_lock:\r\n            if buffer:\r\n                items
      = buffer[:BATCH_SIZE]\r\n                del buffer[: len(items)]\r\n        if
      items:\r\n            try:\r\n                flush_items(items)\r\n            except
      Exception as exc:\r\n                log.error(\"Qdrant flush error: %s\", exc)\r\n
      \               with buffer_lock:\r\n                    buffer[:0] = items\r\n
      \                   if len(buffer) > BATCH_SIZE * 20:\r\n                        del
      buffer[BATCH_SIZE * 20 :]\r\n\r\n\r\ndef cleanup_loop():\r\n    while True:\r\n
      \       try:\r\n            cutoff = time.time() - RETENTION_SECS\r\n            qdrant.delete(\r\n
      \               collection_name=COLLECTION,\r\n                points_selector=qmodels.FilterSelector(\r\n
      \                   filter=qmodels.Filter(\r\n                        must=[qmodels.FieldCondition(key=\"ts\",
      range=qmodels.Range(lt=cutoff))]\r\n                    )\r\n                ),\r\n
      \               wait=False,\r\n            )\r\n            count = qdrant.count(COLLECTION,
      exact=False).count\r\n            if count > MAX_POINTS:\r\n                log.warning(\"Qdrant
      point count high: %s\", count)\r\n        except Exception as exc:\r\n            log.error(\"Cleanup
      error: %s\", exc)\r\n        time.sleep(60)\r\n\r\n\r\ndef on_connect(client,
      _userdata, _flags, reason_code, _properties=None):\r\n    if reason_code ==
      0:\r\n        client.subscribe(MQTT_TOPIC)\r\n        log.info(\"MQTT connected,
      subscribed to %s\", MQTT_TOPIC)\r\n    else:\r\n        log.error(\"MQTT connect
      failed with reason %s\", reason_code)\r\n\r\n\r\ndef on_message(_client, _userdata,
      message):\r\n    try:\r\n        data = json.loads(message.payload.decode(\"utf-8\"))\r\n
      \       payload = data.get(\"payload\", data) if isinstance(data, dict) else
      {}\r\n        machine_id = payload.get(\"machine_id\") or payload.get(\"sensor_id\",
      \"unknown\")\r\n        machine_type = infer_machine_type(machine_id, payload,
      message.topic)\r\n        location = infer_location(payload, message.topic)\r\n
      \       ts_value = float(payload.get(\"ts\") or time.time())\r\n        item_payload
      = {\r\n            \"machine_id\": machine_id,\r\n            \"machine_type\":
      machine_type,\r\n            \"location\": location,\r\n            \"topic\":
      message.topic,\r\n            \"ts\": ts_value,\r\n            \"status\": payload.get(\"status\"),\r\n
      \           \"temperature\": payload.get(\"temperature\"),\r\n            \"vibration\":
      payload.get(\"vibration\"),\r\n            \"pressure\": payload.get(\"pressure\"),\r\n
      \           \"rpm\": payload.get(\"rpm\"),\r\n            \"humidity\": payload.get(\"humidity\"),\r\n
      \           \"anomaly_score\": payload.get(\"anomaly_score\"),\r\n            \"raw\":
      payload,\r\n        }\r\n        item = {\r\n            \"id\": point_id(machine_id,
      ts_value, payload),\r\n            \"text\": text_for_embedding(payload, machine_id,
      machine_type, location),\r\n            \"payload\": item_payload,\r\n        }\r\n
      \       with buffer_lock:\r\n            buffer.append(item)\r\n            if
      len(buffer) >= BATCH_SIZE:\r\n                items = buffer[:BATCH_SIZE]\r\n
      \               del buffer[:BATCH_SIZE]\r\n            else:\r\n                items
      = None\r\n        if items:\r\n            flush_items(items)\r\n    except
      Exception as exc:\r\n        log.error(\"MQTT message error: %s\", exc)\r\n\r\n\r\ndef
      mqtt_loop():\r\n    while True:\r\n        try:\r\n            client = mqtt.Client(callback_api_version=CallbackAPIVersion.VERSION2,
      client_id=\"qdrant-indexer\")\r\n            client.on_connect = on_connect\r\n
      \           client.on_message = on_message\r\n            client.reconnect_delay_set(min_delay=1,
      max_delay=10)\r\n            client.connect(MQTT_HOST, MQTT_PORT, keepalive=60)\r\n
      \           client.loop_forever()\r\n        except Exception as exc:\r\n            log.error(\"MQTT
      loop error: %s\", exc)\r\n            time.sleep(5)\r\n\r\n\r\nensure_collection()\r\nthreading.Thread(target=flush_loop,
      daemon=True).start()\r\nthreading.Thread(target=cleanup_loop, daemon=True).start()\r\nlog.info(\"Qdrant
      indexer MQTT mode\")\r\nmqtt_loop()\r\n"
