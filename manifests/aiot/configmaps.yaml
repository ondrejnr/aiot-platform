ion\": \"hall-A\", \"temperature\": (34, 54), \"vibration\": (0.1, 1.6), \"pressure\": (0.0, 1.0), \"rpm\": (90, 160)},\r\n    {\"id\": \"conveyor-02\", \"type\": \"conveyor\", \"location\": \"outdoor-2\", \"temperature\": (30, 50), \"vibration\": (0.1, 1.4), \"pressure\": (0.0, 1.0), \"rpm\": (80, 150)},\r\n][:TOTAL_MACHINES]\r\n\r\nclient = mqtt.Client(client_id=\"sensor-simulator\")\r\nclient.connect(BROKER, PORT, 60)\r\nclient.loop_start()\r\n\r\n\r\nwhile True:\r\n    for machine in MACHINES:\r\n        payload = {\r\n            \"machine_id\": machine[\"id\"],\r\n            \"machine_type\": machine[\"type\"],\r\n            \"location\": machine[\"location\"],\r\n            \"temperature\": round(random.uniform(*machine[\"temperature\"]), 2),\r\n            \"vibration\": round(random.uniform(*machine[\"vibration\"]), 3),\r\n            \"pressure\": round(random.uniform(*machine[\"pressure\"]), 2),\r\n            \"rpm\": round(random.uniform(*machine[\"rpm\"]), 1),\r\n            \"humidity\": round(random.uniform(30, 70), 1),\r\n            \"status\": random.choices([\"OK\", \"WARNING\", \"CRITICAL\"], weights=[0.86, 0.11, 0.03], k=1)[0],\r\n            \"anomaly_score\": round(random.uniform(0.01, 0.95), 3),\r\n            \"ts\": time.time(),\r\n        }\r\n        topic = f\"sensors/{machine['location']}/{machine['type']}/{machine['id']}\"\r\n        client.publish(topic, json.dumps(payload), qos=0, retain=False)\r\n        print(f\"published {topic}\")\r\n    time.sleep(INTERVAL)\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"sensor-sim","namespace":"aiot"}}
