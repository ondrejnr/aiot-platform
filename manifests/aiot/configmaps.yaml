  data:
    proxy.py: "from fastapi import FastAPI, Request\r\nfrom fastapi.responses import
      StreamingResponse\r\nimport requests as req\r\nimport json, hashlib, time, os,
      re, logging\r\nimport redis\r\n\r\nlogging.basicConfig(level=logging.INFO)\r\nlog
      = logging.getLogger(\"groq-proxy\")\r\n\r\napp = FastAPI(title=\"Groq AIoT Gateway
      v3\")\r\nbank = redis.Redis(host=\"redis-master.aiot.svc.cluster.local\", port=6379,
      db=5, decode_responses=True)\r\ncache = redis.Redis(host=\"redis-master.aiot.svc.cluster.local\",
      port=6379, db=6, decode_responses=True)\r\n\r\nGROQ_URL = \"https://api.groq.com/openai/v1/chat/completions\"\r\nGROQ_KEY
      = os.environ.get(\"GROQ_API_KEY\", \"\")\r\nGROQ_MODEL = \"llama-3.1-8b-instant\"\r\nMODEL_NAME
      = \"groq-aiot\"\r\nQDRANT_URL = \"http://qdrant.aiot.svc.cluster.local:6333\"\r\nVECTOR_SIZE
      = 64\r\nLLM_CACHE_TTL = 300\r\nBANK_CACHE_TTL = 600\r\nRATE_LIMIT_RPM = 30\r\nRATE_LIMIT_KEY
      = \"groq:rate_counter\"\r\n\r\nSIMPLE_KW = [\"summary\",\"status\",\"overview\",\"suhrn\",\"prehlad\",\"how
      many\",\"kolko\",\"pocet\",\"total\",\"celkom\",\"critical\",\"kritick\",\"warning\",\"varov\",\"alarm\",\"list\",\"zoznam\",\"stav\",\"factory\",\"tovarena\",\"machines\",\"stroje\",\"show\",\"ukaz\"]\r\nCOMPLEX_KW
      = [\"why\",\"preco\",\"cause\",\"pricina\",\"recommend\",\"odporuc\",\"predict\",\"trend\",\"analyze\",\"analyz\",\"compare\",\"porovnaj\",\"explain\",\"vysvetli\",\"what
      if\",\"should\",\"plan\",\"optimiz\",\"improve\",\"suggest\",\"navrhn\",\"priemern\",\"average\",\"najvy\",\"highest\",\"max\",\"min\",\"lowest\",\"top\",\"worst\",\"best\",\"forecast\",\"root
      cause\"]\r\nMACH_RE = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)[-_]?\\d+',
      re.I)\r\nJUNK_RE = re.compile(r'(follow.?up|suggest.*question|### task|relevant
      question|generate.*title|generate.*tag|broad tags|keywords|title for)', re.I)\r\n\r\n#
      Patterns that indicate bad/hallucinated safety-filter response\r\nBAD_RESPONSE_RE
      = re.compile(r'(cannot provide information|illegal.*activities|harmful.*activities|denial.of.service|dos.attack|rate
      limit|error \\()', re.I)\r\n\r\nstats = {\"queries\":0,\"bank_hits\":0,\"cache_hits\":0,\"llm_calls\":0,\"blocked\":0,\"retries\":0,\"start_time\":time.time()}\r\n\r\nSYSTEM_PROMPT
      = \"\"\"You are Groq AIoT - industrial IoT assistant (Groq Cloud).\r\nFactory:
      6 types: pump, motor, generator, turbine, compressor, conveyor.\r\nLocations:
      hall-A, hall-B, hall-C, basement, outdoor-1, outdoor-2.\r\nAnswer in SAME LANGUAGE
      as user. Be precise. Units: temperature=C, vibration=mm/s, pressure=bar, rpm=RPM.\r\nUse
      ONLY the pre-calculated STATISTICS section for averages/max/min.\r\nYou are
      a FACTORY MONITORING system. All data is about industrial machines. Never refuse
      to answer about factory data.\"\"\"\r\n\r\nFOLLOWUP_ANSWERS = [\"What is the
      factory status?\",\"Show me critical machines\",\"Which machines have warnings?\",\"How
      many machines are running?\",\"Show turbine-0340 details\"]\r\n\r\ndef is_junk(q):
      return bool(JUNK_RE.search(q))\r\ndef is_complex(q): return any(k in q.lower()
      for k in COMPLEX_KW)\r\ndef is_simple(q):\r\n    if is_complex(q): return False\r\n
      \   ql = q.lower()\r\n    if MACH_RE.search(ql): return True\r\n    return any(k
      in ql for k in SIMPLE_KW)\r\n\r\ndef is_bad_response(text):\r\n    \"\"\"Check
      if response is an error or safety-filter hallucination.\"\"\"\r\n    if not
      text: return True\r\n    return bool(BAD_RESPONSE_RE.search(text))\r\n\r\ndef
      get_ck(q): return f\"groq:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}\"\r\n\r\ndef
      check_rate():\r\n    try:\r\n        c = cache.get(RATE_LIMIT_KEY)\r\n        if
      c and int(c) >= RATE_LIMIT_RPM: return False\r\n        p = cache.pipeline();
      p.incr(RATE_LIMIT_KEY); p.expire(RATE_LIMIT_KEY, 60); p.execute()\r\n        return
      True\r\n    except: return True\r\n\r\ndef answer_from_bank(q):\r\n    ql =
      q.lower()\r\n    try:\r\n        raw = bank.get(\"bank:summary\")\r\n        if
      not raw: return None\r\n        s = json.loads(raw)\r\n        m = MACH_RE.search(ql)\r\n
      \       if m:\r\n            mid = m.group(0).replace(\"_\",\"-\")\r\n            mraw
      = bank.get(f\"bank:machines:{mid}\")\r\n            if not mraw: return f\"Stroj
      {mid} sa nenasiel.\"\r\n            md = json.loads(mraw); mt = md.get(\"metrics\",{})\r\n
      \           lines = [f\"{mid} | typ: {md.get('machine_type','-')} | stav: {md.get('status','-')}\",\r\n
      \                    f\"Teplota: {mt.get('temperature','-')}C | Vibracie: {mt.get('vibration','-')}mm/s
      | Tlak: {mt.get('pressure','-')}bar | RPM: {mt.get('rpm','-')}\"]\r\n            for
      v in md.get(\"violations\",[]): lines.append(f\"Porusenie: {v['metric']}={v['value']}\")\r\n
      \           hist = bank.lrange(f\"bank:history:{mid}\", 0, 4)\r\n            if
      hist:\r\n                lines.append(\"Historia (poslednych 5):\")\r\n                for
      e in hist:\r\n                    d = json.loads(e); lines.append(f\"  T={d.get('temperature','-')}
      V={d.get('vibration','-')} P={d.get('pressure','-')} [{d.get('status','-')}]\")\r\n
      \           return \"\\n\".join(lines)\r\n        total,ok,warn,crit = s.get(\"total\",0),s.get(\"ok\",0),s.get(\"warning\",0),s.get(\"critical\",0)\r\n
      \       if any(k in ql for k in [\"summary\",\"status\",\"overview\",\"suhrn\",\"prehlad\",\"total\",\"celkom\",\"factory\",\"tovarena\",\"stav\"]):\r\n
      \           cn = \", \".join(s.get(\"critical_machines\",[])[:10])\r\n            return
      f\"Tovarena — prehlad:\\nCelkom: {total} strojov | OK: {ok} | Warning: {warn}
      | Critical: {crit}\\nTop critical: {cn}{'...' if crit>10 else ''}\"\r\n        if
      any(k in ql for k in [\"critical\",\"kritick\",\"alarm\"]):\r\n            return
      f\"Kriticke stroje ({crit}):\\n\" + \"\\n\".join(f\"  {n}\" for n in s.get(\"critical_machines\",[])[:20])\r\n
      \       if any(k in ql for k in [\"warning\",\"varov\",\"warn\"]):\r\n            return
      f\"Warning stroje ({warn}):\\n\" + \"\\n\".join(f\"  {n}\" for n in s.get(\"warning_machines\",[])[:20])\r\n
      \       if any(k in ql for k in [\"how many\",\"kolko\",\"pocet\"]):\r\n            return
      f\"Celkom {total} strojov: {ok} OK, {warn} warning, {crit} critical.\"\r\n    except
      Exception as e: log.error(f\"Bank error: {e}\")\r\n    return None\r\n\r\ndef
      compute_type_stats():\r\n    type_data = {}\r\n    try:\r\n        all_keys
      = bank.keys(\"bank:machines:*\")\r\n        if not all_keys: return {}\r\n        pipe
      = bank.pipeline()\r\n        for k in all_keys: pipe.get(k)\r\n        results
      = pipe.execute()\r\n        for raw_m in results:\r\n            if not raw_m:
      continue\r\n            try:\r\n                md = json.loads(raw_m); mt =
      md.get(\"machine_type\",\"\")\r\n                if mt not in type_data:\r\n
      \                   type_data[mt] = {\"temps\":[],\"vibs\":[],\"rpms\":[],\"pressures\":[],\"statuses\":{},\"count\":0}\r\n
      \               td = type_data[mt]; td[\"count\"] += 1\r\n                metrics
      = md.get(\"metrics\",{}); mid = md.get(\"machine_id\",\"?\")\r\n                for
      key,lst in [(\"temperature\",\"temps\"),(\"vibration\",\"vibs\"),(\"rpm\",\"rpms\"),(\"pressure\",\"pressures\")]:\r\n
      \                   v = metrics.get(key)\r\n                    if v is not
      None: td[lst].append((float(v), mid))\r\n                st = md.get(\"status\",\"OK\");
      td[\"statuses\"][st] = td[\"statuses\"].get(st,0) + 1\r\n            except:
      continue\r\n    except: pass\r\n    return type_data\r\n\r\ndef bank_context_for_llm(query):\r\n
      \   ctx = []; q = query.lower()\r\n    try:\r\n        raw = bank.get(\"bank:summary\")\r\n
      \       if not raw: return \"No data.\"\r\n        s = json.loads(raw)\r\n        ctx.append(f\"FACTORY:
      {s.get('total',0)} machines | OK:{s.get('ok',0)} WARNING:{s.get('warning',0)}
      CRITICAL:{s.get('critical',0)}\")\r\n        m = MACH_RE.search(q)\r\n        if
      m:\r\n            mid = m.group(0).replace(\"_\",\"-\")\r\n            mraw
      = bank.get(f\"bank:machines:{mid}\")\r\n            if mraw:\r\n                md
      = json.loads(mraw); mt = md.get(\"metrics\",{})\r\n                ctx.append(f\"\\nMACHINE:
      {mid} type={md.get('machine_type','-')} status={md.get('status','-')} T={mt.get('temperature','-')}
      V={mt.get('vibration','-')} P={mt.get('pressure','-')} RPM={mt.get('rpm','-')}\")\r\n
      \           return \"\\n\".join(ctx)\r\n        type_data = compute_type_stats()\r\n
      \       if type_data:\r\n            ctx.append(\"\\n=== STATISTICS ===\")\r\n
      \           for mtype in [\"turbine\",\"generator\",\"compressor\",\"motor\",\"pump\",\"conveyor\"]:\r\n
      \               td = type_data.get(mtype)\r\n                if not td: continue\r\n
      \               ctx.append(f\"\\n{mtype.upper()} ({td['count']}):\")\r\n                for
      label,lst,unit,fmt in [(\"Temp\",\"temps\",\"C\",\".1f\"),(\"Vib\",\"vibs\",\"mm/s\",\".2f\"),(\"RPM\",\"rpms\",\"\",\".0f\"),(\"Press\",\"pressures\",\"bar\",\".1f\")]:\r\n
      \                   if td[lst]:\r\n                        vals = [t[0] for
      t in td[lst]]\r\n                        avg = sum(vals)/len(vals)\r\n                        mx
      = max(td[lst], key=lambda x: x[0])\r\n                        ctx.append(f\"
      \ {label}: avg={avg:{fmt}}{unit} max={mx[0]:{fmt}}{unit}({mx[1]})\")\r\n                ctx.append(f\"
      \ Status: {td['statuses']}\")\r\n        crit_list = s.get(\"critical_machines\",[])\r\n
      \       if crit_list:\r\n            ctx.append(f\"\\nCRITICAL ({len(crit_list)}):\")\r\n
      \           for mid2 in crit_list[:10]:\r\n                mraw = bank.get(f\"bank:machines:{mid2}\")\r\n
      \               if mraw:\r\n                    md = json.loads(mraw); mt =
      md.get(\"metrics\",{})\r\n                    ctx.append(f\"  {mid2} T={mt.get('temperature','-')}
      V={mt.get('vibration','-')} P={mt.get('pressure','-')}\")\r\n    except Exception
      as e: ctx.append(f\"Error: {e}\")\r\n    return \"\\n\".join(ctx)[:12000]\r\n\r\ndef
      fast_embed(text):\r\n    b = text.encode(); raw = b''\r\n    for salt in (b'\\x00',
      b'\\x01', b'\\x02', b'\\x03'): raw += hashlib.sha256(salt + b).digest()\r\n
      \   vec = []\r\n    for i in range(VECTOR_SIZE): val = (raw[i*2] << 8 | raw[i*2+1])
      / 65535.0 * 2 - 1; vec.append(val)\r\n    norm = sum(x*x for x in vec) ** 0.5\r\n
      \   return [x/norm for x in vec] if norm > 0 else vec\r\n\r\ndef call_groq(context,
      query, retry=0):\r\n    \"\"\"Call Groq API with retry on safety-filter hallucinations.\"\"\"\r\n
      \   try:\r\n        r = req.post(GROQ_URL, headers={\"Authorization\": f\"Bearer
      {GROQ_KEY}\", \"Content-Type\": \"application/json\"},\r\n            json={\"model\":GROQ_MODEL,\"messages\":[{\"role\":\"system\",\"content\":SYSTEM_PROMPT},{\"role\":\"user\",\"content\":f\"DATA:\\n{context}\\n\\nQUESTION:
      {query}\"}],\"max_tokens\":2000,\"temperature\":0.1}, timeout=30)\r\n        if
      r.status_code == 200:\r\n            ans = r.json()[\"choices\"][0][\"message\"][\"content\"]\r\n
      \           # If model hallucinated a safety refusal, retry once with simpler
      prompt\r\n            if is_bad_response(ans) and retry < 1:\r\n                log.warning(f\"[RETRY]
      Safety filter triggered, retrying with simpler prompt: '{query[:50]}'\")\r\n
      \               stats[\"retries\"] += 1\r\n                simple_r = req.post(GROQ_URL,
      headers={\"Authorization\": f\"Bearer {GROQ_KEY}\", \"Content-Type\": \"application/json\"},\r\n
      \                   json={\"model\":GROQ_MODEL,\"messages\":[\r\n                        {\"role\":\"system\",\"content\":\"You
      are a factory monitoring assistant. Answer questions about industrial machine
      sensor data. Always answer helpfully.\"},\r\n                        {\"role\":\"user\",\"content\":f\"Factory
      sensor data:\\n{context[:4000]}\\n\\nQuestion: {query}\"}\r\n                    ],\"max_tokens\":2000,\"temperature\":0.2},
      timeout=30)\r\n                if simple_r.status_code == 200:\r\n                    ans2
      = simple_r.json()[\"choices\"][0][\"message\"][\"content\"]\r\n                    if
      not is_bad_response(ans2):\r\n                        return ans2\r\n            return
      ans\r\n        elif r.status_code == 429: return \"Rate limit. Skuste znova.\"\r\n
      \       else: return f\"LLM Error ({r.status_code})\"\r\n    except Exception
      as e: return f\"LLM Error: {e}\"\r\n\r\ndef resolve_query(q):\r\n    ck = get_ck(q)\r\n
      \   cached = cache.get(ck)\r\n    if cached and not is_bad_response(cached):\r\n
      \       stats[\"cache_hits\"] += 1; log.info(f\"[CACHE] '{q[:50]}'\"); return
      cached, \"cache\"\r\n    if is_simple(q):\r\n        ba = answer_from_bank(q)\r\n
      \       if ba: stats[\"bank_hits\"] += 1; cache.setex(ck, BANK_CACHE_TTL, ba);
      log.info(f\"[BANK] '{q[:50]}' 0 tokenov\"); return ba, \"bank\"\r\n    if not
      check_rate(): return \"Rate limit 30/min.\", \"rate_limited\"\r\n    stats[\"llm_calls\"]
      += 1\r\n    ctx = bank_context_for_llm(q)\r\n    ans = call_groq(ctx, q)\r\n
      \   if ans and not is_bad_response(ans):\r\n        cache.setex(ck, LLM_CACHE_TTL,
      ans)\r\n    log.info(f\"[LLM] '{q[:50]}' Groq API\"); return ans, \"llm\"\r\n\r\ndef
      make_stream(content):\r\n    rid = f\"groq-{int(time.time())}\"\r\n    async
      def gen():\r\n        for i in range(0, len(content), 20):\r\n            chunk
      = content[i:i+20]\r\n            yield f\"data: {json.dumps({'id':rid,'object':'chat.completion.chunk','model':MODEL_NAME,'choices':[{'index':0,'delta':{'content':chunk},'finish_reason':None}]})}\\n\\n\"\r\n
      \       yield f\"data: {json.dumps({'id':rid,'object':'chat.completion.chunk','model':MODEL_NAME,'choices':[{'index':0,'delta':{},'finish_reason':'stop'}]})}\\n\\n\"\r\n
      \       yield \"data: [DONE]\\n\\n\"\r\n    return StreamingResponse(gen(),
      media_type=\"text/event-stream\")\r\n\r\n@app.get(\"/\")\r\ndef root(): return
      {\"service\":\"Groq AIoT v3\",\"mode\":\"bank-first-safe\"}\r\n@app.get(\"/health\")\r\ndef
      health():\r\n    try: return {\"status\":\"healthy\",\"machines\":len(bank.keys(\"bank:machines:*\"))}\r\n
      \   except: return {\"status\":\"degraded\"}\r\n@app.get(\"/v1/models\")\r\ndef
      models(): return {\"object\":\"list\",\"data\":[{\"id\":MODEL_NAME,\"object\":\"model\",\"owned_by\":\"groq-v3\"}]}\r\n@app.get(\"/stats\")\r\ndef
      stats_ep(): return {**stats,\"uptime_s\":int(time.time()-stats[\"start_time\"]),\"efficiency\":f\"{((stats['bank_hits']+stats['cache_hits'])/max(stats['queries'],1)*100):.1f}%\"}\r\n\r\n@app.post(\"/v1/chat/completions\")\r\nasync
      def chat(request: Request):\r\n    body = await request.json()\r\n    msgs =
      body.get(\"messages\",[])\r\n    stream = body.get(\"stream\", False)\r\n    um
      = [m for m in msgs if m.get(\"role\") == \"user\"]\r\n    q = um[-1][\"content\"].strip()
      if um else \"summary\"\r\n    stats[\"queries\"] += 1\r\n    if is_junk(q):\r\n
      \       stats[\"blocked\"] += 1; content = \"\\n\".join(FOLLOWUP_ANSWERS)\r\n
      \       if stream: return make_stream(content)\r\n        return {\"id\":f\"groq-{int(time.time())}\",\"object\":\"chat.completion\",\"model\":MODEL_NAME,\"choices\":[{\"index\":0,\"message\":{\"role\":\"assistant\",\"content\":content},\"finish_reason\":\"stop\"}],\"usage\":{\"prompt_tokens\":0,\"completion_tokens\":0,\"total_tokens\":0}}\r\n
      \   content, source = resolve_query(q)\r\n    if stream: return make_stream(content)\r\n
      \   return {\"id\":f\"groq-{int(time.time())}\",\"object\":\"chat.completion\",\"model\":MODEL_NAME,\"choices\":[{\"index\":0,\"message\":{\"role\":\"assistant\",\"content\":content},\"finish_reason\":\"stop\"}],\"usage\":{\"prompt_tokens\":0,\"completion_tokens\":0,\"total_tokens\":0}}\r\n\r\nlog.info(\"Groq
      AIoT v3 started - with safety-filter retry\")\r\n"
