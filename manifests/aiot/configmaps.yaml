        {"apiVersion":"v1","data":{"pg_sink.py":"import json\r\nimport logging\r\nimport os\r\nimport threading\r\nimport time\r\nfrom datetime import datetime, timezone\r\n\r\nimport paho.mqtt.client as mqtt\r\nfrom paho.mqtt.enums import CallbackAPIVersion\r\nimport psycopg2\r\nfrom psycopg2.extras import execute_values\r\n\r\nlogging.basicConfig(level=logging.INFO)\r\nlog = logging.getLogger(\"pg-sink\")\r\n\r\n\r\ndef parse_host_port(host_value, port_value, default_host, default_port):\r\n    host = host_value or default_host\r\n    port = port_value or str(default_port)\r\n    if isinstance(host, str) and host.startswith(\"tcp://\"):\r\n        host = host.removeprefix(\"tcp://\")\r\n        if \":\" in host:\r\n            host, inferred_port = host.rsplit(\":\", 1)\r\n            port = inferred_port\r\n    if isinstance(port, str) and port.startswith(\"tcp://\"):\r\n        port = port.removeprefix(\"tcp://\")\r\n        if \":\" in port:\r\n            host, port = port.rsplit(\":\", 1)\r\n    return host, int(port)\r\n\r\nMQTT_HOST = os.getenv(\"MQTT_HOST\", \"emqx.emqx.svc.cluster.local\")\r\nMQTT_PORT = int(os.getenv(\"MQTT_PORT\", \"1883\"))\r\nMQTT_TOPIC = os.getenv(\"MQTT_TOPIC\", \"sensors/#\")\r\nPGHOST, PGPORT = parse_host_port(\r\n    os.getenv(\"PG_HOST\") or os.getenv(\"POSTGRES_HOST\"),\r\n    os.getenv(\"POSTGRES_PORT\"),\r\n    \"postgres.aiot.svc.cluster.local\",\r\n    5432,\r\n)\r\nPGDATABASE = os.getenv(\"POSTGRES_DB\") or os.getenv(\"PG_DB\", \"aiot\")\r\nPGUSER = os.getenv(\"POSTGRES_USER\") or os.getenv(\"PG_USER\", \"aiot_admin\")\r\nPGPASSWORD = os.getenv(\"POSTGRES_PASSWORD\") or os.getenv(\"PG_PASS\", \"AioT2026!Prod\")\r\nBATCH_SIZE = int(os.getenv(\"BATCH_SIZE\", \"200\"))\r\nFLUSH_INTERVAL = float(os.getenv(\"FLUSH_INTERVAL\", \"2\"))\r\n\r\nbuffer = []\r\nbuffer_lock = threading.Lock()\r\n\r\n\r\ndef connect_postgres():\r\n    while True:\r\n        try:\r\n            conn = psycopg2.connect(\r\n                host=PGHOST,\r\n                port=PGPORT,\r\n                dbname=PGDATABASE,\r\n                user=PGUSER,\r\n                password=PGPASSWORD,\r\n            )\r\n            conn.autocommit = False\r\n            log.info(\"Postgres ready\")\r\n            return conn\r\n        except Exception as exc:\r\n            log.warning(\"Postgres unavailable: %s\", exc)\r\n            time.sleep(5)\r\n\r\n\r\npg_conn = connect_postgres()\r\n\r\n\r\ndef infer_location(payload, topic):\r\n    if payload.get(\"location\"):\r\n        return payload[\"location\"]\r\n    parts = topic.split(\"/\")\r\n    if len(parts) \u003e= 2:\r\n        return parts[1]\r\n    return \"unknown\"\r\n\r\n\r\ndef infer_machine_type(machine_id, payload, topic):\r\n    if payload.get(\"machine_type\"):\r\n        return payload[\"machine_type\"]\r\n    if machine_id and \"-\" in machine_id:\r\n        return machine_id.rsplit(\"-\", 1)[0]\r\n    parts = topic.split(\"/\")\r\n    if len(parts) \u003e= 3:\r\n        return parts[2]\r\n    return \"unknown\"\r\n\r\n\r\ndef normalize_timestamp(value):\r\n    if value is None:\r\n        return datetime.now(timezone.utc).isoformat()\r\n    if isinstance(value, (int, float)):\r\n        return datetime.fromtimestamp(float(value), tz=timezone.utc).isoformat()\r\n    if isinstance(value, str):\r\n        try:\r\n            return datetime.fromtimestamp(float(value), tz=timezone.utc).isoformat()\r\n        except Exception:\r\n            return value\r\n    return datetime.now(timezone.utc).isoformat()\r\n\r\n\r\ndef normalize(topic, payload):\r\n    machine_id = payload.get(\"machine_id\") or payload.get(\"sensor_id\", \"unknown\")\r\n    machine_type = infer_machine_type(machine_id, payload, topic)\r\n    violations = payload.get(\"violations\") if isinstance(payload.get(\"violations\"), list) else []\r\n    return (\r\n        normalize_timestamp(payload.get(\"ts\") or payload.get(\"timestamp\")),\r\n        machine_id,\r\n        machine_type,\r\n        infer_location(payload, topic),\r\n        str(payload.get(\"status\") or \"UNKNOWN\").upper(),\r\n        payload.get(\"temperature\"),\r\n        payload.get(\"vibration\"),\r\n        payload.get(\"pressure\"),\r\n        payload.get(\"rpm\"),\r\n        payload.get(\"humidity\"),\r\n        payload.get(\"anomaly_score\"),\r\n        payload.get(\"power_consumption\"),\r\n        payload.get(\"uptime_hours\"),\r\n        len(violations),\r\n        json.dumps(violations) if violations else None,\r\n        topic,\r\n    )\r\n\r\n\r\ndef flush_rows(rows):\r\n    global pg_conn\r\n    if not rows:\r\n        return\r\n    for _ in range(2):\r\n        try:\r\n            with pg_conn.cursor() as cursor:\r\n                execute_values(\r\n                    cursor,\r\n                    \"\"\"\r\n                    INSERT INTO sensor_data (\r\n                        ts, machine_id, machine_type, location,\r\n                        status, temperature, vibration, pressure, rpm,\r\n                        humidity, anomaly_score, power_consumption,\r\n                        uptime_hours, violations_count, violations_json, topic\r\n                    ) VALUES %s\r\n                    \"\"\",\r\n                    rows,\r\n                )\r\n            pg_conn.commit()\r\n            log.info(\"Inserted %s rows into Postgres\", len(rows))\r\n            return\r\n        except Exception as exc:\r\n            log.error(\"Postgres flush error: %s\", exc)\r\n            try:\r\n                pg_conn.rollback()\r\n            except Exception:\r\n                pass\r\n            try:\r\n                pg_conn.close()\r\n            except Exception:\r\n                pass\r\n            pg_conn = connect_postgres()\r\n    raise RuntimeError(\"Postgres flush failed after reconnect\")\r\n\r\n\r\ndef flush_loop():\r\n    while True:\r\n        time.sleep(FLUSH_INTERVAL)\r\n        rows = []\r\n        with buffer_lock:\r\n            if buffer:\r\n                rows = buffer[:BATCH_SIZE]\r\n                del buffer[: len(rows)]\r\n        if rows:\r\n            try:\r\n                flush_rows(rows)\r\n            except Exception as exc:\r\n                log.error(\"Flush loop error: %s\", exc)\r\n                with buffer_lock:\r\n                    buffer[:0] = rows\r\n                    if len(buffer) \u003e BATCH_SIZE * 20:\r\n                        del buffer[BATCH_SIZE * 20 :]\r\n\r\n\r\ndef on_connect(client, _userdata, _flags, reason_code, _properties=None):\r\n    if reason_code == 0:\r\n        client.subscribe(MQTT_TOPIC)\r\n        log.info(\"MQTT connected, subscribed to %s\", MQTT_TOPIC)\r\n    else:\r\n        log.error(\"MQTT connect failed with reason %s\", reason_code)\r\n\r\n\r\ndef on_message(_client, _userdata, message):\r\n    try:\r\n        data = json.loads(message.payload.decode(\"utf-8\"))\r\n        payload = data.get(\"payload\", data) if isinstance(data, dict) else {}\r\n        row = normalize(message.topic, payload)\r\n        with buffer_lock:\r\n            buffer.append(row)\r\n            if len(buffer) \u003e= BATCH_SIZE:\r\n                rows = buffer[:BATCH_SIZE]\r\n                del buffer[:BATCH_SIZE]\r\n            else:\r\n                rows = None\r\n        if rows:\r\n            flush_rows(rows)\r\n    except Exception as exc:\r\n        log.error(\"MQTT message error: %s\", exc)\r\n\r\n\r\ndef mqtt_loop():\r\n    while True:\r\n        try:\r\n            client = mqtt.Client(callback_api_version=CallbackAPIVersion.VERSION2, client_id=\"pg-sink\")\r\n            client.on_connect = on_connect\r\n            client.on_message = on_message\r\n            client.reconnect_delay_set(min_delay=1, max_delay=10)\r\n            client.connect(MQTT_HOST, MQTT_PORT, keepalive=60)\r\n            client.loop_forever()\r\n        except Exception as exc:\r\n            log.error(\"MQTT loop error: %s\", exc)\r\n            time.sleep(5)\r\n\r\n\r\nthreading.Thread(target=flush_loop, daemon=True).start()\r\nlog.info(\"PG sink MQTT mode\")\r\nmqtt_loop()\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"pg-sink-code","namespace":"aiot"}}
