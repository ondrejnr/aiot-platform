- apiVersion: v1
  data:
    sim.py: "import json\r\nimport os\r\nimport random\r\nimport time\r\n\r\nimport
      paho.mqtt.client as mqtt\r\n\r\nBROKER = os.getenv(\"BROKER\") or os.getenv(\"MQTT_HOST\",
      \"emqx.emqx.svc.cluster.local\")\r\nPORT = int(os.getenv(\"PORT\", \"1883\"))\r\nTOTAL_MACHINES
      = int(os.getenv(\"NUM_MACHINES\") or os.getenv(\"TOTAL_MACHINES\", \"10\"))\r\nINTERVAL
      = float(os.getenv(\"INTERVAL\", \"2\"))\r\n\r\nMACHINES = [\r\n    {\"id\":
      \"pump-01\", \"type\": \"pump\", \"location\": \"hall-A\", \"temperature\":
      (50, 72), \"vibration\": (0.4, 2.4), \"pressure\": (3.0, 6.8), \"rpm\": (2600,
      3200)},\r\n    {\"id\": \"pump-02\", \"type\": \"pump\", \"location\": \"hall-B\",
      \"temperature\": (52, 74), \"vibration\": (0.4, 2.6), \"pressure\": (3.2, 7.0),
      \"rpm\": (2550, 3150)},\r\n    {\"id\": \"motor-01\", \"type\": \"motor\", \"location\":
      \"hall-A\", \"temperature\": (60, 85), \"vibration\": (0.5, 2.8), \"pressure\":
      (0.0, 1.0), \"rpm\": (1300, 1650)},\r\n    {\"id\": \"motor-02\", \"type\":
      \"motor\", \"location\": \"hall-C\", \"temperature\": (58, 88), \"vibration\":
      (0.5, 3.1), \"pressure\": (0.0, 1.0), \"rpm\": (1320, 1700)},\r\n    {\"id\":
      \"generator-01\", \"type\": \"generator\", \"location\": \"basement\", \"temperature\":
      (72, 98), \"vibration\": (0.3, 2.5), \"pressure\": (0.0, 1.0), \"rpm\": (3400,
      3800)},\r\n    {\"id\": \"turbine-01\", \"type\": \"turbine\", \"location\":
      \"outdoor-1\", \"temperature\": (82, 112), \"vibration\": (0.8, 4.5), \"pressure\":
      (9.0, 17.5), \"rpm\": (7200, 9200)},\r\n    {\"id\": \"compressor-01\", \"type\":
      \"compressor\", \"location\": \"hall-B\", \"temperature\": (68, 92), \"vibration\":
      (0.8, 3.4), \"pressure\": (6.0, 11.0), \"rpm\": (3100, 3700)},\r\n    {\"id\":
      \"compressor-02\", \"type\": \"compressor\", \"location\": \"hall-C\", \"temperature\":
      (66, 90), \"vibration\": (0.8, 3.2), \"pressure\": (5.8, 10.8), \"rpm\": (3050,
      3650)},\r\n    {\"id\": \"conveyor-01\", \"type\": \"conveyor\", \"location\":
      \"hall-A\", \"temperature\": (34, 54), \"vibration\": (0.1, 1.6), \"pressure\":
      (0.0, 1.0), \"rpm\": (90, 160)},\r\n    {\"id\": \"conveyor-02\", \"type\":
      \"conveyor\", \"location\": \"outdoor-2\", \"temperature\": (30, 50), \"vibration\":
      (0.1, 1.4), \"pressure\": (0.0, 1.0), \"rpm\": (80, 150)},\r\n][:TOTAL_MACHINES]\r\n\r\nclient
      = mqtt.Client(client_id=\"sensor-simulator\")\r\nclient.connect(BROKER, PORT,
      60)\r\nclient.loop_start()\r\n\r\n\r\nwhile True:\r\n    for machine in MACHINES:\r\n
      \       payload = {\r\n            \"machine_id\": machine[\"id\"],\r\n            \"machine_type\":
      machine[\"type\"],\r\n            \"location\": machine[\"location\"],\r\n            \"temperature\":
      round(random.uniform(*machine[\"temperature\"]), 2),\r\n            \"vibration\":
      round(random.uniform(*machine[\"vibration\"]), 3),\r\n            \"pressure\":
      round(random.uniform(*machine[\"pressure\"]), 2),\r\n            \"rpm\": round(random.uniform(*machine[\"rpm\"]),
      1),\r\n            \"humidity\": round(random.uniform(30, 70), 1),\r\n            \"status\":
      random.choices([\"OK\", \"WARNING\", \"CRITICAL\"], weights=[0.86, 0.11, 0.03],
      k=1)[0],\r\n            \"anomaly_score\": round(random.uniform(0.01, 0.95),
      3),\r\n            \"ts\": time.time(),\r\n        }\r\n        topic = f\"sensors/{machine['location']}/{machine['type']}/{machine['id']}\"\r\n
      \       client.publish(topic, json.dumps(payload), qos=0, retain=False)\r\n
      \       print(f\"published {topic}\")\r\n    time.sleep(INTERVAL)\r\n"
