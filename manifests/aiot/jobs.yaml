- apiVersion: batch/v1
  kind: Job
  metadata:
    annotations:
      batch.kubernetes.io/cronjob-scheduled-timestamp: "2026-04-25T23:05:00Z"
    labels:
      batch.kubernetes.io/job-name: pg-partition-mgr-29619305
      job-name: pg-partition-mgr-29619305
    name: pg-partition-mgr-29619305
    namespace: aiot
    ownerReferences:
    - apiVersion: batch/v1
      blockOwnerDeletion: true
      controller: true
      kind: CronJob
      name: pg-partition-mgr
  spec:
    activeDeadlineSeconds: 120
    backoffLimit: 2
    completionMode: NonIndexed
    completions: 1
    manualSelector: false
    parallelism: 1
    podReplacementPolicy: TerminatingOrFailed
    selector:
      matchLabels:
    suspend: false
    template:
      metadata:
        labels:
          batch.kubernetes.io/job-name: pg-partition-mgr-29619305
          job-name: pg-partition-mgr-29619305
      spec:
        containers:
        - command:
          - /bin/bash
          - -c
          - |
            set -e
            H="postgres.aiot.svc.cluster.local"
            U="aiot_admin"
            D="aiot"
            echo "=== Partition manager ==="
            # Drop partitions older than 2 hours
            psql -h "$H" -U "$U" -d "$D" -t -A -c "
              SELECT tablename FROM pg_tables
              WHERE schemaname='public'
                AND tablename ~ '^sensor_data_20'
              ORDER BY tablename;" | while read -r part; do
              ts=$(echo "$part" | sed 's/sensor_data_//' | sed 's/_/ /g' | head -c13)
              if [ -n "$ts" ]; then
                cutoff=$(date -u -d '2 hours ago' '+%Y %m %d %H')
                if [[ "$ts" < "$cutoff" ]]; then
                  echo "DROP $part"
                  psql -h "$H" -U "$U" -d "$D" -c "DROP TABLE IF EXISTS $part;"
                fi
              fi
            done
            # Create 4 future hourly partitions
            for i in 0 1 2 3; do
              start=$(date -u -d "+${i} hours" '+%Y-%m-%d %H:00:00')
              end=$(date -u -d "+$((i+1)) hours" '+%Y-%m-%d %H:00:00')
              name="sensor_data_$(date -u -d "+${i} hours" '+%Y_%m_%d_%H')"
              psql -h "$H" -U "$U" -d "$D" -c "
                CREATE TABLE IF NOT EXISTS $name
                PARTITION OF sensor_data
                FOR VALUES FROM ('$start') TO ('$end');" 2>/dev/null || true
              echo "Ensured partition $name"
            done
            echo "=== Done ==="
          env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                key: PGPASSWORD
                name: pg-credentials
          - name: PGOPTIONS
            value: -c statement_timeout=0
          image: postgres:16
          imagePullPolicy: IfNotPresent
          name: partition
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        restartPolicy: Never
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
  status:
    completionTime: "2026-04-25T23:05:04Z"
    conditions:
    - lastProbeTime: "2026-04-25T23:05:04Z"
      lastTransitionTime: "2026-04-25T23:05:04Z"
      message: Reached expected number of succeeded pods
      reason: CompletionsReached
      status: "True"
      type: SuccessCriteriaMet
    - lastProbeTime: "2026-04-25T23:05:04Z"
      lastTransitionTime: "2026-04-25T23:05:04Z"
      message: Reached expected number of succeeded pods
      reason: CompletionsReached
      status: "True"
      type: Complete
    ready: 0
    startTime: "2026-04-25T23:05:00Z"
    succeeded: 1
    terminating: 0
    uncountedTerminatedPods: {}
