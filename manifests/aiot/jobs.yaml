          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: pg-ha-superuser
          - name: RETENTION_DAYS
            value: "30"
          - name: BACKUP_DIR
            value: /backups
          image: postgres:16
          imagePullPolicy: IfNotPresent
          name: backup
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /backups
