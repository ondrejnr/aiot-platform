    labels:
      batch.kubernetes.io/job-name: postgres-backup-29618100
      job-name: postgres-backup-29618100
    name: postgres-backup-29618100
    namespace: aiot
    ownerReferences:
    - apiVersion: batch/v1
      blockOwnerDeletion: true
      controller: true
      kind: CronJob
      name: postgres-backup
  spec:
    activeDeadlineSeconds: 3600
    backoffLimit: 1
    completionMode: NonIndexed
    completions: 1
    manualSelector: false
    parallelism: 1
    podReplacementPolicy: TerminatingOrFailed
    selector:
      matchLabels:
    suspend: false
    template:
      metadata:
        labels:
          batch.kubernetes.io/job-name: postgres-backup-29618100
          job-name: postgres-backup-29618100
      spec:
        containers:
        - command:
          - /bin/bash
          - -c
          - |
            set -e
            TS=$(date -u +%Y-%m-%d-%H%M%S)
            DBS="aiot mlflow n8n open_webui grafana mattermost"
            for DB in $DBS; do
              mkdir -p "$BACKUP_DIR/$DB"
              echo "==> Dumping $DB"
              pg_dump -Fc -Z6 -d "postgresql://$PGUSER:$PGPASSWORD@$PGHOST:5432/$DB" -f "$BACKUP_DIR/$DB/$DB-$TS.dump"
              ls -lh "$BACKUP_DIR/$DB/$DB-$TS.dump"
            done
            echo "==> Pruning >${RETENTION_DAYS}d"
            find "$BACKUP_DIR" -type f -name '*.dump' -mtime +${RETENTION_DAYS} -print -delete
            echo "==> Disk usage:"
            du -sh "$BACKUP_DIR"/*
            echo "==> Backup complete"
          env:
          - name: PGHOST
            value: postgres.aiot.svc.cluster.local
          - name: PGUSER
            valueFrom:
              secretKeyRef:
                key: username
                name: pg-ha-superuser
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: pg-ha-superuser
          - name: RETENTION_DAYS
            value: "30"
          - name: BACKUP_DIR
            value: /backups
          image: postgres:16
          imagePullPolicy: IfNotPresent
          name: backup
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /backups
            name: backups
        dnsPolicy: ClusterFirst
        nodeSelector:
          piraeus.io/storage: "yes"
        restartPolicy: OnFailure
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
        volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: postgres-backup-data-piraeus
