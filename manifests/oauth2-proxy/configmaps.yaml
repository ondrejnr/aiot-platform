  kind: ConfigMap
  metadata:
    annotations:
      kubernetes.io/description: Contains a CA bundle that can be used to verify the
        kube-apiserver when using internal endpoints such as the internal service
        IP or kubernetes.default.svc. No other usage is guaranteed across distributions
        of Kubernetes clusters.
    name: kube-root-ca.crt
    namespace: oauth2-proxy
- apiVersion: v1
  data:
    oauth2_proxy.cfg: |
      provider = "oidc"
      oidc_issuer_url = "https://kubeflow.35.241.255.137.nip.io/dex"
      scope = "profile email groups openid"
      email_domains = [ "*" ]

      upstreams = [ "static://200" ]

      skip_auth_routes = [
        "^/dex/",
      ]

      api_routes = [
        "/api/",
        "/apis/",
        "^/ml_metadata",
      ]

      skip_oidc_discovery = true
      login_url = "/dex/auth"
      redeem_url = "http://dex.auth.svc.cluster.local:5556/dex/token"
      oidc_jwks_url = "http://dex.auth.svc.cluster.local:5556/dex/keys"

      # CHANGED: false = ext-authz deny redirects to /oauth2/sign_in (no CSRF cookie in ext-authz response)
      # then /oauth2/start sets CSRF cookie via normal VirtualService route (more reliable)
      skip_provider_button = false

      provider_display_name = "Dex"
      custom_sign_in_logo = "/custom-theme/kubeflow-logo.svg"
      banner = "-"
      footer = "-"

      prompt = "none"

      set_authorization_header = true
      set_xauthrequest = true

      cookie_name = "oauth2_proxy_kubeflow"
      cookie_expire = "24h"
      cookie_refresh = 0

      code_challenge_method = "S256"

      # Unique CSRF cookie per auth flow to prevent collision
      cookie_csrf_per_request = false
      cookie_csrf_expire = "15m"

      redirect_url = "/oauth2/callback"
      relative_redirect_url = true
      reverse_proxy = true
      cookie_secure = true
      cookie_samesite = "lax"
  kind: ConfigMap
  metadata:
    annotations:
