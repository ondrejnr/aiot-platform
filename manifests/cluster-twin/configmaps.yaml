      #!/usr/bin/env python3
      """Cluster Twin — reports via direct K8s API, no kubectl."""
      import json
      import os
      import ssl
      import sys
      import urllib.request
      import urllib.error
      from datetime import datetime, timezone, timedelta

      WEBHOOK = os.environ["MM_WEBHOOK"]
      MODE = os.environ.get("MODE", "daily")
      CLUSTER_NAME = os.environ.get("CLUSTER_NAME", "aiot2")

      API = "https://kubernetes.default.svc"
      with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
          TOKEN = f.read().strip()
      CA = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      CTX = ssl.create_default_context(cafile=CA)


      def api(path):
          req = urllib.request.Request(API + path, headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"})
          try:
              with urllib.request.urlopen(req, context=CTX, timeout=30) as r:
                  return json.loads(r.read())
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  return None
              print(f"API {path}: HTTP {e.code}", file=sys.stderr)
              return None
          except Exception as e:
              print(f"API {path}: {e}", file=sys.stderr)
              return None


      def post_mm(text):
          data = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(WEBHOOK, data=data, headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.status
          except urllib.error.URLError as e:
              print(f"webhook error: {e}", file=sys.stderr)
              return 0


      def check_nodes():
          d = api("/api/v1/nodes")
          if not d:
              return None, ["nodes: query failed"]
          bad = []
          ready = 0
          for n in d.get("items", []):
              name = n["metadata"]["name"]
              conds = {c["type"]: c["status"] for c in n["status"].get("conditions", [])}
              if conds.get("Ready") == "True":
                  ready += 1
              else:
                  bad.append(f"{name} NotReady")
              for p in ("MemoryPressure", "DiskPressure", "PIDPressure"):
                  if conds.get(p) == "True":
                      bad.append(f"{name} {p}")
          return (ready, len(d["items"])), bad


      def _owned_by_job(pod):
          for o in pod["metadata"].get("ownerReferences", []) or []:
              if o.get("kind") == "Job":
                  return True
          return False


      def _recent_restart(pod, window_min=20):
          """Return True only if any container was terminated within the last window_min minutes."""
          cutoff = datetime.now(timezone.utc) - timedelta(minutes=window_min)
          for c in pod["status"].get("containerStatuses", []) or []:
              term = c.get("lastState", {}).get("terminated", {})
              fin = term.get("finishedAt") if term else None
              if fin:
                  try:
                      t = datetime.fromisoformat(fin.replace("Z", "+00:00"))
                      if t > cutoff:
                          return True
                  except Exception:
                      pass
          return False


      def check_pods():
          d = api("/api/v1/pods")
          if not d:
              return None, ["pods: query failed"]
          running = 0
          failing = []
          for p in d.get("items", []):
              ns = p["metadata"]["namespace"]
              name = p["metadata"]["name"]
              phase = p["status"].get("phase", "")
              if phase == "Running":
                  all_ready = True
                  restart_total = 0
                  for c in p["status"].get("containerStatuses", []) or []:
                      if not c.get("ready"):
                          all_ready = False
                      restart_total += c.get("restartCount", 0)
                  if all_ready:
                      running += 1
                  else:
                      reason = ""
                      for c in p["status"].get("containerStatuses", []) or []:
                          w = c.get("state", {}).get("waiting", {})
                          if w:
                              reason = w.get("reason", "")
                              break
                      failing.append(f"{ns}/{name} NotReady {reason}".strip())
                  # Only alert on restarts that happened recently (avoid stale noise)
                  if restart_total >= 5 and _recent_restart(p, window_min=20):
                      failing.append(f"{ns}/{name} restarts={restart_total} (recent)")
              elif phase == "Succeeded":
                  running += 1
              elif phase == "Pending":
                  failing.append(f"{ns}/{name} Pending")
              elif phase == "Failed" and _owned_by_job(p):
                  # Skip: failed Job/CronJob pods are tracked by check_cronjobs()
                  pass
              else:
                  reason = ""
                  for c in p["status"].get("containerStatuses", []) or []:
                      w = c.get("state", {}).get("waiting", {})
                      if w:
                          reason = w.get("reason", "")
                          break
                  failing.append(f"{ns}/{name} {phase} {reason}".strip())
          return (running, len(d["items"])), failing


      def check_pvcs():
          d = api("/api/v1/persistentvolumeclaims")
          if not d:
              return []
          return [f"{p['metadata']['namespace']}/{p['metadata']['name']} {p['status'].get('phase','?')}"
                  for p in d.get("items", []) if p["status"].get("phase") != "Bound"]


      def check_cronjobs():
          d = api("/apis/batch/v1/cronjobs")
          if not d:
              return []
          warn = []
          for c in d.get("items", []):
              if c["spec"].get("suspend"):
                  continue
              ns = c["metadata"]["namespace"]
              name = c["metadata"]["name"]
              last = c["status"].get("lastScheduleTime")
              last_ok = c["status"].get("lastSuccessfulTime")
              if last and last_ok and last != last_ok:
                  try:
                      t1 = datetime.fromisoformat(last.replace("Z", "+00:00"))
                      t2 = datetime.fromisoformat(last_ok.replace("Z", "+00:00"))
                      if (t1 - t2).total_seconds() > 3600:
                          warn.append(f"{ns}/{name} last run not successful")
                  except Exception:
                      pass
          return warn


      def check_velero():
          d = api("/apis/velero.io/v1/namespaces/velero/backups")
          if not d:
              return []
          items = d.get("items", [])
          if not items:
              return ["velero: no backups"]
          latest = max(items, key=lambda b: b["metadata"].get("creationTimestamp", ""))
          phase = latest["status"].get("phase", "Unknown")
          name = latest["metadata"]["name"]
          created = latest["metadata"].get("creationTimestamp", "")
          age_h = 0.0
          try:
              t = datetime.fromisoformat(created.replace("Z", "+00:00"))
              age_h = (datetime.now(timezone.utc) - t).total_seconds() / 3600
          except Exception:
              pass
          msgs = []
          if phase != "Completed":
              msgs.append(f"velero: last backup {name} phase={phase}")
          if age_h > 30:
              msgs.append(f"velero: last backup {age_h:.0f}h old")
          return msgs


      def check_certs():
          d = api("/apis/cert-manager.io/v1/certificates")
          if not d:
              return []
          bad = []
          for c in d.get("items", []):
              ready = "Unknown"
              for cond in c.get("status", {}).get("conditions", []):
                  if cond["type"] == "Ready":
                      ready = cond["status"]
              if ready != "True":
                  bad.append(f"{c['metadata']['namespace']}/{c['metadata']['name']} NotReady")
          return bad


      def build_daily():
          lines = [f"### :sunrise: Cluster Daily Digest — `{CLUSTER_NAME}`",
                   f"_{datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}_", ""]
          nodes, nb = check_nodes()
          if nodes:
              r, t = nodes
              icon = ":white_check_mark:" if not nb else ":warning:"
              lines.append(f"{icon} **Nodes:** {r}/{t} Ready")
          for b in nb:
              lines.append(f"   - :x: {b}")

          pods, pb = check_pods()
          if pods:
              r, t = pods
              icon = ":white_check_mark:" if len(pb) == 0 else ":warning:"
              lines.append(f"{icon} **Pods:** {r}/{t} OK  ({len(pb)} issues)")
          for b in pb[:10]:
              lines.append(f"   - :x: {b}")
          if len(pb) > 10:
              lines.append(f"   - _…and {len(pb)-10} more_")

          pvc_bad = check_pvcs()
          if pvc_bad:
              lines.append(f":warning: **PVCs:** {len(pvc_bad)} not bound")
              for b in pvc_bad[:5]:
                  lines.append(f"   - {b}")
          else:
              lines.append(":white_check_mark: **PVCs:** all bound")

          cj_bad = check_cronjobs()
          if cj_bad:
              lines.append(f":warning: **CronJobs:** {len(cj_bad)} issues")
              for b in cj_bad[:5]:
                  lines.append(f"   - {b}")
          else:
              lines.append(":white_check_mark: **CronJobs:** healthy")

          vel = check_velero()
          if vel:
              for v in vel:
                  lines.append(f":warning: {v}")
          else:
              lines.append(":white_check_mark: **Velero:** last backup OK")

          cb = check_certs()
          if cb:
              lines.append(f":warning: **Certificates:** {len(cb)} not ready")
              for b in cb[:5]:
                  lines.append(f"   - {b}")
          else:
              lines.append(":white_check_mark: **Certificates:** all ready")

          lines.append("")
          lines.append("_rule-based, no LLM · cluster-twin v0.1_")
          return "\n".join(lines)


      def build_critical():
          alerts = []
          _, nb = check_nodes()
          for b in nb:
              alerts.append(f":rotating_light: NODE · {b}")

          _, pb = check_pods()
          for b in pb:
              if any(k in b for k in ("CrashLoop", "Failed", "restarts=", "ImagePullBackOff", "ErrImagePull", "OOMKilled")):
                  alerts.append(f":rotating_light: POD · {b}")

          for v in check_velero():
              alerts.append(f":rotating_light: BACKUP · {v}")

          if not alerts:
              return None
          header = (f"### :rotating_light: Critical Alerts — `{CLUSTER_NAME}`\n"
                    f"_{datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}_\n")
          return header + "\n".join(alerts[:20])


      def main():
          if MODE == "daily":
              msg = build_daily()
          elif MODE == "critical":
              msg = build_critical()
              if not msg:
                  print("silent: no critical")
                  return 0
          elif MODE == "test":
              msg = f":test_tube: cluster-twin test OK from `{CLUSTER_NAME}` at {datetime.now(timezone.utc).isoformat()}"
          else:
              print(f"unknown MODE {MODE}", file=sys.stderr)
              return 1
          st = post_mm(msg)
          print(f"posted status={st}")
          return 0 if st in (200, 204) else 2


      if __name__ == "__main__":
          sys.exit(main())
