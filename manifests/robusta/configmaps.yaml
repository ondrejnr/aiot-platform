try:\n            data = json.loads(body)\n            findings = data if isinstance(data, list) else [data]\n            for f in findings:\n                text += flatten(f) + \"\\n---\\n\"\n        except Exception:\n            text = body.decode(\"utf-8\", errors=\"replace\")\n    else:\n        text = body.decode(\"utf-8\", errors=\"replace\")\n    text = text.strip()\n    if not text:\n        return {\"ok\": True, \"empty\": True}\n    payload = {\"text\": text[:6000], \"channel\": CHANNEL, \"username\": USERNAME, \"icon_emoji\": \":robot_face:\"}\n    try:\n        r = requests.post(MM_URL, json=payload, timeout=10)\n        if r.status_code \u003e= 400:\n            print(f\"MM error {r.status_code}: {r.text[:200]}\", flush=True)\n            return {\"ok\": False, \"mm_status\": r.status_code}\n    except Exception as ex:\n        print(f\"MM exception: {ex}\", flush=True)\n        return {\"ok\": False, \"err\": str(ex)}\n    return {\"ok\": True}\n\n@app.get(\"/health\")\ndef health():\n    return {\"ok\": True}\n\nif __name__ == \"__main__\":\n    run(app, host=\"0.0.0.0\", port=8080)\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"mm-relay-code","namespace":"robusta"}}
