- apiVersion: v1
  data:
    relay.py: |
      import os, json, requests
      from fastapi import FastAPI, Request
      from uvicorn import run
      MM_URL = os.environ["MM_URL"]
      CHANNEL = os.environ.get("MM_CHANNEL", "k8s")
      USERNAME = os.environ.get("MM_USERNAME", "robusta")
      app = FastAPI()

      def flatten(finding: dict) -> str:
          title = finding.get("title") or finding.get("aggregation_key") or "Robusta alert"
          desc = finding.get("description", "")
          severity = finding.get("severity", "")
          source = finding.get("source", "")
          subject = finding.get("subject", {})
          sname = subject.get("name") if isinstance(subject, dict) else ""
          skind = subject.get("subject_type") if isinstance(subject, dict) else ""
          sns = subject.get("namespace") if isinstance(subject, dict) else ""
          cluster = finding.get("cluster", "")

          lines = [f"**[{severity.upper()}] {title}**"]
          if sname:
              lines.append(f"- {skind} `{sns}/{sname}` ({cluster})")
          if source:
              lines.append(f"- source: {source}")
          if desc:
              lines.append(f"\n{desc[:1500]}")

          # Enrichments
          enrichments = finding.get("enrichments") or []
          for e in enrichments[:3]:
              blocks = e.get("blocks") or []
              for b in blocks[:3]:
                  btype = b.get("block_type", "")
                  if btype == "markdown":
                      text = b.get("text", "")[:1000]
                      if text:
                          lines.append(f"\n> {text}")
                  elif btype == "header":
                      lines.append(f"\n_{b.get('text','')}_")
                  elif btype == "file":
                      lines.append(f"\n_(file: {b.get('filename','')})_")
          return "\n".join(lines)

      @app.post("/webhook")
      async def webhook(req: Request):
          ctype = req.headers.get("content-type", "")
          body = await req.body()
          text = ""
          if "application/json" in ctype:
              try:
                  data = json.loads(body)
                  findings = data if isinstance(data, list) else [data]
                  for f in findings:
                      text += flatten(f) + "\n---\n"
              except Exception:
                  text = body.decode("utf-8", errors="replace")
          else:
              text = body.decode("utf-8", errors="replace")
          text = text.strip()
          if not text:
              return {"ok": True, "empty": True}
          payload = {"text": text[:6000], "channel": CHANNEL, "username": USERNAME, "icon_emoji": ":robot_face:"}
          try:
              r = requests.post(MM_URL, json=payload, timeout=10)
              if r.status_code >= 400:
                  print(f"MM error {r.status_code}: {r.text[:200]}", flush=True)
                  return {"ok": False, "mm_status": r.status_code}
          except Exception as ex:
              print(f"MM exception: {ex}", flush=True)
              return {"ok": False, "err": str(ex)}
          return {"ok": True}

      @app.get("/health")
      def health():
          return {"ok": True}

      if __name__ == "__main__":
          run(app, host="0.0.0.0", port=8080)
  kind: ConfigMap
  metadata:
