    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: proxy
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 0
      type: RollingUpdate
    template:
      metadata:
        annotations:
          kubectl.kubernetes.io/restartedAt: "2026-04-22T12:15:21Z"
        labels:
          app: proxy
      spec:
        containers:
        - command:
          - nginx
          - -g
          - daemon off;
          - -c
          - /etc/nginx/nginx.conf
          image: registry.access.redhat.com/ubi9/nginx-124@sha256:b60dbaf28a767ede611ff98127e0f5a8db8b1afb0c531074fe29c9aef3e0e44a
