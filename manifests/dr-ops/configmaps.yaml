- apiVersion: v1
  data:
    backup.sh: |
      #!/bin/sh
      set -eu
      REPO_URL="https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/ondrejnr/aiot-platform.git"
      WORK=/tmp/repo
      rm -rf "$WORK"
      git clone --depth 1 "$REPO_URL" "$WORK"
      cd "$WORK"
      git config user.email "$GITHUB_EMAIL"
      git config user.name  "dr-manifest-bot"

      OUT="$WORK/manifests"
      rm -rf "$OUT"
      mkdir -p "$OUT/_cluster"

      # cluster-scoped resources
      for K in namespaces nodes persistentvolumes storageclasses clusterroles clusterrolebindings ingressclasses customresourcedefinitions; do
        echo "[cluster] $K"
        kubectl get "$K" -o yaml > "$OUT/_cluster/${K}.yaml" 2>/dev/null || true
      done

      NS_LIST=$(kubectl get ns -o jsonpath='{.items[*].metadata.name}')
      NS_KINDS="deployments statefulsets daemonsets cronjobs jobs services ingresses configmaps persistentvolumeclaims serviceaccounts roles rolebindings networkpolicies horizontalpodautoscalers poddisruptionbudgets"

      for NS in $NS_LIST; do
        mkdir -p "$OUT/$NS"
        for K in $NS_KINDS; do
          DATA=$(kubectl -n "$NS" get "$K" -o yaml 2>/dev/null || true)
          # skip if empty list
          if echo "$DATA" | grep -q "^items: \[\]$"; then
            continue
          fi
          if [ -n "$DATA" ]; then
            echo "$DATA" > "$OUT/$NS/${K}.yaml"
          fi
        done
        # secrets: only names + types, NEVER values
        kubectl -n "$NS" get secrets -o custom-columns=NAME:.metadata.name,TYPE:.type --no-headers 2>/dev/null \
          > "$OUT/$NS/_secrets.list" || true
      done

      # CRDs instances per group (best-effort, common ones)
      mkdir -p "$OUT/_crds"
      for CRD in $(kubectl get crd -o jsonpath='{.items[*].metadata.name}'); do
        SCOPE=$(kubectl get crd "$CRD" -o jsonpath='{.spec.scope}')
        if [ "$SCOPE" = "Namespaced" ]; then
          kubectl get "$CRD" --all-namespaces -o yaml 2>/dev/null > "$OUT/_crds/${CRD}.yaml" || true
        else
          kubectl get "$CRD" -o yaml 2>/dev/null > "$OUT/_crds/${CRD}.yaml" || true
        fi
        # remove if empty list
        if grep -q "^items: \[\]$" "$OUT/_crds/${CRD}.yaml" 2>/dev/null; then
          rm -f "$OUT/_crds/${CRD}.yaml"
        fi
      done

      # Strip volatile fields to reduce diff noise
      find "$OUT" -type f -name '*.yaml' -print0 | xargs -0 -r sed -i \
