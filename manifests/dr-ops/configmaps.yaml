- apiVersion: v1
  data:
    backup.sh: |
      #!/bin/sh
      set -eu
      REPO_URL="https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/ondrejnr/aiot-platform.git"
      WORK=/tmp/repo
      rm -rf "$WORK"
      git clone --depth 1 "$REPO_URL" "$WORK"
      cd "$WORK"
      git config user.email "$GITHUB_EMAIL"
      git config user.name  "dr-dns-bot"

      OUT="$WORK/cloudflare/dns"
      rm -rf "$OUT"
      mkdir -p "$OUT"

      CF="https://api.cloudflare.com/client/v4"
      AUTH="Authorization: Bearer ${CF_TOKEN}"

      # Verify token
      curl -fsS -H "$AUTH" "$CF/user/tokens/verify" > "$OUT/_token-status.json"

      # List zones (paginate up to 1000)
      curl -fsS -H "$AUTH" "$CF/zones?per_page=50" > /tmp/zones.json
      ZONES=$(jq -r '.result[] | "\(.id) \(.name)"' /tmp/zones.json)

      if [ -z "$ZONES" ]; then
        echo "WARN: no zones visible to this token"
      fi

      echo "$ZONES" | while read ZID ZNAME; do
        [ -z "$ZID" ] && continue
        echo "[zone] $ZNAME ($ZID)"
        ZDIR="$OUT/$ZNAME"
        mkdir -p "$ZDIR"
        # Full zone JSON (records)
        curl -fsS -H "$AUTH" "$CF/zones/$ZID/dns_records?per_page=1000" \
          | jq '.result' > "$ZDIR/records.json"
        # BIND export (canonical)
        curl -fsS -H "$AUTH" "$CF/zones/$ZID/dns_records/export" \
          > "$ZDIR/zone.bind" || true
        # Zone settings
        curl -fsS -H "$AUTH" "$CF/zones/$ZID" | jq '.result' > "$ZDIR/zone.json"
      done

      git add -A cloudflare/
      if git diff --cached --quiet; then
        echo "No DNS changes"
        exit 0
      fi
      STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      git commit -m "auto: cloudflare DNS snapshot $STAMP"
      git push origin HEAD:main
      echo "Pushed DNS snapshot $STAMP"
