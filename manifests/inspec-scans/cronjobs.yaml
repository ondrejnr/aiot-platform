apiVersion: v1
items:
- apiVersion: batch/v1
  kind: CronJob
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"name":"inspec-weekly-scan","namespace":"inspec-scans"},"spec":{"concurrencyPolicy":"Forbid","failedJobsHistoryLimit":2,"jobTemplate":{"spec":{"backoffLimit":0,"template":{"spec":{"containers":[{"args":["set +e\nAUTOMATE_URL=\"https://chef-automate.chef.svc.cluster.local:8443/data-collector/v0/\"\n\nNODES=\"\naiot-master|10.132.0.2|ondrejko2_gulkas|aiot-master.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000002\naiot-worker-01|10.132.0.3|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000003\naiot-worker-02|10.132.0.4|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000004\noci-e5-node1|172.16.200.10|opc|oci-e5-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000010\noci-e5-node2|172.16.200.11|opc|oci-e5-node2.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000011\noci-test-node1|172.16.200.12|opc|oci-test-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000012\n\"\n\nPROFILES=\"\nlinux-baseline|https://github.com/dev-sec/linux-baseline\nssh-baseline|https://github.com/dev-sec/ssh-baseline\nos-hardening|https://github.com/dev-sec/cis-dil-benchmark\n\"\n\nfor nodeline in $(echo \"$NODES\" | grep -v '^$'); do\n  NODE=$(echo $nodeline | cut -d'|' -f1)\n  IP=$(echo $nodeline | cut -d'|' -f2)\n  USR=$(echo $nodeline | cut -d'|' -f3)\n  KEY=$(echo $nodeline | cut -d'|' -f4)\n  UUID=$(echo $nodeline | cut -d'|' -f5)\n\n  for profline in $(echo \"$PROFILES\" | grep -v '^$'); do\n    PNAME=$(echo $profline | cut -d'|' -f1)\n    PURL=$(echo $profline | cut -d'|' -f2)\n\n    echo \"\"\n    echo \"==============================================================\"\n    echo \"SCAN: $NODE -\u003e $PNAME\"\n    echo \"==============================================================\"\n\n    cat \u003e /shared/config.json \u003c\u003cEOF\n{\n  \"reporter\": {\n    \"cli\": {},\n    \"automate\": {\n      \"url\": \"$AUTOMATE_URL\",\n      \"token\": \"$TOKEN\",\n      \"insecure\": true,\n      \"node_uuid\": \"$UUID\",\n      \"node_name\": \"$NODE\",\n      \"environment\": \"production\"\n    }\n  }\n}\nEOF\n\n    inspec exec $PURL \\\n      -t ssh://$USR@$IP \\\n      -i /keys/$KEY \\\n      --sudo \\\n      --chef-license=accept-silent \\\n      --waiver-file /waivers/waivers.yaml \\\n      --config /shared/config.json \\\n      --reporter cli 2\u003e\u00261 | tail -5\n  done\ndone\n"],"command":["sh","-c"],"env":[{"name":"TOKEN","valueFrom":{"secretKeyRef":{"key":"token","name":"automate-token"}}}],"image":"chef/inspec:5.22.65","name":"inspec","resources":{"limits":{"cpu":2,"memory":"2Gi"},"requests":{"cpu":"200m","memory":"512Mi"}},"volumeMounts":[{"mountPath":"/keys","name":"ssh-keys","readOnly":true},{"mountPath":"/waivers","name":"waivers","readOnly":true},{"mountPath":"/shared","name":"shared"}]}],"restartPolicy":"Never","volumes":[{"name":"ssh-keys","secret":{"defaultMode":256,"secretName":"ssh-keys"}},{"configMap":{"name":"inspec-waivers"},"name":"waivers"},{"emptyDir":{},"name":"shared"}]}},"ttlSecondsAfterFinished":604800}},"schedule":"0 3 * * 1","successfulJobsHistoryLimit":2}}
    name: inspec-weekly-scan
    namespace: inspec-scans
  spec:
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 2
    jobTemplate:
      metadata:
      spec:
        backoffLimit: 0
        template:
          metadata:
          spec:
            containers:
            - args:
              - |
                set +e
                AUTOMATE_URL="https://chef-automate.chef.svc.cluster.local:8443/data-collector/v0/"

                NODES="
                aiot-master|10.132.0.2|ondrejko2_gulkas|aiot-master.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000002
                aiot-worker-01|10.132.0.3|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000003
                aiot-worker-02|10.132.0.4|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000004
                oci-e5-node1|172.16.200.10|opc|oci-e5-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000010
                oci-e5-node2|172.16.200.11|opc|oci-e5-node2.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000011
                oci-test-node1|172.16.200.12|opc|oci-test-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000012
                "

                PROFILES="
                linux-baseline|https://github.com/dev-sec/linux-baseline
                ssh-baseline|https://github.com/dev-sec/ssh-baseline
                os-hardening|https://github.com/dev-sec/cis-dil-benchmark
                "

                for nodeline in $(echo "$NODES" | grep -v '^$'); do
                  NODE=$(echo $nodeline | cut -d'|' -f1)
                  IP=$(echo $nodeline | cut -d'|' -f2)
                  USR=$(echo $nodeline | cut -d'|' -f3)
                  KEY=$(echo $nodeline | cut -d'|' -f4)
                  UUID=$(echo $nodeline | cut -d'|' -f5)

                  for profline in $(echo "$PROFILES" | grep -v '^$'); do
                    PNAME=$(echo $profline | cut -d'|' -f1)
                    PURL=$(echo $profline | cut -d'|' -f2)

                    echo ""
                    echo "=============================================================="
                    echo "SCAN: $NODE -> $PNAME"
                    echo "=============================================================="

                    cat > /shared/config.json <<EOF
                {
                  "reporter": {
                    "cli": {},
                    "automate": {
                      "url": "$AUTOMATE_URL",
                      "token": "$TOKEN",
                      "insecure": true,
                      "node_uuid": "$UUID",
                      "node_name": "$NODE",
                      "environment": "production"
                    }
                  }
                }
                EOF

                    inspec exec $PURL \
                      -t ssh://$USR@$IP \
                      -i /keys/$KEY \
                      --sudo \
                      --chef-license=accept-silent \
                      --waiver-file /waivers/waivers.yaml \
                      --config /shared/config.json \
                      --reporter cli 2>&1 | tail -5
                  done
                done
              command:
              - sh
              - -c
              env:
              - name: TOKEN
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: automate-token
              image: chef/inspec:5.22.65
              imagePullPolicy: IfNotPresent
              name: inspec
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
                requests:
                  cpu: 200m
                  memory: 512Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
              - mountPath: /keys
                name: ssh-keys
                readOnly: true
              - mountPath: /waivers
                name: waivers
                readOnly: true
              - mountPath: /shared
                name: shared
            dnsPolicy: ClusterFirst
            restartPolicy: Never
            schedulerName: default-scheduler
            securityContext: {}
            terminationGracePeriodSeconds: 30
            volumes:
            - name: ssh-keys
              secret:
                defaultMode: 256
                secretName: ssh-keys
            - configMap:
                defaultMode: 420
                name: inspec-waivers
              name: waivers
            - emptyDir: {}
              name: shared
        ttlSecondsAfterFinished: 604800
    schedule: 0 3 * * 1
    successfulJobsHistoryLimit: 2
    suspend: false
  status:
    lastScheduleTime: "2026-04-20T03:00:00Z"
    lastSuccessfulTime: "2026-04-20T03:40:07Z"
kind: List
metadata:
