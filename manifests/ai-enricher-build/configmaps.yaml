apiVersion: v1
items:
- apiVersion: v1
  data:
    Dockerfile: "FROM python:3.11-slim\r\nWORKDIR /app\r\nCOPY requirements.txt .\r\nRUN
      pip install --no-cache-dir -r requirements.txt\r\nCOPY main.py .\r\nEXPOSE 8080\r\nCMD
      [\"python\", \"-u\", \"main.py\"]\r\n"
    main.py: "\"\"\"\r\nai-enricher — LLM-based enrichment, classification and grouping
      for\r\nrobusta findings and Kubernetes Warning events.\r\n\r\nEndpoints:\r\n
      \ POST /enrich    — receives robusta finding JSON, returns MM-formatted JSON\r\n
      \                   with added AI analysis. Forwards to mm-relay.\r\n  POST
      /classify  — receives event-exporter event JSON. Rule-filters obvious\r\n                    noise,
      LLM-scores the rest, forwards important ones to\r\n                    mm-relay
      with AI summary.\r\n  GET  /healthz\r\n  GET  /metrics\r\n\r\nDesign goals:\r\n
      \ 1. Stay well under free-tier LLM limits (Groq 500k tok/day etc.)\r\n  2. Never
      lose a real signal — fallback to raw message on LLM failure.\r\n  3. Single
      entry point for all AI enrichment.\r\n\r\nToken budget controls:\r\n  - Rule-based
      pre-filter drops ~90% of K8s event noise before LLM.\r\n  - Redis cache dedupes
      identical alerts for 10 minutes.\r\n  - 60-second grouping window collapses
      bursts into one LLM call.\r\n  - Hourly + daily hard caps (skip LLM, pass raw
      through).\r\n  - Circuit breaker: 5 consecutive failures -> disable LLM for
      5 min.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nimport hashlib\r\nimport
      json\r\nimport logging\r\nimport os\r\nimport threading\r\nimport time\r\nfrom
      collections import defaultdict\r\nfrom typing import Any, Dict, List, Optional,
      Tuple\r\n\r\nimport redis\r\nimport requests\r\nfrom flask import Flask, Response,
      jsonify, request\r\nfrom prometheus_client import Counter, Gauge, Histogram,
      generate_latest\r\n\r\n# -------------------- Config (env) --------------------\r\n\r\nLLM_URL
      = os.environ.get(\r\n    \"LLM_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080/v1/chat/completions\"\r\n)\r\nLLM_MODEL
      = os.environ.get(\"LLM_MODEL\", \"llama-3.3-70b-versatile\")\r\nLLM_API_KEY
      = os.environ.get(\"LLM_API_KEY\", \"dummy\")  # llm-proxy ignores\r\nLLM_TIMEOUT_SEC
      = int(os.environ.get(\"LLM_TIMEOUT_SEC\", \"15\"))\r\n\r\nMM_RELAY_URL = os.environ.get(\r\n
      \   \"MM_RELAY_URL\", \"http://mm-relay.robusta.svc.cluster.local/webhook\"\r\n)\r\n\r\nREDIS_URL
      = os.environ.get(\"REDIS_URL\", \"redis://ai-enricher-redis:6379/0\")\r\n\r\n#
      Budgets — tuned for aiot cluster and free tiers\r\nDAILY_BUDGET_CALLS = int(os.environ.get(\"DAILY_BUDGET_CALLS\",
      \"3000\"))\r\nHOURLY_BUDGET_CALLS = int(os.environ.get(\"HOURLY_BUDGET_CALLS\",
      \"200\"))\r\nCACHE_TTL_SEC = int(os.environ.get(\"CACHE_TTL_SEC\", \"600\"))
      \         # 10 min\r\nDEDUPE_WINDOW_SEC = int(os.environ.get(\"DEDUPE_WINDOW_SEC\",
      \"60\"))   # 1 min\r\nGROUP_MIN_SIZE = int(os.environ.get(\"GROUP_MIN_SIZE\",
      \"3\"))\r\nMAX_INPUT_TOKENS = int(os.environ.get(\"MAX_INPUT_TOKENS\", \"400\"))\r\nMAX_OUTPUT_TOKENS
      = int(os.environ.get(\"MAX_OUTPUT_TOKENS\", \"150\"))\r\nMAX_LOG_LINES = int(os.environ.get(\"MAX_LOG_LINES\",
      \"30\"))\r\n\r\nCLASSIFY_THRESHOLD = int(os.environ.get(\"CLASSIFY_THRESHOLD\",
      \"5\"))  # score>=5 -> forward\r\n\r\n# Circuit breaker\r\nCB_FAIL_THRESHOLD
      = 5\r\nCB_OPEN_DURATION_SEC = 300\r\n\r\n# Rule-based noise filter for K8s events\r\nNOISE_REASONS
      = {\r\n    \"Killing\", \"Scheduled\", \"Pulled\", \"Pulling\", \"Created\",
      \"Started\",\r\n    \"SuccessfulCreate\", \"SuccessfulDelete\", \"SandboxChanged\",\r\n
      \   \"NodeHasSufficientMemory\", \"NodeHasNoDiskPressure\", \"NodeHasSufficientPID\",\r\n
      \   \"NodeReady\", \"Starting\", \"RegisteredNode\", \"LeaderElection\",\r\n
      \   \"ScalingReplicaSet\", \"Completed\",\r\n}\r\n\r\n# Known noisy alertnames
      skipped entirely\r\nNOISE_ALERTS = {\"Watchdog\", \"InfoInhibitor\"}\r\n\r\n#
      -------------------- Metrics --------------------\r\n\r\nllm_calls_total = Counter(\r\n
      \   \"ai_enricher_llm_calls_total\", \"LLM API calls\", [\"endpoint\", \"status\"]\r\n)\r\nllm_tokens_used
      = Counter(\r\n    \"ai_enricher_llm_tokens_used_total\", \"Approx tokens used\",
      [\"direction\"]\r\n)\r\ncache_hits = Counter(\"ai_enricher_cache_hits_total\",
      \"Cache hits\", [\"endpoint\"])\r\ncache_misses = Counter(\"ai_enricher_cache_misses_total\",
      \"Cache misses\", [\"endpoint\"])\r\nrequests_total = Counter(\r\n    \"ai_enricher_requests_total\",
      \"Incoming requests\", [\"endpoint\", \"outcome\"]\r\n)\r\nbudget_exhausted
      = Counter(\r\n    \"ai_enricher_budget_exhausted_total\", \"Budget hit\", [\"window\"]\r\n)\r\ncircuit_breaker_state
      = Gauge(\r\n    \"ai_enricher_circuit_breaker_open\", \"1 if CB is open\"\r\n)\r\nllm_latency
      = Histogram(\"ai_enricher_llm_latency_seconds\", \"LLM latency\")\r\n\r\n# --------------------
      State --------------------\r\n\r\nlog = logging.getLogger(\"ai-enricher\")\r\nlogging.basicConfig(\r\n
      \   level=os.environ.get(\"LOG_LEVEL\", \"INFO\"),\r\n    format=\"%(asctime)s
      %(levelname)s %(name)s %(message)s\",\r\n)\r\n\r\napp = Flask(__name__)\r\n\r\n_redis:
      Optional[redis.Redis] = None\r\n\r\n\r\ndef r() -> redis.Redis:\r\n    global
      _redis\r\n    if _redis is None:\r\n        _redis = redis.from_url(REDIS_URL,
      decode_responses=True, socket_timeout=2)\r\n    return _redis\r\n\r\n\r\n# Circuit
      breaker state (in-memory, single pod)\r\n_cb_lock = threading.Lock()\r\n_cb_failures
      = 0\r\n_cb_opened_at = 0.0\r\n\r\n\r\ndef circuit_open() -> bool:\r\n    with
      _cb_lock:\r\n        if _cb_opened_at == 0:\r\n            return False\r\n
      \       if time.time() - _cb_opened_at > CB_OPEN_DURATION_SEC:\r\n            _reset_cb()\r\n
      \           return False\r\n        return True\r\n\r\n\r\ndef _reset_cb() ->
      None:\r\n    global _cb_failures, _cb_opened_at\r\n    _cb_failures = 0\r\n
      \   _cb_opened_at = 0.0\r\n    circuit_breaker_state.set(0)\r\n\r\n\r\ndef record_cb_failure()
      -> None:\r\n    global _cb_failures, _cb_opened_at\r\n    with _cb_lock:\r\n
      \       _cb_failures += 1\r\n        if _cb_failures >= CB_FAIL_THRESHOLD:\r\n
      \           _cb_opened_at = time.time()\r\n            circuit_breaker_state.set(1)\r\n
      \           log.warning(\"circuit breaker OPEN for %s sec\", CB_OPEN_DURATION_SEC)\r\n\r\n\r\ndef
      record_cb_success() -> None:\r\n    global _cb_failures\r\n    with _cb_lock:\r\n
      \       _cb_failures = 0\r\n\r\n\r\n# Grouping buffer (in-memory, pod-local)\r\n_group_lock
      = threading.Lock()\r\n_groups: Dict[Tuple[str, str, str], List[Dict[str, Any]]]
      = defaultdict(list)\r\n_group_first_seen: Dict[Tuple[str, str, str], float]
      = {}\r\n\r\n\r\n# -------------------- Budget --------------------\r\n\r\n\r\ndef
      budget_ok() -> bool:\r\n    \"\"\"Increment-and-check hourly and daily call
      budgets in Redis.\"\"\"\r\n    try:\r\n        now = int(time.time())\r\n        day_key
      = f\"aie:calls:day:{now // 86400}\"\r\n        hour_key = f\"aie:calls:hour:{now
      // 3600}\"\r\n        pipe = r().pipeline()\r\n        pipe.incr(day_key)\r\n
      \       pipe.expire(day_key, 172800)\r\n        pipe.incr(hour_key)\r\n        pipe.expire(hour_key,
      7200)\r\n        day_count, _, hour_count, _ = pipe.execute()\r\n        if
      day_count > DAILY_BUDGET_CALLS:\r\n            budget_exhausted.labels(window=\"day\").inc()\r\n
      \           return False\r\n        if hour_count > HOURLY_BUDGET_CALLS:\r\n
      \           budget_exhausted.labels(window=\"hour\").inc()\r\n            return
      False\r\n        return True\r\n    except Exception as e:\r\n        log.warning(\"budget
      check failed (fail-open): %s\", e)\r\n        return True\r\n\r\n\r\n# --------------------
      LLM --------------------\r\n\r\n\r\ndef _approx_tokens(text: str) -> int:\r\n
      \   # Rough: 1 token ≈ 4 chars for English\r\n    return max(1, len(text) //
      4)\r\n\r\n\r\ndef call_llm(system: str, user: str, max_tokens: int = MAX_OUTPUT_TOKENS)
      -> Optional[str]:\r\n    \"\"\"Call LLM via k8sgpt-llm-proxy. Returns None on
      failure.\"\"\"\r\n    if circuit_open():\r\n        log.info(\"circuit open
      — skipping LLM call\")\r\n        return None\r\n    if not budget_ok():\r\n
      \       log.info(\"budget exhausted — skipping LLM call\")\r\n        return
      None\r\n\r\n    # Truncate user content to protect input tokens\r\n    approx_in
      = _approx_tokens(system) + _approx_tokens(user)\r\n    if approx_in > MAX_INPUT_TOKENS:\r\n
      \       allowed_chars = MAX_INPUT_TOKENS * 4 - len(system) - 50\r\n        if
      allowed_chars > 0:\r\n            user = user[:allowed_chars] + \"\\n[...truncated]\"\r\n\r\n
      \   payload = {\r\n        \"model\": LLM_MODEL,\r\n        \"messages\": [\r\n
      \           {\"role\": \"system\", \"content\": system},\r\n            {\"role\":
      \"user\", \"content\": user},\r\n        ],\r\n        \"max_tokens\": max_tokens,\r\n
      \       \"temperature\": 0.2,\r\n    }\r\n    headers = {\r\n        \"Content-Type\":
      \"application/json\",\r\n        \"Authorization\": f\"Bearer {LLM_API_KEY}\",\r\n
      \   }\r\n\r\n    try:\r\n        with llm_latency.time():\r\n            resp
      = requests.post(\r\n                LLM_URL, json=payload, headers=headers,
      timeout=LLM_TIMEOUT_SEC\r\n            )\r\n        resp.raise_for_status()\r\n
      \       data = resp.json()\r\n        content = data[\"choices\"][0][\"message\"][\"content\"].strip()\r\n
      \       # Best-effort token accounting\r\n        llm_tokens_used.labels(direction=\"in\").inc(\r\n
      \           data.get(\"usage\", {}).get(\"prompt_tokens\", _approx_tokens(system
      + user))\r\n        )\r\n        llm_tokens_used.labels(direction=\"out\").inc(\r\n
      \           data.get(\"usage\", {}).get(\"completion_tokens\", _approx_tokens(content))\r\n
      \       )\r\n        llm_calls_total.labels(endpoint=\"chat\", status=\"ok\").inc()\r\n
      \       record_cb_success()\r\n        return content\r\n    except Exception
      as e:\r\n        llm_calls_total.labels(endpoint=\"chat\", status=\"error\").inc()\r\n
      \       record_cb_failure()\r\n        log.warning(\"LLM call failed: %s\",
      e)\r\n        return None\r\n\r\n\r\n# -------------------- Cache --------------------\r\n\r\n\r\ndef
      cache_key(*parts: str) -> str:\r\n    h = hashlib.sha1(\"|\".join(parts).encode()).hexdigest()[:16]\r\n
      \   return f\"aie:cache:{h}\"\r\n\r\n\r\ndef cache_get(key: str) -> Optional[str]:\r\n
      \   try:\r\n        return r().get(key)\r\n    except Exception:\r\n        return
      None\r\n\r\n\r\ndef cache_set(key: str, value: str) -> None:\r\n    try:\r\n
      \       r().setex(key, CACHE_TTL_SEC, value)\r\n    except Exception:\r\n        pass\r\n\r\n\r\n#
      -------------------- MM forwarding --------------------\r\n\r\n\r\ndef send_to_mm(payload:
      Dict[str, Any]) -> None:\r\n    try:\r\n        requests.post(MM_RELAY_URL,
      json=payload, timeout=5).raise_for_status()\r\n    except Exception as e:\r\n
      \       log.error(\"mm-relay send failed: %s\", e)\r\n\r\n\r\n# --------------------
      /enrich — robusta findings --------------------\r\n\r\nENRICH_SYSTEM = (\r\n
      \   \"You are an SRE expert. Keep answers under 3 lines, English only. \"\r\n
      \   \"Format strictly as:\\n\"\r\n    \"CAUSE: <one sentence>\\nIMPACT: <one
      sentence>\\nFIX: <1-2 concrete kubectl commands or steps>\"\r\n)\r\n\r\n\r\ndef
      build_enrich_user(finding: Dict[str, Any]) -> str:\r\n    alertname = finding.get(\"title\")
      or finding.get(\"alert_name\") or \"unknown\"\r\n    severity = str(finding.get(\"severity\",
      \"unknown\")).lower()\r\n    ns = finding.get(\"subject\", {}).get(\"namespace\",
      finding.get(\"namespace\", \"-\"))\r\n    name = finding.get(\"subject\", {}).get(\"name\",
      finding.get(\"name\", \"-\"))\r\n    kind = finding.get(\"subject\", {}).get(\"subject_type\",
      finding.get(\"kind\", \"-\"))\r\n    desc = finding.get(\"description\") or
      \"\"\r\n\r\n    # Extract log-like enrichment text if present\r\n    logs_text
      = \"\"\r\n    for enr in finding.get(\"enrichments\", []) or []:\r\n        for
      block in enr.get(\"blocks\", []) or []:\r\n            if block.get(\"block_type\")
      in (\"file\", \"markdown\", \"list\"):\r\n                txt = block.get(\"contents\")
      or block.get(\"text\") or \"\"\r\n                if txt and (\"error\" in txt.lower()
      or \"exception\" in txt.lower() or \"failed\" in txt.lower() or logs_text ==
      \"\"):\r\n                    logs_text = str(txt)\r\n                    break\r\n
      \       if logs_text:\r\n            break\r\n\r\n    log_tail = \"\\n\".join(logs_text.splitlines()[-MAX_LOG_LINES:])\r\n
      \   return (\r\n        f\"Alert: {alertname}\\nSeverity: {severity}\\n\"\r\n
      \       f\"Resource: {kind} {ns}/{name}\\n\"\r\n        f\"Description: {desc[:300]}\\n\"\r\n
      \       f\"Recent logs/events:\\n{log_tail[:1500]}\"\r\n    )\r\n\r\n\r\ndef
      wrap_with_ai(finding: Dict[str, Any], ai_text: Optional[str]) -> Dict[str, Any]:\r\n
      \   \"\"\"Attach AI section to robusta finding so mm-relay renders it nicely.\"\"\"\r\n
      \   out = dict(finding)\r\n    if ai_text:\r\n        ai_block = {\r\n            \"block_type\":
      \"markdown\",\r\n            \"text\": f\"**AI Analysis**\\n```\\n{ai_text}\\n```\",\r\n
      \       }\r\n        enrichments = list(out.get(\"enrichments\") or [])\r\n
      \       enrichments.insert(0, {\"blocks\": [ai_block]})\r\n        out[\"enrichments\"]
      = enrichments\r\n    return out\r\n\r\n\r\n@app.route(\"/enrich\", methods=[\"POST\"])\r\ndef
      enrich() -> Response:\r\n    finding = request.get_json(force=True, silent=True)
      or {}\r\n    requests_total.labels(endpoint=\"enrich\", outcome=\"received\").inc()\r\n\r\n
      \   alertname = (finding.get(\"title\") or \"\").strip()\r\n    severity = str(finding.get(\"severity\",
      \"\")).lower()\r\n\r\n    # Skip known-noise alerts, skip INFO — pass through
      raw\r\n    if alertname in NOISE_ALERTS or severity in (\"info\", \"none\",
      \"low\"):\r\n        send_to_mm(finding)\r\n        requests_total.labels(endpoint=\"enrich\",
      outcome=\"passthrough\").inc()\r\n        return jsonify({\"ok\": True, \"ai\":
      False, \"reason\": \"noise_or_info\"})\r\n\r\n    ns = finding.get(\"subject\",
      {}).get(\"namespace\", \"-\")\r\n    name = finding.get(\"subject\", {}).get(\"name\",
      \"-\")\r\n    key = cache_key(\"enrich\", alertname, ns, name)\r\n\r\n    #
      Cache lookup\r\n    cached = cache_get(key)\r\n    if cached:\r\n        cache_hits.labels(endpoint=\"enrich\").inc()\r\n
      \       send_to_mm(wrap_with_ai(finding, cached))\r\n        requests_total.labels(endpoint=\"enrich\",
      outcome=\"cache_hit\").inc()\r\n        return jsonify({\"ok\": True, \"ai\":
      True, \"cached\": True})\r\n    cache_misses.labels(endpoint=\"enrich\").inc()\r\n\r\n
      \   # Grouping window: if many similar arrive within 60s, wait & summarise\r\n
      \   group_k = (alertname, ns, str(finding.get(\"subject\", {}).get(\"subject_type\",
      \"\")))\r\n    with _group_lock:\r\n        _groups[group_k].append(finding)\r\n
      \       if group_k not in _group_first_seen:\r\n            _group_first_seen[group_k]
      = time.time()\r\n    # We don't block the request — group flusher handles summarisation.\r\n
      \   # For the CURRENT finding we still send immediate enrichment so users\r\n
      \   # are never delayed (group summary is an extra bonus message).\r\n\r\n    user_prompt
      = build_enrich_user(finding)\r\n    ai_text = call_llm(ENRICH_SYSTEM, user_prompt,
      max_tokens=MAX_OUTPUT_TOKENS)\r\n    if ai_text:\r\n        cache_set(key, ai_text)\r\n
      \       send_to_mm(wrap_with_ai(finding, ai_text))\r\n        requests_total.labels(endpoint=\"enrich\",
      outcome=\"enriched\").inc()\r\n        return jsonify({\"ok\": True, \"ai\":
      True})\r\n\r\n    # Fallback: raw\r\n    send_to_mm(finding)\r\n    requests_total.labels(endpoint=\"enrich\",
      outcome=\"raw_fallback\").inc()\r\n    return jsonify({\"ok\": True, \"ai\":
      False, \"reason\": \"llm_unavailable\"})\r\n\r\n\r\n# -------------------- /classify
      — K8s events --------------------\r\n\r\nCLASSIFY_SYSTEM = (\r\n    \"Rate the
      operational urgency of this Kubernetes event from 1 to 10. \"\r\n    \"Reply
      with only a single integer, nothing else. \"\r\n    \"10=critical outage, 7=needs
      attention soon, 4=informational, 1=completely safe to ignore.\"\r\n)\r\n\r\n\r\ndef
      is_noise_event(ev: Dict[str, Any]) -> bool:\r\n    reason = ev.get(\"reason\",
      \"\")\r\n    etype = ev.get(\"type\", \"\")\r\n    if etype != \"Warning\":\r\n
      \       return True\r\n    if reason in NOISE_REASONS:\r\n        return True\r\n
      \   # Event older than 10 min -> noise\r\n    try:\r\n        last = ev.get(\"lastTimestamp\")
      or ev.get(\"eventTime\") or \"\"\r\n        if last:\r\n            ts = time.mktime(time.strptime(last.replace(\"Z\",
      \"\"), \"%Y-%m-%dT%H:%M:%S\"))\r\n            if time.time() - ts > 600:\r\n
      \               return True\r\n    except Exception:\r\n        pass\r\n    return
      False\r\n\r\n\r\ndef build_classify_user(ev: Dict[str, Any]) -> str:\r\n    reason
      = ev.get(\"reason\", \"-\")\r\n    io = ev.get(\"involvedObject\", {})\r\n    kind
      = io.get(\"kind\", \"-\")\r\n    ns = io.get(\"namespace\", \"-\")\r\n    name
      = io.get(\"name\", \"-\")\r\n    msg = (ev.get(\"message\") or \"\")[:150]\r\n
      \   return f\"Event: {reason} on {kind} {ns}/{name}: {msg}\"\r\n\r\n\r\ndef
      format_event_for_mm(ev: Dict[str, Any], score: int, ai_summary: Optional[str])
      -> Dict[str, Any]:\r\n    \"\"\"Build a robusta-like payload so mm-relay can
      render it uniformly.\"\"\"\r\n    io = ev.get(\"involvedObject\", {})\r\n    title
      = f\"[score {score}] {ev.get('reason', 'Warning')}\"\r\n    desc = ev.get(\"message\",
      \"\")\r\n    severity = \"HIGH\" if score >= 8 else \"MEDIUM\" if score >= 5
      else \"LOW\"\r\n    blocks = []\r\n    if ai_summary:\r\n        blocks.append({\"block_type\":
      \"markdown\",\r\n                       \"text\": f\"**AI Analysis**\\n```\\n{ai_summary}\\n```\"})\r\n
      \   return {\r\n        \"title\": title,\r\n        \"description\": desc,\r\n
      \       \"severity\": severity,\r\n        \"source\": \"kubernetes-event\",\r\n
      \       \"cluster\": \"aiot-prod\",\r\n        \"subject\": {\r\n            \"kind\":
      io.get(\"kind\", \"-\"),\r\n            \"namespace\": io.get(\"namespace\",
      \"-\"),\r\n            \"name\": io.get(\"name\", \"-\"),\r\n            \"subject_type\":
      io.get(\"kind\", \"-\"),\r\n        },\r\n        \"enrichments\": [{\"blocks\":
      blocks}] if blocks else [],\r\n    }\r\n\r\n\r\n@app.route(\"/classify\", methods=[\"POST\"])\r\ndef
      classify() -> Response:\r\n    ev = request.get_json(force=True, silent=True)
      or {}\r\n    requests_total.labels(endpoint=\"classify\", outcome=\"received\").inc()\r\n\r\n
      \   # Rule pre-filter (no LLM)\r\n    if is_noise_event(ev):\r\n        requests_total.labels(endpoint=\"classify\",
      outcome=\"dropped_noise\").inc()\r\n        return jsonify({\"ok\": True, \"action\":
      \"drop_noise\"})\r\n\r\n    reason = ev.get(\"reason\", \"\")\r\n    io = ev.get(\"involvedObject\",
      {})\r\n    key = cache_key(\"classify\", reason, io.get(\"namespace\", \"\"),
      io.get(\"name\", \"\"))\r\n\r\n    cached = cache_get(key)\r\n    if cached:\r\n
      \       cache_hits.labels(endpoint=\"classify\").inc()\r\n        try:\r\n            data
      = json.loads(cached)\r\n            score, ai_summary = data[\"score\"], data.get(\"ai\")\r\n
      \       except Exception:\r\n            score, ai_summary = 5, None\r\n    else:\r\n
      \       cache_misses.labels(endpoint=\"classify\").inc()\r\n        score_text
      = call_llm(CLASSIFY_SYSTEM, build_classify_user(ev), max_tokens=5)\r\n        if
      score_text is None:\r\n            # Fallback: pass raw through (user requested)\r\n
      \           send_to_mm(format_event_for_mm(ev, score=5, ai_summary=None))\r\n
      \           requests_total.labels(endpoint=\"classify\", outcome=\"raw_fallback\").inc()\r\n
      \           return jsonify({\"ok\": True, \"action\": \"raw_fallback\"})\r\n
      \       try:\r\n            score = int(\"\".join(ch for ch in score_text if
      ch.isdigit())[:2] or \"5\")\r\n            score = max(1, min(10, score))\r\n
      \       except Exception:\r\n            score = 5\r\n\r\n        ai_summary
      = None\r\n        if score >= 8:\r\n            ai_summary = call_llm(\r\n                ENRICH_SYSTEM,\r\n
      \               build_classify_user(ev)\r\n                + \"\\nProvide brief
      SRE analysis for this event.\",\r\n                max_tokens=MAX_OUTPUT_TOKENS,\r\n
      \           )\r\n        cache_set(key, json.dumps({\"score\": score, \"ai\":
      ai_summary}))\r\n\r\n    if score < CLASSIFY_THRESHOLD:\r\n        requests_total.labels(endpoint=\"classify\",
      outcome=\"dropped_low_score\").inc()\r\n        return jsonify({\"ok\": True,
      \"action\": \"drop_low_score\", \"score\": score})\r\n\r\n    send_to_mm(format_event_for_mm(ev,
      score=score, ai_summary=ai_summary))\r\n    requests_total.labels(endpoint=\"classify\",
      outcome=\"forwarded\").inc()\r\n    return jsonify({\"ok\": True, \"action\":
      \"forwarded\", \"score\": score})\r\n\r\n\r\n# -------------------- Group flusher
      (background thread) --------------------\r\n\r\nGROUP_SYSTEM = (\r\n    \"You
      are an SRE expert. Summarise a cluster of similar Kubernetes alerts in \"\r\n
      \   \"at most 4 lines, English only. Format:\\n\"\r\n    \"SUMMARY: <what is
      happening>\\nLIKELY CAUSE: <short>\\nFIX: <1 concrete command>\"\r\n)\r\n\r\n\r\ndef
      group_flusher() -> None:\r\n    while True:\r\n        time.sleep(10)\r\n        now
      = time.time()\r\n        to_flush: List[Tuple[Any, List[Dict[str, Any]]]] =
      []\r\n        with _group_lock:\r\n            for k, first_ts in list(_group_first_seen.items()):\r\n
      \               if now - first_ts >= DEDUPE_WINDOW_SEC:\r\n                    items
      = _groups.pop(k, [])\r\n                    _group_first_seen.pop(k, None)\r\n
      \                   if len(items) >= GROUP_MIN_SIZE:\r\n                        to_flush.append((k,
      items))\r\n        for k, items in to_flush:\r\n            alertname, ns, kind
      = k\r\n            sample = items[:5]\r\n            bullets = \"\\n\".join(\r\n
      \               f\"- {i.get('subject', {}).get('name', '-')}: \"\r\n                f\"{(i.get('description')
      or '')[:80]}\"\r\n                for i in sample\r\n            )\r\n            user
      = (\r\n                f\"Alert: {alertname} ({len(items)} occurrences in \"\r\n
      \               f\"{DEDUPE_WINDOW_SEC}s, namespace={ns}, kind={kind})\\n\"\r\n
      \               f\"Samples:\\n{bullets}\"\r\n            )\r\n            ai
      = call_llm(GROUP_SYSTEM, user, max_tokens=MAX_OUTPUT_TOKENS)\r\n            summary
      = {\r\n                \"title\": f\"[grouped x{len(items)}] {alertname}\",\r\n
      \               \"description\": f\"{len(items)} similar alerts in {ns} ({kind})\",\r\n
      \               \"severity\": \"MEDIUM\",\r\n                \"source\": \"ai-enricher-group\",\r\n
      \               \"cluster\": \"aiot-prod\",\r\n                \"subject\":
      {\"kind\": kind, \"namespace\": ns,\r\n                            \"name\":
      f\"{len(items)} resources\", \"subject_type\": kind},\r\n                \"enrichments\":
      [{\"blocks\": [{\r\n                    \"block_type\": \"markdown\",\r\n                    \"text\":
      f\"**AI Group Summary**\\n```\\n{ai or '(LLM unavailable)'}\\n```\",\r\n                }]}],\r\n
      \           }\r\n            send_to_mm(summary)\r\n            log.info(\"flushed
      group %s size=%d ai=%s\",\r\n                     alertname, len(items), bool(ai))\r\n\r\n\r\n#
      -------------------- Routes --------------------\r\n\r\n\r\n@app.route(\"/healthz\")\r\ndef
      healthz() -> Response:\r\n    ok = True\r\n    try:\r\n        r().ping()\r\n
      \   except Exception:\r\n        ok = False\r\n    return (jsonify({\"ok\":
      ok}), 200 if ok else 503)\r\n\r\n\r\n@app.route(\"/metrics\")\r\ndef metrics()
      -> Response:\r\n    return Response(generate_latest(), mimetype=\"text/plain\")\r\n\r\n\r\n@app.route(\"/\")\r\ndef
      root() -> Response:\r\n    return jsonify({\r\n        \"service\": \"ai-enricher\",\r\n
      \       \"llm_url\": LLM_URL,\r\n        \"model\": LLM_MODEL,\r\n        \"budget\":
      {\r\n            \"daily\": DAILY_BUDGET_CALLS,\r\n            \"hourly\": HOURLY_BUDGET_CALLS,\r\n
      \       },\r\n        \"circuit_open\": circuit_open(),\r\n    })\r\n\r\n\r\n#
      -------------------- Main --------------------\r\n\r\nif __name__ == \"__main__\":\r\n
      \   t = threading.Thread(target=group_flusher, daemon=True)\r\n    t.start()\r\n
      \   app.run(host=\"0.0.0.0\", port=8080)\r\n"
    requirements.txt: "flask==3.0.3\r\nrequests==2.32.3\r\nredis==5.0.8\r\nprometheus-client==0.20.0\r\ngunicorn==22.0.0\r\n"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"Dockerfile":"FROM python:3.11-slim\r\nWORKDIR /app\r\nCOPY requirements.txt .\r\nRUN pip install --no-cache-dir -r requirements.txt\r\nCOPY main.py .\r\nEXPOSE 8080\r\nCMD [\"python\", \"-u\", \"main.py\"]\r\n","main.py":"\"\"\"\r\nai-enricher — LLM-based enrichment, classification and grouping for\r\nrobusta findings and Kubernetes Warning events.\r\n\r\nEndpoints:\r\n  POST /enrich    — receives robusta finding JSON, returns MM-formatted JSON\r\n                    with added AI analysis. Forwards to mm-relay.\r\n  POST /classify  — receives event-exporter event JSON. Rule-filters obvious\r\n                    noise, LLM-scores the rest, forwards important ones to\r\n                    mm-relay with AI summary.\r\n  GET  /healthz\r\n  GET  /metrics\r\n\r\nDesign goals:\r\n  1. Stay well under free-tier LLM limits (Groq 500k tok/day etc.)\r\n  2. Never lose a real signal — fallback to raw message on LLM failure.\r\n  3. Single entry point for all AI enrichment.\r\n\r\nToken budget controls:\r\n  - Rule-based pre-filter drops ~90% of K8s event noise before LLM.\r\n  - Redis cache dedupes identical alerts for 10 minutes.\r\n  - 60-second grouping window collapses bursts into one LLM call.\r\n  - Hourly + daily hard caps (skip LLM, pass raw through).\r\n  - Circuit breaker: 5 consecutive failures -\u003e disable LLM for 5 min.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nimport hashlib\r\nimport json\r\nimport logging\r\nimport os\r\nimport threading\r\nimport time\r\nfrom collections import defaultdict\r\nfrom typing import Any, Dict, List, Optional, Tuple\r\n\r\nimport redis\r\nimport requests\r\nfrom flask import Flask, Response, jsonify, request\r\nfrom prometheus_client import Counter, Gauge, Histogram, generate_latest\r\n\r\n# -------------------- Config (env) --------------------\r\n\r\nLLM_URL = os.environ.get(\r\n    \"LLM_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080/v1/chat/completions\"\r\n)\r\nLLM_MODEL = os.environ.get(\"LLM_MODEL\", \"llama-3.3-70b-versatile\")\r\nLLM_API_KEY = os.environ.get(\"LLM_API_KEY\", \"dummy\")  # llm-proxy ignores\r\nLLM_TIMEOUT_SEC = int(os.environ.get(\"LLM_TIMEOUT_SEC\", \"15\"))\r\n\r\nMM_RELAY_URL = os.environ.get(\r\n    \"MM_RELAY_URL\", \"http://mm-relay.robusta.svc.cluster.local/webhook\"\r\n)\r\n\r\nREDIS_URL = os.environ.get(\"REDIS_URL\", \"redis://ai-enricher-redis:6379/0\")\r\n\r\n# Budgets — tuned for aiot cluster and free tiers\r\nDAILY_BUDGET_CALLS = int(os.environ.get(\"DAILY_BUDGET_CALLS\", \"3000\"))\r\nHOURLY_BUDGET_CALLS = int(os.environ.get(\"HOURLY_BUDGET_CALLS\", \"200\"))\r\nCACHE_TTL_SEC = int(os.environ.get(\"CACHE_TTL_SEC\", \"600\"))          # 10 min\r\nDEDUPE_WINDOW_SEC = int(os.environ.get(\"DEDUPE_WINDOW_SEC\", \"60\"))   # 1 min\r\nGROUP_MIN_SIZE = int(os.environ.get(\"GROUP_MIN_SIZE\", \"3\"))\r\nMAX_INPUT_TOKENS = int(os.environ.get(\"MAX_INPUT_TOKENS\", \"400\"))\r\nMAX_OUTPUT_TOKENS = int(os.environ.get(\"MAX_OUTPUT_TOKENS\", \"150\"))\r\nMAX_LOG_LINES = int(os.environ.get(\"MAX_LOG_LINES\", \"30\"))\r\n\r\nCLASSIFY_THRESHOLD = int(os.environ.get(\"CLASSIFY_THRESHOLD\", \"5\"))  # score\u003e=5 -\u003e forward\r\n\r\n# Circuit breaker\r\nCB_FAIL_THRESHOLD = 5\r\nCB_OPEN_DURATION_SEC = 300\r\n\r\n# Rule-based noise filter for K8s events\r\nNOISE_REASONS = {\r\n    \"Killing\", \"Scheduled\", \"Pulled\", \"Pulling\", \"Created\", \"Started\",\r\n    \"SuccessfulCreate\", \"SuccessfulDelete\", \"SandboxChanged\",\r\n    \"NodeHasSufficientMemory\", \"NodeHasNoDiskPressure\", \"NodeHasSufficientPID\",\r\n    \"NodeReady\", \"Starting\", \"RegisteredNode\", \"LeaderElection\",\r\n    \"ScalingReplicaSet\", \"Completed\",\r\n}\r\n\r\n# Known noisy alertnames skipped entirely\r\nNOISE_ALERTS = {\"Watchdog\", \"InfoInhibitor\"}\r\n\r\n# -------------------- Metrics --------------------\r\n\r\nllm_calls_total = Counter(\r\n    \"ai_enricher_llm_calls_total\", \"LLM API calls\", [\"endpoint\", \"status\"]\r\n)\r\nllm_tokens_used = Counter(\r\n    \"ai_enricher_llm_tokens_used_total\", \"Approx tokens used\", [\"direction\"]\r\n)\r\ncache_hits = Counter(\"ai_enricher_cache_hits_total\", \"Cache hits\", [\"endpoint\"])\r\ncache_misses = Counter(\"ai_enricher_cache_misses_total\", \"Cache misses\", [\"endpoint\"])\r\nrequests_total = Counter(\r\n    \"ai_enricher_requests_total\", \"Incoming requests\", [\"endpoint\", \"outcome\"]\r\n)\r\nbudget_exhausted = Counter(\r\n    \"ai_enricher_budget_exhausted_total\", \"Budget hit\", [\"window\"]\r\n)\r\ncircuit_breaker_state = Gauge(\r\n    \"ai_enricher_circuit_breaker_open\", \"1 if CB is open\"\r\n)\r\nllm_latency = Histogram(\"ai_enricher_llm_latency_seconds\", \"LLM latency\")\r\n\r\n# -------------------- State --------------------\r\n\r\nlog = logging.getLogger(\"ai-enricher\")\r\nlogging.basicConfig(\r\n    level=os.environ.get(\"LOG_LEVEL\", \"INFO\"),\r\n    format=\"%(asctime)s %(levelname)s %(name)s %(message)s\",\r\n)\r\n\r\napp = Flask(__name__)\r\n\r\n_redis: Optional[redis.Redis] = None\r\n\r\n\r\ndef r() -\u003e redis.Redis:\r\n    global _redis\r\n    if _redis is None:\r\n        _redis = redis.from_url(REDIS_URL, decode_responses=True, socket_timeout=2)\r\n    return _redis\r\n\r\n\r\n# Circuit breaker state (in-memory, single pod)\r\n_cb_lock = threading.Lock()\r\n_cb_failures = 0\r\n_cb_opened_at = 0.0\r\n\r\n\r\ndef circuit_open() -\u003e bool:\r\n    with _cb_lock:\r\n        if _cb_opened_at == 0:\r\n            return False\r\n        if time.time() - _cb_opened_at \u003e CB_OPEN_DURATION_SEC:\r\n            _reset_cb()\r\n            return False\r\n        return True\r\n\r\n\r\ndef _reset_cb() -\u003e None:\r\n    global _cb_failures, _cb_opened_at\r\n    _cb_failures = 0\r\n    _cb_opened_at = 0.0\r\n    circuit_breaker_state.set(0)\r\n\r\n\r\ndef record_cb_failure() -\u003e None:\r\n    global _cb_failures, _cb_opened_at\r\n    with _cb_lock:\r\n        _cb_failures += 1\r\n        if _cb_failures \u003e= CB_FAIL_THRESHOLD:\r\n            _cb_opened_at = time.time()\r\n            circuit_breaker_state.set(1)\r\n            log.warning(\"circuit breaker OPEN for %s sec\", CB_OPEN_DURATION_SEC)\r\n\r\n\r\ndef record_cb_success() -\u003e None:\r\n    global _cb_failures\r\n    with _cb_lock:\r\n        _cb_failures = 0\r\n\r\n\r\n# Grouping buffer (in-memory, pod-local)\r\n_group_lock = threading.Lock()\r\n_groups: Dict[Tuple[str, str, str], List[Dict[str, Any]]] = defaultdict(list)\r\n_group_first_seen: Dict[Tuple[str, str, str], float] = {}\r\n\r\n\r\n# -------------------- Budget --------------------\r\n\r\n\r\ndef budget_ok() -\u003e bool:\r\n    \"\"\"Increment-and-check hourly and daily call budgets in Redis.\"\"\"\r\n    try:\r\n        now = int(time.time())\r\n        day_key = f\"aie:calls:day:{now // 86400}\"\r\n        hour_key = f\"aie:calls:hour:{now // 3600}\"\r\n        pipe = r().pipeline()\r\n        pipe.incr(day_key)\r\n        pipe.expire(day_key, 172800)\r\n        pipe.incr(hour_key)\r\n        pipe.expire(hour_key, 7200)\r\n        day_count, _, hour_count, _ = pipe.execute()\r\n        if day_count \u003e DAILY_BUDGET_CALLS:\r\n            budget_exhausted.labels(window=\"day\").inc()\r\n            return False\r\n        if hour_count \u003e HOURLY_BUDGET_CALLS:\r\n            budget_exhausted.labels(window=\"hour\").inc()\r\n            return False\r\n        return True\r\n    except Exception as e:\r\n        log.warning(\"budget check failed (fail-open): %s\", e)\r\n        return True\r\n\r\n\r\n# -------------------- LLM --------------------\r\n\r\n\r\ndef _approx_tokens(text: str) -\u003e int:\r\n    # Rough: 1 token ≈ 4 chars for English\r\n    return max(1, len(text) // 4)\r\n\r\n\r\ndef call_llm(system: str, user: str, max_tokens: int = MAX_OUTPUT_TOKENS) -\u003e Optional[str]:\r\n    \"\"\"Call LLM via k8sgpt-llm-proxy. Returns None on failure.\"\"\"\r\n    if circuit_open():\r\n        log.info(\"circuit open — skipping LLM call\")\r\n        return None\r\n    if not budget_ok():\r\n        log.info(\"budget exhausted — skipping LLM call\")\r\n        return None\r\n\r\n    # Truncate user content to protect input tokens\r\n    approx_in = _approx_tokens(system) + _approx_tokens(user)\r\n    if approx_in \u003e MAX_INPUT_TOKENS:\r\n        allowed_chars = MAX_INPUT_TOKENS * 4 - len(system) - 50\r\n        if allowed_chars \u003e 0:\r\n            user = user[:allowed_chars] + \"\\n[...truncated]\"\r\n\r\n    payload = {\r\n        \"model\": LLM_MODEL,\r\n        \"messages\": [\r\n            {\"role\": \"system\", \"content\": system},\r\n            {\"role\": \"user\", \"content\": user},\r\n        ],\r\n        \"max_tokens\": max_tokens,\r\n        \"temperature\": 0.2,\r\n    }\r\n    headers = {\r\n        \"Content-Type\": \"application/json\",\r\n        \"Authorization\": f\"Bearer {LLM_API_KEY}\",\r\n    }\r\n\r\n    try:\r\n        with llm_latency.time():\r\n            resp = requests.post(\r\n                LLM_URL, json=payload, headers=headers, timeout=LLM_TIMEOUT_SEC\r\n            )\r\n        resp.raise_for_status()\r\n        data = resp.json()\r\n        content = data[\"choices\"][0][\"message\"][\"content\"].strip()\r\n        # Best-effort token accounting\r\n        llm_tokens_used.labels(direction=\"in\").inc(\r\n            data.get(\"usage\", {}).get(\"prompt_tokens\", _approx_tokens(system + user))\r\n        )\r\n        llm_tokens_used.labels(direction=\"out\").inc(\r\n            data.get(\"usage\", {}).get(\"completion_tokens\", _approx_tokens(content))\r\n        )\r\n        llm_calls_total.labels(endpoint=\"chat\", status=\"ok\").inc()\r\n        record_cb_success()\r\n        return content\r\n    except Exception as e:\r\n        llm_calls_total.labels(endpoint=\"chat\", status=\"error\").inc()\r\n        record_cb_failure()\r\n        log.warning(\"LLM call failed: %s\", e)\r\n        return None\r\n\r\n\r\n# -------------------- Cache --------------------\r\n\r\n\r\ndef cache_key(*parts: str) -\u003e str:\r\n    h = hashlib.sha1(\"|\".join(parts).encode()).hexdigest()[:16]\r\n    return f\"aie:cache:{h}\"\r\n\r\n\r\ndef cache_get(key: str) -\u003e Optional[str]:\r\n    try:\r\n        return r().get(key)\r\n    except Exception:\r\n        return None\r\n\r\n\r\ndef cache_set(key: str, value: str) -\u003e None:\r\n    try:\r\n        r().setex(key, CACHE_TTL_SEC, value)\r\n    except Exception:\r\n        pass\r\n\r\n\r\n# -------------------- MM forwarding --------------------\r\n\r\n\r\ndef send_to_mm(payload: Dict[str, Any]) -\u003e None:\r\n    try:\r\n        requests.post(MM_RELAY_URL, json=payload, timeout=5).raise_for_status()\r\n    except Exception as e:\r\n        log.error(\"mm-relay send failed: %s\", e)\r\n\r\n\r\n# -------------------- /enrich — robusta findings --------------------\r\n\r\nENRICH_SYSTEM = (\r\n    \"You are an SRE expert. Keep answers under 3 lines, English only. \"\r\n    \"Format strictly as:\\n\"\r\n    \"CAUSE: \u003cone sentence\u003e\\nIMPACT: \u003cone sentence\u003e\\nFIX: \u003c1-2 concrete kubectl commands or steps\u003e\"\r\n)\r\n\r\n\r\ndef build_enrich_user(finding: Dict[str, Any]) -\u003e str:\r\n    alertname = finding.get(\"title\") or finding.get(\"alert_name\") or \"unknown\"\r\n    severity = str(finding.get(\"severity\", \"unknown\")).lower()\r\n    ns = finding.get(\"subject\", {}).get(\"namespace\", finding.get(\"namespace\", \"-\"))\r\n    name = finding.get(\"subject\", {}).get(\"name\", finding.get(\"name\", \"-\"))\r\n    kind = finding.get(\"subject\", {}).get(\"subject_type\", finding.get(\"kind\", \"-\"))\r\n    desc = finding.get(\"description\") or \"\"\r\n\r\n    # Extract log-like enrichment text if present\r\n    logs_text = \"\"\r\n    for enr in finding.get(\"enrichments\", []) or []:\r\n        for block in enr.get(\"blocks\", []) or []:\r\n            if block.get(\"block_type\") in (\"file\", \"markdown\", \"list\"):\r\n                txt = block.get(\"contents\") or block.get(\"text\") or \"\"\r\n                if txt and (\"error\" in txt.lower() or \"exception\" in txt.lower() or \"failed\" in txt.lower() or logs_text == \"\"):\r\n                    logs_text = str(txt)\r\n                    break\r\n        if logs_text:\r\n            break\r\n\r\n    log_tail = \"\\n\".join(logs_text.splitlines()[-MAX_LOG_LINES:])\r\n    return (\r\n        f\"Alert: {alertname}\\nSeverity: {severity}\\n\"\r\n        f\"Resource: {kind} {ns}/{name}\\n\"\r\n        f\"Description: {desc[:300]}\\n\"\r\n        f\"Recent logs/events:\\n{log_tail[:1500]}\"\r\n    )\r\n\r\n\r\ndef wrap_with_ai(finding: Dict[str, Any], ai_text: Optional[str]) -\u003e Dict[str, Any]:\r\n    \"\"\"Attach AI section to robusta finding so mm-relay renders it nicely.\"\"\"\r\n    out = dict(finding)\r\n    if ai_text:\r\n        ai_block = {\r\n            \"block_type\": \"markdown\",\r\n            \"text\": f\"**AI Analysis**\\n```\\n{ai_text}\\n```\",\r\n        }\r\n        enrichments = list(out.get(\"enrichments\") or [])\r\n        enrichments.insert(0, {\"blocks\": [ai_block]})\r\n        out[\"enrichments\"] = enrichments\r\n    return out\r\n\r\n\r\n@app.route(\"/enrich\", methods=[\"POST\"])\r\ndef enrich() -\u003e Response:\r\n    finding = request.get_json(force=True, silent=True) or {}\r\n    requests_total.labels(endpoint=\"enrich\", outcome=\"received\").inc()\r\n\r\n    alertname = (finding.get(\"title\") or \"\").strip()\r\n    severity = str(finding.get(\"severity\", \"\")).lower()\r\n\r\n    # Skip known-noise alerts, skip INFO — pass through raw\r\n    if alertname in NOISE_ALERTS or severity in (\"info\", \"none\", \"low\"):\r\n        send_to_mm(finding)\r\n        requests_total.labels(endpoint=\"enrich\", outcome=\"passthrough\").inc()\r\n        return jsonify({\"ok\": True, \"ai\": False, \"reason\": \"noise_or_info\"})\r\n\r\n    ns = finding.get(\"subject\", {}).get(\"namespace\", \"-\")\r\n    name = finding.get(\"subject\", {}).get(\"name\", \"-\")\r\n    key = cache_key(\"enrich\", alertname, ns, name)\r\n\r\n    # Cache lookup\r\n    cached = cache_get(key)\r\n    if cached:\r\n        cache_hits.labels(endpoint=\"enrich\").inc()\r\n        send_to_mm(wrap_with_ai(finding, cached))\r\n        requests_total.labels(endpoint=\"enrich\", outcome=\"cache_hit\").inc()\r\n        return jsonify({\"ok\": True, \"ai\": True, \"cached\": True})\r\n    cache_misses.labels(endpoint=\"enrich\").inc()\r\n\r\n    # Grouping window: if many similar arrive within 60s, wait \u0026 summarise\r\n    group_k = (alertname, ns, str(finding.get(\"subject\", {}).get(\"subject_type\", \"\")))\r\n    with _group_lock:\r\n        _groups[group_k].append(finding)\r\n        if group_k not in _group_first_seen:\r\n            _group_first_seen[group_k] = time.time()\r\n    # We don't block the request — group flusher handles summarisation.\r\n    # For the CURRENT finding we still send immediate enrichment so users\r\n    # are never delayed (group summary is an extra bonus message).\r\n\r\n    user_prompt = build_enrich_user(finding)\r\n    ai_text = call_llm(ENRICH_SYSTEM, user_prompt, max_tokens=MAX_OUTPUT_TOKENS)\r\n    if ai_text:\r\n        cache_set(key, ai_text)\r\n        send_to_mm(wrap_with_ai(finding, ai_text))\r\n        requests_total.labels(endpoint=\"enrich\", outcome=\"enriched\").inc()\r\n        return jsonify({\"ok\": True, \"ai\": True})\r\n\r\n    # Fallback: raw\r\n    send_to_mm(finding)\r\n    requests_total.labels(endpoint=\"enrich\", outcome=\"raw_fallback\").inc()\r\n    return jsonify({\"ok\": True, \"ai\": False, \"reason\": \"llm_unavailable\"})\r\n\r\n\r\n# -------------------- /classify — K8s events --------------------\r\n\r\nCLASSIFY_SYSTEM = (\r\n    \"Rate the operational urgency of this Kubernetes event from 1 to 10. \"\r\n    \"Reply with only a single integer, nothing else. \"\r\n    \"10=critical outage, 7=needs attention soon, 4=informational, 1=completely safe to ignore.\"\r\n)\r\n\r\n\r\ndef is_noise_event(ev: Dict[str, Any]) -\u003e bool:\r\n    reason = ev.get(\"reason\", \"\")\r\n    etype = ev.get(\"type\", \"\")\r\n    if etype != \"Warning\":\r\n        return True\r\n    if reason in NOISE_REASONS:\r\n        return True\r\n    # Event older than 10 min -\u003e noise\r\n    try:\r\n        last = ev.get(\"lastTimestamp\") or ev.get(\"eventTime\") or \"\"\r\n        if last:\r\n            ts = time.mktime(time.strptime(last.replace(\"Z\", \"\"), \"%Y-%m-%dT%H:%M:%S\"))\r\n            if time.time() - ts \u003e 600:\r\n                return True\r\n    except Exception:\r\n        pass\r\n    return False\r\n\r\n\r\ndef build_classify_user(ev: Dict[str, Any]) -\u003e str:\r\n    reason = ev.get(\"reason\", \"-\")\r\n    io = ev.get(\"involvedObject\", {})\r\n    kind = io.get(\"kind\", \"-\")\r\n    ns = io.get(\"namespace\", \"-\")\r\n    name = io.get(\"name\", \"-\")\r\n    msg = (ev.get(\"message\") or \"\")[:150]\r\n    return f\"Event: {reason} on {kind} {ns}/{name}: {msg}\"\r\n\r\n\r\ndef format_event_for_mm(ev: Dict[str, Any], score: int, ai_summary: Optional[str]) -\u003e Dict[str, Any]:\r\n    \"\"\"Build a robusta-like payload so mm-relay can render it uniformly.\"\"\"\r\n    io = ev.get(\"involvedObject\", {})\r\n    title = f\"[score {score}] {ev.get('reason', 'Warning')}\"\r\n    desc = ev.get(\"message\", \"\")\r\n    severity = \"HIGH\" if score \u003e= 8 else \"MEDIUM\" if score \u003e= 5 else \"LOW\"\r\n    blocks = []\r\n    if ai_summary:\r\n        blocks.append({\"block_type\": \"markdown\",\r\n                       \"text\": f\"**AI Analysis**\\n```\\n{ai_summary}\\n```\"})\r\n    return {\r\n        \"title\": title,\r\n        \"description\": desc,\r\n        \"severity\": severity,\r\n        \"source\": \"kubernetes-event\",\r\n        \"cluster\": \"aiot-prod\",\r\n        \"subject\": {\r\n            \"kind\": io.get(\"kind\", \"-\"),\r\n            \"namespace\": io.get(\"namespace\", \"-\"),\r\n            \"name\": io.get(\"name\", \"-\"),\r\n            \"subject_type\": io.get(\"kind\", \"-\"),\r\n        },\r\n        \"enrichments\": [{\"blocks\": blocks}] if blocks else [],\r\n    }\r\n\r\n\r\n@app.route(\"/classify\", methods=[\"POST\"])\r\ndef classify() -\u003e Response:\r\n    ev = request.get_json(force=True, silent=True) or {}\r\n    requests_total.labels(endpoint=\"classify\", outcome=\"received\").inc()\r\n\r\n    # Rule pre-filter (no LLM)\r\n    if is_noise_event(ev):\r\n        requests_total.labels(endpoint=\"classify\", outcome=\"dropped_noise\").inc()\r\n        return jsonify({\"ok\": True, \"action\": \"drop_noise\"})\r\n\r\n    reason = ev.get(\"reason\", \"\")\r\n    io = ev.get(\"involvedObject\", {})\r\n    key = cache_key(\"classify\", reason, io.get(\"namespace\", \"\"), io.get(\"name\", \"\"))\r\n\r\n    cached = cache_get(key)\r\n    if cached:\r\n        cache_hits.labels(endpoint=\"classify\").inc()\r\n        try:\r\n            data = json.loads(cached)\r\n            score, ai_summary = data[\"score\"], data.get(\"ai\")\r\n        except Exception:\r\n            score, ai_summary = 5, None\r\n    else:\r\n        cache_misses.labels(endpoint=\"classify\").inc()\r\n        score_text = call_llm(CLASSIFY_SYSTEM, build_classify_user(ev), max_tokens=5)\r\n        if score_text is None:\r\n            # Fallback: pass raw through (user requested)\r\n            send_to_mm(format_event_for_mm(ev, score=5, ai_summary=None))\r\n            requests_total.labels(endpoint=\"classify\", outcome=\"raw_fallback\").inc()\r\n            return jsonify({\"ok\": True, \"action\": \"raw_fallback\"})\r\n        try:\r\n            score = int(\"\".join(ch for ch in score_text if ch.isdigit())[:2] or \"5\")\r\n            score = max(1, min(10, score))\r\n        except Exception:\r\n            score = 5\r\n\r\n        ai_summary = None\r\n        if score \u003e= 8:\r\n            ai_summary = call_llm(\r\n                ENRICH_SYSTEM,\r\n                build_classify_user(ev)\r\n                + \"\\nProvide brief SRE analysis for this event.\",\r\n                max_tokens=MAX_OUTPUT_TOKENS,\r\n            )\r\n        cache_set(key, json.dumps({\"score\": score, \"ai\": ai_summary}))\r\n\r\n    if score \u003c CLASSIFY_THRESHOLD:\r\n        requests_total.labels(endpoint=\"classify\", outcome=\"dropped_low_score\").inc()\r\n        return jsonify({\"ok\": True, \"action\": \"drop_low_score\", \"score\": score})\r\n\r\n    send_to_mm(format_event_for_mm(ev, score=score, ai_summary=ai_summary))\r\n    requests_total.labels(endpoint=\"classify\", outcome=\"forwarded\").inc()\r\n    return jsonify({\"ok\": True, \"action\": \"forwarded\", \"score\": score})\r\n\r\n\r\n# -------------------- Group flusher (background thread) --------------------\r\n\r\nGROUP_SYSTEM = (\r\n    \"You are an SRE expert. Summarise a cluster of similar Kubernetes alerts in \"\r\n    \"at most 4 lines, English only. Format:\\n\"\r\n    \"SUMMARY: \u003cwhat is happening\u003e\\nLIKELY CAUSE: \u003cshort\u003e\\nFIX: \u003c1 concrete command\u003e\"\r\n)\r\n\r\n\r\ndef group_flusher() -\u003e None:\r\n    while True:\r\n        time.sleep(10)\r\n        now = time.time()\r\n        to_flush: List[Tuple[Any, List[Dict[str, Any]]]] = []\r\n        with _group_lock:\r\n            for k, first_ts in list(_group_first_seen.items()):\r\n                if now - first_ts \u003e= DEDUPE_WINDOW_SEC:\r\n                    items = _groups.pop(k, [])\r\n                    _group_first_seen.pop(k, None)\r\n                    if len(items) \u003e= GROUP_MIN_SIZE:\r\n                        to_flush.append((k, items))\r\n        for k, items in to_flush:\r\n            alertname, ns, kind = k\r\n            sample = items[:5]\r\n            bullets = \"\\n\".join(\r\n                f\"- {i.get('subject', {}).get('name', '-')}: \"\r\n                f\"{(i.get('description') or '')[:80]}\"\r\n                for i in sample\r\n            )\r\n            user = (\r\n                f\"Alert: {alertname} ({len(items)} occurrences in \"\r\n                f\"{DEDUPE_WINDOW_SEC}s, namespace={ns}, kind={kind})\\n\"\r\n                f\"Samples:\\n{bullets}\"\r\n            )\r\n            ai = call_llm(GROUP_SYSTEM, user, max_tokens=MAX_OUTPUT_TOKENS)\r\n            summary = {\r\n                \"title\": f\"[grouped x{len(items)}] {alertname}\",\r\n                \"description\": f\"{len(items)} similar alerts in {ns} ({kind})\",\r\n                \"severity\": \"MEDIUM\",\r\n                \"source\": \"ai-enricher-group\",\r\n                \"cluster\": \"aiot-prod\",\r\n                \"subject\": {\"kind\": kind, \"namespace\": ns,\r\n                            \"name\": f\"{len(items)} resources\", \"subject_type\": kind},\r\n                \"enrichments\": [{\"blocks\": [{\r\n                    \"block_type\": \"markdown\",\r\n                    \"text\": f\"**AI Group Summary**\\n```\\n{ai or '(LLM unavailable)'}\\n```\",\r\n                }]}],\r\n            }\r\n            send_to_mm(summary)\r\n            log.info(\"flushed group %s size=%d ai=%s\",\r\n                     alertname, len(items), bool(ai))\r\n\r\n\r\n# -------------------- Routes --------------------\r\n\r\n\r\n@app.route(\"/healthz\")\r\ndef healthz() -\u003e Response:\r\n    ok = True\r\n    try:\r\n        r().ping()\r\n    except Exception:\r\n        ok = False\r\n    return (jsonify({\"ok\": ok}), 200 if ok else 503)\r\n\r\n\r\n@app.route(\"/metrics\")\r\ndef metrics() -\u003e Response:\r\n    return Response(generate_latest(), mimetype=\"text/plain\")\r\n\r\n\r\n@app.route(\"/\")\r\ndef root() -\u003e Response:\r\n    return jsonify({\r\n        \"service\": \"ai-enricher\",\r\n        \"llm_url\": LLM_URL,\r\n        \"model\": LLM_MODEL,\r\n        \"budget\": {\r\n            \"daily\": DAILY_BUDGET_CALLS,\r\n            \"hourly\": HOURLY_BUDGET_CALLS,\r\n        },\r\n        \"circuit_open\": circuit_open(),\r\n    })\r\n\r\n\r\n# -------------------- Main --------------------\r\n\r\nif __name__ == \"__main__\":\r\n    t = threading.Thread(target=group_flusher, daemon=True)\r\n    t.start()\r\n    app.run(host=\"0.0.0.0\", port=8080)\r\n","requirements.txt":"flask==3.0.3\r\nrequests==2.32.3\r\nredis==5.0.8\r\nprometheus-client==0.20.0\r\ngunicorn==22.0.0\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"ai-enricher-src","namespace":"ai-enricher-build"}}
