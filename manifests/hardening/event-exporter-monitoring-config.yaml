apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-cfg
  namespace: monitoring
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    maxEventAgeSeconds: 600
    omitLookup: true
    route:
      routes:
        - drop:
            - reason: "InvalidDiskCapacity"
            - reason: "FailedScheduling"
              message: ".*untolerated taint.*"
            - reason: "Unhealthy"
              message: ".*Startup probe.*"
          match:
            - type: Warning
          receiver: ai
    receivers:
      - name: ai
        webhook:
          endpoint: "http://ai-enricher.ai-enricher.svc.cluster.local:8080/classify"
          headers:
            Content-Type: application/json
