apiVersion: v1
kind: Namespace
metadata:
  name: node-problem-detector
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelet-watchdog
  namespace: node-problem-detector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubelet-watchdog
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubelet-watchdog
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubelet-watchdog
subjects:
- kind: ServiceAccount
  name: kubelet-watchdog
  namespace: node-problem-detector
---
# kubelet-watchdog DaemonSet
# Detects PLEG hang / containerd freeze and self-heals by restarting
# containerd + kubelet via host PID namespace.
# Triggered when kubelet healthz endpoint stays unreachable > 60 s.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubelet-watchdog
  namespace: node-problem-detector
  labels:
    app: kubelet-watchdog
spec:
  selector:
    matchLabels:
      app: kubelet-watchdog
  template:
    metadata:
      labels:
        app: kubelet-watchdog
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
      - operator: Exists
      priorityClassName: system-node-critical
      serviceAccountName: kubelet-watchdog
      containers:
      - name: watchdog
        image: alpine:3.20
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 64Mi
        command:
        - /bin/sh
        - -c
        - |
          set -e
          apk add --no-cache util-linux >/dev/null 2>&1 || true
          echo "kubelet-watchdog starting on $NODE_NAME"
          while true; do
            sleep 60
            HZ=$(nsenter -t 1 -n -- curl -fsS --max-time 5 http://127.0.0.1:10248/healthz 2>/dev/null || echo "FAIL")
            if [ "$HZ" = "ok" ]; then continue; fi
            echo "[$(date -Iseconds)] kubelet healthz unhealthy: $HZ"
            if ! nsenter -t 1 -m -u -i -n -p -- crictl --runtime-endpoint unix:///run/containerd/containerd.sock version >/dev/null 2>&1; then
              echo "[$(date -Iseconds)] containerd unresponsive — restarting"
              nsenter -t 1 -m -u -i -n -p -- systemctl restart containerd || true
              sleep 15
            fi
            echo "[$(date -Iseconds)] restarting kubelet"
            nsenter -t 1 -m -u -i -n -p -- systemctl restart kubelet || true
            sleep 30
          done
