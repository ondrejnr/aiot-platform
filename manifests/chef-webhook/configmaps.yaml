- apiVersion: v1
  data:
    server.py: |
      import json, os, datetime
      from http.server import HTTPServer, BaseHTTPRequestHandler

      DATA_DIR = "/data"
      os.makedirs(DATA_DIR, exist_ok=True)

      class Handler(BaseHTTPRequestHandler):
          def do_POST(self):
              length = int(self.headers.get("Content-Length", 0))
              body = self.rfile.read(length).decode()
              ts = datetime.datetime.utcnow().isoformat()
              fname = os.path.join(DATA_DIR, f"{ts}.json")
              try:
                  data = json.loads(body)
              except Exception:
                  data = {"raw": body}
              data["_received"] = ts
              with open(fname, "w") as f:
                  json.dump(data, f, indent=2)
              print(f"[{ts}] Received webhook: {len(body)} bytes")
              self.send_response(200)
              self.send_header("Content-Type", "application/json")
              self.end_headers()
              self.wfile.write(json.dumps({"status": "ok", "ts": ts}).encode())

          def do_GET(self):
              files = sorted(os.listdir(DATA_DIR))[-10:]
              feeds = []
              for f in files:
                  with open(os.path.join(DATA_DIR, f)) as fh:
                      feeds.append(json.load(fh))
              self.send_response(200)
              self.send_header("Content-Type", "application/json")
              self.end_headers()
              self.wfile.write(json.dumps(feeds, indent=2).encode())

      if __name__ == "__main__":
          server = HTTPServer(("0.0.0.0", 8080), Handler)
          print("Webhook server on :8080")
          server.serve_forever()
