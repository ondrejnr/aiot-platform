- apiVersion: v1
  data:
    redis_liveness.sh: |
      response=$(
        redis-cli \
          -a "${REDIS_PASSWORD}" --no-auth-warning \
          -h localhost \
          -p 6379 \
          ping
      )
      if [ "$response" != "PONG" ] && [ "${response:0:7}" != "LOADING" ] ; then
        echo "$response"
        exit 1
      fi
      echo "response=$response"
    redis_readiness.sh: |
      response=$(
        redis-cli \
          -a "${REDIS_PASSWORD}" --no-auth-warning \
          -h localhost \
          -p 6379 \
          ping
      )
      if [ "$response" != "PONG" ] ; then
        echo "$response"
        exit 1
      fi
      echo "response=$response"
