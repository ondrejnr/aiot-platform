apiVersion: v1
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: "1"
      ignore-check.kube-linter.io/no-anti-affinity: Using topologySpreadConstraints
    labels:
      apps: namespace-lister
      konflux.konflux-ci.dev/component: namespace-lister
      konflux.konflux-ci.dev/owner: konflux-namespace-lister
    name: namespace-lister
    namespace: namespace-lister
    ownerReferences:
    - apiVersion: konflux.konflux-ci.dev/v1alpha1
      blockOwnerDeletion: true
      controller: true
      kind: KonfluxNamespaceLister
      name: konflux-namespace-lister
  spec:
    progressDeadlineSeconds: 2147483647
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        apps: namespace-lister
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          apps: namespace-lister
      spec:
        containers:
        - args:
          - -enable-tls
          - -cert-path=/var/tls/tls.crt
          - -key-path=/var/tls/tls.key
          env:
          - name: LOG_LEVEL
            value: "0"
          - name: CACHE_RESYNC_PERIOD
            value: 10m
          - name: CACHE_NAMESPACE_LABELSELECTOR
            value: konflux-ci.dev/type=tenant
          - name: AUTH_USERNAME_HEADER
            value: X-User
          - name: AUTH_GROUPS_HEADER
            value: X-Group
          image: quay.io/konflux-ci/namespace-lister@sha256:8dc64178aa5ffe82a4ec5e70c425c0f486a60c495f80ef4d372ad8a185c730fa
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 1
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: namespace-lister
          ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 1
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /var/tls
            name: tls
            readOnly: true
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: namespace-lister
        serviceAccountName: namespace-lister
        terminationGracePeriodSeconds: 60
        topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              apps: namespace-lister
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
        volumes:
        - name: tls
