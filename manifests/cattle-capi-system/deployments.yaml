  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: "2"
    labels:
      cluster.x-k8s.io/provider: cluster-api
      clusterctl.cluster.x-k8s.io: ""
      control-plane: controller-manager
    name: capi-controller-manager
    namespace: cattle-capi-system
    ownerReferences:
