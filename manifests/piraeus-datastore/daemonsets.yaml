          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: ha-controller
          resources: {}
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          startupProbe:
            failureThreshold: 3
