items:
- apiVersion: apps/v1
  kind: DaemonSet
  metadata:
    annotations:
    labels:
      app.kubernetes.io/component: ha-controller
      app.kubernetes.io/instance: linstorcluster
      app.kubernetes.io/managed-by: piraeus-operator
      app.kubernetes.io/name: piraeus-datastore
      app.kubernetes.io/version: v2.10.5-22c84566f3c5373a9406952727499328c8741681
    name: ha-controller
    namespace: piraeus-datastore
    ownerReferences:
    - apiVersion: piraeus.io/v1
      blockOwnerDeletion: true
      controller: true
      kind: LinstorCluster
      name: linstorcluster
  spec:
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app.kubernetes.io/component: ha-controller
        app.kubernetes.io/instance: linstorcluster
        app.kubernetes.io/name: piraeus-datastore
    template:
      metadata:
        labels:
          app.kubernetes.io/component: ha-controller
          app.kubernetes.io/instance: linstorcluster
          app.kubernetes.io/name: piraeus-datastore
      spec:
        containers:
        - args:
          - /agent
          - --v=1
          env:
          - name: NODE_NAME
