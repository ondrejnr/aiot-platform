      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    return json.loads(r).get(\"result\")\r\ntok = api(\"user.login\",
      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\nitems = api(\"item.get\",
      {\"search\":{\"key_\":\"http.status_code\"},\"output\":[\"hostid\",\"name\",\"lastvalue\",\"state\",\"error\"]},
      tok)\r\nprint(f\"Total HTTP status items: {len(items)}\")\r\nok = sum(1 for
