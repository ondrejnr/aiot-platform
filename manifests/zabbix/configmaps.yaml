    zbx-fix.py: "#!/usr/bin/env python3\r\nimport json, urllib.request\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=20).read()\r\n    return json.loads(r).get(\"result\")\r\ntok = api(\"user.login\",
      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\nh = api(\"host.get\", {\"filter\":{\"host\":\"aiot-master\"}},
      tok)[0]\r\nitems = api(\"item.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"name\",\"key_\",\"lastvalue\"],\"search\":{\"key_\":\"system.cpu.util\"}},
      tok)\r\nfor i in items: print(f\"CPU: name={i['name']!r} key={i['key_']!r} last={i.get('lastvalue')}\")\r\nitems
      = api(\"item.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"name\",\"key_\",\"lastvalue\"],\"search\":{\"key_\":\"memory\"}},
      tok)\r\nfor i in items: print(f\"MEM: name={i['name']!r} key={i['key_']!r} last={i.get('lastvalue')}\")\r\nitems
      = api(\"item.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"name\",\"key_\",\"lastvalue\"],\"search\":{\"key_\":\"vfs.fs\"}},
      tok)\r\nfor i in items[:10]: print(f\"FS: name={i['name']!r} key={i['key_']!r}
      last={i.get('lastvalue')}\")\r\n"
