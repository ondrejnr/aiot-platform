s}/\",\r\n        \"status_codes\": \"\",\r\n        \"request_method\": 1,  # GET\r\n        \"follow_redirects\": 1,\r\n        \"retrieve_mode\": 1,  # 0=body, 1=headers, 2=both\r\n        \"value_type\": 3,  # uint\r\n        \"delay\": \"60s\",\r\n        \"verify_host\": 0,\r\n        \"verify_peer\": 0,\r\n        \"preprocessing\": [\r\n            {\"type\": 5, \"params\": \"HTTP/[0-9.]+ ([0-9]{3})\\n\\\\1\", \"error_handler\": 0, \"error_handler_params\": \"\"},\r\n        ],\r\n    }, token)\r\nprint(\"Done\")\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"zbx-fix-py","namespace":"zabbix"}}
