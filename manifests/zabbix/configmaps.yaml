k)[0]\r\n\r\ndef strip_ids(ops):\r\n    for op in ops:\r\n        op.pop(\"operationid\", None)\r\n        op.pop(\"actionid\", None)\r\n        if \"opmessage\" in op and isinstance(op[\"opmessage\"], dict):\r\n            op[\"opmessage\"].pop(\"operationid\", None)\r\n        for sub in (\"opmessage_usr\",\"opmessage_grp\"):\r\n            if sub in op:\r\n                for x in op[sub]:\r\n                    x.pop(\"operationid\", None)\r\n    return ops\r\n\r\nops = strip_ids(act.get(\"operations\",[]))\r\nfor op in ops:\r\n    op[\"esc_step_from\"] = \"2\"\r\n    op[\"esc_step_to\"] = \"2\"\r\n\r\nrec_ops = strip_ids(act.get(\"recoveryOperations\", act.get(\"recovery_operations\",[])))\r\n\r\nupd = {\r\n    \"actionid\": act[\"actionid\"],\r\n    \"esc_period\": \"2m\",\r\n    \"operations\": ops,\r\n    \"recovery_operations\": rec_ops,\r\n}\r\nr = api(\"action.update\", upd, tok)\r\nprint(f\"Action update: {r}\")\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"zbx-asp2-py","namespace":"zabbix"}}
