- apiVersion: v1
  data:
    zbx-fix.py: "#!/usr/bin/env python3\r\n\"\"\"Anti-spam: require 3 consecutive
      bad readings for web triggers, add 3min action escalation delay.\"\"\"\r\nimport
      json, urllib.request\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=20).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\",
      d[\"error\"])\r\n    return d.get(\"result\")\r\ntok = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n#
      1) Require 3 out of last 3 bad values (key polls every 60s, so 3min confirmation)\r\ng
      = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Web Services\"}}, tok)[0][\"groupid\"]\r\nhosts
      = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"]}, tok)\r\ncount
      = 0\r\nfor h in hosts:\r\n    trigs = api(\"trigger.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"triggerid\",\"description\"]},
      tok) or []\r\n    for t in trigs:\r\n        if \"HTTP\" in t.get(\"description\",\"\"):\r\n
      \           new_expr = (f\"min(/{h['host']}/http.status_code,#3)=0 \"\r\n                        f\"or
      min(/{h['host']}/http.status_code,#3)>=500\")\r\n            api(\"trigger.update\",
      {\"triggerid\": t[\"triggerid\"], \"expression\": new_expr}, tok)\r\n            count
      += 1\r\nprint(f\"Updated {count} web triggers with #3 confirmation\")\r\n\r\n#
      2) Same for infra TCP\r\ng = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT
      Infrastructure\"}}, tok)[0][\"groupid\"]\r\nhosts = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"],\"selectItems\":[\"key_\"]},
      tok)\r\ncount = 0\r\nfor h in hosts:\r\n    trigs = api(\"trigger.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"triggerid\",\"description\",\"expression\"]},
      tok) or []\r\n    for t in trigs:\r\n        expr = t.get(\"expression\",\"\")\r\n
      \       if \"net.tcp.service\" in expr:\r\n            # Extract key part\r\n
      \           import re\r\n            m = re.search(r\"last\\(/[^/]+/(net\\.tcp\\.service\\[[^\\]]+\\])\\)=0\",
      expr)\r\n            if m:\r\n                key = m.group(1)\r\n                new_expr
      = f\"max(/{h['host']}/{key},#3)=0\"\r\n                api(\"trigger.update\",
      {\"triggerid\": t[\"triggerid\"], \"expression\": new_expr}, tok)\r\n                count
      += 1\r\nprint(f\"Updated {count} infra triggers with #3 confirmation\")\r\n\r\n#
      3) Action: add 2min esc_step delay so short blips don't page\r\nact = api(\"action.get\",
      {\"filter\":{\"name\":\"AIOT Mattermost notify\"},\"selectOperations\":\"extend\",\"selectFilter\":\"extend\",\"selectRecoveryOperations\":\"extend\"},
      tok)[0]\r\n# esc_period in action is default step duration; esc_step_from/to
      in operation controls when\r\n# Simplest: bump operation start step so it fires
      after 2 minutes\r\nfor op in act[\"operations\"]:\r\n    op[\"esc_step_from\"]
      = \"2\"  # start from step 2 = wait 1 * esc_period\r\n    op[\"esc_step_to\"]
      = \"2\"\r\nact[\"esc_period\"] = \"2m\"  # each step = 2min\r\n\r\nupdate =
      {\r\n    \"actionid\": act[\"actionid\"],\r\n    \"esc_period\": act[\"esc_period\"],\r\n
      \   \"operations\": act[\"operations\"],\r\n}\r\napi(\"action.update\", update,
      tok)\r\nprint(f\"Action {act['actionid']}: 2min step delay applied (step 2 of
      2m = alert at t+2min)\")\r\n\r\n# 4) Close any still-open problems (force resolution)\r\nprobs
      = api(\"problem.get\", {\"output\":[\"eventid\",\"name\"],\"recent\":False},
      tok)\r\nprint(f\"\\nCurrent problems: {len(probs)}\")\r\nfor p in probs[:20]:
      print(f\"  {p['name']}\")\r\n"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"zbx-fix.py":"#!/usr/bin/env python3\r\n\"\"\"Anti-spam: require 3 consecutive bad readings for web triggers, add 3min action escalation delay.\"\"\"\r\nimport json, urllib.request\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n    if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n        data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}), timeout=20).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\", d[\"error\"])\r\n    return d.get(\"result\")\r\ntok = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n# 1) Require 3 out of last 3 bad values (key polls every 60s, so 3min confirmation)\r\ng = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Web Services\"}}, tok)[0][\"groupid\"]\r\nhosts = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"]}, tok)\r\ncount = 0\r\nfor h in hosts:\r\n    trigs = api(\"trigger.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"triggerid\",\"description\"]}, tok) or []\r\n    for t in trigs:\r\n        if \"HTTP\" in t.get(\"description\",\"\"):\r\n            new_expr = (f\"min(/{h['host']}/http.status_code,#3)=0 \"\r\n                        f\"or min(/{h['host']}/http.status_code,#3)\u003e=500\")\r\n            api(\"trigger.update\", {\"triggerid\": t[\"triggerid\"], \"expression\": new_expr}, tok)\r\n            count += 1\r\nprint(f\"Updated {count} web triggers with #3 confirmation\")\r\n\r\n# 2) Same for infra TCP\r\ng = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Infrastructure\"}}, tok)[0][\"groupid\"]\r\nhosts = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"],\"selectItems\":[\"key_\"]}, tok)\r\ncount = 0\r\nfor h in hosts:\r\n    trigs = api(\"trigger.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"triggerid\",\"description\",\"expression\"]}, tok) or []\r\n    for t in trigs:\r\n        expr = t.get(\"expression\",\"\")\r\n        if \"net.tcp.service\" in expr:\r\n            # Extract key part\r\n            import re\r\n            m = re.search(r\"last\\(/[^/]+/(net\\.tcp\\.service\\[[^\\]]+\\])\\)=0\", expr)\r\n            if m:\r\n                key = m.group(1)\r\n                new_expr = f\"max(/{h['host']}/{key},#3)=0\"\r\n                api(\"trigger.update\", {\"triggerid\": t[\"triggerid\"], \"expression\": new_expr}, tok)\r\n                count += 1\r\nprint(f\"Updated {count} infra triggers with #3 confirmation\")\r\n\r\n# 3) Action: add 2min esc_step delay so short blips don't page\r\nact = api(\"action.get\", {\"filter\":{\"name\":\"AIOT Mattermost notify\"},\"selectOperations\":\"extend\",\"selectFilter\":\"extend\",\"selectRecoveryOperations\":\"extend\"}, tok)[0]\r\n# esc_period in action is default step duration; esc_step_from/to in operation controls when\r\n# Simplest: bump operation start step so it fires after 2 minutes\r\nfor op in act[\"operations\"]:\r\n    op[\"esc_step_from\"] = \"2\"  # start from step 2 = wait 1 * esc_period\r\n    op[\"esc_step_to\"] = \"2\"\r\nact[\"esc_period\"] = \"2m\"  # each step = 2min\r\n\r\nupdate = {\r\n    \"actionid\": act[\"actionid\"],\r\n    \"esc_period\": act[\"esc_period\"],\r\n    \"operations\": act[\"operations\"],\r\n}\r\napi(\"action.update\", update, tok)\r\nprint(f\"Action {act['actionid']}: 2min step delay applied (step 2 of 2m = alert at t+2min)\")\r\n\r\n# 4) Close any still-open problems (force resolution)\r\nprobs = api(\"problem.get\", {\"output\":[\"eventid\",\"name\"],\"recent\":False}, tok)\r\nprint(f\"\\nCurrent problems: {len(probs)}\")\r\nfor p in probs[:20]: print(f\"  {p['name']}\")\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"zbx-asp-py","namespace":"zabbix"}}
