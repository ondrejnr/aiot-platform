  data:
    zbx-fix.py: "#!/usr/bin/env python3\r\n\"\"\"Create AIOT Overview dashboard with
      proper svggraph references.\"\"\"\r\nimport json, urllib.request, string, random,
      sys\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=20).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(f\"ERR
      {method}: {d['error']}\", file=sys.stderr); return None\r\n    return d.get(\"result\")\r\ntok
      = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\ng_nodes
      = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Cluster Nodes\"}}, tok)[0][\"groupid\"]\r\ng_web
      \  = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Web Services\"}}, tok)[0][\"groupid\"]\r\ng_infra
      = api(\"hostgroup.get\", {\"filter\":{\"name\":\"AIOT Infrastructure\"}}, tok)[0][\"groupid\"]\r\n\r\nnodes
      = sorted(api(\"host.get\", {\"groupids\":g_nodes,\"output\":[\"hostid\",\"host\"]},
      tok), key=lambda x: x[\"host\"])\r\n\r\n_ref_counter = [0]\r\ndef ref():\r\n
      \   _ref_counter[0] += 1\r\n    n = _ref_counter[0]\r\n    # 5-letter base26\r\n
      \   s = \"\"\r\n    x = n\r\n    for _ in range(5):\r\n        s = chr(ord(\"A\")
      + (x % 26)) + s\r\n        x //= 26\r\n    return s\r\n\r\ndef W(wtype, x, y,
      cw, h, name, fields):\r\n    return {\"type\":wtype,\"name\":name,\"x\":x,\"y\":y,\"width\":cw,\"height\":h,\"view_mode\":0,\"fields\":fields}\r\n\r\ndef
      FI(n,v): return {\"type\":0,\"name\":n,\"value\":v}\r\ndef FS(n,v): return {\"type\":1,\"name\":n,\"value\":v}\r\ndef
      FG(n,v): return {\"type\":2,\"name\":n,\"value\":v}\r\n\r\ndef graph(x, y, w_,
      h_, name, host, item, color):\r\n    return W(\"svggraph\", x, y, w_, h_, name,
      [\r\n        FI(\"legend\", 1),\r\n        FI(\"show_problems\", 1),\r\n        FS(\"ds.0.color\",
      color),\r\n        FS(\"ds.0.hosts.0\", host),\r\n        FS(\"ds.0.items.0\",
      item),\r\n        FS(\"reference\", ref()),\r\n    ])\r\n\r\nwidgets = []\r\nwidgets.append(W(\"problemsbysv\",
      0, 0, 36, 4, \"Problems by severity\",\r\n    [FG(\"groupids.0\", g_nodes),
      FG(\"groupids.1\", g_web), FG(\"groupids.2\", g_infra)]))\r\nwidgets.append(W(\"systeminfo\",
      36, 0, 36, 4, \"System info\", []))\r\nwidgets.append(W(\"problems\", 0, 4,
      72, 5, \"Current problems\",\r\n    [FG(\"groupids.0\", g_nodes), FG(\"groupids.1\",
      g_web), FG(\"groupids.2\", g_infra),\r\n     FI(\"show_lines\", 25)]))\r\n\r\n#
      CPU graphs — 3 per row, 6 nodes = 2 rows\r\nx = 0; y = 9\r\nfor n in nodes:\r\n
      \   widgets.append(graph(x, y, 24, 5, f\"CPU - {n['host']}\", n[\"host\"], \"CPU
      utilization\", \"1A7C11\"))\r\n    x += 24\r\n    if x >= 72: x = 0; y += 5\r\nif
      x != 0: x = 0; y += 5\r\n\r\n# MEM graphs\r\nfor n in nodes:\r\n    widgets.append(graph(x,
      y, 24, 5, f\"MEM - {n['host']}\", n[\"host\"], \"Memory utilization\", \"2E8B57\"))\r\n
      \   x += 24\r\n    if x >= 72: x = 0; y += 5\r\nif x != 0: x = 0; y += 5\r\n\r\n#
      Disk / — use rootfs (Linux template mounts / at /rootfs in dep item)\r\nfor
      n in nodes:\r\n    widgets.append(graph(x, y, 24, 5, f\"Disk / - {n['host']}\",
      n[\"host\"], \"FS [/rootfs]: Space: Used, in %\", \"B22222\"))\r\n    x += 24\r\n
      \   if x >= 72: x = 0; y += 5\r\nif x != 0: x = 0; y += 5\r\n\r\nwidgets.append(W(\"dataover\",
      0, y, 72, 8, \"Web services\", [FG(\"groupids.0\", g_web)]))\r\ny += 8\r\nwidgets.append(W(\"dataover\",
      0, y, 72, 5, \"Infrastructure\", [FG(\"groupids.0\", g_infra)]))\r\n\r\nexisting
      = api(\"dashboard.get\", {\"filter\":{\"name\":\"AIOT Overview\"}}, tok)\r\ndash
      = {\r\n    \"name\": \"AIOT Overview\",\r\n    \"display_period\": 30,\r\n    \"auto_start\":
      1,\r\n    \"pages\": [{\"name\":\"Overview\",\"widgets\": widgets}],\r\n}\r\nif
      existing:\r\n    dash[\"dashboardid\"] = existing[0][\"dashboardid\"]\r\n    r
      = api(\"dashboard.update\", dash, tok)\r\n    print(f\"Dashboard updated id={existing[0]['dashboardid']}
      widgets={len(widgets)} result={r}\")\r\nelse:\r\n    r = api(\"dashboard.create\",
      dash, tok)\r\n    print(f\"Dashboard created: {r}\")\r\n"
