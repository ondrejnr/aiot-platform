      \"qdrant.35.241.255.137.nip.io\"),\r\n    (\"aiot/rag\", \"rag.35.241.255.137.nip.io\"),\r\n
      \   (\"cattle/rancher\", \"rancher.35.241.255.137.nip.io\"),\r\n    (\"chef/chef\",
