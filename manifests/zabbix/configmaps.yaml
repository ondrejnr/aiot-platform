inue\r\n    api(\"host.create\", {\r\n        \"host\": name,\r\n        \"interfaces\": [{\"type\":1,\"main\":1,\"useip\":1,\"ip\":ip,\"dns\":\"\",\"port\":\"10050\"}],\r\n        \"groups\": [{\"groupid\": groups[\"AIOT Cluster Nodes\"]}],\r\n        \"templates\": [{\"templateid\": LINUX_TPL}],\r\n    }, tok)\r\nprint(f\"Node hosts: {len(NODES)} ensured\")\r\n\r\n# ===== Web hosts =====\r\nINGRESS_IP = \"35.241.255.137\"\r\nWEB_HOSTS = [\r\n    \"api.aiot\", \"twin.aiot\", \"pgadmin.aiot\", \"rag.aiot\", \"cloudbeaver.aiot\",\r\n    \"qdrant.aiot\", \"chat.aiot\", \"emqx.aiot\", \"headlamp.aiot\", \"inference.aiot\",\r\n    \"kubeflow\", \"jenkins\", \"longhorn\", \"mm\", \"mlflow\",\r\n    \"grafana\", \"prometheus\", \"n8n\", \"signoz\", \"chef\",\r\n    \"webhook\", \"ngrok.aiot\", \"registry\", \"gitea\", \"semaphore\",\r\n    \"argo\", \"rancher\",\r\n]\r\nfor name in WEB_HOSTS:\r\n    hn = f\"web-{name.replace('.','-')}\"\r\n    ex = api(\"host.get\", {\"filter\":{\"host\":hn}}, tok)\r\n    if ex: continue\r\n    dns = f\"{name}.{INGRESS_IP}.nip.io\"\r\n    hid = api(\"host.create\", {\r\n        \"host\": hn,\r\n        \"interfaces\": [{\"type\":1,\"main\":1,\"useip\":0,\"ip\":\"\",\"dns\":dns,\"port\":\"443\"}],\r\n        \"groups\": [{\"groupid\": groups[\"AIOT Web Services\"]}],\r\n    }, tok)[\"hostids\"][0]\r\n    # TCP service check (simple check type=3)\r\n    api(\"item.create\", {\r\n        \"hostid\": hid, \"name\":\"HTTPS service availability\",\r\n        \"key_\": f\"net.tcp.service[https,{dns},443]\", \"type\":3, \"value_type\":3, \"delay\":\"60s\"\r\n    }, tok)\r\n    # HTTP status code (HTTP agent type=19)\r\n    api(\"item.create\", {\r\n        \"hostid\": hid, \"name\":\"HTTP status code\",\r\n        \"key_\": \"http.status_code\", \"type\":19, \"url\":f\"https://{dns}/\",\r\n        \"request_method\":1, \"follow_redirects\":1, \"retrieve_mode\":2,\r\n        \"value_type\":3, \"verify_host\":0, \"verify_peer\":0, \"delay\":\"60s\",\r\n        \"preprocessing\":[\r\n            {\"type\":5, \"params\":\"HTTP/[0-9.]+ ([0-9]{3})\\n\\\\1\",\r\n             \"error_handler\":2, \"error_handler_params\":\"0\"},\r\n        ],\r\n    }, tok)\r\n    # Trigger: fail if not 2xx/3xx for 3min\r\n    api(\"trigger.create\", {\r\n        \"description\": f\"{hn}: HTTP not OK on {{HOST.NAME}}\",\r\n        \"expression\": f\"last(/{hn}/http.status_code)\u003c200 or last(/{hn}/http.status_code)\u003e=400\",\r\n        \"priority\": 3,  # Average\r\n    }, tok)\r\nprint(f\"Web hosts: {len(WEB_HOSTS)} ensured\")\r\n\r\n# ===== Infrastructure TCP =====\r\nINFRA = [\r\n    (\"aiot-postgres\", \"postgres.aiot.svc.cluster.local\", \"tcp,5432\"),\r\n    (\"aiot-redis\", \"redis-master.aiot.svc.cluster.local\", \"tcp,6379\"),\r\n    (\"emqx-mqtt\", \"emqx.emqx.svc.cluster.local\", \"tcp,1883\"),\r\n    (\"signoz-clickhouse\", \"chi-signoz-clickhouse-cluster-0-0.signoz.svc.cluster.local\", \"tcp,9000\"),\r\n    (\"kubeflow-mysql\", \"mysql.kubeflow.svc.cluster.local\", \"tcp,3306\"),\r\n]\r\nfor hn, dns, svc in INFRA:\r\n    ex = api(\"host.get\", {\"filter\":{\"host\":hn}}, tok)\r\n    if ex: continue\r\n    hid = api(\"host.create\", {\r\n        \"host\": hn,\r\n        \"interfaces\": [{\"type\":1,\"main\":1,\"useip\":0,\"ip\":\"\",\"dns\":dns,\"port\":\"10050\"}],\r\n        \"groups\": [{\"groupid\": groups[\"AIOT Infrastructure\"]}],\r\n    }, tok)[\"hostids\"][0]\r\n    proto, port = svc.split(\",\")\r\n    api(\"item.create\", {\r\n        \"hostid\": hid, \"name\": f\"{proto.upper()} {port} service\",\r\n        \"key_\": f\"net.tcp.service[{proto},{dns},{port}]\",\r\n        \"type\": 3, \"value_type\": 3, \"delay\":\"60s\"\r\n    }, tok)\r\n    api(\"trigger.create\", {\r\n        \"description\": f\"{hn}: TCP {port} down\",\r\n        \"expression\": f'last(/{hn}/net.tcp.service[{proto},{dns},{port}])=0',\r\n        \"priority\": 4,  # High\r\n    }, tok)\r\nprint(f\"Infra hosts: {len(INFRA)} ensured\")\r\n\r\n# ===== Mattermost mediatype =====\r\nMM_URL = \"https://mm.35.241.255.137.nip.io/hooks/jzjdqjnck7y6ubjdauce6gm5cr\"\r\nMM_SCRIPT = r\"\"\"\r\ntry {\r\n    var params = JSON.parse(value);\r\n    var req = new HttpRequest();\r\n    req.addHeader('Content-Type: application/json');\r\n    var text = '### ' + (params.event_severity || 'Info') + ': ' + (params.subject || params.event_name || 'Alert') + '\\n\\n' + (params.message || '');\r\n    var payload = JSON.stringify({text: text, username: 'zabbix-bot', icon_emoji: ':zabbix:'});\r\n    var resp = req.post(params.webhook_url, payload);\r\n    return 'OK';\r\n} catch(e) { return 'ERR: ' + e; }\r\n\"\"\"\r\nmt = api(\"mediatype.get\", {\"filter\":{\"name\":\"Mattermost AIOT\"}}, tok)\r\nmm_params = {\r\n    \"type\": 4,  # webhook\r\n    \"name\": \"Mattermost AIOT\",\r\n    \"script\": MM_SCRIPT,\r\n    \"parameters\": [\r\n        {\"name\":\"webhook_url\",\"value\":MM_URL},\r\n        {\"name\":\"subject\",\"value\":\"{ALERT.SUBJECT}\"},\r\n        {\"name\":\"message\",\"value\":\"{ALERT.MESSAGE}\"},\r\n        {\"name\":\"event_severity\",\"value\":\"{EVENT.SEVERITY}\"},\r\n        {\"name\":\"event_name\",\"value\":\"{EVENT.NAME}\"},\r\n    ],\r\n    \"status\": 0,\r\n    \"message_templates\": [\r\n        {\"eventsource\":0,\"recovery\":0,\"subject\":\"Problem: {EVENT.NAME}\",\"message\":\"Severity: {EVENT.SEVERITY}\\nHost: {HOST.NAME}\\nTime: {EVENT.DATE} {EVENT.TIME}\\n{EVENT.NAME}\"},\r\n        {\"eventsource\":0,\"recovery\":1,\"subject\":\"Resolved: {EVENT.NAME}\",\"message\":\"Resolved at {EVENT.RECOVERY.DATE} {EVENT.RECOVERY.TIME}\\n{EVENT.NAME}\"},\r\n    ],\r\n}\r\nif mt:\r\n    mm_params[\"mediatypeid\"] = mt[0][\"mediatypeid\"]\r\n    api(\"mediatype.update\", mm_params, tok)\r\n    MT_ID = mt[0][\"mediatypeid\"]\r\nelse:\r\n    MT_ID = api(\"mediatype.create\", mm_params, tok)[\"mediatypeids\"][0]\r\nprint(f\"Mediatype Mattermost AIOT id: {MT_ID}\")\r\n\r\n# Attach to Admin\r\nadm = api(\"user.get\", {\"filter\":{\"alias\":\"Admin\"},\"selectMedias\":\"extend\"}, tok)[0]\r\nif not any(m[\"mediatypeid\"]==MT_ID for m in adm.get(\"medias\",[])):\r\n    api(\"user.update\", {\r\n        \"userid\": adm[\"userid\"],\r\n        \"medias\": adm.get(\"medias\",[]) + [{\"mediatypeid\":MT_ID,\"sendto\":\"mm\",\"active\":0,\"severity\":63,\"period\":\"1-7,00:00-24:00\"}],\r\n    }, tok)\r\n    print(\"Attached MM media to Admin\")\r\n\r\n# ===== Action =====\r\nact = api(\"action.get\", {\"filter\":{\"name\":\"AIOT Mattermost notify\"}}, tok)\r\naction_params = {\r\n    \"name\": \"AIOT Mattermost notify\",\r\n    \"eventsource\": 0,\r\n    \"status\": 0,\r\n    \"esc_period\": \"1h\",\r\n    \"filter\": {\"evaltype\":0, \"conditions\":[\r\n        {\"conditiontype\":4,\"operator\":5,\"value\":\"2\"},  # severity \u003e= Warning\r\n    ]},\r\n    \"operations\": [{\"operationtype\":0,\"esc_period\":\"0\",\"esc_step_from\":1,\"esc_step_to\":1,\r\n                    \"opmessage\":{\"default_msg\":1,\"mediatypeid\":MT_ID},\r\n                    \"opmessage_usr\":[{\"userid\":adm[\"userid\"]}]}],\r\n    \"recovery_operations\":[{\"operationtype\":0,\"opmessage\":{\"default_msg\":1,\"mediatypeid\":MT_ID},\"opmessage_usr\":[{\"userid\":adm[\"userid\"]}]}],\r\n}\r\nif act:\r\n    action_params[\"actionid\"] = act[0][\"actionid\"]\r\n    api(\"action.update\", action_params, tok)\r\nelse:\r\n    api(\"action.create\", action_params, tok)\r\nprint(\"Action created/updated\")\r\n\r\nprint(\"\\n=== DONE ===\")\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"zbx-full-py","namespace":"zabbix"}}
