y, w_, h_, name, [\r\n        FI(\"legend\", 1),\r\n        FI(\"show_problems\", 1),\r\n        FS(\"ds.0.color\", color),\r\n        FS(\"ds.0.hosts.0\", host),\r\n        FS(\"ds.0.items.0\", item),\r\n        FS(\"reference\", ref()),\r\n    ])\r\n\r\nwidgets = []\r\nwidgets.append(W(\"problemsbysv\", 0, 0, 36, 4, \"Problems by severity\",\r\n    [FG(\"groupids.0\", g_nodes), FG(\"groupids.1\", g_web), FG(\"groupids.2\", g_infra)]))\r\nwidgets.append(W(\"systeminfo\", 36, 0, 36, 4, \"System info\", []))\r\nwidgets.append(W(\"problems\", 0, 4, 72, 5, \"Current problems\",\r\n    [FG(\"groupids.0\", g_nodes), FG(\"groupids.1\", g_web), FG(\"groupids.2\", g_infra),\r\n     FI(\"show_lines\", 25)]))\r\n\r\n# CPU graphs — 3 per row, 6 nodes = 2 rows\r\nx = 0; y = 9\r\nfor n in nodes:\r\n    widgets.append(graph(x, y, 24, 5, f\"CPU - {n['host']}\", n[\"host\"], \"CPU utilization\", \"1A7C11\"))\r\n    x += 24\r\n    if x \u003e= 72: x = 0; y += 5\r\nif x != 0: x = 0; y += 5\r\n\r\n# MEM graphs\r\nfor n in nodes:\r\n    widgets.append(graph(x, y, 24, 5, f\"MEM - {n['host']}\", n[\"host\"], \"Memory utilization\", \"2E8B57\"))\r\n    x += 24\r\n    if x \u003e= 72: x = 0; y += 5\r\nif x != 0: x = 0; y += 5\r\n\r\n# Disk / — use rootfs (Linux template mounts / at /rootfs in dep item)\r\nfor n in nodes:\r\n    widgets.append(graph(x, y, 24, 5, f\"Disk / - {n['host']}\", n[\"host\"], \"FS [/rootfs]: Space: Used, in %\", \"B22222\"))\r\n    x += 24\r\n    if x \u003e= 72: x = 0; y += 5\r\nif x != 0: x = 0; y += 5\r\n\r\nwidgets.append(W(\"dataover\", 0, y, 72, 8, \"Web services\", [FG(\"groupids.0\", g_web)]))\r\ny += 8\r\nwidgets.append(W(\"dataover\", 0, y, 72, 5, \"Infrastructure\", [FG(\"groupids.0\", g_infra)]))\r\n\r\nexisting = api(\"dashboard.get\", {\"filter\":{\"name\":\"AIOT Overview\"}}, tok)\r\ndash = {\r\n    \"name\": \"AIOT Overview\",\r\n    \"display_period\": 30,\r\n    \"auto_start\": 1,\r\n    \"pages\": [{\"name\":\"Overview\",\"widgets\": widgets}],\r