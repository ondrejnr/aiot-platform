- apiVersion: v1
  data:
    zbx-mm.py: "#!/usr/bin/env python3\r\n\"\"\"Setup Mattermost webhook media type
      + user media + action for triggers.\"\"\"\r\nimport json, urllib.request, sys\r\nURL
      = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\nMM_URL
      = \"https://mm.35.241.255.137.nip.io/hooks/jzjdqjnck7y6ubjdauce6gm5cr\"\r\n\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(f\"ERR
      {method}: {d['error']}\", file=sys.stderr); return None\r\n    return d.get(\"result\")\r\n\r\ntoken
      = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n#
      Webhook script: Zabbix runs this JS in Duktape. {ALERT.SUBJECT} and {ALERT.MESSAGE}\r\n#
      get replaced before script runs; script posts to MM webhook.\r\nSCRIPT = r'''try
      {\r\n    var params = JSON.parse(value);\r\n    var req = new HttpRequest();\r\n
      \   req.addHeader('Content-Type: application/json');\r\n    var payload = JSON.stringify({\r\n
      \       username: 'zabbix-bot',\r\n        icon_emoji: ':zabbix:',\r\n        text:
      '### :rotating_light: ' + params.subject + '\\n' + params.message\r\n    });\r\n
      \   var resp = req.post(params.url, payload);\r\n    return resp;\r\n} catch
      (e) {\r\n    Zabbix.log(3, 'mm webhook error: ' + e);\r\n    throw e;\r\n}'''\r\n\r\n#
      Check if exists\r\nexisting = api(\"mediatype.get\", {\"filter\":{\"name\":[\"Mattermost
      AIOT\"]}}, token)\r\nif existing:\r\n    mtid = existing[0][\"mediatypeid\"]\r\n
      \   api(\"mediatype.update\", {\"mediatypeid\": mtid, \"script\": SCRIPT, \"parameters\":
      [\r\n        {\"name\":\"url\",\"value\":MM_URL},\r\n        {\"name\":\"subject\",\"value\":\"{ALERT.SUBJECT}\"},\r\n
      \       {\"name\":\"message\",\"value\":\"{ALERT.MESSAGE}\"},\r\n    ]}, token)\r\n
      \   print(f\"Updated mediatype {mtid}\")\r\nelse:\r\n    r = api(\"mediatype.create\",
      {\r\n        \"name\": \"Mattermost AIOT\",\r\n        \"type\": 4,  # webhook\r\n
      \       \"status\": 0,  # enabled\r\n        \"script\": SCRIPT,\r\n        \"parameters\":
      [\r\n            {\"name\":\"url\",\"value\":MM_URL},\r\n            {\"name\":\"subject\",\"value\":\"{ALERT.SUBJECT}\"},\r\n
      \           {\"name\":\"message\",\"value\":\"{ALERT.MESSAGE}\"},\r\n        ],\r\n
      \       \"message_templates\": [\r\n            {\"eventsource\": 0, \"recovery\":
      0, \"subject\": \"PROBLEM: {EVENT.NAME}\",\r\n             \"message\": \"Host:
      {HOST.NAME}\\nSeverity: {EVENT.SEVERITY}\\n{EVENT.DATE} {EVENT.TIME}\\n\\nTrigger:
      {TRIGGER.DESCRIPTION}\"},\r\n            {\"eventsource\": 0, \"recovery\":
      1, \"subject\": \"RESOLVED: {EVENT.NAME}\",\r\n             \"message\": \"Host:
      {HOST.NAME}\\n{EVENT.RECOVERY.DATE} {EVENT.RECOVERY.TIME}\\n\\n{TRIGGER.DESCRIPTION}\"},\r\n
      \       ],\r\n    }, token)\r\n    mtid = r[\"mediatypeids\"][0]\r\n    print(f\"Created
      mediatype {mtid}\")\r\n\r\n# Add media to Admin user\r\nadmin = api(\"user.get\",
      {\"filter\":{\"username\":[\"Admin\"]},\"selectMedias\":\"extend\"}, token)[0]\r\nhas
      = any(m[\"mediatypeid\"] == mtid for m in admin.get(\"medias\", []))\r\nif not
      has:\r\n    medias = admin.get(\"medias\", []) + [{\r\n        \"mediatypeid\":
      mtid,\r\n        \"sendto\": \"mattermost\",\r\n        \"active\": 0,\r\n        \"severity\":
      63,\r\n        \"period\": \"1-7,00:00-24:00\",\r\n    }]\r\n    # strip mediaid
      on re-send\r\n    for m in medias:\r\n        m.pop(\"mediaid\", None)\r\n        m.pop(\"userid\",
      None)\r\n    api(\"user.update\", {\"userid\": admin[\"userid\"], \"medias\":
      medias}, token)\r\n    print(\"Added media to Admin user\")\r\nelse:\r\n    print(\"Admin
      already has MM media\")\r\n\r\n# Create trigger action\r\nexisting_act = api(\"action.get\",
      {\"filter\":{\"name\":[\"AIOT Mattermost notify\"]}}, token)\r\nif existing_act:\r\n
      \   print(f\"Action already exists: {existing_act[0]['actionid']}\")\r\nelse:\r\n
      \   r = api(\"action.create\", {\r\n        \"name\": \"AIOT Mattermost notify\",\r\n
      \       \"eventsource\": 0,  # triggers\r\n        \"status\": 0,\r\n        \"esc_period\":
      \"1h\",\r\n        \"filter\": {\r\n            \"evaltype\": 0,\r\n            \"conditions\":
      [\r\n                {\"conditiontype\": 4, \"operator\": 5, \"value\": \"2\"},
      \ # trigger severity >= Warning\r\n            ],\r\n        },\r\n        \"operations\":
      [{\r\n            \"operationtype\": 0,  # send message\r\n            \"esc_step_from\":
      1, \"esc_step_to\": 1, \"esc_period\": \"0\",\r\n            \"opmessage\":
      {\"default_msg\": 1, \"mediatypeid\": mtid},\r\n            \"opmessage_usr\":
      [{\"userid\": admin[\"userid\"]}],\r\n        }],\r\n        \"recovery_operations\":
      [{\r\n            \"operationtype\": 11,  # notify all involved\r\n            \"opmessage\":
      {\"default_msg\": 1},\r\n        }],\r\n    }, token)\r\n    print(f\"Created
      action {r['actionids'][0]}\")\r\n"
