- apiVersion: v1
  data:
    zbx-check.py: "#!/usr/bin/env python3\r\nimport json, urllib.request\r\nURL =
      \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    return json.loads(r).get(\"result\")\r\n\r\ntoken
      = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\nhosts
      = api(\"host.get\", {\"output\":[\"host\",\"status\",\"available\"],\"selectGroups\":[\"name\"]},
      token)\r\nprint(f\"Total hosts: {len(hosts)}\")\r\nprint()\r\nby_group = {}\r\nfor
      h in hosts:\r\n    for g in h.get(\"groups\", []):\r\n        by_group.setdefault(g[\"name\"],
      []).append(h[\"host\"])\r\nfor grp, hs in sorted(by_group.items()):\r\n    print(f\"[{grp}]
      ({len(hs)})\")\r\n    for h in sorted(hs)[:20]:\r\n        print(f\"  {h}\")\r\n"
  kind: ConfigMap
  metadata:
