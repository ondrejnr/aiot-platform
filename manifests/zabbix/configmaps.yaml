      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\ng = api(\"hostgroup.get\",
      {\"filter\":{\"name\":\"AIOT Web Services\"}}, tok)[0][\"groupid\"]\r\nhosts
      = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"]}, tok)\r\nfor
      h in sorted(hosts, key=lambda x: x[\"host\"]):\r\n    items = api(\"item.get\",
      {\"hostids\":h[\"hostid\"],\"filter\":{\"key_\":\"http.status_code\"},\r\n                               \"output\":[\"lastvalue\",\"state\",\"error\"]},
      tok)\r\n    if items:\r\n        i = items[0]\r\n        print(f\"{h['host']:30s}
      val={i.get('lastvalue'):>5} state={i.get('state')} err={(i.get('error') or '')[:60]}\")\r\n"
