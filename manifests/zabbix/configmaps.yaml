    zbx-nodes.py: "#!/usr/bin/env python3\r\nimport json, urllib.request, sys\r\nURL
      = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\n\r\nNODES
      = [\r\n    (\"aiot-master\", \"10.132.0.2\"),\r\n    (\"aiot-worker-01\", \"10.132.0.3\"),\r\n
      \   (\"aiot-worker-02\", \"10.132.0.4\"),\r\n    (\"oci-e5-node1\", \"172.16.200.10\"),\r\n
      \   (\"oci-e5-node2\", \"172.16.200.11\"),\r\n    (\"oci-test-node1\", \"172.16.200.12\"),\r\n]\r\n\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(f\"ERR
      {method}: {d['error']}\", file=sys.stderr); return None\r\n    return d.get(\"result\")\r\n\r\ntoken
      = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\ngid
      = api(\"hostgroup.get\", {\"filter\":{\"name\":[\"AIOT Cluster Nodes\"]}}, token)[0][\"groupid\"]\r\ntpl
      = api(\"template.get\", {\"filter\":{\"host\":[\"Linux by Zabbix agent active\"]}},
      token)[0][\"templateid\"]\r\nprint(f\"group={gid} template={tpl}\")\r\n\r\nfor
      name, ip in NODES:\r\n    existing = api(\"host.get\", {\"filter\":{\"host\":[name]}},
      token)\r\n    if existing:\r\n        print(f\"= {name} already exists\")\r\n
      \       continue\r\n    r = api(\"host.create\", {\r\n        \"host\": name,\r\n
      \       \"name\": name,\r\n        \"groups\": [{\"groupid\": gid}],\r\n        \"interfaces\":
      [{\"type\": 1, \"main\": 1, \"useip\": 1, \"ip\": ip, \"dns\": \"\", \"port\":
      \"10050\"}],\r\n        \"templates\": [{\"templateid\": tpl}],\r\n        \"inventory_mode\":
      0,\r\n    }, token)\r\n    if r:\r\n        print(f\"+ {name} ({ip})\")\r\n"
