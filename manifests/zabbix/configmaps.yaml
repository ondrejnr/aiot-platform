      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\",
      d[\"error\"]); return None\r\n    return d.get(\"result\")\r\ntok = api(\"user.login\",
      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\nitems = api(\"item.get\",
      {\"search\":{\"key_\":\"http.status_code\"},\"output\":[\"itemid\"]}, tok)\r\nprint(f\"Updating
      {len(items)} items with uint + preprocessing...\")\r\nfor it in items:\r\n    api(\"item.update\",
      {\r\n        \"itemid\": it[\"itemid\"],\r\n        \"value_type\": 3,  # uint\r\n
      \       \"retrieve_mode\": 2,  # both (so we have status line in body/headers)\r\n
      \       \"preprocessing\": [\r\n            {\"type\": 5, \"params\": \"HTTP/[0-9.]+
      ([0-9]{3})\\n\\\\1\", \"error_handler\": 2, \"error_handler_params\": \"0\"},\r\n
      \       ],\r\n    }, tok)\r\n\r\n# Verify params are stored correctly\r\ncheck
      = api(\"item.get\", {\"itemids\":items[0][\"itemid\"],\"selectPreprocessing\":\"extend\"},
      tok)\r\nprint(\"Stored preprocessing:\", json.dumps(check[0].get(\"preprocessing\"),
      indent=2))\r\nprint(\"Done.\")\r\n"
