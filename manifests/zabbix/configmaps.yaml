- apiVersion: v1
  data:
    zbx-fix.py: "#!/usr/bin/env python3\r\n\"\"\"Inspect what's flowing in Zabbix.\"\"\"\r\nimport
      json, urllib.request\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\",
      d[\"error\"]); return None\r\n    return d.get(\"result\")\r\ntok = api(\"user.login\",
      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n# Host status\r\nhosts
      = api(\"host.get\", {\"output\":[\"host\",\"status\",\"available\",\"error\"],\"selectInterfaces\":[\"available\",\"error\",\"ip\",\"dns\"]},
      tok)\r\nprint(f\"=== {len(hosts)} hosts ===\")\r\nfor h in hosts[:8]:\r\n    for
      i in h[\"interfaces\"]:\r\n        av = {\"0\":\"unknown\",\"1\":\"available\",\"2\":\"unavailable\"}.get(i.get(\"available\",\"0\"),\"?\")\r\n
      \       print(f\"  {h['host']:30s} iface={i['ip'] or i['dns']:40s} avail={av}
      err={i.get('error','')[:40]}\")\r\n\r\n# Item stats per host\r\nprint(\"\\n===
      items per host ===\")\r\nfor h in hosts[:4]:\r\n    items = api(\"item.get\",
      {\"hostids\":h[\"hostid\"],\"output\":[\"state\",\"lastvalue\"],\"countOutput\":False},
      tok)\r\n    have_val = sum(1 for i in items if i.get(\"lastvalue\"))\r\n    err_state
      = sum(1 for i in items if str(i.get(\"state\"))==\"1\")\r\n    print(f\"  {h['host']:30s}
      total={len(items):3d} with_value={have_val:3d} state=err={err_state}\")\r\n\r\n#
      Dashboards\r\ndbs = api(\"dashboard.get\", {\"output\":[\"dashboardid\",\"name\"]},
      tok)\r\nprint(f\"\\n=== {len(dbs)} dashboards ===\")\r\nfor d in dbs: print(f\"
      \ {d['dashboardid']} {d['name']}\")\r\n\r\n# Triggers\r\ntrig = api(\"trigger.get\",
      {\"output\":[\"triggerid\"],\"countOutput\":True}, tok)\r\nprint(f\"\\nTotal
      triggers: {trig}\")\r\n# Active problems\r\nprobs = api(\"problem.get\", {\"output\":\"extend\",\"recent\":True},
      tok)\r\nprint(f\"Current problems: {len(probs)}\")\r\nfor p in probs[:5]:\r\n
      \   print(f\"  sev={p['severity']} name={p['name'][:80]}\")\r\n"
