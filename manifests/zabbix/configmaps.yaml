      = [i for i in items if i.get(\"error\")]\r\nprint(f\"With value: {sum(1 for
      i in items if i.get('lastvalue'))}\")\r\nprint(f\"State=1(err): {sum(1 for i
      in items if str(i.get('state'))=='1')}\")\r\nfor i in items[:3]:\r\n    print(f\"
      \ lastvalue={i.get('lastvalue')!r} state={i.get('state')} err={i.get('error')[:80]
      if i.get('error') else ''}\")\r\n# Node hosts metrics\r\nnodes = api(\"host.get\",
      {\"groupids\":\"22\",\"output\":[\"hostid\",\"host\"]}, tok)\r\nprint(f\"\\nNode
      hosts: {len(nodes)}\")\r\nfor n in nodes:\r\n    items_n = api(\"item.get\",
      {\"hostids\":n[\"hostid\"],\"search\":{\"key_\":\"system.uptime\"},\"output\":[\"lastvalue\",\"state\",\"error\"]},
      tok)\r\n    if items_n:\r\n        i = items_n[0]\r\n        print(f\"  {n['host']}:
      uptime={i.get('lastvalue')} state={i.get('state')} err={(i.get('error') or '')[:60]}\")\r\n"
