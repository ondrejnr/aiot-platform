  data:
    zbx-fix.py: "#!/usr/bin/env python3\r\n\"\"\"Fix unsupported HTTP items: replace
      web.page.regexp with web.page.get, delete broken items.\"\"\"\r\nimport json,
      urllib.request, sys\r\nURL = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\n\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=15).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(f\"ERR
      {method}: {d['error']}\", file=sys.stderr); return None\r\n    return d.get(\"result\")\r\n\r\ntoken
      = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n#
      Find and delete broken web.page.regexp items\r\nbroken = api(\"item.get\", {\"search\":{\"key_\":\"web.page.regexp\"},\"output\":[\"itemid\",\"name\",\"key_\"]},
      token)\r\nprint(f\"Found {len(broken)} broken items\")\r\nif broken:\r\n    api(\"item.delete\",
      [b[\"itemid\"] for b in broken], token)\r\n    print(\"Deleted broken items\")\r\n\r\n#
      For web hosts, replace with HTTP agent type item that checks status code\r\nweb_hosts
      = api(\"host.get\", {\"search\":{\"host\":\"web-\"},\"startSearch\":True,\"output\":[\"hostid\",\"host\"],\"selectInterfaces\":[\"dns\"]},
      token)\r\nprint(f\"Patching {len(web_hosts)} web hosts with HTTP agent status
      check...\")\r\nfor h in web_hosts:\r\n    dns = h[\"interfaces\"][0][\"dns\"]\r\n
      \   hostid = h[\"hostid\"]\r\n    existing = api(\"item.get\", {\"hostids\":hostid,\"search\":{\"key_\":\"http.status_code\"}},
      token)\r\n    if existing: continue\r\n    api(\"item.create\", {\r\n        \"hostid\":
      hostid,\r\n        \"name\": \"HTTP status code\",\r\n        \"key_\": \"http.status_code\",\r\n
      \       \"type\": 19,  # HTTP agent\r\n        \"url\": f\"https://{dns}/\",\r\n
      \       \"status_codes\": \"\",\r\n        \"request_method\": 1,  # GET\r\n
      \       \"follow_redirects\": 1,\r\n        \"retrieve_mode\": 1,  # 0=body,
      1=headers, 2=both\r\n        \"value_type\": 3,  # uint\r\n        \"delay\":
      \"60s\",\r\n        \"verify_host\": 0,\r\n        \"verify_peer\": 0,\r\n        \"preprocessing\":
      [\r\n            {\"type\": 5, \"params\": \"HTTP/[0-9.]+ ([0-9]{3})\\n\\\\1\",
      \"error_handler\": 0, \"error_handler_params\": \"\"},\r\n        ],\r\n    },
      token)\r\nprint(\"Done\")\r\n"
