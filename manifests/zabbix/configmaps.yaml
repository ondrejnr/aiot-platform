- apiVersion: v1
  data:
    zbx-fix.py: "#!/usr/bin/env python3\r\n\"\"\"Round 2: fix action update (strip
      operationid), fix infra triggers.\"\"\"\r\nimport json, urllib.request, re\r\nURL
      = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=20).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\",
      d[\"error\"])\r\n    return d.get(\"result\")\r\ntok = api(\"user.login\", {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\n#
      Infra triggers: simpler - just use description match\r\ng = api(\"hostgroup.get\",
      {\"filter\":{\"name\":\"AIOT Infrastructure\"}}, tok)[0][\"groupid\"]\r\nhosts
      = api(\"host.get\", {\"groupids\":g,\"output\":[\"host\",\"hostid\"]}, tok)\r\ncount
      = 0\r\nfor h in hosts:\r\n    trigs = api(\"trigger.get\", {\"hostids\":h[\"hostid\"],\"output\":[\"triggerid\",\"description\",\"expression\"]},
      tok) or []\r\n    for t in trigs:\r\n        expr = t.get(\"expression\",\"\")\r\n
      \       m = re.search(r\"(net\\.tcp\\.service\\[[^\\]]+\\])\", expr)\r\n        if
      m:\r\n            key = m.group(1)\r\n            new_expr = f\"max(/{h['host']}/{key},#3)=0\"\r\n
      \           api(\"trigger.update\", {\"triggerid\": t[\"triggerid\"], \"expression\":
      new_expr}, tok)\r\n            count += 1\r\n            print(f\"  {h['host']}:
      {new_expr}\")\r\nprint(f\"Updated {count} infra triggers\")\r\n\r\n# Action
      update — rebuild operations without operationid\r\nact = api(\"action.get\",
      {\"filter\":{\"name\":\"AIOT Mattermost notify\"},\r\n                          \"selectOperations\":\"extend\",\"selectRecoveryOperations\":\"extend\",\r\n
      \                         \"selectFilter\":\"extend\"}, tok)[0]\r\n\r\ndef strip_ids(ops):\r\n
      \   for op in ops:\r\n        op.pop(\"operationid\", None)\r\n        op.pop(\"actionid\",
      None)\r\n        if \"opmessage\" in op and isinstance(op[\"opmessage\"], dict):\r\n
      \           op[\"opmessage\"].pop(\"operationid\", None)\r\n        for sub
      in (\"opmessage_usr\",\"opmessage_grp\"):\r\n            if sub in op:\r\n                for
      x in op[sub]:\r\n                    x.pop(\"operationid\", None)\r\n    return
      ops\r\n\r\nops = strip_ids(act.get(\"operations\",[]))\r\nfor op in ops:\r\n
      \   op[\"esc_step_from\"] = \"2\"\r\n    op[\"esc_step_to\"] = \"2\"\r\n\r\nrec_ops
      = strip_ids(act.get(\"recoveryOperations\", act.get(\"recovery_operations\",[])))\r\n\r\nupd
      = {\r\n    \"actionid\": act[\"actionid\"],\r\n    \"esc_period\": \"2m\",\r\n
      \   \"operations\": ops,\r\n    \"recovery_operations\": rec_ops,\r\n}\r\nr
      = api(\"action.update\", upd, tok)\r\nprint(f\"Action update: {r}\")\r\n"
