- apiVersion: v1
  data:
    zbx-k8s-host.py: "#!/usr/bin/env python3\r\nimport json, urllib.request, sys\r\nURL
      = \"http://zabbix-zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php\"\r\ndef
      api(method, params, token=None):\r\n    p = {\"jsonrpc\":\"2.0\",\"method\":method,\"params\":params,\"id\":1}\r\n
      \   if token: p[\"auth\"] = token\r\n    r = urllib.request.urlopen(urllib.request.Request(URL,\r\n
      \       data=json.dumps(p).encode(),\r\n        headers={\"Content-Type\":\"application/json-rpc\"}),
      timeout=30).read()\r\n    d = json.loads(r)\r\n    if \"error\" in d: print(\"ERR\",
      d[\"error\"]); sys.exit(1)\r\n    return d.get(\"result\")\r\n\r\ntok = api(\"user.login\",
      {\"username\":\"Admin\",\"password\":\"zabbix\"})\r\n\r\nALL_AIOT = [\"22\",\"23\",\"24\",\"25\"]\r\nNODE_GRP,
      WEB_GRP, INFRA_GRP, K8S_GRP = \"22\",\"23\",\"24\",\"25\"\r\n\r\nNODES = [\"aiot-master\",\"aiot-worker-01\",\"aiot-worker-02\",\"oci-e5-node1\",\"oci-e5-node2\",\"oci-test-node1\"]\r\nCOLORS
      = [\"2196F3\",\"4CAF50\",\"FFC107\",\"FF5722\",\"9C27B0\",\"00BCD4\"]\r\n\r\nhs
      = api(\"host.get\", {\"filter\":{\"host\":NODES}, \"output\":[\"hostid\",\"host\"]},
      tok)\r\nh2id = {h[\"host\"]: h[\"hostid\"] for h in hs}\r\n\r\ndef gi(hostid,
      key):\r\n    r = api(\"item.get\", {\"hostids\":[hostid], \"filter\":{\"key_\":key},
      \"output\":[\"itemid\"]}, tok)\r\n    return r[0][\"itemid\"] if r else None\r\n\r\ncpu
      = [gi(h2id[n], \"system.cpu.util\") for n in NODES]\r\nmem = [gi(h2id[n], \"vm.memory.utilization\")
      for n in NODES]\r\nload1 = [gi(h2id[n], \"system.cpu.load[all,avg1]\") for n
      in NODES]\r\ndisk = [gi(h2id[n], \"vfs.fs.dependent.size[/rootfs,pused]\") for
      n in NODES]\r\n\r\nK8S = api(\"host.get\", {\"filter\":{\"host\":\"aiot2-kubernetes\"},
      \"output\":[\"hostid\"]}, tok)[0][\"hostid\"]\r\ndef kg(key):\r\n    r = api(\"item.get\",
      {\"hostids\":[K8S], \"filter\":{\"key_\":key}, \"output\":[\"itemid\"]}, tok)\r\n
      \   return r[0][\"itemid\"] if r else None\r\n\r\nk_nodes = kg(\"kube.node.count\")\r\nk_ns
      = kg(\"kube.namespace.count\")\r\nk_dep = kg(\"kube.deployment.count\")\r\nk_sts
      = kg(\"kube.statefulset.count\")\r\nk_svc = kg(\"kube.service.count\")\r\nk_job
      = kg(\"kube.job.count\")\r\nk_cron = kg(\"kube.cronjob.count\")\r\n\r\ndef F(n,v,t):\r\n
      \   return {\"type\":int(t), \"name\":n, \"value\":str(v)}\r\n\r\ndef fields(lst):\r\n
      \   return lst\r\n\r\ndef fdict(d, type_map=None):\r\n    out=[]\r\n    for
      k,v in d.items():\r\n        if k == \"groupids\" or k.startswith(\"groupids.\")
      or \".groupids.\" in k:\r\n            t = 2\r\n        elif k == \"hostids\"
      or k.startswith(\"hostids.\") or \".hostids.\" in k:\r\n            t = 3\r\n
      \       elif k.startswith(\"itemid.\") or k == \"itemid\" or \".itemids.\" in
      k or k.startswith(\"itemids.\"):\r\n            t = 4\r\n        else:\r\n            try:\r\n
      \               int(v); t=0\r\n            except (ValueError,TypeError):\r\n
      \               t=1\r\n        out.append(F(k,v,t))\r\n    return out\r\n\r\nwidgets
      = []\r\n\r\n# ===== Row 1 (y=0, h=4) =====\r\nwidgets.append({\r\n    \"type\":\"problemsbysv\",\"name\":\"Problems
      by severity\",\r\n    \"x\":0,\"y\":0,\"width\":36,\"height\":4,\r\n    \"fields\":
      fdict({**{f\"groupids.{i}\":g for i,g in enumerate(ALL_AIOT)}, \"show_type\":\"1\",\"reference\":\"AAAAA\"})\r\n})\r\nwidgets.append({\r\n
      \   \"type\":\"hostavail\",\"name\":\"\",\r\n    \"x\":36,\"y\":0,\"width\":18,\"height\":4,\r\n
      \   \"fields\": fdict({\"groupids.0\": NODE_GRP, \"interface_type.0\":\"1\"})\r\n})\r\nwidgets.append({\r\n
      \   \"type\":\"clock\",\"name\":\"Local time\",\r\n    \"x\":54,\"y\":0,\"width\":18,\"height\":4,\r\n
      \   \"fields\":[]\r\n})\r\n\r\n# ===== Row 2 (y=4, h=5): Top hosts CPU + Top
      hosts Memory =====\r\ntophosts_cpu = {\r\n    \"groupids.0\": NODE_GRP,\r\n
      \   \"columns.0.name\":\"Host\",\"columns.0.data\":\"2\",\"columns.0.aggregate_function\":\"0\",\"columns.0.decimal_places\":\"0\",\"columns.0.base_color\":\"\",\r\n
      \   \"columns.1.name\":\"CPU %\",\"columns.1.data\":\"1\",\"columns.1.item\":\"CPU
      utilization\",\"columns.1.aggregate_function\":\"0\",\r\n    \"columns.1.min\":\"0\",\"columns.1.max\":\"100\",\"columns.1.decimal_places\":\"1\",\"columns.1.display\":\"3\",\"columns.1.history\":\"1\",\r\n
      \   \"columns.1.base_color\":\"4CAF50\",\r\n    \"columnsthresholds.1.color.0\":\"FFFF00\",\"columnsthresholds.1.threshold.0\":\"50\",\r\n
      \   \"columnsthresholds.1.color.1\":\"FF8000\",\"columnsthresholds.1.threshold.1\":\"75\",\r\n
      \   \"columnsthresholds.1.color.2\":\"FF4000\",\"columnsthresholds.1.threshold.2\":\"90\",\r\n
      \   \"columns.2.name\":\"Load 1m\",\"columns.2.data\":\"1\",\"columns.2.item\":\"Load
      average (1m avg)\",\"columns.2.aggregate_function\":\"0\",\r\n    \"columns.2.decimal_places\":\"2\",\"columns.2.display\":\"1\",\"columns.2.history\":\"1\",\"columns.2.base_color\":\"\",\r\n
      \   \"columns.3.name\":\"Load 5m\",\"columns.3.data\":\"1\",\"columns.3.item\":\"Load
      average (5m avg)\",\"columns.3.aggregate_function\":\"0\",\r\n    \"columns.3.decimal_places\":\"2\",\"columns.3.display\":\"1\",\"columns.3.history\":\"1\",\"columns.3.base_color\":\"\",\r\n
      \   \"column\":\"1\",\"count\":\"10\",\"reference\":\"BBBBB\",\r\n}\r\nwidgets.append({\"type\":\"tophosts\",\"name\":\"Top
      hosts by CPU\",\r\n    \"x\":0,\"y\":4,\"width\":36,\"height\":5, \"fields\":
      fdict(tophosts_cpu)})\r\n\r\ntophosts_mem = {\r\n    \"groupids.0\": NODE_GRP,\r\n
      \   \"columns.0.name\":\"Host\",\"columns.0.data\":\"2\",\"columns.0.aggregate_function\":\"0\",\"columns.0.decimal_places\":\"0\",\"columns.0.base_color\":\"\",\r\n
      \   \"columns.1.name\":\"Mem %\",\"columns.1.data\":\"1\",\"columns.1.item\":\"Memory
      utilization\",\"columns.1.aggregate_function\":\"0\",\r\n    \"columns.1.min\":\"0\",\"columns.1.max\":\"100\",\"columns.1.decimal_places\":\"1\",\"columns.1.display\":\"3\",\"columns.1.history\":\"1\",\r\n
      \   \"columns.1.base_color\":\"2196F3\",\r\n    \"columnsthresholds.1.color.0\":\"FFFF00\",\"columnsthresholds.1.threshold.0\":\"70\",\r\n
      \   \"columnsthresholds.1.color.1\":\"FF8000\",\"columnsthresholds.1.threshold.1\":\"85\",\r\n
      \   \"columnsthresholds.1.color.2\":\"FF4000\",\"columnsthresholds.1.threshold.2\":\"95\",\r\n
      \   \"columns.2.name\":\"/ used %\",\"columns.2.data\":\"1\",\"columns.2.item\":\"FS
      [/rootfs]: Space: Used, in %\",\"columns.2.aggregate_function\":\"0\",\r\n    \"columns.2.min\":\"0\",\"columns.2.max\":\"100\",\"columns.2.decimal_places\":\"1\",\"columns.2.display\":\"3\",\"columns.2.history\":\"1\",\r\n
      \   \"columns.2.base_color\":\"9C27B0\",\r\n    \"columnsthresholds.2.color.0\":\"FFFF00\",\"columnsthresholds.2.threshold.0\":\"70\",\r\n
      \   \"columnsthresholds.2.color.1\":\"FF8000\",\"columnsthresholds.2.threshold.1\":\"85\",\r\n
      \   \"columnsthresholds.2.color.2\":\"FF4000\",\"columnsthresholds.2.threshold.2\":\"95\",\r\n
      \   \"column\":\"1\",\"count\":\"10\",\"reference\":\"CCCCC\",\r\n}\r\nwidgets.append({\"type\":\"tophosts\",\"name\":\"Top
      hosts by Memory\",\r\n    \"x\":36,\"y\":4,\"width\":36,\"height\":5, \"fields\":
      fdict(tophosts_mem)})\r\n\r\n# ===== Row 3 (y=9, h=6): Current problems =====\r\nprob
      = {**{f\"groupids.{i}\":g for i,g in enumerate(ALL_AIOT)},\r\n        \"show\":\"3\",\"show_tags\":\"3\",\"show_lines\":\"30\",\"sort_triggers\":\"16\"}\r\nwidgets.append({\"type\":\"problems\",\"name\":\"Current
      problems\",\r\n    \"x\":0,\"y\":9,\"width\":72,\"height\":6, \"fields\": fdict(prob)})\r\n\r\n#
      ===== Row 4 (y=15, h=3): K8s cluster gauges =====\r\ndef item_gauge(x, w, name,
      itemid, color):\r\n    return {\"type\":\"item\",\"name\":name,\r\n        \"x\":x,\"y\":15,\"width\":w,\"height\":3,\r\n
      \       \"fields\":[\r\n            F(\"itemid.0\", itemid, 4),\r\n            F(\"show.0\",\"2\",0),
      \  # value\r\n            F(\"show.1\",\"4\",0),   # time\r\n            F(\"show.2\",\"1\",0),
      \  # description\r\n            F(\"description\", name, 1),\r\n            F(\"desc_bold\",\"1\",0),\r\n
      \           F(\"desc_size\",\"15\",0),\r\n            F(\"desc_v_pos\",\"0\",0),\r\n
      \           F(\"desc_h_pos\",\"1\",0),\r\n            F(\"value_bold\",\"1\",0),\r\n
      \           F(\"value_size\",\"50\",0),\r\n            F(\"value_h_pos\",\"1\",0),\r\n
      \           F(\"bg_color\", color, 1),\r\n            F(\"dynamic\",\"0\",0),\r\n
      \       ]}\r\n\r\n# 6 gauges spread across 72 units → each width 12\r\ngauges
      = [\r\n    (\"Nodes\", k_nodes, \"1B5E20\"),\r\n    (\"Namespaces\", k_ns, \"0D47A1\"),\r\n
      \   (\"Deployments\", k_dep, \"4A148C\"),\r\n    (\"StatefulSets\", k_sts, \"B71C1C\"),\r\n
      \   (\"Services\", k_svc, \"BF360C\"),\r\n    (\"CronJobs\", k_cron, \"004D40\"),\r\n]\r\nfor
      idx,(n,iid,c) in enumerate(gauges):\r\n    if iid: widgets.append(item_gauge(idx*12,
      12, n, iid, c))\r\n\r\n# ===== Row 5 (y=18, h=6): CPU graph + MEM graph =====\r\ndef
      graph_pattern(ref, item_pattern, ymin=\"0\", ymax=\"100\", unit=\"%\"):\r\n
      \   \"\"\"Minimal svggraph matching working Zabbix server health sample.\"\"\"\r\n
      \   d = {\"reference\":ref, \"righty\":\"0\", \"legend\":\"1\"}\r\n    if ymin
      != \"\" : d[\"lefty_min\"] = ymin\r\n    if ymax != \"\" : d[\"lefty_max\"]
      = ymax\r\n    if unit: d[\"lefty_static_units\"] = unit\r\n    for i, host in
      enumerate(NODES):\r\n        d[f\"ds.{i}.hosts.0\"] = host\r\n        d[f\"ds.{i}.items.0\"]
      = item_pattern\r\n        d[f\"ds.{i}.color\"] = COLORS[i]\r\n        d[f\"ds.{i}.transparency\"]
      = \"3\"\r\n    return d\r\n\r\nwidgets.append({\"type\":\"svggraph\",\"name\":\"CPU
      utilization (all nodes)\",\r\n    \"x\":0,\"y\":18,\"width\":36,\"height\":6,\r\n
      \   \"fields\": fdict(graph_pattern(\"DDDDD\", \"CPU utilization\"))})\r\nwidgets.append({\"type\":\"svggraph\",\"name\":\"Memory
      utilization (all nodes)\",\r\n    \"x\":36,\"y\":18,\"width\":36,\"height\":6,\r\n
      \   \"fields\": fdict(graph_pattern(\"EEEEE\", \"Memory utilization\"))})\r\n\r\n#
      ===== Row 6 (y=24, h=6): Disk + Load =====\r\nwidgets.append({\"type\":\"svggraph\",\"name\":\"Root
      filesystem used % (all nodes)\",\r\n    \"x\":0,\"y\":24,\"width\":36,\"height\":6,\r\n
      \   \"fields\": fdict(graph_pattern(\"FFFFF\", \"FS [/rootfs]: Space: Used,
      in %\"))})\r\nwidgets.append({\"type\":\"svggraph\",\"name\":\"Load average
      1m (all nodes)\",\r\n    \"x\":36,\"y\":24,\"width\":36,\"height\":6,\r\n    \"fields\":
      fdict(graph_pattern(\"GGGGG\", \"Load average (1m avg)\", ymin=\"0\", ymax=\"\",
      unit=\"\"))})\r\n\r\n# ===== Row 7 (y=30, h=8): Web services =====\r\nwidgets.append({\"type\":\"dataover\",\"name\":\"Web
      services\",\r\n    \"x\":0,\"y\":30,\"width\":72,\"height\":8,\r\n    \"fields\":
      fdict({\"groupids.0\": WEB_GRP, \"style\":\"0\"})})\r\n\r\n# ===== Row 8 (y=38,
      h=5): Infrastructure =====\r\nwidgets.append({\"type\":\"dataover\",\"name\":\"Infrastructure\",\r\n
      \   \"x\":0,\"y\":38,\"width\":72,\"height\":5,\r\n    \"fields\": fdict({\"groupids.0\":
      INFRA_GRP, \"style\":\"0\"})})\r\n\r\n# Push dashboard\r\npage = {\"name\":\"Overview\",\"display_period\":\"30\",\"widgets\":widgets}\r\nr
      = api(\"dashboard.update\", {\r\n    \"dashboardid\":\"389\",\"name\":\"AIOT
      Overview\",\r\n    \"display_period\":\"30\",\"auto_start\":\"1\",\r\n    \"pages\":[page],\r\n},
      tok)\r\nprint(\"OK:\", r, f\"widgets={len(widgets)}\")\r\n"
