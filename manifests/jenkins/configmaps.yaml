- apiVersion: v1
  data:
    Dockerfile.patch: |
      FROM ghcr.io/pluralsh/console:0.12.13 AS upstream

      FROM hexpm/elixir:1.18.4-erlang-27.2-alpine-3.21.7 AS builder
      WORKDIR /work
      COPY --from=upstream /opt/app /opt/app
      COPY features.ex /work/features.ex
      RUN PA="" && for d in $(find /opt/app/lib -maxdepth 2 -type d -name ebin); do PA="$PA -pa $d"; done && \
          mkdir -p /out && \
          elixirc $PA -o /out /work/features.ex && \
          ls -la /out

      FROM ghcr.io/pluralsh/console:0.12.13
      USER root
      COPY --from=builder /out/Elixir.Console.Features.beam /opt/app/lib/console-0.12.13+dirty/ebin/Elixir.Console.Features.beam
      USER 65532
    features.ex: |-
      defmodule Console.Features do
        use GenServer
        require Logger
        alias Console.Plural.{Account, Features}

        def start_link(_opts \\ :ok),
          do: GenServer.start_link(__MODULE__, :ok, name: __MODULE__)

        def start(), do: GenServer.start_link(__MODULE__, :ok)

        def init(_), do: {:ok, {Features.everything(), Account.enterprise()}}

        def available?(_feature), do: true

        def expiry(), do: nil

        def cluster_max(), do: :infinity

        def fetch(), do: Features.everything()

        def account(), do: Account.enterprise()

        def handle_call(:fetch, _, state),
          do: {:reply, Features.everything(), state}

        def handle_call(:account, _, state),
          do: {:reply, Account.enterprise(), state}

        def handle_info(:poll, state), do: {:noreply, state}
        def handle_info(_msg, state), do: {:noreply, state}

        def check_license(_license_key \\ nil) do
          account = Account.enterprise()
          {account.availableFeatures, account}
        end
      end
