- apiVersion: v1
  data:
    otel-deployment-config.yaml: |
      exporters:
        otlp:
          endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
          headers:
            signoz-access-token: ${env:SIGNOZ_API_KEY}
          tls:
            insecure: true
            insecure_skip_verify: false
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        pprof:
          endpoint: localhost:1777
        zpages:
          endpoint: localhost:55679
      processors:
        batch:
          send_batch_size: 10000
          timeout: 1s
        k8sattributes:
          extract:
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
        resourcedetection:
          detectors:
          - env
          override: false
          timeout: 2s
      receivers:
        k8s_cluster:
          allocatable_types_to_report:
          - cpu
          - memory
          collection_interval: 30s
          metrics:
            k8s.node.condition:
              enabled: true
            k8s.pod.status_reason:
              enabled: true
          node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
          - PIDPressure
          - NetworkUnavailable
          resource_attributes:
            container.runtime:
              enabled: true
            container.runtime.version:
              enabled: true
            k8s.container.status.last_terminated_reason:
              enabled: true
            k8s.kubelet.version:
              enabled: true
            k8s.pod.qos_class:
              enabled: true
        k8s_events:
          auth_type: serviceAccount
        prometheus/ingress:
          config:
            scrape_configs:
            - job_name: ingress-nginx
              scrape_interval: 30s
              metrics_path: /metrics
              kubernetes_sd_configs:
              - role: pod
              relabel_configs:
              - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
                action: keep
                regex: ingress-nginx
              - source_labels:
                - __meta_kubernetes_pod_ip
                action: replace
                target_label: __address__
                replacement: $$1:10254
              - source_labels:
                - __meta_kubernetes_pod_node_name
                target_label: node
              - source_labels:
                - __meta_kubernetes_pod_name
                target_label: pod
              - source_labels:
                - __meta_kubernetes_namespace
                target_label: namespace
      service:
        extensions:
        - health_check
        - zpages
        - pprof
        pipelines:
          logs:
            exporters:
            - otlp
            processors:
            - k8sattributes
            - resourcedetection
            - batch
            receivers:
            - k8s_events
          metrics/internal:
            exporters:
            - otlp
            processors:
            - k8sattributes
            - resourcedetection
            - batch
            receivers:
            - k8s_cluster
            - prometheus/ingress
        telemetry:
          logs:
            encoding: json
