      COUNT=$(sqlite3 "$DB" "SELECT count(*) FROM dashboard WHERE id='$DASH_ID'" 2>/dev/null || echo 0)
      if [ "$COUNT" = "1" ]; then
        echo "AIOT dashboard already present"
        exit 0
      fi

      echo "Seeding AIOT dashboard..."
      ORG_ID=$(sqlite3 "$DB" "SELECT id FROM organizations LIMIT 1")
      USER_ID=$(sqlite3 "$DB" "SELECT id FROM users WHERE is_root=1 LIMIT 1")
      NOW=$(date -u +"%Y-%m-%d %H:%M:%S+00:00")

      if [ -z "$ORG_ID" ] || [ -z "$USER_ID" ]; then
        echo "org_id or root user not yet present — skipping seed (will retry on next pod start)"
        exit 0
      fi

      cp /backup/dashboard.json /tmp/dash.json
      cat > /tmp/insert.sql <<SQLEOF
      INSERT INTO dashboard (id, created_at, updated_at, created_by, updated_by, locked, org_id, data)
      VALUES ('$DASH_ID', '$NOW', '$NOW', '$USER_ID', '$USER_ID', 0, '$ORG_ID', readfile('/tmp/dash.json'));
      SQLEOF
      sqlite3 "$DB" < /tmp/insert.sql
      echo "AIOT dashboard seeded (ID=$DASH_ID)"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"seed.sh":"#!/bin/sh\nset -e\nDB=/var/lib/signoz/signoz.db\nDASH_ID=d912d23b-055d-4116-a0cf-e77f09dace73\n\nif [ ! -f \"$DB\" ]; then\n  echo \"DB not initialized yet — first-run, skipping seed\"\n  exit 0\nfi\n\nCOUNT=$(sqlite3 \"$DB\" \"SELECT count(*) FROM dashboard WHERE id='$DASH_ID'\" 2\u003e/dev/null || echo 0)\nif [ \"$COUNT\" = \"1\" ]; then\n  echo \"AIOT dashboard already present\"\n  exit 0\nfi\n\necho \"Seeding AIOT dashboard...\"\nORG_ID=$(sqlite3 \"$DB\" \"SELECT id FROM organizations LIMIT 1\")\nUSER_ID=$(sqlite3 \"$DB\" \"SELECT id FROM users WHERE is_root=1 LIMIT 1\")\nNOW=$(date -u +\"%Y-%m-%d %H:%M:%S+00:00\")\n\nif [ -z \"$ORG_ID\" ] || [ -z \"$USER_ID\" ]; then\n  echo \"org_id or root user not yet present — skipping seed (will retry on next pod start)\"\n  exit 0\nfi\n\ncp /backup/dashboard.json /tmp/dash.json\ncat \u003e /tmp/insert.sql \u003c\u003cSQLEOF\nINSERT INTO dashboard (id, created_at, updated_at, created_by, updated_by, locked, org_id, data)\nVALUES ('$DASH_ID', '$NOW', '$NOW', '$USER_ID', '$USER_ID', 0, '$ORG_ID', readfile('/tmp/dash.json'));\nSQLEOF\nsqlite3 \"$DB\" \u003c /tmp/insert.sql\necho \"AIOT dashboard seeded (ID=$DASH_ID)\"\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"aiot-dashboard-seed-script","namespace":"signoz"}}
