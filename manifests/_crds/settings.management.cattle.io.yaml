- apiVersion: management.cattle.io/v3
  customized: false
  default: |-
    {
      "nodeAffinity": {
        "requiredDuringSchedulingIgnoredDuringExecution": {
          "nodeSelectorTerms": [
            {
              "matchExpressions": [
                {
                  "key": "kubernetes.io/os",
                  "operator": "NotIn",
                  "values": [
                    "windows"
                  ]
                }
              ]
            }
          ]
        },
        "preferredDuringSchedulingIgnoredDuringExecution": [
          {
            "weight": 100,
            "preference": {
              "matchExpressions": [
                {
                  "key": "node-role.kubernetes.io/controlplane",
                  "operator": "In",
                  "values": [
                    "true"
                  ]
                }
              ]
            }
          },
          {
            "weight": 100,
            "preference": {
              "matchExpressions": [
                {
                  "key": "node-role.kubernetes.io/control-plane",
                  "operator": "In",
                  "values": [
                    "true"
                  ]
                }
              ]
            }
          },
          {
            "weight": 1,
            "preference": {
              "matchExpressions": [
                {
                  "key": "cattle.io/cluster-agent",
                  "operator": "In",
                  "values": [
                    "true"
                  ]
                }
              ]
            }
          }
        ]
      },
      "podAntiAffinity": {
        "preferredDuringSchedulingIgnoredDuringExecution": [
          {
            "weight": 100,
            "podAffinityTerm": {
              "labelSelector": {
                "matchExpressions": [
                  {
                    "key": "app",
                    "operator": "In",
                    "values": [
                      "cattle-cluster-agent"
                    ]
                  }
                ]
              },
              "topologyKey": "kubernetes.io/hostname"
            }
          }
        ]
      }
    }
