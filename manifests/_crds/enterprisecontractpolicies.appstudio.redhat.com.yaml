apiVersion: v1
items:
- apiVersion: appstudio.redhat.com/v1alpha1
  kind: EnterpriseContractPolicy
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"appstudio.redhat.com/v1alpha1","kind":"EnterpriseContractPolicy","metadata":{"annotations":{},"name":"hello-aiot-policy","namespace":"default-tenant"},"spec":{"description":"Dev policy for hello-aiot. Enforces presence of SLSA provenance attestation\nand a valid Tekton task bundle, but excludes hermetic-build, source-image\nand rpm checks (not applicable to internal-registry builds).\n","publicKey":"k8s://tekton-pipelines/public-key","sources":[{"config":{"exclude":["hermetic_build_task","hermetic_task","source_image","rpm_repos","cve","sbom_cyclonedx","sbom_spdx","labels","trusted_task.trusted"],"include":["@slsa3","attestation_type","attestation_task_bundle","test"]},"data":["oci::quay.io/konflux-ci/tekton-catalog/data-acceptable-bundles:latest@sha256:42089bb06b35a7ea6361f18b9dab7337a745f0ab5b8072f76d78340be1fcf096"],"name":"Default","policy":["oci::quay.io/conforma/release-policy:konflux@sha256:1b296a925b4021f4b4959ea289596925a8735540e554f3ba7754a651731a216f"]}]}}
    name: hello-aiot-policy
    namespace: default-tenant
  spec:
    description: |
      Dev policy for hello-aiot. Enforces presence of SLSA provenance attestation
      and a valid Tekton task bundle, but excludes hermetic-build, source-image
      and rpm checks (not applicable to internal-registry builds).
    publicKey: k8s://tekton-pipelines/public-key
    sources:
    - config:
        exclude:
        - hermetic_build_task
        - hermetic_task
        - source_image
        - rpm_repos
        - cve
        - sbom_cyclonedx
        - sbom_spdx
        - labels
        - trusted_task.trusted
        include:
        - '@slsa3'
        - attestation_type
        - attestation_task_bundle
        - test
      data:
      - oci::quay.io/konflux-ci/tekton-catalog/data-acceptable-bundles:latest@sha256:42089bb06b35a7ea6361f18b9dab7337a745f0ab5b8072f76d78340be1fcf096
      name: Default
      policy:
      - oci::quay.io/conforma/release-policy:konflux@sha256:1b296a925b4021f4b4959ea289596925a8735540e554f3ba7754a651731a216f
- apiVersion: appstudio.redhat.com/v1alpha1
  kind: EnterpriseContractPolicy
  metadata:
    labels:
      konflux.konflux-ci.dev/component: enterprise-contract
      konflux.konflux-ci.dev/owner: konflux-enterprise-contract
    name: default
    namespace: enterprise-contract-service
    ownerReferences:
    - apiVersion: konflux.konflux-ci.dev/v1alpha1
      blockOwnerDeletion: true
      controller: true
      kind: KonfluxEnterpriseContract
      name: konflux-enterprise-contract
  spec:
    description: Includes most of the rules and policies required internally by Red
      Hat when building Red Hat products. It excludes the requirement of hermetic
      builds. Available collections are defined in https://redhat-appstudio.github.io/docs.stonesoup.io/ec-policies/release_policy.html#_available_rule_collections.
      If a different policy configuration is desired, this resource can serve as a
      starting point. See the docs on how to include and exclude rules https://redhat-appstudio.github.io/docs.stonesoup.io/ec-policies/policy_configuration.html#_including_and_excluding_rules.
    name: Default
    publicKey: k8s://openshift-pipelines/public-key
    sources:
    - config:
        exclude:
        - hermetic_task
        - source_image
        - rpm_repos
        include:
        - '@redhat'
      data:
      - oci::quay.io/konflux-ci/tekton-catalog/data-acceptable-bundles:latest@sha256:42089bb06b35a7ea6361f18b9dab7337a745f0ab5b8072f76d78340be1fcf096
      - github.com/redhat-appstudio/tsf-conforma-data//data?ref=1966f21842d507441a7a5e1c7de9071cf3f9ec53
      name: Default
      policy:
      - oci::quay.io/conforma/release-policy:konflux@sha256:1b296a925b4021f4b4959ea289596925a8735540e554f3ba7754a651731a216f
