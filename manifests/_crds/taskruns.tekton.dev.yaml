          fi
          echo '--- snapshot spec ---'
          head -c 800 /tmp/snap.json; echo
          ec validate image \
            --images /tmp/snap.json \
            --policy="$POL" \
            --public-key=k8s://tekton-pipelines/public-key \
            --ignore-rekor \
            --strict=false \
            --output=appstudio=$(results.TEST_OUTPUT.path) \
