          IMAGE="internal-registry.registry.svc.cluster.local:5000/aiot/hello-aiot:cef878c1f7eedb16fa9f57991cbd39dbb608865f"
          LATEST="internal-registry.registry.svc.cluster.local:5000/aiot/hello-aiot:latest"
          buildah bud --isolation=chroot --storage-driver=vfs -t "$IMAGE" -t "$LATEST" .
          buildah push --storage-driver=vfs --tls-verify=false "$IMAGE"
          buildah push --storage-driver=vfs --tls-verify=false "$LATEST"
          echo "pushed $IMAGE and $LATEST"
        securityContext:
          privileged: true
        workingDir: $(workspaces.source.path)/src
      workspaces:
      - name: source
