      blockOwnerDeletion: true
      controller: true
      kind: PipelineRun
      name: managed-njd9p
  spec:
    params:
    - name: POLICY_CONFIGURATION
      value: '{"description":"Dev policy for hello-aiot. Enforces presence of SLSA
        provenance attestation\nand a valid Tekton task bundle, but excludes hermetic-build,
        source-image\nand rpm checks (not applicable to internal-registry builds).\n","sources":[{"name":"Default","policy":["oci::quay.io/conforma/release-policy:konflux@sha256:1b296a925b4021f4b4959ea289596925a8735540e554f3ba7754a651731a216f"],"data":["oci::quay.io/konflux-ci/tekton-catalog/data-acceptable-bundles:latest@sha256:42089bb06b35a7ea6361f18b9dab7337a745f0ab5b8072f76d78340be1fcf096"],"config":{"exclude":["hermetic_build_task","hermetic_task","source_image","rpm_repos","cve","sbom_cyclonedx","sbom_spdx","labels","trusted_task.trusted"],"include":["@slsa3","attestation_type","attestation_task_bundle","test"]}}],"publicKey":"k8s://tekton-pipelines/public-key"}'
    - name: IMAGES_FILE
      value: |
        internal-registry-http.registry.svc.cluster.local/aiot/hello-aiot@sha256:2b3233806369b99f4cd68f4b2aa82123a6d264874c4563064b4dca701f00e836
        internal-registry-http.registry.svc.cluster.local/aiot/hello-aiot-frontend@sha256:c5e59acc90f0f87651c74b648888b1c6f8054fce7e3be518aa5f52367939e8df
        internal-registry-http.registry.svc.cluster.local/aiot/hello-aiot-backend@sha256:8bea0c2559137621961d5f93fef69d49f4d574f165c02a0e6ba8d4ce9e6334dc
    - name: SNAPSHOT
      value: default-tenant/hello-aiot-20260423-094402-000
    podTemplate:
      nodeSelector:
        workload-zone: build
    serviceAccountName: release-service-account
    taskSpec:
      params:
      - name: POLICY_CONFIGURATION
        type: string
      - name: IMAGES_FILE
        type: string
      - name: SNAPSHOT
        type: string
      results:
      - description: EC verification result
        name: TEST_OUTPUT
        type: string
      steps:
      - computeResources: {}
        env:
        - name: HOME
          value: /tmp
        image: quay.io/conforma/cli:latest
        name: verify
        script: |
          #!/bin/bash
          set -uo pipefail
          POL='$(params.POLICY_CONFIGURATION)'
          echo "Policy: $POL"
          SNAP_REF='$(params.SNAPSHOT)'
          echo "snapshot ref: $SNAP_REF"
          # Build images.json that ec accepts: {"components":[{"containerImage":"...", "name":"...", "source":{...}}]}
          # Pull snapshot spec from cluster
          if echo "$SNAP_REF" | grep -q '^{'; then
            echo "$SNAP_REF" > /tmp/snap.json
          else
            NS=$(echo "$SNAP_REF" | cut -d/ -f1)
            NAME=$(echo "$SNAP_REF" | cut -d/ -f2)
            # ec image has curl; use the kube API via in-cluster SA
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            curl -s --cacert $CACERT -H "Authorization: Bearer $TOKEN" \
              "https://kubernetes.default.svc/apis/appstudio.redhat.com/v1alpha1/namespaces/$NS/snapshots/$NAME" \
              | (jq -r '.spec' 2>/dev/null || sed -n 's/.*"spec":\({.*}\),"status".*/\1/p') > /tmp/snap.json
          fi
          echo '--- snapshot spec ---'
