      readme: "\n# K8s-Infra\n\n![Version: 0.15.0](https://img.shields.io/badge/Version-0.15.0-informational?style=flat-square)
        ![Type: application](https://img.shields.io/badge/Type-application-informational?style=flat-square)
        ![AppVersion: 0.139.0](https://img.shields.io/badge/AppVersion-0.139.0-informational?style=flat-square)\n\nMonitoring
        your Kubernetes cluster is essential for ensuring performance, stability,
        and reliability. The SigNoz k8s-infra Helm chart provides a comprehensive
        solution for collecting and analyzing metrics, logs, and events from your
        entire Kubernetes environment.\n\n### TL;DR;\n\n```sh\nhelm repo add signoz
        https://charts.signoz.io\nhelm install -n platform --create-namespace \"my-release\"
        signoz/k8s-infra\n```\n\n### Introduction\n\nThe `k8s-infra` chart provides
        Kubernetes infrastructure observability by deploying OpenTelemetry components
        and related resources using the [Helm](https://helm.sh) package manager.\n\nIt
        enables collection of metrics, logs, and events from your Kubernetes cluster,
        making it easier to monitor and troubleshoot your infrastructure with SigNoz.\n\nRefer
        to the documentation for a more detailed explanation of [k8s-infra](https://signoz.io/docs/collection-agents/k8s/k8s-infra/overview/)\n###
        Prerequisites\n\n- Kubernetes 1.16+\n- Helm 3.0+\n\n### Installing the Chart\n\nTo
        install the chart with the release name `my-release`:\n\n```bash\nhelm repo
        add signoz https://charts.signoz.io\nhelm -n platform --create-namespace install
        \"my-release\" signoz/k8s-infra\n```\n\nThese commands deploy K8s-infra on
        the Kubernetes cluster in the default configuration.\nThe [Configuration](#configuration)
        section lists the parameters that can be configured during installation:\n\n>[!NOTE]\n>
        ### Installing K8s-Infra on Windows\n> Follow these steps to configure k8s-infra
        for Windows environments.\n>\n> #### Use OpenTelemetry Collector Contrib for
        Windows\n>\n> OpenTelemetry provides Windows-compatible [opentelemetry-collector-contrib](https://hub.docker.com/r/otel/opentelemetry-collector-contrib/tags?name=windows)
        container images which can be used for k8s-infra. You must specify the Windows
        image tags in your Helm values configuration.\n>\n> Add the following configuration
        to your Helm values file:\n>\n> ```yaml\n> otelAgent:\n>   image:\n>     tag:
        0.123.0-windows-2022-amd64\n>\n> otelDeployment:\n>   image:\n>     tag: 0.123.0-windows-2022-amd64\n>
        ```\n>\n> #### Remove Root Path for Host Metrics\n>\n> The host metrics receiver
        requires configuring the `root_path` when using the host receiver for Linux
        in containers. However, Windows deployments do not require this configuration
        and the k8s-infra installation may fail if included. Remove the path from
        the `root_path` key under `presets.hostMetrics` in your Helm values:\n>\n>
        ```yaml\n> presets:\n>   hostMetrics:\n>     root_path: \"\"\n> ```\n>\n>
        After completing these steps, you can proceed with the [standard k8s-infra
        installation](https://github.com/SigNoz/charts/tree/main/charts/k8s-infra#installing-the-chart).\n\n>
        [!NOTE]\n> The `kubeletstats` receiver connects to the kubelet API to collect
        node and container metrics. \n> By default, it uses the node's **`K8S_HOST_IP`**
        to ensure reliable connectivity in most IPv4 environments, as this avoids
        DNS resolution issues seen in some providers.\n> In clusters running **IPv6**
        or **dual-stack**, the host IP might resolve to an unreachable address, causing
        connection errors. \n> In such cases, you can update the endpoint to use **`K8S_NODE_NAME`**
        instead, which often works better in IPv6 setups. \n> Example configuration:
        \n> ```yaml\n> presets:\n>   kubeletMetrics:\n>     endpoint: \"${env:K8S_NODE_NAME}:10250\"\n>
        ```\n\n### Uninstalling the chart\n\nTo uninstall/delete the `my-release`
        resources:\n\n```bash\nhelm -n platform uninstall \"my-release\"\n```\n\nSee
        the [Helm docs](https://helm.sh/docs/helm/helm_uninstall/) for documentation
        on the helm uninstall command.\n\nThe command above removes all the Kubernetes
        components associated\nwith the chart and deletes the release.\n\nDeletion
        of the StatefulSet doesn't cascade to deleting associated PVCs. To delete
        them:\n\n```bash\nkubectl -n platform delete pvc --selector app.kubernetes.io/instance=my-release\n```\n\nSometimes
        everything doesn't get properly removed. If that happens try deleting the
        namespace:\n\n```bash\nkubectl delete namespace platform\n```\n> [!WARNING]
        \n> ### Breaking Changes\n> #### Version 0.15.0\n> The following changes have
        been introduced in this version:\n> - Upgraded the OpenTelemetry Collector
        to version `0.139.0`\n> - Removed deprecated variables from the OpenTelemetry
        Collector configuration to ensure compatibility with the latest version\n>\n>
        Please refer to the [upgrade guide](https://signoz.io/docs/opentelemetry-collection-agents/k8s/k8s-infra/user-guides/upgrade-k8s-infra-v0.15)
        for detailed instructions on upgrading k8s-infra to v0.15.0\n>\n>\n> ####
        Version 0.14.1\n>\n> **Configuration Migration Required:**\n> - `presets.loggingExporter`
        has been deprecated and must be migrated to `presets.debugExporter`.\n>\n>
        This change aligns with OpenTelemetry's deprecation of the [logging exporter](https://github.com/open-telemetry/opentelemetry-collector/tree/v0.110.0/exporter/loggingexporter)
        in favor of the [debug exporter](https://github.com/open-telemetry/opentelemetry-collector/blob/v0.110.0/exporter/debugexporter/README.md).\n>\n>
        **Migration Example:**\n>\n> Replace this configuration:\n> ```yaml\n> presets:\n>
        \  loggingExporter: \n>     enabled: true\n>     verbosity: basic\n>     samplingInitial:
        2\n>     samplingThereafter: 500\n> ```\n>\n> With this configuration:\n>
        ```yaml\n> presets:\n>   debugExporter: \n>     enabled: true\n>     verbosity:
        basic\n>     samplingInitial: 2\n>     samplingThereafter: 500\n> ```\n\n##
