        (You should delete the initial secret afterwards as suggested by the Getting Started Guide: https://argo-cd.readthedocs.io/en/stable/getting_started/#4-login-using-the-cli)
      readme: "# Argo CD Chart\n\nA Helm chart for Argo CD, a declarative, GitOps
        continuous delivery tool for Kubernetes.\n\nSource code can be found here:\n\n*
        <https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd>\n* <https://github.com/argoproj/argo-cd>\n\nThis
        is a **community maintained** chart. This chart installs [argo-cd](https://argo-cd.readthedocs.io/en/stable/),
        a declarative, GitOps continuous delivery tool for Kubernetes.\n\nThe default
        installation is intended to be similar to the provided Argo CD [releases](https://github.com/argoproj/argo-cd/releases).\n\nIf
        you want to avoid including sensitive information unencrypted (clear text)
        in your version control, make use of the [declarative setup] of Argo CD.\nFor
        instance, rather than adding repositories and their keys in your Helm values,
        you could deploy [SealedSecrets](https://github.com/bitnami-labs/sealed-secrets)
        with contents as seen in this [repositories section](https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#repositories)
        or any other secrets manager service (i.e. HashiCorp Vault, AWS/GCP Secrets
        Manager, etc.).\n\n## High Availability\n\nThis chart installs the non-HA
        version of Argo CD by default. If you want to run Argo CD in HA mode, you
        can use one of the example values in the next sections.\nPlease also have
        a look into the upstream [Operator Manual regarding High Availability](https://argo-cd.readthedocs.io/en/stable/operator-manual/high_availability/)
        to understand how scaling of Argo CD works in detail.\n\n> **Warning:**\n>
        You need at least 3 worker nodes as the HA mode of redis enforces Pods to
        run on separate nodes.\n\n### HA mode with autoscaling\n\n```yaml\nredis-ha:\n
        \ enabled: true\n\ncontroller:\n  replicas: 1\n\nserver:\n  autoscaling:\n
        \   enabled: true\n    minReplicas: 2\n\nrepoServer:\n  autoscaling:\n    enabled:
        true\n    minReplicas: 2\n\napplicationSet:\n  replicas: 2\n```\n\n### HA
        mode without autoscaling\n\n```yaml\nredis-ha:\n  enabled: true\n\ncontroller:\n
        \ replicas: 1\n\nserver:\n  replicas: 2\n\nrepoServer:\n  replicas: 2\n\napplicationSet:\n
        \ replicas: 2\n```\n\n## Ingress configuration\n\nPlease refer to the [Operator
        Manual](https://argo-cd.readthedocs.io/en/stable/operator-manual/ingress/#ingress-configurationh)
        for details as the samples\nbelow corespond to their respective sections.\n\n###
        SSL-Passthrough\n\nThe `tls: true` option will expect that the `argocd-server-tls`
        secret exists as Argo CD server loads TLS certificates from this place.\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\ncertificate:\n  enabled: true\n\nserver:\n
        \ ingress:\n    enabled: true\n    ingressClassName: nginx\n    annotations:\n
        \     nginx.ingress.kubernetes.io/force-ssl-redirect: \"true\"\n      nginx.ingress.kubernetes.io/ssl-passthrough:
        \"true\"\n    tls: true\n```\n\n### SSL Termination at Ingress Controller\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\nconfigs:\n  params:\n    server.insecure:
        true\n\nserver:\n  ingress:\n    enabled: true\n    ingressClassName: nginx\n
        \   annotations:\n      nginx.ingress.kubernetes.io/force-ssl-redirect: \"true\"\n
        \     nginx.ingress.kubernetes.io/backend-protocol: \"HTTP\"\n    extraTls:\n
        \     - hosts:\n        - argocd.example.com\n        # Based on the ingress
        controller used secret might be optional\n        secretName: wildcard-tls\n```\n\n>
        **Note:**\n> If you don't plan on using a wildcard certificate it's also possible
        to use `tls: true` without `extraTls` section.\n\n### Multiple ingress resources
        for gRPC protocol support\n\nUse `ingressGrpc` section if your ingress controller
        supports only a single protocol per Ingress resource (i.e.: Contour).\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\nconfigs:\n  params:\n    server.insecure:
        true\n\nserver:\n  ingress:\n    enabled: true\n    ingressClassName: contour-internal\n
        \   extraTls:\n      - hosts:\n        - argocd.example.com\n        secretName:
        wildcard-tls\n\n   ingressGrpc:\n     enabled: true\n     ingressClassName:
        contour-internal\n     extraTls:\n      - hosts:\n        - grpc.argocd.example.com\n
        \       secretName: wildcard-tls\n```\n\n### Multiple ingress domains\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\nserver:\n  ingress:\n    enabled: true\n    ingressClassName:
        nginx\n    annotations:\n      cert-manager.io/cluster-issuer: \"<my-issuer>\"\n
        \     nginx.ingress.kubernetes.io/backend-protocol: \"HTTPS\"\n    tls: true\n
        \   extraHosts:\n      - name: argocd-alias.example.com\n        path: /\n```\n\n###
        AWS Application Load Balancer\n\nRefer to the Operator Manual for [AWS Application
        Load Balancer mode](https://argo-cd.readthedocs.io/en/stable/operator-manual/ingress/#aws-application-load-balancers-albs-and-classic-elb-http-mode).\nThe
        provided example assumes you are using TLS off-loading via AWS ACM service.\n\n>
        **Note:**\n> Using `controller: aws` creates additional service for gRPC traffic
        and it's no longer need to use `ingressGrpc` configuration section.\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\nconfigs:\n  params:\n    server.insecure:
        true\n\nserver:\n  ingress:\n    enabled: true\n    controller: aws\n    ingressClassName:
        alb\n    annotations:\n      alb.ingress.kubernetes.io/scheme: internal\n
        \     alb.ingress.kubernetes.io/target-type: ip\n      alb.ingress.kubernetes.io/backend-protocol:
        HTTP\n      alb.ingress.kubernetes.io/listen-ports: '[{\"HTTPS\":80}, {\"HTTPS\":443}]'\n
        \     alb.ingress.kubernetes.io/ssl-redirect: '443'\n    aws:\n      serviceType:
        ClusterIP # <- Used with target-type: ip\n      backendProtocolVersion: GRPC\n```\n\n###
        GKE Application Load Balancer\n\nThe implementation will populate `ingressClassName`,
        `networking.gke.io/managed-certificates` and `networking.gke.io/v1beta1.FrontendConfig`
        annotations\nautomatically if you provide configuration for GKE resources.\n\n```yaml\nglobal:\n
        \ domain: argocd.example.com\n\nconfigs:\n  params:\n    server.insecure:
        true\n\nserver:\n  service:\n    annotations:\n      cloud.google.com/neg:
        '{\"ingress\": true}'\n      cloud.google.com/backend-config: '{\"ports\":
        {\"http\":\"argocd-server\"}}'\n\n  ingress:\n    enabled: true\n    controller:
        gke\n    gke:\n      backendConfig:\n        healthCheck:\n          checkIntervalSec:
        30\n          timeoutSec: 5\n          healthyThreshold: 1\n          unhealthyThreshold:
        2\n          type: HTTP\n          requestPath: /healthz\n          port:
        8080\n      frontendConfig:\n        redirectToHttps:\n          enabled:
        true \n      managedCertificate:\n        enabled: true\n```\n\n## Synchronizing
        Changes from Original Repository\n\nIn the original [Argo CD repository](https://github.com/argoproj/argo-cd/)
        an [`manifests/install.yaml`](https://github.com/argoproj/argo-cd/blob/master/manifests/install.yaml)
        is generated using `kustomize`. It's the basis for the installation as [described
        in the docs](https://argo-cd.readthedocs.io/en/stable/getting_started/#1-install-argo-cd).\n\nWhen
        installing Argo CD using this helm chart the user should have a similar experience
        and configuration rolled out. Hence, it makes sense to try to achieve a similar
        output of rendered `.yaml` resources when calling `helm template` using the
        default settings in `values.yaml`.\n\nTo update the templates and default
        settings in `values.yaml` it may come in handy to look up the diff of the
        `manifests/install.yaml` between two versions accordingly. This can either
        be done directly via github and look for `manifests/install.yaml`:\n\nhttps://github.com/argoproj/argo-cd/compare/v1.8.7...v2.0.0#files_bucket\n\nOr
        you clone the repository and do a local `git-diff`:\n\n```bash\ngit clone
        https://github.com/argoproj/argo-cd.git\ncd argo-cd\ngit diff v1.8.7 v2.0.0
        -- manifests/install.yaml\n```\n\nChanges in the `CustomResourceDefinition`
        resources shall be fixed easily by copying 1:1 from the [`manifests/crds`
        folder](https://github.com/argoproj/argo-cd/tree/master/manifests/crds) into
        this [`charts/argo-cd/templates/crds` folder](https://github.com/argoproj/argo-helm/tree/master/charts/argo-cd/templates/crds).\n\n###
        Custom resource definitions\n\nSome users would prefer to install the CRDs
        _outside_ of the chart. You can disable the CRD installation of this chart
        by using `--set crds.install=false` when installing the chart.\n\nHelm cannot
        upgrade custom resource definitions in the `<chart>/crds` folder [by design](https://helm.sh/docs/chart_best_practices/custom_resource_definitions/#some-caveats-and-explanations).
        Starting with 5.2.0, the CRDs have been moved to `<chart>/templates` to address
        this design decision.\n\nIf you are using Argo CD chart version prior to 5.2.0
        or have elected to manage the Argo CD CRDs outside of the chart, please use
        `kubectl` to upgrade CRDs manually from [templates/crds](templates/crds/)
        folder or via the manifests from the upstream project repo:\n\n```bash\nkubectl
        apply -k \"https://github.com/argoproj/argo-cd/manifests/crds?ref=<appVersion>\"\n\n#
        Eg. version v2.4.9\nkubectl apply -k \"https://github.com/argoproj/argo-cd/manifests/crds?ref=v2.4.9\"\n```\n\n##
        Changelog\n\nFor full list of changes please check ArtifactHub [changelog].\n\nHighlighted
        versions provide information about additional steps that should be performed
        by user when upgrading to newer version.\n\n### 7.0.0\n\nWe changed the type
        of `.Values.configs.clusterCredentials` from `list` to `object`.\nIf you used
        the value, please migrate like below.\n\n```yaml\n# before\nconfigs:\n  clusterCredentials:\n
        \   - mycluster:\n      server: https://mycluster.example.com\n      labels:
        {}\n      annotations: {}\n      # ...\n\n# after\nconfigs:\n  clusterCredentials:\n
        \   mycluster:\n      server: https://mycluster.example.com\n      labels:
        {}\n      annotations: {}\n      # ...\n```\n\n### 6.10.0\n\nThis version
        introduces authentication for Redis to mitigate GHSA-9766-5277-j5hr.\n\n####
        How to rotate Redis secret?\n\nUpstream steps in the [FAQ] are not enough,
        since we chose a different approach.\n(We use a Kubernetes Job with [Chart
        Hooks] to create the auth secret `argocd-redis`.)\n\nSteps to roteate the
        secret when using the helm chart (bold step is additional to upstream):\n*
        Delete `argocd-redis` secret in the namespace where Argo CD is installed.\n
        \ ```bash\n  kubectl delete secret argocd-redis -n <argocd namespace>\n  ```\n*
        **Perform a helm upgrade**\n  ```bash\n  helm upgrade argocd argo/argo-cd
        --reuse-values --wait\n  ```\n* If you are running Redis in HA mode, restart
        Redis in HA.\n  ```bash\n  kubectl rollout restart deployment argocd-redis-ha-haproxy\n
        \ kubectl rollout restart statefulset argocd-redis-ha-server\n  ```\n* If
        you are running Redis in non-HA mode, restart Redis.\n  ```bash\n  kubectl
        rollout restart deployment argocd-redis\n  ```\n* Restart other components.\n
        \ ```bash\n  kubectl rollout restart deployment argocd-server argocd-repo-server\n
        \ kubectl rollout restart statefulset argocd-application-controller\n  ```\n\n###
        6.9.0\nApplicationSet controller is always created to follow [upstream's manifest](https://github.com/argoproj/argo-cd/blob/v2.11.0/manifests/core-install/kustomization.yaml#L9).
        \n\n### 6.4.0\n\nAdded support for application controller dynamic cluster
        distribution.\nPlease refer to [the docs](https://argo-cd.readthedocs.io/en/stable/operator-manual/dynamic-cluster-distribution)
        for more information.\n\nAdded env variables to handle the non-standard names
        generated by the helm chart.\nHere are the [docs](https://argo-cd.readthedocs.io/en/release-2.9/user-guide/environment-variables/)\nand
        [code](https://github.com/argoproj/argo-cd/blob/99723143b96ceec9ef5b0a7feb7b4f4b0dce3497/common/common.go#L252)\n\n###
        6.1.0\n\nAdded support for global domain used by all components.\n\n### 6.0.0\n\nThis
        version **removes support for**:\n\n* deprecated component options `logLevel`
        and `logFormat`\n* deprecated component arguments `<components>.args.<feature>`
        that were replaced with `configs.params`\n* deprecated configuration `server.config`
        that was replaced with `configs.cm`\n* deprecated configuration `server.rbacConfig`
        that was replaced with `configs.rbac`\n\nMajor version also contains breaking
        **changes related to Argo CD Ingress** resources that were hard to extend
        and maintain for various ingress controller implementations.\nPlease review
        your setup and adjust to new configuration options:\n\n* catch all rule was
        removed for security reasons. If you need this please use `server.ingress.extraRules`
        to provide ingress rule without hostname\n* ingress rule for `paths` changed
        to `path` as there is only single Argo CD backend path\n* ingress rule for
        `hosts` changed to `hostname` as there can be only single SSO redirect for
        given hostname\n* ingress TLS for server uses by default `argocd-server-tls`
        secret required by Argo CD server, additional ingresses are using `<hostname>-tls`
        secret when `tls: true`\n* additional hostnames and routing can be provided
        via `extraHosts` configuration section\n* additional TLS secrets can be provided
        via `extraTls` configuration section\n\nPlease refer to [ingress configuration](#ingress-configuration)
        for examples.\n\n### 5.53.0\n\nArgocd-repo-server can now optionally use Persistent
        Volumes for its mountpoints instead of only emptydir()\n\n### 5.52.0\n\nBecause
        [Argo CD Extensions] is now deprecated and no further changes will be made,
        we switched to [Argo CD Extension Installer], adding an Argo CD Extension
        Installer to init-container in the Argo CD API server.\nIf you used old mechanism,
        please move to new mechanism. For more details, please refer `.Values.server.extensions`
        in values.yaml.\n\n### 5.35.0\n\nThis version supports Kubernetes version
        `>=1.23.0-0`. The current supported version of Kubernetes is v1.24 or later
        and we align with the Amazon EKS calendar, because many AWS users follow a
        conservative approach.\n\nPlease see more information about EoL: [Amazon EKS
        EoL][EKS EoL].\n\n### 5.31.0\nThe manifests are now using [`tini` as entrypoint][tini],
        instead of `entrypoint.sh`. Until Argo CD v2.8, `entrypoint.sh` is retained
        for upgrade compatibility.\nThis means that the deployment manifests have
        to be updated after upgrading to Argo CD v2.7, and before upgrading to Argo
        CD v2.8 later.\nIn case the manifests are updated before moving to Argo CD
        v2.8, the containers will not be able to start.\n\n### 5.26.0\n\nThis version
        adds support for Config Management Plugins using the sidecar model and configured
        in a ConfigMap named `argocd-cmp-cm`.\nUsers will need to migrate from the
        previous `argocd-cm` ConfigMap method to using the sidecar method before Argo
        CD v2.8. See the [Argo CD CMP migration guide](https://argo-cd.readthedocs.io/en/stable/operator-manual/config-management-plugins/#migrating-from-argocd-cm-plugins)
        for more specifics.\n\nTo migrate your plugins, you can now set the `configs.cmp.create`
        to `true` and move your plugins from `configs.cm` to `configs.cmp.plugins`.\nYou
        will also need to configure the sidecar containers under `repoServer.extraContainers`
        and ensure you are mounting any custom volumes you need from `repoServer.volumes`
        into here also.\n\n### 5.24.0\n\nThis version adds additional global parameters
        for scheduling (`nodeSelector`, `tolerations`, `topologySpreadConstraints`).\nDefault
        `global.affinity` rules can be disabled when `none` value is used for the
        preset.\n\n### 5.22.0\n\nThis version adds `global.affinity` options that
        are used as a presets. Override on component level works as before and replaces
        the default preset completely.\n\n### 5.19.0\n\nThis version consolidates
        config for custom repository TLS certificates and SSH known hosts. If you
        provided these values (`configs.knownHosts.*`, `configs.knownHostsAnnotations`,
        `configs.tlsCerts`, `configs.tlsCertsAnnotations`) please move them into new
        `configs.ssh` and `configs.tls` sections.\nYou can also use new option `configs.ssh.extraHosts`
        to configure your SSH keys without maintaing / overwritting keys for public
        Git repositories.\n\n### 5.13.0\n\nThis version reduces history limit for
        Argo CD deployment replicas to 3 to provide more visibility for Argo CD deployments
        that manage itself. If you need more deployment revisions for rollbacks set
        `global.revisionHistoryLimit` parameter.\n\n### 5.12.0\n\nIf Argo CD is managing
        termination of TLS and you are using `configs.secret.argocdServerTlsConfig`
        option to provide custom TLS configuration for this chart, please use `server.certificate`
        or `server.certificateSecret` instead.\nFor the secrets for tls termination,
        please use a secret named `argocd-server-tls` instead of `argocd-secret`.\nFor
        the technical details please check the [Argo CD documentation](https://argo-cd.readthedocs.io/en/stable/operator-manual/tls/#tls-certificates-used-by-argocd-server).
        When transitioning from the one secret to the other pay attention to `tls.key`
        and `tls.crt` keys.\n\n### 5.10.0\n\nThis version hardens security by configuring
        default container security contexts and adds hard requirement for Kubernetes
        1.22+ to work properly.\nThe change aligns chart with officially [supported
        versions](https://argo-cd.readthedocs.io/en/release-2.5/operator-manual/installation/#supported-versions)
        by upstream project.\n\n### 5.7.0\n\nThis version introcudes new `configs.cm`
        and `configs.rbac` sections that replaces `server.config` and `server.rbacConfig`
        respectively.\nPlease move your current configuration to the new place. The
        Argo CD RBAC config now also sets defaults in the `argocd-rbac-cm`.\nIf you
        have manually created this ConfigMap please ensure templating is disabled
        so you will not lose your changes.\n\n### 5.5.20\n\nThis version moved API
        version templates into dedicated helper. If you are using these in your umbrella\nchart
        please migrate your templates to pattern `argo-cd.apiVersion.<component>`.\n\n###
        5.5.0\n\nThis version introduces new `configs.params` section that replaces
        command line arguments for containers.\nPlease refer to documentation in values.yaml
        for migrating the configuration.\n\n### 5.2.0\n\nCustom resource definitions
        were moved to `templates` folder so they can be managed by Helm.\n\nTo adopt
        already created CRDs, please use following command:\n\n```bash\nYOUR_ARGOCD_NAMESPACE=\"\"
        # e.g. argo-cd\nYOUR_ARGOCD_RELEASENAME=\"\" # e.g. argo-cd\n\nfor crd in
        \"applications.argoproj.io\" \"applicationsets.argoproj.io\" \"argocdextensions.argoproj.io\"
        \"appprojects.argoproj.io\"; do\n  kubectl label --overwrite crd $crd app.kubernetes.io/managed-by=Helm\n
        \ kubectl annotate --overwrite crd $crd meta.helm.sh/release-namespace=\"$YOUR_ARGOCD_NAMESPACE\"\n
        \ kubectl annotate --overwrite crd $crd meta.helm.sh/release-name=\"$YOUR_ARGOCD_RELEASENAME\"\ndone\n```\n\n###
        5.0.0\n\nThis version **removes support for**:\n\n- deprecated repository
        credentials (parameter `configs.repositoryCredentials`)\n- option to run application
        controller as a Deployment\n- the parameters `server.additionalApplications`
        and `server.additionalProjects`\n\nPlease carefully read the following section
        if you are using these parameters!\n\nIn order to upgrade Applications and
        Projects safely against CRDs' upgrade, `server.additionalApplications` and
        `server.additionalProjects` are moved to [argocd-apps](../argocd-apps).\n\nIf
        you are using `server.additionalApplications` or `server.additionalProjects`,
        you can adopt to [argocd-apps](../argocd-apps) as below:\n\n1. Add [helm.sh/resource-policy
        annotation](https://helm.sh/docs/howto/charts_tips_and_tricks/#tell-helm-not-to-uninstall-a-resource)
        to avoid resources being removed by upgrading Helm chart\n\nYou can keep your
        existing CRDs by adding `\"helm.sh/resource-policy\": keep` on `additionalAnnotations`,
        under `server.additionalApplications` and `server.additionalProjects` blocks,
        and running `helm upgrade`.\n\ne.g:\n\n```yaml\nserver:\n  additionalApplications:\n
        \   - name: guestbook\n      namespace: argocd\n      additionalLabels: {}\n
        \     additionalAnnotations:\n        \"helm.sh/resource-policy\": keep #
        <-- add this\n      finalizers:\n      - resources-finalizer.argocd.argoproj.io\n
        \     project: guestbook\n      source:\n        repoURL: https://github.com/argoproj/argocd-example-apps.git\n
        \       targetRevision: HEAD\n        path: guestbook\n        directory:\n
        \         recurse: true\n      destination:\n        server: https://kubernetes.default.svc\n
        \       namespace: guestbook\n      syncPolicy:\n        automated:\n          prune:
        false\n          selfHeal: false\n      ignoreDifferences:\n      - group:
        apps\n        kind: Deployment\n        jsonPointers:\n        - /spec/replicas\n
        \     info:\n      - name: url\n        value: https://argoproj.github.io/\n```\n\nYou
        can also keep your existing CRDs by running the following scripts.\n\n```bash\n#
        keep Applications\nfor app in \"guestbook\"; do\n  kubectl annotate --overwrite
        application $app helm.sh/resource-policy=keep\ndone\n\n# keep Projects\nfor
        project in \"guestbook\"; do\n  kubectl annotate --overwrite appproject $project
        helm.sh/resource-policy=keep\ndone\n```\n\n2. Upgrade argo-cd Helm chart to
        v5.0.0\n\n3. Remove keep [helm.sh/resource-policy annotation](https://helm.sh/docs/howto/charts_tips_and_tricks/#tell-helm-not-to-uninstall-a-resource)\n\n```bash\n#
        delete annotations from Applications\nfor app in \"guestbook\"; do\n  kubectl
        annotate --overwrite application $app helm.sh/resource-policy-\ndone\n\n#
        delete annotations from Projects\nfor project in \"guestbook\"; do\n  kubectl
        annotate --overwrite appproject $project helm.sh/resource-policy-\ndone\n```\n\n4.
        Adopt existing resources to [argocd-apps](../argocd-apps)\n\n### 4.9.0\n\nThis
        version starts to use upstream image with applicationset binary. Start command
        was changed from `applicationset-controller` to `argocd-applicationset-controller`\n\n###
        4.3.*\n\nWith this minor version, the notification notifier's `service.slack`
        is no longer configured by default.\n\n### 4.0.0 and above\n\nThis helm chart
        version deploys Argo CD v2.3. The Argo CD Notifications and ApplicationSet
        are part of Argo CD now. You no longer need to install them separately. The
        Notifications and ApplicationSet components **are bundled into default** Argo
        CD installation.\nPlease read the [v2.2 to 2.3 upgrade instructions] in the
        upstream repository.\n\n### 3.13.0\n\nThis release removes the flag `--staticassets`
        from argocd server as it has been dropped upstream. If this flag needs to
        be enabled e.g for older releases of Argo CD, it can be passed via the `server.extraArgs`
        field\n\n### 3.10.2\n\nArgo CD has recently deprecated the flag `--staticassets`
        and from chart version `3.10.2` has been disabled by default\nIt can be re-enabled
        by setting `server.staticAssets.enabled` to true\n\n### 3.8.1\n\nThis bugfix
        version potentially introduces a rename (and recreation) of one or more ServiceAccounts.
        It _only happens_ when you use one of these customization:\n\n```yaml\n# Case
        1) - only happens when you do not specify a custom name (repoServer.serviceAccount.name)\nrepoServer:\n
        \ serviceAccount:\n    create: true\n\n# Case 2)\ncontroller:\n  serviceAccount:\n
        \   name: \"\" # or <nil>\n\n# Case 3)\ndex:\n  serviceAccount:\n    name:
        \"\" # or <nil>\n\n# Case 4)\nserver:\n  serviceAccount:\n    name: \"\" #
        or <nil>\n```\n\nPlease check if you are affected by one of these cases **before
        you upgrade**, especially when you use **cloud IAM roles for service accounts.**
        (eg. IRSA on AWS or Workload Identity for GKE)\n\n### 3.2.*\n\nWith this minor
        version we introduced the evaluation for the ingress manifest (depending on
        the capabilities version), See [Pull Request](https://github.com/argoproj/argo-helm/pull/637).\n[Issue
        703](https://github.com/argoproj/argo-helm/issues/703) reported that the capabilities
        evaluation is **not handled correctly when deploying the chart via an Argo
        CD instance**,\nespecially deploying on clusters running a cluster version
        prior to `1.19` (which misses  `Ingress` on apiVersion `networking.k8s.io/v1`).\n\nIf
        you are running a cluster version prior to `1.19` you can avoid this issue
        by directly installing chart version `3.6.0` and setting `kubeVersionOverride`
        like:\n\n```yaml\nkubeVersionOverride: \"1.18.0\"\n```\n\nThen you should
        no longer encounter this issue.\n\n### 3.0.0 and above\n\nHelm apiVersion
        switched to `v2`. Requires Helm `3.0.0` or above to install. [Read More](https://helm.sh/blog/migrate-from-helm-v2-to-helm-v3/)
        on how to migrate your release from Helm 2 to Helm 3.\n\n### 2.14.7 and above\n\nThe
        `matchLabels` key in the Argo CD Application Controller is no longer hard-coded.
        Note that labels are immutable so caution should be exercised when making
        changes to this resource.\n\n### 2.10.x to 2.11.0\n\nThe application controller
        is now available as a `StatefulSet` when the `controller.enableStatefulSet`
        flag is set to true. Depending on your Helm deployment this may be a downtime
        or breaking change if enabled when using HA and will become the default in
        3.x.\n\n### 1.8.7 to 2.x.x\n\n`controller.extraArgs`, `repoServer.extraArgs`
        and `server.extraArgs`  are now arrays of strings instead of a map\n\nWhat
        was\n\n```yaml\nserver:\n  extraArgs:\n    insecure: \"\"\n```\n\nis now\n\n```yaml\nserver:\n
        \ extraArgs:\n  - --insecure\n```\n\n## Prerequisites\n\n- Kubernetes: `>=1.25.0-0`\n
        \ - We align with [Amazon EKS calendar][EKS EoL] because there are many AWS
        users and it's a conservative approach.\n  - Please check [Support Matrix
        of Argo CD][Kubernetes Compatibility Matrix] for official info.\n- Helm v3.0.0+\n\n##
        Installing the Chart\n\nTo install the chart with the release name `my-release`:\n\n```console\n$
        helm repo add argo https://argoproj.github.io/argo-helm\n\"argo\" has been
        added to your repositories\n\n$ helm install my-release argo/argo-cd\nNAME:
        my-release\n...\n```\n\n## General parameters\n\n| Key | Type | Default |
