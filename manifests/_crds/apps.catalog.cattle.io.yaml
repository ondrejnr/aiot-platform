      readme: "# Jenkins\n\n[![Artifact Hub](https://img.shields.io/endpoint?url=https://artifacthub.io/badge/repository/jenkins)](https://artifacthub.io/packages/helm/jenkinsci/jenkins)\n[![License](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](https://opensource.org/licenses/Apache-2.0)\n[![Releases
        downloads](https://img.shields.io/github/downloads/jenkinsci/helm-charts/total.svg)](https://github.com/jenkinsci/helm-charts/releases)\n[![Join
        the chat at https://app.gitter.im/#/room/#jenkins-ci:matrix.org](https://badges.gitter.im/badge.svg)](https://app.gitter.im/#/room/#jenkins-ci:matrix.org)\n\n[Jenkins](https://www.jenkins.io/)
        is the leading open source automation server, Jenkins provides over 2000 plugins
        to support building, deploying and automating any project.\n\nThis chart installs
        a Jenkins server which spawns agents on [Kubernetes](http://kubernetes.io)
        utilizing the [Jenkins Kubernetes plugin](https://plugins.jenkins.io/kubernetes/).\n\nInspired
        by the awesome work of [Carlos Sanchez](https://github.com/carlossg).\n\n##
        Get Repository Info\n\n```console\nhelm repo add jenkins https://charts.jenkins.io\nhelm
        repo update\n```\n\n_See [`helm repo`](https://helm.sh/docs/helm/helm_repo/)
        for command documentation._\n\n## Install Chart\n\n```console\nhelm install
        [RELEASE_NAME] jenkins/jenkins [flags]\n```\n\nSince version `5.6.0` the chart
        is available as an OCI image and can be installed using:\n\n```console\nhelm
        install [RELEASE_NAME] oci://ghcr.io/jenkinsci/helm-charts/jenkins [flags]\n```\n\n_See
        [configuration](#configuration) below._\n\n_See [helm install](https://helm.sh/docs/helm/helm_install/)
        for command documentation._\n\n## Uninstall Chart\n\n```console\n# Helm 3\n$
        helm uninstall [RELEASE_NAME]\n```\n\nThis removes all the Kubernetes components
        associated with the chart and deletes the release.\n\n_See [helm uninstall](https://helm.sh/docs/helm/helm_uninstall/)
        for command documentation._\n\n## Upgrade Chart\n\n```console\n# Helm 3\n$
        helm upgrade [RELEASE_NAME] jenkins/jenkins [flags]\n```\n\n_See [helm upgrade](https://helm.sh/docs/helm/helm_upgrade/)
        for command documentation._\n\nVisit the chart's [CHANGELOG](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/CHANGELOG.md)
        to view the chart's release history.\nFor migration between major version
        check [migration guide](#migration-guide).\n\n## Building weekly releases\n\nThe
        default charts target Long-Term-Support (LTS) releases of Jenkins.\nTo use
        other versions the easiest way is to update the image tag to the version you
        want.\nYou can also rebuild the chart if you want the `appVersion` field to
        match.\n\n## Configuration\n\nSee [Customizing the Chart Before Installing](https://helm.sh/docs/intro/using_helm/#customizing-the-chart-before-installing).\nTo
        see all configurable options with detailed comments, visit the chart's [values.yaml](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/values.yaml),
        or run these configuration commands:\n\n```console\n# Helm 3\n$ helm show
        values jenkins/jenkins\n```\n\nFor a summary of all configurable options,
        see [VALUES.md](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/VALUES.md).\n\n###
        Configure Security Realm and Authorization Strategy\n\nThis chart configured
        a `securityRealm` and `authorizationStrategy` as shown below:\n\n```yaml\ncontroller:\n
        \ JCasC:\n    securityRealm: |-\n      local:\n        allowsSignup: false\n
        \       enableCaptcha: false\n        users:\n        - id: \"${chart-admin-username}\"\n
        \         name: \"Jenkins Admin\"\n          password: \"${chart-admin-password}\"\n
        \   authorizationStrategy: |-\n      loggedInUsersCanDoAnything:\n        allowAnonymousRead:
        false\n```\n\nWith the configuration above there is only a single user.\nThis
        is fine for getting started quickly, but it needs to be adjusted for any serious
        environment.\n\nSo you should adjust this to suite your needs.\nThat could
        be using LDAP / OIDC / .. as authorization strategy and use globalMatrix as
        authorization strategy to configure more fine-grained permissions.\n\n###
        Consider using a custom image\n\nThis chart allows the user to specify plugins
        which should be installed. However, for production use cases one should consider
        to build a custom Jenkins image which has all required plugins pre-installed.\nThis
        way you can be sure which plugins Jenkins is using when starting up and you
        avoid trouble in case of connectivity issues to the Jenkins update site.\n\nThe
        [Docker repository](https://github.com/jenkinsci/docker) for the Jenkins image
        contains [documentation](https://github.com/jenkinsci/docker#preinstalling-plugins)
        how to do it.\n\nHere is an example how that can be done:\n\n```Dockerfile\nFROM
        jenkins/jenkins:lts\nRUN jenkins-plugin-cli --plugins kubernetes workflow-aggregator
        git configuration-as-code\n```\n\nNOTE: If you want a reproducible build then
        you should specify a non-floating tag for the image `jenkins/jenkins:2.249.3`
        and specify plugin versions.\n\nOnce you built the image and pushed it to
        your registry you can specify it in your values file like this:\n\n```yaml\ncontroller:\n
        \ image: \"registry/my-jenkins\"\n  tag: \"v1.2.3\"\n  installPlugins: false\n```\n\nNotice:
        `installPlugins` is set to false to disable plugin download. In this case,
        the image `registry/my-jenkins:v1.2.3` must have the plugins specified as
        default value for [the `controller.installPlugins` directive](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/VALUES_SUMMARY.md#jenkins-plugins)
        to ensure that the configuration side-car system works as expected.\n\nIn
        case you are using a private registry you can use 'imagePullSecretName' to
        specify the name of the secret to use when pulling the image:\n\n```yaml\ncontroller:\n
        \ image: \"registry/my-jenkins\"\n  tag: \"v1.2.3\"\n  imagePullSecretName:
        registry-secret\n  installPlugins: false\n```\n\n### External URL Configuration\n\nIf
        you are using the ingress definitions provided by this chart via the `controller.ingress`
        block the configured hostname will be the ingress hostname starting with `https://`
        or `http://` depending on the `tls` configuration.\nThe Protocol can be overwritten
        by specifying `controller.jenkinsUrlProtocol`.\n\nIf you are not using the
        provided ingress you can specify `controller.jenkinsUrl` to change the URL
        definition.\n\n### Configuration as Code\n\nJenkins Configuration as Code
        (JCasC) is now a standard component in the Jenkins project.\nTo allow JCasC's
        configuration from the helm values, the plugin [`configuration-as-code`](https://plugins.jenkins.io/configuration-as-code/)
        must be installed in the Jenkins Controller's Docker image (which is the case
        by default as specified by the [default value of the directive `controller.installPlugins`](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/VALUES_SUMMARY.md#jenkins-plugins)).\n\nJCasc
        configuration is passed through Helm values under the key `controller.JCasC`.\nThe
        section [\"Jenkins Configuration as Code (JCasC)\" of the page \"VALUES_SUMMARY.md\"](https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/VALUES_SUMMARY.md#jenkins-configuration-as-code-jcasc)
        lists all the possible directives.\n\nIn particular, you may specify custom
        JCasC scripts by adding sub-key under the `controller.JCasC.configScripts`
        for each configuration area where each corresponds to a plugin or section
        of the UI.\n\nThe sub-keys (prior to `|` character) are only labels used to
        give the section a meaningful name.\nThe only restriction is they must conform
        to RFC 1123 definition of a DNS label, so they may only contain lowercase
        letters, numbers, and hyphens.\n\nEach key will become the name of a configuration
        yaml file on the controller in `/var/jenkins_home/casc_configs` (by default)
        and will be processed by the Configuration as Code Plugin during Jenkins startup.\n\nThe
        lines after each `|` become the content of the configuration yaml file.\n\nThe
        first line after this is a JCasC root element, e.g. jenkins, credentials,
        etc.\n\nBest reference is the Documentation link here: `https://<jenkins_url>/configuration-as-code`.\n\nThe
        example below sets custom systemMessage:\n\n```yaml\ncontroller:\n  JCasC:\n
        \   configScripts:\n      welcome-message: |\n        jenkins:\n          systemMessage:
        Welcome to our CI\\CD server.\n```\n\nMore complex example that creates ldap
        settings:\n\n```yaml\ncontroller:\n  JCasC:\n    configScripts:\n      ldap-settings:
        |\n        jenkins:\n          securityRealm:\n            ldap:\n              configurations:\n
        \               - server: ldap.acme.com\n                  rootDN: dc=acme,dc=uk\n
        \                 managerPasswordSecret: ${LDAP_PASSWORD}\n                  groupMembershipStrategy:\n
        \                   fromUserRecord:\n                      attributeName:
        \"memberOf\"\n```\n\nKeep in mind that default configuration file already
        contains some values that you won't be able to override under configScripts
        section.\n\nFor example, you can not configure Jenkins URL and System Admin
        email address like this because of conflicting configuration error.\n\nIncorrect:\n\n```yaml\ncontroller:\n
        \ JCasC:\n    configScripts:\n      jenkins-url: |\n        unclassified:\n
        \         location:\n            url: https://example.com/jenkins\n            adminAddress:
        example@mail.com\n```\n\nCorrect:\n\n```yaml\ncontroller:\n  jenkinsUrl: https://example.com/jenkins\n
        \ jenkinsAdminEmail: example@mail.com\n```\n\nFurther JCasC examples can be
        found in the [configuration-as-code repository](https://github.com/jenkinsci/configuration-as-code-plugin/tree/master/demos).\n\n####
        Breaking out large Config as Code scripts\n\nJenkins Config as Code scripts
        can become quite large, and maintaining all of your scripts within one yaml
        file can be difficult. The Config as Code plugin itself suggests updating
        the `CASC_JENKINS_CONFIG` environment variable to be a comma separated list
        of paths for the plugin to traverse, picking up the yaml files as needed.
        \ \nHowever, under the Jenkins helm chart, this `CASC_JENKINS_CONFIG` value
        is maintained through the templates. A better solution is to split your `controller.JCasC.configScripts`
        into separate values files, and provide each file during the helm install.\n\nFor
        example, you can have a values file (e.g values_main.yaml) that defines the
        values described in the `VALUES_SUMMARY.md` for your Jenkins configuration:\n\n```yaml\njenkins:\n
        \ controller:\n    jenkinsUrlProtocol: https\n    installPlugins: false\n
        \   ...\n```\n\nIn a second file (e.g values_jenkins_casc.yaml), you can define
        a section of your config scripts:\n\n```yaml\njenkins:\n  controller:\n    JCasC:\n
        \     configScripts:\n        jenkinsCasc: |\n          jenkins:\n            disableRememberMe:
        false\n            mode: NORMAL\n            ...\n```\n\nAnd keep extending
        your config scripts by creating more files (so not all config scripts are
        located in one yaml file for better maintenance):\n\nvalues_jenkins_unclassified.yaml\n\n```yaml\njenkins:\n
        \ controller:\n    JCasC:\n      configScripts:\n        unclassifiedCasc:
        |\n          unclassified:\n            ...\n```\n\nWhen installing, you provide
        all relevant yaml files (e.g `helm install -f values_main.yaml -f values_jenkins_casc.yaml
        -f values_jenkins_unclassified.yaml ...`). Instead of updating the `CASC_JENKINS_CONFIG`
        environment variable to include multiple paths, multiple CasC yaml files will
        be created in the same path `var/jenkins_home/casc_configs`.\n\n#### Config
        as Code With or Without Auto-Reload\n\nConfig as Code changes (to `controller.JCasC.configScripts`)
        can either force a new pod to be created and only be applied at next startup,
        or can be auto-reloaded on-the-fly.\nIf you set `controller.sidecars.configAutoReload.enabled`
        to `true`, a second, auxiliary container will be installed into the Jenkins
        controller pod, known as a \"sidecar\".\nThis watches for changes to configScripts,
        copies the content onto the Jenkins file-system and issues a POST to `http://<jenkins_url>/reload-configuration-as-code`
        with a pre-shared key.\nYou can monitor this sidecar's logs using command
        `kubectl logs <controller_pod> -c config-reload -f`.\nIf you want to enable
        auto-reload then you also need to configure rbac as the container which triggers
        the reload needs to watch the config maps:\n\n```yaml\ncontroller:\n  sidecars:\n
        \   configAutoReload:\n      enabled: true\nrbac:\n  create: true\n```\n\n###
        Allow Limited HTML Markup in User-Submitted Text\n\nSome third-party systems
        (e.g. GitHub) use HTML-formatted data in their payload sent to a Jenkins webhook
        (e.g. URL of a pull-request being built).\nTo display such data as processed
        HTML instead of raw text set `controller.enableRawHtmlMarkupFormatter` to
        true.\nThis option requires installation of the [OWASP Markup Formatter Plugin
        (antisamy-markup-formatter)](https://plugins.jenkins.io/antisamy-markup-formatter/).\nThis
        plugin is **not** installed by default but may be added to `controller.additionalPlugins`.\n\n###
        Change max connections to Kubernetes API\n\nWhen using agents with containers
        other than JNLP, The kubernetes plugin will communicate with those containers
        using the Kubernetes API. this changes the maximum concurrent connections\n\n```yaml\nagent:\n
        \ maxRequestsPerHostStr: \"32\"\n```\n\nThis will change the configuration
        of the kubernetes \"cloud\" (as called by jenkins) that is created automatically
        as part of this helm chart.\n\n### Change container cleanup timeout API\n\nFor
        tasks that use very large images, this timeout can be increased to avoid early
        termination of the task while the Kubernetes pod is still deploying.\n\n```yaml\nagent:\n
        \ retentionTimeout: \"32\"\n```\n\nThis will change the configuration of the
        kubernetes \"cloud\" (as called by jenkins) that is created automatically
        as part of this helm chart.\n\n### Change seconds to wait for pod to be running\n\nThis
        will change how long Jenkins will wait (seconds) for pod to be in running
        state.\n\n```yaml\nagent:\n  waitForPodSec: \"32\"\n```\n\nThis will change
        the configuration of the kubernetes \"cloud\" (as called by jenkins) that
        is created automatically as part of this helm chart.\n\n### Mounting Volumes
        into Agent Pods\n\nYour Jenkins Agents will run as pods, and it's possible
        to inject volumes where needed:\n\n```yaml\nagent:\n  volumes:\n    - type:
        Secret\n      secretName: jenkins-mysecrets\n      mountPath: /var/run/secrets/jenkins-mysecrets\n```\n\nThe
        supported volume types are: `ConfigMap`, `EmptyDir`, `HostPath`, `Nfs`, `PVC`,
        `Secret`.\nEach type supports a different set of configurable attributes,
        defined by [the corresponding Java class](https://github.com/jenkinsci/kubernetes-plugin/tree/master/src/main/java/org/csanchez/jenkins/plugins/kubernetes/volumes).\n\n###
        NetworkPolicy\n\nTo make use of the NetworkPolicy resources created by default,
        install [a networking plugin that implements the Kubernetes NetworkPolicy
        spec](https://kubernetes.io/docs/tasks/administer-cluster/declare-network-policy#before-you-begin).\n\n[Install](#install-chart)
        helm chart with network policy enabled by setting `networkPolicy.enabled`
        to `true`.\n\nYou can use `controller.networkPolicy.internalAgents` and `controller.networkPolicy.externalAgents`
        stanzas for fine-grained controls over where internal/external agents can
        connect from.\nInternal ones are allowed based on pod labels and (optionally)
        namespaces, and external ones are allowed based on IP ranges.\n\n### Script
        approval list\n\n`controller.scriptApproval` allows to pass function signatures
        that will be allowed in pipelines.\nExample:\n\n```yaml\ncontroller:\n  scriptApproval:\n
        \   - \"method java.util.Base64$Decoder decode java.lang.String\"\n    - \"new
        java.lang.String byte[]\"\n    - \"staticMethod java.util.Base64 getDecoder\"\n```\n\n###
        Custom Labels\n\n`controller.serviceLabels` can be used to add custom labels
        in `jenkins-controller-svc.yaml`.\nFor example:\n\n```yaml\nServiceLabels:\n
        \ expose: true\n```\n\n### Persistence\n\nThe Jenkins image stores persistence
        under `/var/jenkins_home` path of the container.\nA dynamically managed Persistent
        Volume Claim is used to keep the data across deployments, by default.\nThis
        is known to work in GCE, AWS, and minikube. Alternatively, a previously configured
        Persistent Volume Claim can be used.\n\nIt is possible to mount several volumes
        using `persistence.volumes` and `persistence.mounts` parameters.\nSee additional
        `persistence` values using [configuration commands](#configuration).\n\n####
        Existing PersistentVolumeClaim\n\n1. Create the PersistentVolume\n2. Create
        the PersistentVolumeClaim\n3. [Install](#install-chart) the chart, setting
        `persistence.existingClaim` to `PVC_NAME`\n\n#### Long Volume Attach-/Mount
        Times\n\nCertain volume type and filesystem format combinations may experience
        long\nattach/mount times, [10 or more minutes][K8S_VOLUME_TIMEOUT], when using\n`fsGroup`.
        This issue may result in the following entries in the pod's event\nhistory:\n\n```console\nWarning
        \ FailedMount  38m                kubelet, aks-default-41587790-2 Unable to
        attach or mount volumes: unmounted volumes=[jenkins-home], unattached volumes=[plugins
        plugin-dir jenkins-token-rmq2g sc-config-volume tmp jenkins-home jenkins-config
        secrets-dir]: timed out waiting for the condition\n```\n\nIn these cases,
        experiment with replacing `fsGroup` with\n`supplementalGroups` in the pod's
        `securityContext`. This can be achieved by\nsetting the `controller.podSecurityContextOverride`
        Helm chart value to\nsomething like:\n\n```yaml\ncontroller:\n  podSecurityContextOverride:\n
        \   runAsNonRoot: true\n    runAsUser: 1000\n    supplementalGroups: [1000]\n```\n\nThis
        issue has been reported on [azureDisk with ext4][K8S_VOLUME_TIMEOUT] and\non
        [Alibaba cloud][K8S_VOLUME_TIMEOUT_ALIBABA].\n\n[K8S_VOLUME_TIMEOUT]: https://github.com/kubernetes/kubernetes/issues/67014\n[K8S_VOLUME_TIMEOUT_ALIBABA]:
        https://github.com/kubernetes/kubernetes/issues/67014#issuecomment-698770511\n\n####
        Storage Class\n\nIt is possible to define which storage class to use, by setting
        `persistence.storageClass` to `[customStorageClass]`.\nIf set to a dash (`-`),
        dynamic provisioning is disabled.\nIf the storage class is set to null or
        left undefined (`\"\"`), the default provisioner is used (gp2 on AWS, standard
        on GKE, AWS & OpenStack).\n\n### Additional Secrets\n\nAdditional secrets
        and Additional Existing Secrets,\ncan be mounted into the Jenkins controller
        through the chart or created using `controller.additionalSecrets` or `controller.additionalExistingSecrets`.
        \ \nA common use case might be identity provider credentials if using an external
        LDAP or OIDC-based identity provider.\nThe secret may then be referenced in
        JCasC configuration (see [JCasC configuration](#configuration-as-code)).\n\n`values.yaml`
        controller section, referencing mounted secrets:\n\n```yaml\ncontroller:\n
        \ # the 'name' and 'keyName' are concatenated with a '-' in between, so for
        example:\n  # an existing secret \"secret-credentials\" and a key inside it
        named \"github-password\" should be used in Jcasc as ${secret-credentials-github-password}\n
        \ # 'name' and 'keyName' must be lowercase RFC 1123 label must consist of
        lower case alphanumeric characters or '-',\n  # and must start and end with
        an alphanumeric character (e.g. 'my-name', or '123-abc')\n  # existingSecret
        existing secret \"secret-credentials\" and a key inside it named \"github-username\"
        should be used in Jcasc as ${github-username}\n  # When using existingSecret
        no need to specify the keyName under additionalExistingSecrets.\n  existingSecret:
        secret-credentials\n\n  additionalExistingSecrets:\n    - name: secret-credentials\n
        \     keyName: github-username\n    - name: secret-credentials\n      keyName:
        github-password\n    - name: secret-credentials\n      keyName: token\n\n
        \ additionalSecrets:\n    - name: client_id\n      value: abc123\n    - name:
        client_secret\n      value: xyz999\n  JCasC:\n    securityRealm: |\n      oic:\n
        \       clientId: ${client_id}\n        clientSecret: ${client_secret}\n        ...\n
        \   configScripts:\n      jenkins-casc-configs: |\n        credentials:\n
        \         system:\n            domainCredentials:\n            - credentials:\n
        \             - string:\n                  description: \"github access token\"\n
        \                 id: \"github_app_token\"\n                  scope: GLOBAL\n
        \                 secret: ${secret-credentials-token}\n              - usernamePassword:\n
        \                 description: \"github access username password\"\n                  id:
        \"github_username_pass\"\n                  password: ${secret-credentials-github-password}\n
        \                 scope: GLOBAL\n                  username: ${secret-credentials-github-username}\n```\n\nFor
        more information, see [JCasC documentation](https://github.com/jenkinsci/configuration-as-code-plugin/blob/master/docs/features/secrets.adoc#kubernetes-secrets).\n\n###
        Secret Claims from HashiCorp Vault\n\nIt's possible for this chart to generate
        `SecretClaim` resources in order to automatically create and maintain Kubernetes
        `Secrets` from HashiCorp [Vault](https://www.vaultproject.io/) via [`kube-vault-controller`](https://github.com/roboll/kube-vault-controller)\n\nThese
        `Secrets` can then be referenced in the same manner as Additional Secrets
        above.\n\nThis can be achieved by defining required Secret Claims within `controller.secretClaims`,
        as follows:\n\n```yaml\ncontroller:\n  secretClaims:\n    - name: jenkins-secret\n
        \     path: secret/path\n    - name: jenkins-short-ttl\n      path: secret/short-ttl-path\n
        \     renew: 60\n```\n\n### RBAC\n\nRBAC is enabled by default. If you want
        to disable it you will need to set `rbac.create` to `false`.\n\n### Adding
        Custom Pod Templates\n\nIt is possible to add custom pod templates for the
        default configured kubernetes cloud.\nAdd a key under `agent.podTemplates`
        for each pod template. Each key (prior to `|` character) is just a label,
        and can be any value.\nKeys are only used to give the pod template a meaningful
        name. The only restriction is they may only contain RFC 1123 \\ DNS label
        characters: lowercase letters, numbers, and hyphens. Each pod template can
        contain multiple containers.\nThere's no need to add the _jnlp_ container
        since the kubernetes plugin will automatically inject it into the pod.\nFor
        this pod templates configuration to be loaded the following values must be
        set:\n\n```yaml\ncontroller.JCasC.defaultConfig: true\n```\n\nThe example
        below creates a python pod template in the kubernetes cloud:\n\n```yaml\nagent:\n
        \ podTemplates:\n    python: |\n      - name: python\n        label: jenkins-python\n
        \       serviceAccount: jenkins\n        containers:\n          - name: python\n
        \           image: python:3\n            command: \"/bin/sh -c\"\n            args:
        \"cat\"\n            ttyEnabled: true\n            privileged: true\n            resourceRequestCpu:
        \"400m\"\n            resourceRequestMemory: \"512Mi\"\n            resourceLimitCpu:
        \"1\"\n            resourceLimitMemory: \"1024Mi\"\n```\n\nBest reference
        is `https://<jenkins_url>/configuration-as-code/reference#Cloud-kubernetes`.\n\n###
        Adding Pod Templates Using additionalAgents\n\n`additionalAgents` may be used
        to configure additional kubernetes pod templates.\nEach additional agent corresponds
        to `agent` in terms of the configurable values and inherits all values from
        `agent` so you only need to specify values which differ.\nFor example:\n\n```yaml\nagent:\n
        \ podName: default\n  customJenkinsLabels: default\n  # set resources for
        additional agents to inherit\n  resources:\n    limits:\n      cpu: \"1\"\n
        \     memory: \"2048Mi\"\n\nadditionalAgents:\n  maven:\n    podName: maven\n
        \   customJenkinsLabels: maven\n    # An example of overriding the jnlp container\n
        \   # sideContainerName: jnlp\n    image: jenkins/jnlp-agent-maven\n    tag:
        latest\n  python:\n    podName: python\n    customJenkinsLabels: python\n
        \   sideContainerName: python\n    image: python\n    tag: \"3\"\n    command:
        \"/bin/sh -c\"\n    args: \"cat\"\n    TTYEnabled: true\n```\n\n### Ingress
        Configuration\n\nThis chart provides ingress resources configurable via the
        `controller.ingress` block.\n\nThe simplest configuration looks like the following:\n\n```yaml\ncontroller:\n
        \ ingress:\n    enabled: true\n    paths: []\n    apiVersion: \"extensions/v1beta1\"\n
        \   hostName: jenkins.example.com\n```\n\nThis snippet configures an ingress
        rule for exposing jenkins at `jenkins.example.com`\n\nYou can define labels
        and annotations via `controller.ingress.labels` and `controller.ingress.annotations`
        respectively.\nAdditionally, you can configure the ingress tls via `controller.ingress.tls`.\nBy
        default, this ingress rule exposes all paths.\nIf needed this can be overwritten
        by specifying the wanted paths in `controller.ingress.paths`\n\nIf you want
        to configure a secondary ingress e.g. you don't want the jenkins instance
        exposed but still want to receive webhooks you can configure `controller.secondaryingress`.\nThe
        secondaryingress doesn't expose anything by default and has to be configured
        via `controller.secondaryingress.paths`:\n\n```yaml\ncontroller:\n  ingress:\n
        \   enabled: true\n    apiVersion: \"extensions/v1beta1\"\n    hostName: \"jenkins.internal.example.com\"\n
        \   annotations:\n      kubernetes.io/ingress.class: \"internal\"\n  secondaryingress:\n
        \   enabled: true\n    apiVersion: \"extensions/v1beta1\"\n    hostName: \"jenkins-scm.example.com\"\n
        \   annotations:\n      kubernetes.io/ingress.class: \"public\"\n    paths:\n
        \     - /github-webhook\n```\n\n## Prometheus Metrics\n\nIf you want to expose
        Prometheus metrics you need to install the [Jenkins Prometheus Metrics Plugin](https://github.com/jenkinsci/prometheus-plugin).\nIt
        will expose an endpoint (default `/prometheus`) with metrics where a Prometheus
        Server can scrape.\n\nIf you have implemented [Prometheus Operator](https://github.com/prometheus-operator/prometheus-operator),
        you can set `controller.prometheus.enabled` to `true` to configure a `ServiceMonitor`
        and `PrometheusRule`.\nIf you want to further adjust alerting rules you can
        do so by configuring `controller.prometheus.alertingrules`\n\nIf you have
        implemented Prometheus without using the operator, you can leave `controller.prometheus.enabled`
        set to `false`.\n\n### Running Behind a Forward Proxy\n\nThe controller pod
        uses an Init Container to install plugins etc. If you are behind a corporate
        proxy it may be useful to set `controller.initContainerEnv` to add environment
        variables such as `http_proxy`, so that these can be downloaded.\n\nAdditionally,
        you may want to add env vars for the init container, the Jenkins container,
        and the JVM (`controller.javaOpts`):\n\n```yaml\ncontroller:\n  initContainerEnv:\n
        \   - name: http_proxy\n      value: \"http://192.168.64.1:3128\"\n    - name:
        https_proxy\n      value: \"http://192.168.64.1:3128\"\n    - name: no_proxy\n
        \     value: \"\"\n    - name: JAVA_OPTS\n      value: \"-Dhttps.proxyHost=proxy_host_name_without_protocol
        -Dhttps.proxyPort=3128\"\n  containerEnv:\n    - name: http_proxy\n      value:
        \"http://192.168.64.1:3128\"\n    - name: https_proxy\n      value: \"http://192.168.64.1:3128\"\n
        \ javaOpts: >-\n    -Dhttp.proxyHost=192.168.64.1\n    -Dhttp.proxyPort=3128\n
        \   -Dhttps.proxyHost=192.168.64.1\n    -Dhttps.proxyPort=3128\n```\n\n###
        HTTPS Keystore Configuration\n\n[This configuration](https://wiki.jenkins.io/pages/viewpage.action?pageId=135468777)
        enables jenkins to use keystore in order to serve HTTPS.\nHere is the [value
        file section](https://wiki.jenkins.io/pages/viewpage.action?pageId=135468777#RunningJenkinswithnativeSSL/HTTPS-ConfigureJenkinstouseHTTPSandtheJKSkeystore)
        related to keystore configuration.\nKeystore itself should be placed in front
        of `jenkinsKeyStoreBase64Encoded` key and in base64 encoded format. To achieve
        that after having `keystore.jks` file simply do this: `cat keystore.jks |
        base64` and paste the output in front of `jenkinsKeyStoreBase64Encoded`.\nAfter
        enabling `httpsKeyStore.enable` make sure that `httpPort` and `targetPort`
        are not the same, as `targetPort` will serve HTTPS.\nDo not set `controller.httpsKeyStore.httpPort`
        to `-1` because it will cause readiness and liveliness prob to fail.\nIf you
        already have a kubernetes secret that has keystore and its password you can
        specify its' name in front of `jenkinsHttpsJksSecretName`, You need to remember
        that your secret should have proper data key names `jenkins-jks-file` (or
        override the key name using `jenkinsHttpsJksSecretKey`)\nand `https-jks-password`
        (or override the key name using `jenkinsHttpsJksPasswordSecretKey`; additionally
        you can make it get the password from a different secret using `jenkinsHttpsJksPasswordSecretName`).
        Example:\n\n```yaml\ncontroller:\n  httpsKeyStore:\n    enable: true\n    jenkinsHttpsJksSecretName:
        \"\"\n    httpPort: 8081\n    path: \"/var/jenkins_keystore\"\n    fileName:
        \"keystore.jks\"\n    password: \"changeit\"\n    jenkinsKeyStoreBase64Encoded:
        \"\"\n```\n\n### AWS Security Group Policies\n\nTo create SecurityGroupPolicies
        set `awsSecurityGroupPolicies.enabled` to true and add your policies. Each
        policy requires a `name`, array of `securityGroupIds` and a `podSelector`.
        Example:\n\n```yaml\nawsSecurityGroupPolicies:\n  enabled: true\n  policies:\n
        \   - name: \"jenkins-controller\"\n      securityGroupIds:\n        - sg-123456789\n
        \     podSelector:\n        matchExpressions:\n          - key: app.kubernetes.io/component\n
        \           operator: In\n            values:\n              - jenkins-controller\n```\n\n###
        Agent Direct Connection\n\nSet `directConnection` to `true` to allow agents
        to connect directly to a given TCP port without having to negotiate a HTTP(S)
        connection. This can allow you to have agent connections without an external
        HTTP(S) port. Example:\n\n```yaml\nagent:\n  jenkinsTunnel: \"jenkinsci-agent:50000\"\n
        \ directConnection: true\n```\n\n## Migration Guide\n\n### From stable repository\n\nUpgrade
        an existing release from `stable/jenkins` to `jenkins/jenkins` seamlessly
        by ensuring you have the latest [repository info](#get-repository-info) and
        running the [upgrade commands](#upgrade-chart) specifying the `jenkins/jenkins`
        chart.\n\n### Major Version Upgrades\n\nChart release versions follow [SemVer](../../CONTRIBUTING.md#versioning),
        where a MAJOR version change (example `1.0.0` -> `2.0.0`) indicates an incompatible
        breaking change needing manual actions.\n\nSee [UPGRADING.md](./UPGRADING.md)
        for a list of breaking changes\n"
