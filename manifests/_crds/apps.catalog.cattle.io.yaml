        NOTES:
        - We no longer bundle K8s-Infra chart with the SigNoz chart installation. For any existing set up, please install k8s-infra chart separately with the relevant override values.
        - OtelCollectorMetrics is no longer bundled with the SigNoz chart and has been removed. See https://github.com/SigNoz/charts/issues/593 for more details.
        - Frontend is deprecated and has been removed as it is now bundled with the signoz component. See https://github.com/SigNoz/signoz/issues/6762 for more details.
      readme: "\n# SigNoz\n\n![Version: 0.117.1](https://img.shields.io/badge/Version-0.117.1-informational?style=flat-square)
        ![Type: application](https://img.shields.io/badge/Type-application-informational?style=flat-square)
        ![AppVersion: v0.117.1](https://img.shields.io/badge/AppVersion-v0.117.1-informational?style=flat-square)\n\nSigNoz
        is an open-source observability platform native to OpenTelemetry with logs,
        traces and metrics in a single application. An open-source alternative to
        DataDog, NewRelic, etc. \U0001F525 \U0001F5A5. \U0001F449 Open source Application
        Performance Monitoring (APM) & Observability tool\n\n### TL;DR;\n\n```sh\nhelm
        repo add signoz https://charts.signoz.io\nhelm install -n platform --create-namespace
        \"my-release\" signoz/signoz\n```\n\n### Introduction\n\nThis chart bootstraps
        [SigNoz](https://signoz.io) cluster deployment on a\nKubernetes cluster using
        [Helm](https://helm.sh) package manager.\n\n### Prerequisites\n\n- Kubernetes
        1.16+\n- Helm 3.0+\n\n### Installing the Chart\n\nTo install the chart with
        the release name `my-release`:\n\n```bash\nhelm repo add signoz https://charts.signoz.io\nhelm
        -n platform --create-namespace install \"my-release\" signoz/signoz\n```\n\nThese
        commands deploy SigNoz on the Kubernetes cluster in the default configuration.\nThe
        [Configuration](#configuration) section lists the parameters that can be configured
        during installation:\n\n> **Tip**: List all releases using `helm list`\n\n###
        Uninstalling the chart\n\nTo uninstall/delete the `my-release` resources:\n\n```bash\nhelm
        -n platform uninstall \"my-release\"\n```\n\nSee the [Helm docs](https://helm.sh/docs/helm/helm_uninstall/)
        for documentation on the helm uninstall command.\n\nThe command above removes
        all the Kubernetes components associated\nwith the chart and deletes the release.\n\nDeletion
        of the StatefulSet doesn't cascade to deleting associated PVCs. To delete
        them:\n\n```bash\nkubectl -n platform delete pvc --selector app.kubernetes.io/instance=my-release\n```\n\nSometimes
        everything doesn't get properly removed. If that happens try deleting the
        namespace:\n\n```bash\nkubectl delete namespace platform\n```\n\n> [!WARNING]
        \n> ### Breaking Changes\n> #### Version 0.116.1\n> Support for legacy environment
        variable by using following values has been removed from the chart templates
        and users must migrate any custom templates or values that relied on the legacy
        env behavior:\n> - `signoz.configVars` has been remove\n> - `signoz.smtpVars`
        has been removed\n> - `signoz.additionalEnvs` has been removed\n>\n> ####
        Version 0.113.0\n> `schemaMigrator` has been deprecated and replaced by `telemetryStoreMigrator`.\n>\n>
        Store migrations are now handled by a single Job using the built-in `migrate`
        command in `signoz-otel-collector`.\n> If you had any overrides in `schemaMigrator`,
        move them to `telemetryStoreMigrator`. See the [upgrade guide](https://signoz.io/docs/operate/migration/upgrade-0.113)
        for details.\n>\n> The following `initContainers` have been removed as they
        are no longer required:\n> - `signoz.initContainers.init`\n> - `signoz.initContainers.migration`\n>
        - `otelCollector.initContainers.init`\n>\n> Otel-collector no longer depends
        on the migrator Job existing. Readiness is now determined by a ClickHouse-based
        check (`migrate sync check`). If you had any of these overrides, remove them
        from your values.\n>\n> **Helm value reference (v0.113.0)** \n>\n> Use the
        table below when migrating your `values.yaml`.\n>  - Keys marked **Replaced**
        should be moved to the new path.\n>  - Keys marked **Deprecated** have no
        replacement, so remove them from your overrides.\n>\n> | Key | Status | Replacement
        |\n> | --- | --- | --- |\n> | `signoz.initContainers.init` | Deprecated |
        None |\n> | `signoz.initContainers.migration` | Deprecated | None |\n> | `otelCollector.initContainers.init`
        | Deprecated | None |\n> | `schemaMigrator.enabled` | Replaced | `telemetryStoreMigrator.enabled`
        |\n> | `schemaMigrator.name` | Replaced | `telemetryStoreMigrator.name` |\n>
        | `schemaMigrator.annotations` | Replaced | `telemetryStoreMigrator.annotations`
        |\n> | `schemaMigrator.upgradeHelmHooks` | Replaced | `telemetryStoreMigrator.upgradeHelmHooks`
        |\n> | `schemaMigrator.enableReplication` | Replaced | `telemetryStoreMigrator.enableReplication`
        |\n> | `schemaMigrator.nodeSelector` | Replaced | `telemetryStoreMigrator.nodeSelector`
        |\n> | `schemaMigrator.tolerations` | Replaced | `telemetryStoreMigrator.tolerations`
        |\n> | `schemaMigrator.affinity` | Replaced | `telemetryStoreMigrator.affinity`
        |\n> | `schemaMigrator.topologySpreadConstraints` | Replaced | `telemetryStoreMigrator.topologySpreadConstraints`
        |\n> | `schemaMigrator.resources` | Replaced | `telemetryStoreMigrator.resources`
        |\n> | `schemaMigrator.serviceAccount` | Replaced | `telemetryStoreMigrator.serviceAccount`
        |\n> | `schemaMigrator.image` | Deprecated | None (uses otel-collector image)
        |\n> | `schemaMigrator.args` | Deprecated | None |\n> | `schemaMigrator.initContainers`
        | Deprecated | None |\n> | `schemaMigrator.role` | Deprecated | None |\n>\n>
        #### Version 0.89.0\n> After August 28, 2025, Bitnami will require paid subscriptions
        for their image updates. SigNoz utilises Bitnami container images and Helm
        charts for Zookeeper.\n>\n> To ensure continued stability, we have migrated
        the Zookeeper Images and Charts to our own repositories.\n>\n> You must upgrade
        to SigNoz `v0.89.0` to avoid any service interruption.\n> More details are
        available in [Issue #731](https://github.com/SigNoz/charts/issues/731)\n>
        #### Version 0.88.0\n> **Configuration Migration Required:**\n> - `signoz.configVars`
        has been deprecated\n> - `signoz.smtpVars` has been deprecated\n> - `signoz.additionalEnvs`
        has been deprecated\n> These configuration options must now be specified under
        `signoz.env` instead.\n>\n> Refer to the official [documentation](https://github.com/SigNoz/signoz/blob/main/conf/example.yaml)
        for a complete list of env variables.\n> <br/> Note on Variable Naming: Environment
        variables are derived from the YAML configuration.\n> <br/> For example, a
        key `address` for `smtp` under the `emailing` section becomes `signoz_emailing_smtp_address`.\n>\n>
        **Before:**\n> ```yaml\n> signoz:\n>  configVars:\n>    storage: clickhouse\n>
        \ smtpVars:\n>    existingSecret:\n>      name: my-secret-name\n>      hostKey:
        my-smtp-host-key\n>      portKey: my-smtp-port-key\n> ```\n>\n> **After:**\n>
        ```yaml\n> signoz:\n>  env:\n>    storage: clickhouse\n>    signoz_emailing_smtp_address:\n>
        \     valueFrom:\n>        secretKeyRef:\n>          name: my-secret-name\n>
        \         key: my-smtp-address-key\n> ```\n\n## Values\n\n<h3>Global Settings</h3>\n<table>\n
        \   <thead>\n        <th>Key</th>\n        <th>Type</th>\n        <th>Default</th>\n
        \       <th>Description</th>\n    </thead>\n    <tbody>\n        <tr>\n            <td
        id=\"global\"><a href=\"./values.yaml#L3\">global</a></td>\n            <td>object</td>\n
        \           <td>\n                <div style=\"max-width: 300px;\"><pre lang=\"yaml\">cloud:
        other\nclusterDomain: cluster.local\nclusterName: \"\"\nimagePullSecrets:
        []\nimageRegistry: null\nstorageClass: null</pre>\n</div>\n            </td>\n
        \           <td>Global override values for the chart.</td>\n        </tr>\n
        \       <tr>\n            <td id=\"global--imageRegistry\"><a href=\"./values.yaml#L7\">global.imageRegistry</a></td>\n
        \           <td>string</td>\n            <td>\n                <div style=\"max-width:
        300px;\"><pre lang=\"yaml\">null</pre>\n</div>\n            </td>\n            <td>Overrides
        the Image registry globally for all components.</td>\n        </tr>\n        <tr>\n
        \           <td id=\"global--imagePullSecrets\"><a href=\"./values.yaml#L11\">global.imagePullSecrets</a></td>\n
        \           <td>list</td>\n            <td>\n                <div style=\"max-width:
        300px;\"><pre lang=\"yaml\">[]</pre>\n</div>\n            </td>\n            <td>Global
        Image Pull Secrets.</td>\n        </tr>\n        <tr>\n            <td id=\"global--storageClass\"><a
        href=\"./values.yaml#L17\">global.storageClass</a></td>\n            <td>string</td>\n
        \           <td>\n                <div style=\"max-width: 300px;\"><pre lang=\"yaml\">null</pre>\n</div>\n
        \           </td>\n            <td>Overrides the storage class for all PVCs
        with persistence enabled. If not set, the default storage class is used. If
        set to \"-\", storageClassName will be an empty string, which disables dynamic
        provisioning.</td>\n        </tr>\n        <tr>\n            <td id=\"global--clusterDomain\"><a
        href=\"./values.yaml#L22\">global.clusterDomain</a></td>\n            <td>string</td>\n
        \           <td>\n                <div style=\"max-width: 300px;\"><pre lang=\"yaml\">cluster.local</pre>\n</div>\n
        \           </td>\n            <td>The Kubernetes cluster domain. It is used
        only when components are installed in different namespaces.</td>\n        </tr>\n
