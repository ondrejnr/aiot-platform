        # k8up

        ![Version: 4.9.0](https://img.shields.io/badge/Version-4.9.0-informational?style=flat-square)

        Kubernetes and OpenShift Backup Operator based on restic

        **Homepage:** <https://k8up.io/>

        ## Installation

        ```bash
        helm repo add k8up-io https://k8up-io.github.io/k8up
        helm install k8up k8up-io/k8up
        ```
        ```bash
        kubectl apply -f https://github.com/k8up-io/k8up/releases/download/k8up-4.9.0/k8up-crd.yaml --server-side
        ```

