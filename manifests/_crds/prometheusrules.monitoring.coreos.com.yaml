ce_device:node_disk_io_time_weighted_seconds:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_receive_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m])\n)","record":"instance:node_network_receive_bytes_excluding_lo:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_transmit_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m])\n)","record":"instance:node_network_transmit_bytes_excluding_lo:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_receive_drop_total{job=\"node-exporter\", device!=\"lo\"}[5m])\n)","record":"instance:node_network_receive_drop_excluding_lo:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_transmit_drop_total{job=\"node-exporter\", device!=\"lo\"}[5m])\n)","record":"instance:node_network_transmit_drop_excluding_lo:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_receive_bytes_total{job=\"node-exporter\", device!~\"lo|veth.+\"}[5m])\n)","record":"instance:node_network_receive_bytes_physical:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_transmit_bytes_total{job=\"node-exporter\", device!~\"lo|veth.+\"}[5m])\n)","record":"instance:node_network_transmit_bytes_physical:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_receive_drop_total{job=\"node-exporter\", device!~\"lo|veth.+\"}[5m])\n)","record":"instance:node_network_receive_drop_physical:rate5m"},{"expr":"sum without (device) (\n  rate(node_network_transmit_drop_total{job=\"node-exporter\", device!~\"lo|veth.+\"}[5m])\n)","record":"instance:node_network_transmit_drop_physical:rate5m"}]}]}}
