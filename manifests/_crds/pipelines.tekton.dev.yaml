apiVersion: v1
items:
- apiVersion: tekton.dev/v1
  kind: Pipeline
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"tekton.dev/v1","kind":"Pipeline","metadata":{"annotations":{},"name":"integration-smoke-test","namespace":"default-tenant"},"spec":{"params":[{"description":"AppStudio snapshot JSON (auto-injected by integration-service)","name":"SNAPSHOT","type":"string"}],"tasks":[{"name":"inspect-images","params":[{"name":"SNAPSHOT","value":"$(params.SNAPSHOT)"}],"taskSpec":{"params":[{"name":"SNAPSHOT","type":"string"}],"results":[{"description":"Test result in Konflux TEST_OUTPUT format","name":"TEST_OUTPUT"}],"steps":[{"image":"quay.io/skopeo/stable:latest","name":"inspect","script":"#!/bin/bash\nset -uo pipefail\ncommand -v jq \u003e/dev/null 2\u003e\u00261 || (microdnf install -y jq \u003e/dev/null 2\u003e\u00261 || dnf install -y jq -q \u003e/dev/null 2\u003e\u00261 || true)\necho '=== Snapshot received ==='\necho '$(params.SNAPSHOT)' | jq .\necho '=== Inspecting images ==='\nFAIL=0\nSUCC=0\nfor img in $(echo '$(params.SNAPSHOT)' | jq -r '.components[].containerImage'); do\n  norm=$(echo \"$img\" | sed -E 's|^internal-registry\\.registry\\.svc\\.cluster\\.local(@\\|/)|internal-registry.registry.svc.cluster.local:5000\\1|')\n  echo \"--- $norm ---\"\n  if skopeo inspect --tls-verify=false \"docker://${norm}\" \u003e/dev/null 2\u003e\u00261; then\n    echo \"OK: $norm\"\n    SUCC=$((SUCC+1))\n  else\n    echo \"FAIL inspect (ignored in PoC): $norm\"\n    FAIL=$((FAIL+1))\n  fi\ndone\nTS=$(date -u +%Y-%m-%dT%H:%M:%SZ)\ncat \u003e \"$(results.TEST_OUTPUT.path)\" \u003c\u003cJSON\n{\"result\":\"SUCCESS\",\"timestamp\":\"$TS\",\"successes\":$SUCC,\"failures\":$FAIL,\"warnings\":0,\"note\":\"smoke test PoC: image inspect attempts, never fails build\"}\nJSON\necho 'Done'\n"}]}}]}}
    name: integration-smoke-test
    namespace: default-tenant
  spec:
    params:
    - description: AppStudio snapshot JSON (auto-injected by integration-service)
      name: SNAPSHOT
      type: string
    tasks:
    - name: inspect-images
      params:
      - name: SNAPSHOT
        value: $(params.SNAPSHOT)
      taskSpec:
        metadata: {}
        params:
        - name: SNAPSHOT
          type: string
        results:
        - description: Test result in Konflux TEST_OUTPUT format
          name: TEST_OUTPUT
          type: string
        spec: null
        steps:
        - computeResources: {}
          image: quay.io/skopeo/stable:latest
          name: inspect
          script: |
            #!/bin/bash
            set -uo pipefail
            command -v jq >/dev/null 2>&1 || (microdnf install -y jq >/dev/null 2>&1 || dnf install -y jq -q >/dev/null 2>&1 || true)
            echo '=== Snapshot received ==='
            echo '$(params.SNAPSHOT)' | jq .
            echo '=== Inspecting images ==='
            FAIL=0
            SUCC=0
            for img in $(echo '$(params.SNAPSHOT)' | jq -r '.components[].containerImage'); do
              norm=$(echo "$img" | sed -E 's|^internal-registry\.registry\.svc\.cluster\.local(@\|/)|internal-registry.registry.svc.cluster.local:5000\1|')
              echo "--- $norm ---"
              if skopeo inspect --tls-verify=false "docker://${norm}" >/dev/null 2>&1; then
                echo "OK: $norm"
                SUCC=$((SUCC+1))
              else
                echo "FAIL inspect (ignored in PoC): $norm"
                FAIL=$((FAIL+1))
              fi
            done
            TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            cat > "$(results.TEST_OUTPUT.path)" <<JSON
            {"result":"SUCCESS","timestamp":"$TS","successes":$SUCC,"failures":$FAIL,"warnings":0,"note":"smoke test PoC: image inspect attempts, never fails build"}
            JSON
            echo 'Done'
- apiVersion: tekton.dev/v1
  kind: Pipeline
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"tekton.dev/v1","kind":"Pipeline","metadata":{"annotations":{},"name":"release-noop","namespace":"default-tenant"},"spec":{"params":[{"default":"","description":"Snapshot spec as JSON string","name":"snapshot","type":"string"},{"default":"","name":"release","type":"string"},{"default":"","name":"releasePlan","type":"string"},{"default":"","name":"releasePlanAdmission","type":"string"},{"default":"","name":"enterpriseContractPolicy","type":"string"},{"default":"","name":"enterpriseContractExtraRuleData","type":"string"},{"default":"","name":"taskGitUrl","type":"string"},{"default":"","name":"taskGitRevision","type":"string"}],"tasks":[{"name":"log-snapshot","params":[{"name":"snapshot","value":"$(params.snapshot)"}],"taskSpec":{"params":[{"name":"snapshot","type":"string"}],"steps":[{"image":"registry.access.redhat.com/ubi9/ubi-minimal:latest","name":"log","script":"#!/bin/sh\necho \"release-noop invoked\"\necho \"snapshot param:\"\necho \"$(params.snapshot)\"\necho \"Release OK\"\n"}]}}]}}
    name: release-noop
    namespace: default-tenant
  spec:
