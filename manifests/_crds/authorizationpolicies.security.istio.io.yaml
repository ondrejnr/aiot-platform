- apiVersion: security.istio.io/v1
  kind: AuthorizationPolicy
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"security.istio.io/v1beta1","kind":"AuthorizationPolicy","metadata":{"annotations":{},"name":"istio-ingressgateway-oauth2-proxy","namespace":"istio-system"},"spec":{"action":"CUSTOM","provider":{"name":"oauth2-proxy"},"rules":[{"to":[{"operation":{"notPaths":["/dex/*","/dex/**","/oauth2/*"]}}],"when":[{"key":"request.headers[authorization]","notValues":["*"]}]}],"selector":{"matchLabels":{"app":"istio-ingressgateway"}}}}
    name: istio-ingressgateway-oauth2-proxy
    namespace: istio-system
  spec:
    action: CUSTOM
    provider:
      name: oauth2-proxy
    rules:
    - to:
      - operation:
          notPaths:
          - /dex/*
          - /dex/**
          - /oauth2/*
      when:
      - key: request.headers[authorization]
        notValues:
        - '*'
    selector:
      matchLabels:
        app: istio-ingressgateway
- apiVersion: security.istio.io/v1
  kind: AuthorizationPolicy
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"security.istio.io/v1beta1","kind":"AuthorizationPolicy","metadata":{"annotations":{},"name":"istio-ingressgateway-require-jwt","namespace":"istio-system"},"spec":{"action":"DENY","rules":[{"from":[{"source":{"notRequestPrincipals":["*"]}}],"to":[{"operation":{"notPaths":["/dex/*","/dex/**","/oauth2/*"]}}]}],"selector":{"matchLabels":{"app":"istio-ingressgateway"}}}}
    name: istio-ingressgateway-require-jwt
    namespace: istio-system
  spec:
    action: DENY
    rules:
    - from:
      - source:
          notRequestPrincipals:
          - '*'
      to:
      - operation:
          notPaths:
          - /dex/*
          - /dex/**
          - /oauth2/*
    selector:
      matchLabels:
        app: istio-ingressgateway
