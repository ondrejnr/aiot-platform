apiVersion: v1
items:
- apiVersion: opentelemetry.io/v1alpha1
  kind: Instrumentation
  metadata:
    annotations:
      instrumentation.opentelemetry.io/default-auto-instrumentation-apache-httpd-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
      instrumentation.opentelemetry.io/default-auto-instrumentation-dotnet-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.2.0
      instrumentation.opentelemetry.io/default-auto-instrumentation-go-image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:v0.23.0
      instrumentation.opentelemetry.io/default-auto-instrumentation-java-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
      instrumentation.opentelemetry.io/default-auto-instrumentation-nginx-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
      instrumentation.opentelemetry.io/default-auto-instrumentation-nodejs-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.71.0
      instrumentation.opentelemetry.io/default-auto-instrumentation-python-image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.60b1
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"opentelemetry.io/v1alpha1","kind":"Instrumentation","metadata":{"annotations":{},"name":"python-instrumentation","namespace":"aiot"},"spec":{"exporter":{"endpoint":"http://signoz-otel-collector.signoz.svc.cluster.local:4318"},"propagators":["tracecontext","baggage"],"python":{"env":[{"name":"OTEL_TRACES_EXPORTER","value":"otlp"},{"name":"OTEL_METRICS_EXPORTER","value":"none"},{"name":"OTEL_LOGS_EXPORTER","value":"none"},{"name":"OTEL_EXPORTER_OTLP_PROTOCOL","value":"http/protobuf"},{"name":"OTEL_EXPORTER_OTLP_TRACES_PROTOCOL","value":"http/protobuf"}]}}}
    name: python-instrumentation
    namespace: aiot
  spec:
    apacheHttpd:
      configPath: /usr/local/apache2/conf
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 1m
          memory: 128Mi
      version: "2.4"
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    defaults: {}
    dotnet:
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.2.0
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    exporter:
      endpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318
    go:
      image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:v0.23.0
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    java:
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    nginx:
      configFile: /etc/nginx/nginx.conf
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 1m
          memory: 128Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    nodejs:
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.71.0
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    propagators:
    - tracecontext
    - baggage
    python:
      env:
      - name: OTEL_TRACES_EXPORTER
        value: otlp
      - name: OTEL_METRICS_EXPORTER
        value: none
      - name: OTEL_LOGS_EXPORTER
        value: none
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
        value: http/protobuf
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.60b1
      resourceRequirements:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
      volumeClaimTemplate:
        metadata: {}
        spec:
          resources: {}
    resource: {}
    sampler: {}
kind: List
