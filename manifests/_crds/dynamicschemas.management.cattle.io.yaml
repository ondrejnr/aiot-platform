- apiVersion: management.cattle.io/v3
  kind: DynamicSchema
  metadata:
    labels:
      cattle.io/creator: norman
      io.cattle.node_driver.name: digitalocean
    name: digitaloceanconfig
    ownerReferences:
    - apiVersion: management.cattle.io/v3
      kind: NodeDriver
      name: digitalocean
  spec:
    resourceFields:
      accessToken:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Digital Ocean access token
        type: password
        update: true
      backups:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: enable backups for droplet
        type: boolean
        update: true
      image:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ubuntu-20-04-x64
        description: Digital Ocean Image
        type: string
        update: true
      ipv6:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: enable ipv6 for droplet
        type: boolean
        update: true
      monitoring:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: enable monitoring for droplet
        type: boolean
        update: true
      privateNetworking:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: enable private networking for droplet
        type: boolean
        update: true
      region:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: nyc3
        description: Digital Ocean region
        type: string
        update: true
      size:
        create: true
        default:
