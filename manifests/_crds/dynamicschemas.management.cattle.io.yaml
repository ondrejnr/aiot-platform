apiVersion: v1
items:
- apiVersion: management.cattle.io/v3
  kind: DynamicSchema
  metadata:
    labels:
      cattle.io/creator: norman
    name: alibabacredentialconfig
  spec:
    resourceFields:
      accessKeyId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        type: string
        update: true
      accessKeySecret:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        type: password
        update: true
  status: {}
- apiVersion: management.cattle.io/v3
  kind: DynamicSchema
  metadata:
    labels:
      cattle.io/creator: norman
      io.cattle.node_driver.name: amazonec2
    name: amazonec2config
    ownerReferences:
    - apiVersion: management.cattle.io/v3
      kind: NodeDriver
      name: amazonec2
  spec:
    resourceFields:
      accessKey:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Access Key
        type: string
        update: true
      ami:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS machine image
        type: string
        update: true
      blockDurationMinutes:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "0"
        description: AWS spot instance duration in minutes (60, 120, 180, 240, 300,
          or 360)
        type: string
        update: true
      deviceName:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS root device name
        type: string
        update: true
      enablePrimaryIpv6:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Indicates whether the first IPv6 address assigned to the instance
          should be marked as the primary IPv6 address. Enable this option if the
          instance requires a stable, non-changing IPv6 address. This option does
          not affect whether IPv6 addresses are assigned to the instance.
        type: boolean
        update: true
      encryptEbsVolume:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Encrypt the EBS volume using the AWS Managed CMK
        type: boolean
        update: true
      endpoint:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Optional endpoint URL (hostname only or fully qualified URI)
        type: string
        update: true
      httpEndpoint:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Enables or disables the HTTP metadata endpoint on your instances
        type: string
        update: true
      httpProtocolIpv6:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: disabled
        description: 'Enables or disables the IPv6 endpoint for the instance metadata
          service. Options: enabled, disabled (default).'
        type: string
        update: true
      httpTokens:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: The state of token usage for your instance metadata requests.
        type: string
        update: true
      iamInstanceProfile:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS IAM Instance Profile
        type: string
        update: true
      insecureTransport:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Disable SSL when sending requests
        type: boolean
        update: true
      instanceType:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: t2.micro
        description: AWS instance type
        type: string
        update: true
      ipv6AddressCount:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "0"
        description: 'The number of IPv6 addresses to assign to the network interface
          (default: 0). Must be greater than zero when amazonec2-ipv6-address-only
          is true.'
        type: string
        update: true
      ipv6AddressOnly:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Indicates whether the instance has only IPv6 address. Useful
          when the VPC or subnet is configured as IPv6-only. When set to true, the
          instance will have IPv6 as its sole address. When set to true, amazonec2-ipv6-address-count
          must be greater than zero.
        type: boolean
        update: true
      keypairName:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS keypair to use; requires --amazonec2-ssh-keypath
        type: string
        update: true
      kmsKey:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Custom KMS key using the AWS Managed CMK
        type: string
        update: true
      monitoring:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Set this flag to enable CloudWatch monitoring
        type: boolean
        update: true
      openPort:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Make the specified port number accessible from the Internet
        nullable: true
        type: array[string]
        update: true
      privateAddressOnly:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Only use a private IP address
        type: boolean
        update: true
      region:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: us-east-1
        description: AWS region
        type: string
        update: true
      requestSpotInstance:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Set this flag to request spot instance
        type: boolean
        update: true
      retries:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "5"
        description: Set retry count for recoverable failures (use -1 to disable)
        type: string
        update: true
      rootSize:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "16"
        description: AWS root disk size (in GB)
        type: string
        update: true
      secretKey:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Secret Key
        type: password
        update: true
      securityGroup:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue:
          - rancher-nodes
          stringValue: ""
        description: AWS VPC security group
        nullable: true
        type: array[string]
        update: true
      securityGroupReadonly:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Skip adding default rules to security groups
        type: boolean
        update: true
      sessionToken:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Session Token
        type: string
        update: true
      spotPrice:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "0.50"
        description: AWS spot instance bid price (in dollar)
        type: string
        update: true
      sshKeyContents:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: File contents for sshKeyContents
        type: password
        update: true
      sshUser:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ubuntu
        description: Set the name of the ssh user
        type: string
        update: true
      subnetId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS VPC subnet id
        type: string
        update: true
      tags:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Tags (e.g. key1,value1,key2,value2)
        type: string
        update: true
      useEbsOptimizedInstance:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Create an EBS optimized instance
        type: boolean
        update: true
      usePrivateAddress:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Force the usage of private IP address
        type: boolean
        update: true
      userdata:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: File contents for userdata
        type: string
        update: true
      volumeType:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: gp2
        description: Amazon EBS volume type
        type: string
        update: true
      vpcId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS VPC id
        type: string
        update: true
      zone:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: a
        description: AWS zone for instance (i.e. a,b,c,d,e)
        type: string
        update: true
  status: {}
- apiVersion: management.cattle.io/v3
  kind: DynamicSchema
  metadata:
    labels:
      cattle.io/creator: norman
    name: amazonec2credentialconfig
    ownerReferences:
    - apiVersion: management.cattle.io/v3
      kind: NodeDriver
      name: amazonec2
  spec:
    resourceFields:
      accessKey:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Access Key
        required: true
        type: string
        update: true
      defaultRegion:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Default Region
        dynamicField: true
        type: string
        update: true
      secretKey:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: AWS Secret Key
        required: true
        type: password
        update: true
  status: {}
- apiVersion: management.cattle.io/v3
  kind: DynamicSchema
  metadata:
    labels:
      cattle.io/creator: norman
      io.cattle.node_driver.name: azure
    name: azureconfig
    ownerReferences:
    - apiVersion: management.cattle.io/v3
      kind: NodeDriver
      name: azure
  spec:
    resourceFields:
      acceleratedNetworking:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Specify if an Accelerated Networking NIC should be created for
          your VM
        type: boolean
        update: true
      availabilitySet:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: docker-machine
        description: Azure Availability Set to place the virtual machine into
        type: string
        update: true
      availabilityZone:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Specify the Availability Zones the Azure resources should be
          created in
        type: string
        update: true
      clientId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Azure Service Principal Account ID (optional, browser auth is
          used if not specified)
        type: string
        update: true
      clientSecret:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Azure Service Principal Account password (optional, browser auth
          is used if not specified)
        type: password
        update: true
      customData:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: File contents for customData
        type: string
        update: true
      diskSize:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "30"
        description: Disk size if using managed disk
        type: string
        update: true
      dns:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: A unique DNS label for the public IP adddress
        type: string
        update: true
      dockerPort:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "2376"
        description: Port number for Docker engine
        type: string
        update: true
      enablePublicIpStandardSku:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Specify if a Standard SKU should be used for the Public IP of
          the Azure VM
        type: boolean
        update: true
      environment:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: AzurePublicCloud
        description: Azure environment (e.g. AzurePublicCloud, AzureChinaCloud)
        type: string
        update: true
      faultDomainCount:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "3"
        description: Fault domain count to use for availability set
        type: string
        update: true
      image:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: canonical:ubuntu-24_04-lts:server-gen1:latest
        description: Azure virtual machine OS image
        type: string
        update: true
      location:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: westus
        description: Azure region to create the virtual machine
        type: string
        update: true
      managedDisks:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Configures VM and availability set for managed disks
        type: boolean
        update: true
      noPublicIp:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Do not create a public IP address for the machine
        type: boolean
        update: true
      nsg:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Azure Network Security Group to assign this node to (accepts
          either a name or resource ID, default is to create a new NSG for each machine)
        type: string
        update: true
      openPort:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Make the specified port number accessible from the Internet
        nullable: true
        type: array[string]
        update: true
      plan:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Purchase plan for Azure Virtual Machine (in <publisher>:<product>:<plan>
          format)
        type: string
        update: true
      privateIpAddress:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Specify a static private IP address for the machine
        type: string
        update: true
      resourceGroup:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: docker-machine
        description: Azure Resource Group name (will be created if missing)
        type: string
        update: true
      size:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: Standard_D2_v2
        description: Size for Azure Virtual Machine
        type: string
        update: true
      sshUser:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: docker-user
        description: Username for SSH login
        type: string
        update: true
      staticPublicIp:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Assign a static public IP address to the machine
        type: boolean
        update: true
      storageType:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: Standard_LRS
        description: Type of Storage Account to host the OS Disk for the machine
        type: string
        update: true
      subnet:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: docker-machine
        description: Azure Subnet Name to be used within the Virtual Network
        type: string
        update: true
      subnetPrefix:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: 192.168.0.0/16
        description: Private CIDR block to be used for the new subnet, should comply
          RFC 1918
        type: string
        update: true
      subscriptionId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Azure Subscription ID
        type: string
        update: true
      tags:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Tags to be applied to the Azure VM instance
        type: string
        update: true
      tenantId:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Azure Tenant ID
        type: string
        update: true
      updateDomainCount:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: "5"
        description: Update domain count to use for availability set
        type: string
        update: true
      usePrivateIp:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: ""
        description: Use private IP address of the machine to connect
        type: boolean
        update: true
      vnet:
        create: true
        default:
          boolValue: false
          intValue: 0
          stringSliceValue: null
          stringValue: docker-machine-vnet
        description: Azure Virtual Network name to connect the virtual machine (in
          [resourcegroup:]name format)
        type: string
        update: true
  status: {}
