Exception as e:\r\n        return {\"error\": str(e)}\r\n\r\ndef collect_data():\r\n    data = {}\r\n    # K8sGPT results via K8s API\r\n    results = k8s_get(\"/apis/core.k8sgpt.ai/v1alpha1/namespaces/k8sgpt/results\")\r\n    if isinstance(results, dict) and \"items\" in results:\r\n        rlist = []\r\n        for r in results[\"items\"]:\r\n            spec = r.get(\"spec\", {})\r\n            rlist.append(f\"{spec.get('kind','?')}/{spec.get('name','?')}\")\r\n        data[\"k8sgpt_results\"] = \"\\n\".join(rlist) if rlist else \"No issues\"\r\n    else:\r\n        data[\"k8sgpt_results\"] = \"Unable to fetch\"\r\n    # Proxy health\r\n    data[\"proxy_health\"] = http_get(f\"{PROXY}/health\")\r\n    # Pod restarts via K8s API — check all namespaces\r\n    restarts = []\r\n    pods_all = k8s_get(\"/api/v1/pods?limit=500\")\r\n    if isinstance(pods_all, dict) and \"items\" in pods_all:\r\n        for p in pods_all[\"items\"]:\r\n            ns = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\n            name = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n            for cs in p.get(\"status\", {}).get(\"containerStatuses\", []):\r\n                rc = cs.get(\"restartCount\", 0)\r\n                if rc \u003e 0:\r\n                    restarts.append(f\"{ns}/{name}: {rc} restarts\")\r\n    data[\"pod_restarts\"] = \"\\n\".join(restarts[-15:]) if restarts else \"none\"\r\n    # Nodes\r\n    nodes_data = k8s_get(\"/api/v1/nodes\")\r\n    if isinstance(nodes_data, dict) and \"items\" in nodes_data:\r\n        nlist = []\r\n        for n in nodes_data[\"items\"]:\r\n            name = n[\"metadata\"][\"name\"]\r\n            ready = \"Ready\" if any(c[\"type\"] == \"Ready\" and c[\"status\"] == \"True\"\r\n                                  for c in n.get(\"status\", {}).get(\"conditions\", [])) else \"NotReady\"\r\n            nlist.append(f\"{name}: {ready}\")\r\n        data[\"nodes\"] = \"\\n\".join(nlist)\r\n    else:\r\n        data[\"nodes\"] = \"Unable to fetch\"\r\n    # Not-ready pods\r\n    not_ready = []\r\n    if isinstance(pods_all, dict) and \"items\" in pods_all:\r\n        for p in pods_all[\"items\"]:\r\n            phase = p.get(\"status\", {}).get(\"phase\", \"\")\r\n            if phase not in (\"Running\", \"Succeeded\"):\r\n                ns = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\n                name = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n                not_ready.append(f\"{ns}/{name}: {phase}\")\r\n    data[\"not_ready\"] = \"\\n\".join(not_ready[:10]) if not_ready else \"none\"\r\n    return data\r\n\r\ndef build_prompt(data):\r\n    sections = []\r\n    sections.append(f\"K8sGPT issues:\\n{data['k8sgpt_results'][:600]}\")\r\n    ph = data.get(\"proxy_health\", {})\r\n    if isinstance(ph, dict) and \"providers\" in ph:\r\n        prov_summary = \", \".join(f\"{k}: {v.get('available',0)}/{v.get('models',0)}\"\r\n                                 + (f\" daily:{v.get('daily_used',0)}/{v.get('daily_budget',0)}\" if 'daily_budget' in v else \"\")\r\n                                 for k, v in ph[\"providers\"].items())\r\n        sections.append(f\"LLM Proxy: {ph.get('slots_total',0)} slots, {ph.get('slots_available',0)} avail, cache={ph.get('cache_size',0)}. Providers: {prov_summary}\")\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"k8sgpt-health-report-code","namespace":"k8sgpt"}}
