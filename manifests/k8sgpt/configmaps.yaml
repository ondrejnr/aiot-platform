    report.py: "#!/usr/bin/env python3\r\n\"\"\"AIoT Daily Health Report — collects
      cluster health, K8sGPT results, proxy stats,\r\npod restarts, and sends a compact
      AI-summarized report to Mattermost.\"\"\"\r\nimport json, os, time, urllib.request,
      urllib.error, ssl, logging\r\n\r\nlogging.basicConfig(level=logging.INFO, format=\"%(asctime)s
      %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"health-report\")\r\n\r\nPROXY
      = os.environ.get(\"LLM_PROXY_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080\")\r\nMM_WEBHOOK
      = os.environ.get(\"MM_WEBHOOK_URL\", \"\")\r\nK8S_API = \"https://kubernetes.default.svc\"\r\nTOKEN_PATH
      = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\r\nCA_PATH = \"/var/run/secrets/kubernetes.io/serviceaccount/ca.crt\"\r\n\r\ndef
      _k8s_ctx():\r\n    ctx = ssl.create_default_context(cafile=CA_PATH)\r\n    with
      open(TOKEN_PATH) as f:\r\n        token = f.read().strip()\r\n    return ctx,
      token\r\n\r\ndef k8s_get(path):\r\n    ctx, token = _k8s_ctx()\r\n    req =
      urllib.request.Request(f\"{K8S_API}{path}\",\r\n                                headers={\"Authorization\":
      f\"Bearer {token}\"})\r\n    try:\r\n        r = urllib.request.urlopen(req,
      context=ctx, timeout=15)\r\n        return json.loads(r.read())\r\n    except
      Exception as e:\r\n        return {\"error\": str(e)}\r\n\r\ndef http_get(url):\r\n
      \   try:\r\n        r = urllib.request.urlopen(url, timeout=10)\r\n        return
      json.loads(r.read())\r\n    except Exception as e:\r\n        return {\"error\":
      str(e)}\r\n\r\ndef http_post_json(url, data):\r\n    req = urllib.request.Request(url,
      data=json.dumps(data).encode(),\r\n                                headers={\"Content-Type\":
      \"application/json\"})\r\n    try:\r\n        r = urllib.request.urlopen(req,
      timeout=60)\r\n        return json.loads(r.read())\r\n    except urllib.error.HTTPError
      as e:\r\n        return {\"error\": f\"{e.code}: {e.read().decode()[:200]}\"}\r\n
      \   except Exception as e:\r\n        return {\"error\": str(e)}\r\n\r\ndef
      collect_data():\r\n    data = {}\r\n    # K8sGPT results via K8s API\r\n    results
      = k8s_get(\"/apis/core.k8sgpt.ai/v1alpha1/namespaces/k8sgpt/results\")\r\n    if
      isinstance(results, dict) and \"items\" in results:\r\n        rlist = []\r\n
      \       for r in results[\"items\"]:\r\n            spec = r.get(\"spec\", {})\r\n
      \           rlist.append(f\"{spec.get('kind','?')}/{spec.get('name','?')}\")\r\n
      \       data[\"k8sgpt_results\"] = \"\\n\".join(rlist) if rlist else \"No issues\"\r\n
      \   else:\r\n        data[\"k8sgpt_results\"] = \"Unable to fetch\"\r\n    #
      Proxy health\r\n    data[\"proxy_health\"] = http_get(f\"{PROXY}/health\")\r\n
      \   # Pod restarts via K8s API — check all namespaces\r\n    restarts = []\r\n
      \   pods_all = k8s_get(\"/api/v1/pods?limit=500\")\r\n    if isinstance(pods_all,
      dict) and \"items\" in pods_all:\r\n        for p in pods_all[\"items\"]:\r\n
      \           ns = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\n            name
      = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n            for cs in p.get(\"status\",
      {}).get(\"containerStatuses\", []):\r\n                rc = cs.get(\"restartCount\",
      0)\r\n                if rc > 0:\r\n                    restarts.append(f\"{ns}/{name}:
      {rc} restarts\")\r\n    data[\"pod_restarts\"] = \"\\n\".join(restarts[-15:])
      if restarts else \"none\"\r\n    # Nodes\r\n    nodes_data = k8s_get(\"/api/v1/nodes\")\r\n
      \   if isinstance(nodes_data, dict) and \"items\" in nodes_data:\r\n        nlist
      = []\r\n        for n in nodes_data[\"items\"]:\r\n            name = n[\"metadata\"][\"name\"]\r\n
      \           ready = \"Ready\" if any(c[\"type\"] == \"Ready\" and c[\"status\"]
      == \"True\"\r\n                                  for c in n.get(\"status\",
      {}).get(\"conditions\", [])) else \"NotReady\"\r\n            nlist.append(f\"{name}:
      {ready}\")\r\n        data[\"nodes\"] = \"\\n\".join(nlist)\r\n    else:\r\n
      \       data[\"nodes\"] = \"Unable to fetch\"\r\n    # Not-ready pods\r\n    not_ready
      = []\r\n    if isinstance(pods_all, dict) and \"items\" in pods_all:\r\n        for
      p in pods_all[\"items\"]:\r\n            phase = p.get(\"status\", {}).get(\"phase\",
      \"\")\r\n            if phase not in (\"Running\", \"Succeeded\"):\r\n                ns
      = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\n                name
      = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n                not_ready.append(f\"{ns}/{name}:
      {phase}\")\r\n    data[\"not_ready\"] = \"\\n\".join(not_ready[:10]) if not_ready
      else \"none\"\r\n    return data\r\n\r\ndef build_prompt(data):\r\n    sections
      = []\r\n    sections.append(f\"K8sGPT issues:\\n{data['k8sgpt_results'][:600]}\")\r\n
      \   ph = data.get(\"proxy_health\", {})\r\n    if isinstance(ph, dict) and \"providers\"
      in ph:\r\n        prov_summary = \", \".join(f\"{k}: {v.get('available',0)}/{v.get('models',0)}\"\r\n
      \                                + (f\" daily:{v.get('daily_used',0)}/{v.get('daily_budget',0)}\"
      if 'daily_budget' in v else \"\")\r\n                                 for k,
      v in ph[\"providers\"].items())\r\n        sections.append(f\"LLM Proxy: {ph.get('slots_total',0)}
      slots, {ph.get('slots_available',0)} avail, cache={ph.get('cache_size',0)}.
      Providers: {prov_summary}\")\r\n"
