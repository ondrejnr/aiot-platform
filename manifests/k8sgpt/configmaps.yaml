- apiVersion: v1
  data:
    detector.py: "#!/usr/bin/env python3\r\n\"\"\"AIoT AI Anomaly Detector — queries
      Prometheus for metric anomalies,\r\nuses Z-score detection, sends anomalies
      to LLM for analysis, posts to MM.\"\"\"\r\nimport json, os, time, math, urllib.request,
      urllib.error, logging\r\nfrom collections import defaultdict\r\n\r\nlogging.basicConfig(level=logging.INFO,
      format=\"%(asctime)s %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"anomaly-detector\")\r\n\r\nPROM
      = os.environ.get(\"PROMETHEUS_URL\", \"http://victoriametrics.victoriametrics.svc.cluster.local:8428\")\r\nPROXY
      = os.environ.get(\"LLM_PROXY_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080\")\r\nMM_WEBHOOK
      = os.environ.get(\"MM_WEBHOOK_URL\", \"\")\r\nCHECK_INTERVAL = int(os.environ.get(\"CHECK_INTERVAL\",
      \"1800\"))  # 30 min\r\nZ_THRESHOLD = float(os.environ.get(\"Z_THRESHOLD\",
      \"5.0\"))\r\n# Cooldown per anomaly key to avoid spam (seconds)\r\nANOMALY_COOLDOWN
      = int(os.environ.get(\"ANOMALY_COOLDOWN\", \"7200\"))  # 2h\r\n# Max anomalies
      to batch per LLM call\r\nMAX_BATCH = 5\r\n\r\n# Track seen anomalies to avoid
      duplicates\r\nseen_anomalies = {}  # key -> last_reported_ts\r\n\r\n# Prometheus
      queries for anomaly detection\r\nQUERIES = {\r\n    \"cpu_spike\": {\r\n        \"query\":
      'topk(10, rate(container_cpu_usage_seconds_total{namespace!~\"kube-system|istio-system|knative-serving|cert-manager\"}[5m]))',\r\n
      \       \"range_query\": 'rate(container_cpu_usage_seconds_total{{namespace=\"{ns}\",pod=\"{pod}\"}}[5m])',\r\n
      \       \"unit\": \"cores\",\r\n        \"desc\": \"CPU usage spike\",\r\n    },\r\n
      \   \"memory_growth\": {\r\n        \"query\": 'topk(10, container_memory_working_set_bytes{namespace!~\"kube-system|istio-system|knative-serving|cert-manager\"}
      / 1048576)',\r\n        \"range_query\": 'container_memory_working_set_bytes{{namespace=\"{ns}\",pod=\"{pod}\"}}
      / 1048576',\r\n        \"unit\": \"MiB\",\r\n        \"desc\": \"Memory anomaly\",\r\n
      \   },\r\n    \"restart_burst\": {\r\n        \"query\": 'topk(10, increase(kube_pod_container_status_restarts_total[1h]))',\r\n
      \       \"range_query\": 'increase(kube_pod_container_status_restarts_total{{namespace=\"{ns}\",pod=\"{pod}\"}}[1h])',\r\n
      \       \"unit\": \"restarts/h\",\r\n        \"desc\": \"Restart burst\",\r\n
      \   },\r\n    \"error_rate\": {\r\n        \"query\": 'topk(10, sum by (namespace,
      pod) (increase(kube_pod_container_status_last_terminated_reason{reason=~\"Error|OOMKilled|CrashLoopBackOff\"}[1h])))',\r\n
      \       \"range_query\": None,\r\n        \"unit\": \"errors/h\",\r\n        \"desc\":
      \"Error/OOM events\",\r\n    },\r\n}\r\n\r\ndef prom_query(query):\r\n    try:\r\n
      \       url = f\"{PROM}/api/v1/query?query={urllib.request.quote(query)}\"\r\n
      \       r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\n
      \       if data.get(\"status\") == \"success\":\r\n            return data.get(\"data\",
      {}).get(\"result\", [])\r\n    except Exception as e:\r\n        log.warning(\"Prometheus
      query failed: %s\", e)\r\n    return []\r\n\r\ndef prom_range(query, hours=6,
      step=\"5m\"):\r\n    try:\r\n        end = int(time.time())\r\n        start
      = end - hours * 3600\r\n        url = (f\"{PROM}/api/v1/query_range?\"\r\n               f\"query={urllib.request.quote(query)}&start={start}&end={end}&step={step}\")\r\n
      \       r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\n
      \       if data.get(\"status\") == \"success\":\r\n            results = data.get(\"data\",
      {}).get(\"result\", [])\r\n            if results:\r\n                # Return
      list of float values\r\n                return [float(v[1]) for v in results[0].get(\"values\",
      []) if v[1] != \"NaN\"]\r\n    except Exception as e:\r\n        log.debug(\"Range
      query failed: %s\", e)\r\n    return []\r\n\r\ndef zscore(values):\r\n    \"\"\"Calculate
      Z-score of the latest value vs historical mean/std.\"\"\"\r\n    if len(values)
      < 10:\r\n        return 0.0\r\n    mean = sum(values[:-1]) / len(values[:-1])\r\n
      \   variance = sum((x - mean) ** 2 for x in values[:-1]) / len(values[:-1])\r\n
      \   std = math.sqrt(variance) if variance > 0 else 0.001\r\n    return (values[-1]
      - mean) / std\r\n\r\ndef detect_anomalies():\r\n    anomalies = []\r\n    now
      = time.time()\r\n    for qname, qcfg in QUERIES.items():\r\n        results
      = prom_query(qcfg[\"query\"])\r\n        for r in results:\r\n            metric
      = r.get(\"metric\", {})\r\n            ns = metric.get(\"namespace\", \"?\")\r\n
      \           pod = metric.get(\"pod\", metric.get(\"container\", \"?\"))\r\n
      \           val = float(r.get(\"value\", [0, 0])[1])\r\n            if val ==
      0:\r\n                continue\r\n            key = f\"{qname}:{ns}/{pod}\"\r\n
      \           # Check cooldown\r\n            if key in seen_anomalies and (now
      - seen_anomalies[key]) < ANOMALY_COOLDOWN:\r\n                continue\r\n            #
      For range queries, compute Z-score\r\n            if qcfg.get(\"range_query\"):\r\n
      \               rq = qcfg[\"range_query\"].format(ns=ns, pod=pod)\r\n                hist
      = prom_range(rq, hours=6)\r\n                if hist and len(hist) >= 10:\r\n
      \                   z = zscore(hist)\r\n                    if z >= Z_THRESHOLD:
      \ # only positive spikes, drops are normal\r\n                        anomalies.append({\r\n
      \                           \"type\": qname, \"desc\": qcfg[\"desc\"],\r\n                            \"namespace\":
      ns, \"pod\": pod,\r\n                            \"value\": round(val, 2), \"unit\":
      qcfg[\"unit\"],\r\n                            \"zscore\": round(z, 1),\r\n
      \                       })\r\n                        seen_anomalies[key] =
      now\r\n            else:\r\n                # No range query — just check if
      value > 0 (error events)\r\n                if val >= 1:\r\n                    anomalies.append({\r\n
      \                       \"type\": qname, \"desc\": qcfg[\"desc\"],\r\n                        \"namespace\":
      ns, \"pod\": pod,\r\n                        \"value\": round(val, 2), \"unit\":
      qcfg[\"unit\"],\r\n                        \"zscore\": 0,\r\n                    })\r\n
      \                   seen_anomalies[key] = now\r\n    return anomalies[:MAX_BATCH]\r\n\r\ndef
      build_prompt(anomalies):\r\n    lines = []\r\n    for a in anomalies:\r\n        lines.append(f\"-
      {a['desc']}: {a['namespace']}/{a['pod']} = {a['value']} {a['unit']}\"\r\n                     +
      (f\" (Z={a['zscore']})\" if a['zscore'] else \"\"))\r\n    prompt = (\r\n        \"You
      are a Kubernetes operations expert. Analyze these metric anomalies detected
      in the last check.\\n\"\r\n        \"For each anomaly, provide:\\n\"\r\n        \"1)
      Likely cause (1 sentence)\\n\"\r\n        \"2) Severity: critical/warning/info\\n\"\r\n
      \       \"3) Recommended action (1 sentence)\\n\"\r\n        \"Be concise. Use
      Mattermost markdown. Max 300 words.\\n\\n\"\r\n        \"Anomalies:\\n\" + \"\\n\".join(lines)\r\n
      \   )\r\n    return prompt\r\n\r\ndef send_to_llm(prompt):\r\n    data = json.dumps({\r\n
      \       \"model\": \"any\",\r\n        \"messages\": [{\"role\": \"system\",
      \"content\": \"You diagnose Kubernetes metric anomalies concisely.\"},\r\n                     {\"role\":
      \"user\", \"content\": prompt}],\r\n        \"max_tokens\": 500,\r\n        \"temperature\":
      0.2,\r\n    }).encode()\r\n    req = urllib.request.Request(f\"{PROXY}/v1/chat/completions\",
      data=data,\r\n                                headers={\"Content-Type\": \"application/json\"})\r\n
      \   try:\r\n        r = urllib.request.urlopen(req, timeout=90)\r\n        resp
      = json.loads(r.read())\r\n        text = resp.get(\"choices\", [{}])[0].get(\"message\",
      {}).get(\"content\", \"\")\r\n        proxy = resp.get(\"_proxy\", {})\r\n        return
      text, proxy\r\n    except Exception as e:\r\n        return f\"LLM error: {e}\",
      {}\r\n\r\ndef post_to_mm(text):\r\n    if not MM_WEBHOOK:\r\n        log.info(\"No
      MM webhook:\\n%s\", text)\r\n        return\r\n    data = json.dumps({\"text\":
      text}).encode()\r\n    req = urllib.request.Request(MM_WEBHOOK, data=data, headers={\"Content-Type\":
      \"application/json\"})\r\n    try:\r\n        urllib.request.urlopen(req, timeout=10)\r\n
      \       log.info(\"Posted anomaly report to MM\")\r\n    except Exception as
      e:\r\n        log.error(\"MM post failed: %s\", e)\r\n\r\ndef check_once():\r\n
      \   anomalies = detect_anomalies()\r\n    if not anomalies:\r\n        log.info(\"No
      anomalies detected\")\r\n        return\r\n    log.info(\"Detected %d anomalies,
      sending to LLM...\", len(anomalies))\r\n    prompt = build_prompt(anomalies)\r\n
      \   log.info(\"Prompt ~%d tokens\", len(prompt) // 4)\r\n    result = send_to_llm(prompt)\r\n
      \   if isinstance(result, tuple):\r\n        text, proxy = result\r\n        header
      = f\"### :rotating_light: AIoT Anomaly Alert\\n_{len(anomalies)} anomalies detected_\\n\\n\"\r\n
      \       footer = f\"\\n\\n---\\n_Analyzed by AI ({proxy.get('backend','?')}/{proxy.get('model','?')})_\"\r\n
      \       post_to_mm(header + text + footer)\r\n    else:\r\n        log.error(\"LLM:
      %s\", result)\r\n\r\ndef main():\r\n    log.info(\"AIoT Anomaly Detector starting
      (interval=%ds, z_threshold=%.1f)\", CHECK_INTERVAL, Z_THRESHOLD)\r\n    while
      True:\r\n        try:\r\n            check_once()\r\n        except Exception
      as e:\r\n            log.error(\"Check failed: %s\", e)\r\n        time.sleep(CHECK_INTERVAL)\r\n\r\nif
      __name__ == \"__main__\":\r\n    main()\r\n"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"detector.py":"#!/usr/bin/env python3\r\n\"\"\"AIoT AI Anomaly Detector — queries Prometheus for metric anomalies,\r\nuses Z-score detection, sends anomalies to LLM for analysis, posts to MM.\"\"\"\r\nimport json, os, time, math, urllib.request, urllib.error, logging\r\nfrom collections import defaultdict\r\n\r\nlogging.basicConfig(level=logging.INFO, format=\"%(asctime)s %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"anomaly-detector\")\r\n\r\nPROM = os.environ.get(\"PROMETHEUS_URL\", \"http://victoriametrics.victoriametrics.svc.cluster.local:8428\")\r\nPROXY = os.environ.get(\"LLM_PROXY_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080\")\r\nMM_WEBHOOK = os.environ.get(\"MM_WEBHOOK_URL\", \"\")\r\nCHECK_INTERVAL = int(os.environ.get(\"CHECK_INTERVAL\", \"1800\"))  # 30 min\r\nZ_THRESHOLD = float(os.environ.get(\"Z_THRESHOLD\", \"5.0\"))\r\n# Cooldown per anomaly key to avoid spam (seconds)\r\nANOMALY_COOLDOWN = int(os.environ.get(\"ANOMALY_COOLDOWN\", \"7200\"))  # 2h\r\n# Max anomalies to batch per LLM call\r\nMAX_BATCH = 5\r\n\r\n# Track seen anomalies to avoid duplicates\r\nseen_anomalies = {}  # key -\u003e last_reported_ts\r\n\r\n# Prometheus queries for anomaly detection\r\nQUERIES = {\r\n    \"cpu_spike\": {\r\n        \"query\": 'topk(10, rate(container_cpu_usage_seconds_total{namespace!~\"kube-system|istio-system|knative-serving|cert-manager\"}[5m]))',\r\n        \"range_query\": 'rate(container_cpu_usage_seconds_total{{namespace=\"{ns}\",pod=\"{pod}\"}}[5m])',\r\n        \"unit\": \"cores\",\r\n        \"desc\": \"CPU usage spike\",\r\n    },\r\n    \"memory_growth\": {\r\n        \"query\": 'topk(10, container_memory_working_set_bytes{namespace!~\"kube-system|istio-system|knative-serving|cert-manager\"} / 1048576)',\r\n        \"range_query\": 'container_memory_working_set_bytes{{namespace=\"{ns}\",pod=\"{pod}\"}} / 1048576',\r\n        \"unit\": \"MiB\",\r\n        \"desc\": \"Memory anomaly\",\r\n    },\r\n    \"restart_burst\": {\r\n        \"query\": 'topk(10, increase(kube_pod_container_status_restarts_total[1h]))',\r\n        \"range_query\": 'increase(kube_pod_container_status_restarts_total{{namespace=\"{ns}\",pod=\"{pod}\"}}[1h])',\r\n        \"unit\": \"restarts/h\",\r\n        \"desc\": \"Restart burst\",\r\n    },\r\n    \"error_rate\": {\r\n        \"query\": 'topk(10, sum by (namespace, pod) (increase(kube_pod_container_status_last_terminated_reason{reason=~\"Error|OOMKilled|CrashLoopBackOff\"}[1h])))',\r\n        \"range_query\": None,\r\n        \"unit\": \"errors/h\",\r\n        \"desc\": \"Error/OOM events\",\r\n    },\r\n}\r\n\r\ndef prom_query(query):\r\n    try:\r\n        url = f\"{PROM}/api/v1/query?query={urllib.request.quote(query)}\"\r\n        r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\n        if data.get(\"status\") == \"success\":\r\n            return data.get(\"data\", {}).get(\"result\", [])\r\n    except Exception as e:\r\n        log.warning(\"Prometheus query failed: %s\", e)\r\n    return []\r\n\r\ndef prom_range(query, hours=6, step=\"5m\"):\r\n    try:\r\n        end = int(time.time())\r\n        start = end - hours * 3600\r\n        url = (f\"{PROM}/api/v1/query_range?\"\r\n               f\"query={urllib.request.quote(query)}\u0026start={start}\u0026end={end}\u0026step={step}\")\r\n        r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\n        if data.get(\"status\") == \"success\":\r\n            results = data.get(\"data\", {}).get(\"result\", [])\r\n            if results:\r\n                # Return list of float values\r\n                return [float(v[1]) for v in results[0].get(\"values\", []) if v[1] != \"NaN\"]\r\n    except Exception as e:\r\n        log.debug(\"Range query failed: %s\", e)\r\n    return []\r\n\r\ndef zscore(values):\r\n    \"\"\"Calculate Z-score of the latest value vs historical mean/std.\"\"\"\r\n    if len(values) \u003c 10:\r\n        return 0.0\r\n    mean = sum(values[:-1]) / len(values[:-1])\r\n    variance = sum((x - mean) ** 2 for x in values[:-1]) / len(values[:-1])\r\n    std = math.sqrt(variance) if variance \u003e 0 else 0.001\r\n    return (values[-1] - mean) / std\r\n\r\ndef detect_anomalies():\r\n    anomalies = []\r\n    now = time.time()\r\n    for qname, qcfg in QUERIES.items():\r\n        results = prom_query(qcfg[\"query\"])\r\n        for r in results:\r\n            metric = r.get(\"metric\", {})\r\n            ns = metric.get(\"namespace\", \"?\")\r\n            pod = metric.get(\"pod\", metric.get(\"container\", \"?\"))\r\n            val = float(r.get(\"value\", [0, 0])[1])\r\n            if val == 0:\r\n                continue\r\n            key = f\"{qname}:{ns}/{pod}\"\r\n            # Check cooldown\r\n            if key in seen_anomalies and (now - seen_anomalies[key]) \u003c ANOMALY_COOLDOWN:\r\n                continue\r\n            # For range queries, compute Z-score\r\n            if qcfg.get(\"range_query\"):\r\n                rq = qcfg[\"range_query\"].format(ns=ns, pod=pod)\r\n                hist = prom_range(rq, hours=6)\r\n                if hist and len(hist) \u003e= 10:\r\n                    z = zscore(hist)\r\n                    if z \u003e= Z_THRESHOLD:  # only positive spikes, drops are normal\r\n                        anomalies.append({\r\n                            \"type\": qname, \"desc\": qcfg[\"desc\"],\r\n                            \"namespace\": ns, \"pod\": pod,\r\n                            \"value\": round(val, 2), \"unit\": qcfg[\"unit\"],\r\n                            \"zscore\": round(z, 1),\r\n                        })\r\n                        seen_anomalies[key] = now\r\n            else:\r\n                # No range query — just check if value \u003e 0 (error events)\r\n                if val \u003e= 1:\r\n                    anomalies.append({\r\n                        \"type\": qname, \"desc\": qcfg[\"desc\"],\r\n                        \"namespace\": ns, \"pod\": pod,\r\n                        \"value\": round(val, 2), \"unit\": qcfg[\"unit\"],\r\n                        \"zscore\": 0,\r\n                    })\r\n                    seen_anomalies[key] = now\r\n    return anomalies[:MAX_BATCH]\r\n\r\ndef build_prompt(anomalies):\r\n    lines = []\r\n    for a in anomalies:\r\n        lines.append(f\"- {a['desc']}: {a['namespace']}/{a['pod']} = {a['value']} {a['unit']}\"\r\n                     + (f\" (Z={a['zscore']})\" if a['zscore'] else \"\"))\r\n    prompt = (\r\n        \"You are a Kubernetes operations expert. Analyze these metric anomalies detected in the last check.\\n\"\r\n        \"For each anomaly, provide:\\n\"\r\n        \"1) Likely cause (1 sentence)\\n\"\r\n        \"2) Severity: critical/warning/info\\n\"\r\n        \"3) Recommended action (1 sentence)\\n\"\r\n        \"Be concise. Use Mattermost markdown. Max 300 words.\\n\\n\"\r\n        \"Anomalies:\\n\" + \"\\n\".join(lines)\r\n    )\r\n    return prompt\r\n\r\ndef send_to_llm(prompt):\r\n    data = json.dumps({\r\n        \"model\": \"any\",\r\n        \"messages\": [{\"role\": \"system\", \"content\": \"You diagnose Kubernetes metric anomalies concisely.\"},\r\n                     {\"role\": \"user\", \"content\": prompt}],\r\n        \"max_tokens\": 500,\r\n        \"temperature\": 0.2,\r\n    }).encode()\r\n    req = urllib.request.Request(f\"{PROXY}/v1/chat/completions\", data=data,\r\n                                headers={\"Content-Type\": \"application/json\"})\r\n    try:\r\n        r = urllib.request.urlopen(req, timeout=90)\r\n        resp = json.loads(r.read())\r\n        text = resp.get(\"choices\", [{}])[0].get(\"message\", {}).get(\"content\", \"\")\r\n        proxy = resp.get(\"_proxy\", {})\r\n        return text, proxy\r\n    except Exception as e:\r\n        return f\"LLM error: {e}\", {}\r\n\r\ndef post_to_mm(text):\r\n    if not MM_WEBHOOK:\r\n        log.info(\"No MM webhook:\\n%s\", text)\r\n        return\r\n    data = json.dumps({\"text\": text}).encode()\r\n    req = urllib.request.Request(MM_WEBHOOK, data=data, headers={\"Content-Type\": \"application/json\"})\r\n    try:\r\n        urllib.request.urlopen(req, timeout=10)\r\n        log.info(\"Posted anomaly report to MM\")\r\n    except Exception as e:\r\n        log.error(\"MM post failed: %s\", e)\r\n\r\ndef check_once():\r\n    anomalies = detect_anomalies()\r\n    if not anomalies:\r\n        log.info(\"No anomalies detected\")\r\n        return\r\n    log.info(\"Detected %d anomalies, sending to LLM...\", len(anomalies))\r\n    prompt = build_prompt(anomalies)\r\n    log.info(\"Prompt ~%d tokens\", len(prompt) // 4)\r\n    result = send_to_llm(prompt)\r\n    if isinstance(result, tuple):\r\n        text, proxy = result\r\n        header = f\"### :rotating_light: AIoT Anomaly Alert\\n_{len(anomalies)} anomalies detected_\\n\\n\"\r\n        footer = f\"\\n\\n---\\n_Analyzed by AI ({proxy.get('backend','?')}/{proxy.get('model','?')})_\"\r\n        post_to_mm(header + text + footer)\r\n    else:\r\n        log.error(\"LLM: %s\", result)\r\n\r\ndef main():\r\n    log.info(\"AIoT Anomaly Detector starting (interval=%ds, z_threshold=%.1f)\", CHECK_INTERVAL, Z_THRESHOLD)\r\n    while True:\r\n        try:\r\n            check_once()\r\n        except Exception as e:\r\n            log.error(\"Check failed: %s\", e)\r\n        time.sleep(CHECK_INTERVAL)\r\n\r\nif __name__ == \"__main__\":\r\n    main()\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"k8sgpt-anomaly-detector-code","namespace":"k8sgpt"}}
