- apiVersion: v1
  data:
    report.sh: |
      #!/bin/sh
      set -e
      # Static exclusions (intentional upstream Kubeflow StatefulSets with empty serviceName)
      EXCLUDE_EXACT="kubeflow/metacontroller kubeflow-user-example-com/ml-workshop"
      # Regex exclusions: Knative revision services (auto-generated, scale-to-zero = no endpoints is normal)
      # Matches *-NNNNN or *-NNNNN-private
      EXCLUDE_REGEX="-[0-9]{5}(-private)?$"

      JQ_EXACT=""
      for e in $EXCLUDE_EXACT; do
        JQ_EXACT="$JQ_EXACT and (.spec.name != \"$e\")"
      done
      JQ_EXACT=$(echo "$JQ_EXACT" | sed "s/^ and //")
      JQ_FILTER="$JQ_EXACT and ((.spec.name | test(\"$EXCLUDE_REGEX\")) | not)"

      RAW=$(kubectl -n k8sgpt get results.core.k8sgpt.ai -o json)
      COUNT=$(echo "$RAW" | jq "[.items[] | select($JQ_FILTER)] | length")
      NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      HIST_CM=k8sgpt-mm-history
      OLD_HIST=$(kubectl -n k8sgpt get cm $HIST_CM -o jsonpath="{.data.history\.json}" 2>/dev/null || echo "[]")
      [ -z "$OLD_HIST" ] && OLD_HIST="[]"

      if [ "$COUNT" = "0" ]; then
        NEW_HIST=$(echo "$OLD_HIST" | jq --arg ts "$NOW" ". + [{ts:\$ts,count:0,items:[]}] | .[-50:]")
        kubectl -n k8sgpt create cm $HIST_CM --from-literal=history.json="$NEW_HIST" --dry-run=client -o yaml | kubectl apply -f - >/dev/null
        echo "silent: no findings"
        exit 0
      fi

      BODY=$(echo "$RAW" | jq -r "[.items[] | select($JQ_FILTER)] | sort_by(.metadata.creationTimestamp) | .[] | \"**\(.spec.kind)/\(.spec.name)** _(since \(.metadata.creationTimestamp))_\n\(.spec.details | split(\"\n\")[0:2] | join(\"\n\"))\n\"")

      SNAPSHOT=$(echo "$RAW" | jq "[.items[] | select($JQ_FILTER) | {kind:.spec.kind,name:.spec.name,since:.metadata.creationTimestamp}]")
      NEW_HIST=$(echo "$OLD_HIST" | jq --arg ts "$NOW" --argjson snap "$SNAPSHOT" ". + [{ts:\$ts,count:(\$snap|length),items:\$snap}] | .[-50:]")
      kubectl -n k8sgpt create cm $HIST_CM --from-literal=history.json="$NEW_HIST" --dry-run=client -o yaml | kubectl apply -f - >/dev/null

      TREND=$(echo "$NEW_HIST" | jq -r ".[-12:] | reverse | .[] | \"\(.ts | split(\"T\")[1] | split(\":\")[0]):\(.ts | split(\"T\")[1] | split(\":\")[1]) → \(.count) findings\"" | head -12)

      TEXT=$(printf "### :warning: k8sgpt nálezy (%s) — %s\n\n%s\n---\n**Historický trend (posledných 12 hod):**\n\`\`\`\n%s\n\`\`\`" "$COUNT" "$NOW" "$BODY" "$TREND")

      PAYLOAD=$(jq -nc --arg t "$TEXT" "{text: \$t, username: \"k8sgpt-bot\", icon_emoji: \":robot_face:\"}")
      curl -sk -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$MM_URL" >/dev/null
      echo "Sent $COUNT findings + trend"
