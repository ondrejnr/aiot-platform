        {"apiVersion":"v1","data":{"bridge.py":"import hashlib\r\nimport logging\r\nimport os\r\nimport threading\r\nimport time\r\nfrom datetime import datetime, timezone\r\n\r\nimport requests as req\r\nfrom fastapi import FastAPI, Request\r\nfrom fastapi.responses import JSONResponse\r\n\r\nlogging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')\r\nlog = logging.getLogger('k8sgpt-bridge')\r\napp = FastAPI(title='K8sGPT Slack Bridge v3')\r\n\r\nSLACK_WEBHOOK = os.environ.get('SLACK_WEBHOOK', '')\r\nSLACK_API_TOKEN = os.environ.get('SLACK_API_TOKEN', '')\r\nSLACK_CHANNEL = os.environ.get('SLACK_CHANNEL', '')\r\nK8S_API = 'https://kubernetes.default.svc'\r\nTOKEN_PATH = '/var/run/secrets/kubernetes.io/serviceaccount/token'\r\nCA_PATH = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'\r\nRESULT_NAMESPACE = 'k8sgpt'\r\nPOLL_INTERVAL = 60\r\nPOSTED_TTL = 4 * 3600\r\nSTALE_CYCLES = 6\r\n\r\n# v3: Auto-silencer config\r\nAUTO_SILENCE_THRESHOLD = 3\r\nAUTO_SILENCE_DURATION = 48 * 3600\r\nAUTO_SILENCE_MAX = 50\r\n\r\nALLOWED_NAMESPACES = {\r\n    'aiot','monitoring','signoz','inference','n8n','auth','oauth2-proxy',\r\n    'mlflow','emqx','k8sgpt','mattermost','chef','istio-system',\r\n    'longhorn-system','kyverno','jenkins','headlamp','victoriametrics',\r\n    'registry','trivy-system',\r\n}\r\nDENIED_NAMESPACES = {\r\n    'kube-system','default','kube-flannel','cert-manager','flux-system',\r\n    'local-path-storage','opentelemetry-operator-system',\r\n}\r\nFALSE_POSITIVE_NAMESPACES = {'kubeflow','kubeflow-user-example-com','monitoring','knative-serving'}\r\nPOST_SEVERITIES = {'critical','high'}\r\nMEDIUM_REPEAT_COUNTS = {3,6,12}\r\nCONTROLLER_OWNER_KINDS = {'ReplicaSet','StatefulSet','DaemonSet','Job','CronJob'}\r\n\r\nimport json as _json\r\n\r\nCACHE_PATH = \"/data/bridge_cache.json\"\r\nsilenced_sigs = {}\r\nauto_silenced = {}  # v3: sig -\u003e {at, until, kind, name, ns, count}\r\n\r\n\r\ndef _load_cache():\r\n    try:\r\n        with open(CACHE_PATH, \"r\") as f:\r\n            d = _json.load(f)\r\n            return (d.get(\"posted\", {}), d.get(\"seen\", {}), d.get(\"stale\", {}),\r\n                    d.get(\"silenced\", {}), d.get(\"auto_silenced\", {}), True)\r\n    except FileNotFoundError:\r\n        return {}, {}, {}, {}, {}, False\r\n    except Exception as exc:\r\n        log.warning(\"Cache load failed: %s\", exc)\r\n        return {}, {}, {}, {}, {}, False\r\n\r\n\r\ndef _save_cache():\r\n    try:\r\n        with open(CACHE_PATH, \"w\") as f:\r\n            _json.dump({\"posted\": posted_results, \"seen\": seen_counts,\r\n                        \"stale\": stale_counts, \"silenced\": silenced_sigs,\r\n                        \"auto_silenced\": auto_silenced}, f)\r\n    except Exception as exc:\r\n        log.warning(\"Cache save failed: %s\", exc)\r\n\r\n\r\nposted_results, seen_counts, stale_counts, silenced_sigs, auto_silenced, cache_loaded = _load_cache()\r\nstats = {'watched': 0, 'posted': 0, 'errors': 0, 'start_time': time.time(),\r\n         'skipped': 0, 'stale_suppressed': 0, 'silenced': 0, 'ttl_expired': 0, 'auto_silenced': 0}\r\n\r\n\r\ndef get_k8s_headers():\r\n    with open(TOKEN_PATH, 'r', encoding='utf-8') as f:\r\n        return {'Authorization': f'Bearer {f.read().strip()}'}\r\n\r\n\r\ndef k8s_get(path: str):\r\n    try:\r\n        r = req.get(f'{K8S_API}{path}', headers=get_k8s_headers(), verify=CA_PATH, timeout=10)\r\n        if r.status_code == 200:\r\n            return r.json()\r\n        log.warning('K8s API %s returned %s', path, r.status_code)\r\n    except Exception as exc:\r\n        log.warning('K8s API fail %s: %s', path, exc)\r\n    return None\r\n\r\n\r\ndef get_results():\r\n    data = k8s_get(f'/apis/core.k8sgpt.ai/v1alpha1/namespaces/{RESULT_NAMESPACE}/results')\r\n    return data.get('items', []) if data else []\r\n\r\n\r\ndef extract_resource(result):\r\n    meta = result.get('metadata', {})\r\n    spec = result.get('spec', {})\r\n    parent = spec.get('parentObject', '') or ''\r\n    raw_name = spec.get('name') or meta.get('name', 'unknown')\r\n    ns = RESULT_NAMESPACE\r\n    name = raw_name\r\n    if '/' in raw_name:\r\n        ns, name = raw_name.split('/', 1)\r\n    elif '/' in parent:\r\n        ns, name = parent.split('/', 1)\r\n    kind = spec.get('kind', 'Unknown')\r\n    return ns, kind, name\r\n\r\n\r\ndef normalize_errors(errors):\r\n    lines = []\r\n    for err in errors or []:\r\n        txt = err.get('text', '') if isinstance(err, dict) else str(err)\r\n        if txt:\r\n            lines.append(txt)\r\n    return lines\r\n\r\n\r\ndef is_known_false_positive(kind, namespace, error_lines):\r\n    if namespace not in FALSE_POSITIVE_NAMESPACES:\r\n        return False\r\n    text = '\\n'.join(error_lines).lower()\r\n    if kind == 'StatefulSet' and 'uses the service' in text and 'does not exist' in text:\r\n        return True\r\n    if kind == 'Service' and ('no endpoints' in text or 'no-endpoints' in text):\r\n        return True\r\n    return False\r\n\r\n\r\ndef get_owner_kinds(kind, namespace, name):\r\n    if kind == 'Pod':\r\n        obj = k8s_get(f'/api/v1/namespaces/{namespace}/pods/{name}')\r\n    elif kind == 'ReplicaSet':\r\n        obj = k8s_get(f'/apis/apps/v1/namespaces/{namespace}/replicasets/{name}')\r\n    else:\r\n        return []\r\n    return [o.get('kind', '') for o in (obj or {}).get('metadata', {}).get('ownerReferences', [])]\r\n\r\n\r\ndef classify_severity(kind, details, error_lines):\r\n    text = (details + '\\n' + '\\n'.join(error_lines)).lower()\r\n    critical_words = ['crashloopbackoff','oomkilled','failedmount','failedattachvolume',\r\n                      'failedscheduling','errimagepull','imagepullbackoff',\r\n                      'networkunavailable','diskpressure','memorypressure']\r\n    high_words = ['no-endpoints','no endpoints','unavailable','not ready','backoff','unhealthy']\r\n    if kind in {'Node','PersistentVolumeClaim'} or any(w in text for w in critical_words):\r\n        return 'critical'\r\n    if kind in {'Service','StatefulSet','Deployment','DaemonSet','Ingress','ReplicaSet'} or any(w in text for w in high_words):\r\n        return 'high'\r\n    if kind == 'Pod':\r\n        return 'medium'\r\n    return 'low'\r\n\r\n\r\ndef result_signature(result):\r\n    spec = result.get('spec', {})\r\n    err = '|'.join(normalize_errors(spec.get('error', [])))\r\n    details = spec.get('details', '')\r\n    ns, kind, name = extract_resource(result)\r\n    return hashlib.md5(f'{ns}|{kind}|{name}|{details}|{err}'.encode('utf-8')).hexdigest()\r\n\r\n\r\ndef should_post(result):\r\n    ns, kind, name = extract_resource(result)\r\n    if ns in DENIED_NAMESPACES or ns not in ALLOWED_NAMESPACES:\r\n        return False, 'namespace-filtered', 'low'\r\n    spec = result.get('spec', {})\r\n    details = spec.get('details', '')\r\n    error_lines = normalize_errors(spec.get('error', []))\r\n    if is_known_false_positive(kind, ns, error_lines):\r\n        return False, 'false-positive', 'low'\r\n    severity = classify_severity(kind, details, error_lines)\r\n    owners = get_owner_kinds(kind, ns, name)\r\n    if kind == 'Pod' and any(o in CONTROLLER_OWNER_KINDS for o in owners):\r\n        return False, 'pod-owned-by-controller', severity\r\n    if kind == 'ReplicaSet' and 'Deployment' in owners:\r\n        return False, 'replicaset-owned-by-deployment', severity\r\n    sig = result_signature(result)\r\n    now = time.time()\r\n    if sig in silenced_sigs:\r\n        if now \u003c silenced_sigs[sig]:\r\n            stats['silenced'] += 1\r\n            return False, 'silenced', severity\r\n        else:\r\n            del silenced_sigs[sig]\r\n    seen_counts[sig] = seen_counts.get(sig, 0) + 1\r\n    if sig in posted_results:\r\n        posted_at = posted_results[sig]\r\n        if now - posted_at \u003c POSTED_TTL:\r\n            stale_counts[sig] = stale_counts.get(sig, 0) + 1\r\n            if stale_counts[sig] \u003e STALE_CYCLES:\r\n                stats['stale_suppressed'] += 1\r\n                return False, f'stale-{stale_counts[sig]}', severity\r\n            return False, 'already-posted-ttl', severity\r\n        else:\r\n            stats['ttl_expired'] += 1\r\n            del posted_results[sig]\r\n            stale_counts.pop(sig, None)\r\n    if severity in POST_SEVERITIES:\r\n        return True, 'post', severity\r\n    if severity == 'medium' and seen_counts[sig] in MEDIUM_REPEAT_COUNTS:\r\n        return True, f'repeat-{seen_counts[sig]}', severity\r\n    return False, 'severity-filtered', severity\r\n\r\n\r\ndef severity_meta(severity):\r\n    if severity == 'critical':\r\n        return ':red_circle:', '#E01E5A', 'CRITICAL'\r\n    if severity == 'high':\r\n        return ':orange_circle:', '#E97E00', 'HIGH'\r\n    if severity == 'medium':\r\n        return ':large_yellow_circle:', '#ECB22E', 'MEDIUM'\r\n    return ':large_blue_circle:', '#36C5F0', 'LOW'\r\n\r\n\r\ndef format_message(result, severity):\r\n    ns, kind, name = extract_resource(result)\r\n    spec = result.get('spec', {})\r\n    details = spec.get('details', '')\r\n    error_lines = normalize_errors(spec.get('error', []))\r\n    icon, color, label = severity_meta(severity)\r\n    ts = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')\r\n    err_text = '\\n'.join(f'- {line}' for line in error_lines[:5]) or 'No raw errors'\r\n    analyzed = details[:1400] if details else 'No AI analysis available'\r\n    text = (\r\n        f'### {icon} K8sGPT {label}: `{kind}/{name}`\\n'\r\n        f'| Field | Value |\\n|---|---|\\n'\r\n        f'| **Namespace** | `{ns}` |\\n'\r\n        f'| **Resource** | `{kind}/{name}` |\\n'\r\n        f'| **Severity** | {label} |\\n'\r\n        f'| **Detected** | {ts} |\\n\\n'\r\n        f'**:brain: AI Analysis**\\n{analyzed}\\n\\n'\r\n        f'**:x: Errors**\\n{err_text}'\r\n    )\r\n    return {'text': text}\r\n\r\n\r\ndef post_to_slack(payload):\r\n    if SLACK_API_TOKEN and SLACK_CHANNEL:\r\n        try:\r\n            r = req.post('https://slack.com/api/chat.postMessage',\r\n                         headers={'Authorization': f'Bearer {SLACK_API_TOKEN}', 'Content-Type': 'application/json'},\r\n                         json={'channel': SLACK_CHANNEL, **payload}, timeout=10)\r\n            data = r.json()\r\n            if r.status_code == 200 and data.get('ok'):\r\n                return True\r\n            log.warning('Slack API failed: %s', data)\r\n        except Exception as exc:\r\n            log.warning('Slack API error: %s', exc)\r\n    if SLACK_WEBHOOK:\r\n        try:\r\n            r = req.post(SLACK_WEBHOOK, json=payload, timeout=10)\r\n            return r.status_code == 200\r\n        except Exception as exc:\r\n            log.warning('Slack webhook error: %s', exc)\r\n    return False\r\n\r\n\r\ndef auto_silence_check(results):\r\n    \"\"\"v3: Check for repeated results and auto-silence them.\"\"\"\r\n    now = time.time()\r\n    for result in results:\r\n        sig = result_signature(result)\r\n        ns, kind, name = extract_resource(result)\r\n        repeat = seen_counts.get(sig, 0)\r\n        if (repeat \u003e= AUTO_SILENCE_THRESHOLD\r\n                and sig not in silenced_sigs\r\n                and sig not in auto_silenced\r\n                and len(auto_silenced) \u003c AUTO_SILENCE_MAX):\r\n            until = now + AUTO_SILENCE_DURATION\r\n            silenced_sigs[sig] = until\r\n            auto_silenced[sig] = {\r\n                \"at\": now, \"until\": until,\r\n                \"kind\": kind, \"name\": name, \"ns\": ns, \"count\": repeat,\r\n            }\r\n            stats['auto_silenced'] += 1\r\n            _save_cache()\r\n            log.info(\"[AUTO-SILENCE] %s/%s (seen %dx) silenced for 48h\", kind, name, repeat)\r\n            if SLACK_WEBHOOK:\r\n                try:\r\n                    req.post(SLACK_WEBHOOK, json={\r\n                        \"text\": (f\"### :mute: Auto-silenced: `{kind}/{name}`\\n\"\r\n                                 f\"| Field | Value |\\n|---|---|\\n\"\r\n                                 f\"| **Namespace** | `{ns}` |\\n\"\r\n                                 f\"| **Repeated** | {repeat}x unchanged |\\n\"\r\n                                 f\"| **Silenced for** | 48h |\\n\"\r\n                                 f\"| **Reason** | Recurring known issue |\")\r\n                    }, timeout=10)\r\n                except Exception:\r\n                    pass\r\n\r\n\r\ndef watch_loop():\r\n    log.info('Bridge v3 watcher started (TTL=%ss, stale=%s, auto_silence=%dx→%dh)',\r\n             POSTED_TTL, STALE_CYCLES, AUTO_SILENCE_THRESHOLD, AUTO_SILENCE_DURATION // 3600)\r\n    while True:\r\n        try:\r\n            results = get_results()\r\n            stats['watched'] += 1\r\n            for result in results:\r\n                post, reason, severity = should_post(result)\r\n                ns, kind, name = extract_resource(result)\r\n                if not post:\r\n                    stats['skipped'] += 1\r\n                    if stats['watched'] % 10 == 1:\r\n                        log.info('[SKIP] %s/%s %s (%s)', kind, name, severity, reason)\r\n                    continue\r\n                if post_to_slack(format_message(result, severity)):\r\n                    sig = result_signature(result)\r\n                    posted_results[sig] = time.time()\r\n                    stale_counts[sig] = 0\r\n                    _save_cache()\r\n                    stats['posted'] += 1\r\n                    log.info('[POSTED] %s/%s severity=%s', kind, name, severity)\r\n                else:\r\n                    stats['errors'] += 1\r\n                    log.error('[FAIL] post for %s/%s', kind, name)\r\n            # v3: Auto-silence repeated results\r\n            auto_silence_check(results)\r\n            # Clean old entries\r\n            now = time.time()\r\n            expired = [k for k, v in posted_results.items() if now - v \u003e POSTED_TTL * 2]\r\n            for k in expired:\r\n                posted_results.pop(k, None)\r\n                stale_counts.pop(k, None)\r\n            expired_s = [k for k, v in silenced_sigs.items() if now \u003e v]\r\n            for k in expired_s:\r\n                silenced_sigs.pop(k, None)\r\n                auto_silenced.pop(k, None)\r\n        except Exception as exc:\r\n            stats['errors'] += 1\r\n            log.error('Watch loop error: %s', exc)\r\n        time.sleep(POLL_INTERVAL)\r\n\r\n\r\ndef _bootstrap_cache_from_results():\r\n    global posted_results, seen_counts, stale_counts, silenced_sigs, auto_silenced, cache_loaded\r\n    if cache_loaded:\r\n        return\r\n    try:\r\n        existing = get_results()\r\n        posted_results = {result_signature(r): time.time() for r in existing}\r\n        seen_counts = {}\r\n        stale_counts = {}\r\n        silenced_sigs = {}\r\n        auto_silenced = {}\r\n        _save_cache()\r\n        cache_loaded = True\r\n        log.info('Bootstrapped cache with %s results', len(posted_results))\r\n    except Exception as exc:\r\n        log.warning('Bootstrap failed: %s', exc)\r\n\r\n\r\n@app.on_event('startup')\r\nasync def startup():\r\n    _bootstrap_cache_from_results()\r\n    threading.Thread(target=watch_loop, daemon=True).start()\r\n    log.info('K8sGPT bridge v3 started')\r\n\r\n\r\n@app.get('/')\r\ndef root():\r\n    return {'service': 'k8sgpt-bridge-v3', 'status': 'running'}\r\n\r\n\r\n@app.get('/health')\r\ndef health():\r\n    return {'status': 'healthy', **stats, 'tracked': len(posted_results),\r\n            'seen': len(seen_counts), 'stale_tracked': len(stale_counts),\r\n            'silenced_count': len(silenced_sigs), 'auto_silenced_count': len(auto_silenced)}\r\n\r\n\r\n@app.get('/stats')\r\ndef bridge_stats():\r\n    return {'uptime_s': int(time.time() - stats['start_time']), **stats,\r\n            'tracked': len(posted_results), 'seen': len(seen_counts)}\r\n\r\n\r\n@app.get('/results')\r\ndef results_ep():\r\n    items = []\r\n    for r in get_results():\r\n        ns, kind, name = extract_resource(r)\r\n        items.append({'namespace': ns, 'kind': kind, 'name': name,\r\n                      'details': r.get('spec', {}).get('details', ''),\r\n                      'errors': normalize_errors(r.get('spec', {}).get('error', []))})\r\n    return {'count': len(items), 'results': items}\r\n\r\n\r\n@app.post('/silence')\r\nasync def silence(request: Request):\r\n    try:\r\n        body = await request.json()\r\n    except Exception:\r\n        return JSONResponse({'error': 'bad json'}, 400)\r\n    sig = body.get('sig')\r\n    duration = int(body.get('duration', 14400))\r\n    if not sig:\r\n        ns = body.get('namespace', '')\r\n        kind = body.get('kind', '')\r\n        name = body.get('name', '')\r\n        if kind and name:\r\n            sig = hashlib.md5(f'{ns}|{kind}|{name}'.encode()).hexdigest()[:16]\r\n            for r in get_results():\r\n                rns, rkind, rname = extract_resource(r)\r\n                if rns == ns and rkind == kind and rname == name:\r\n                    sig = result_signature(r)\r\n                    break\r\n        else:\r\n            return JSONResponse({'error': 'provide sig or kind+name+namespace'}, 400)\r\n    silenced_sigs[sig] = time.time() + duration\r\n    _save_cache()\r\n    return {'silenced': sig, 'until': datetime.fromtimestamp(time.time() + duration, tz=timezone.utc).isoformat(), 'duration_s': duration}\r\n\r\n\r\n@app.get('/silenced')\r\ndef list_silenced():\r\n    now = time.time()\r\n    active = {k: {'expires_in_s': int(v - now), 'until': datetime.fromtimestamp(v, tz=timezone.utc).isoformat()}\r\n              for k, v in silenced_sigs.items() if v \u003e now}\r\n    return {'count': len(active), 'silenced': active}\r\n\r\n\r\n@app.get('/autosilenced')\r\ndef list_autosilenced():\r\n    \"\"\"v3: List auto-silenced items.\"\"\"\r\n    now = time.time()\r\n    active = {}\r\n    for sig, info in auto_silenced.items():\r\n        if info.get(\"until\", 0) \u003e now:\r\n            active[sig] = {\r\n                \"kind\": info.get(\"kind\", \"?\"),\r\n                \"name\": info.get(\"name\", \"?\"),\r\n                \"namespace\": info.get(\"ns\", \"?\"),\r\n                \"seen_count\": info.get(\"count\", 0),\r\n                \"expires_in_h\": round((info[\"until\"] - now) / 3600, 1),\r\n            }\r\n    return {\"count\": len(active), \"auto_silenced\": active}\r\n\r\n\r\n@app.delete('/silence/{sig}')\r\ndef unsilence(sig: str):\r\n    if sig in silenced_sigs:\r\n        del silenced_sigs[sig]\r\n        auto_silenced.pop(sig, None)\r\n        _save_cache()\r\n        return {'unsilenced': sig}\r\n    return JSONResponse({'error': 'not found'}, 404)\r\n\r\n\r\n@app.post('/webhook')\r\nasync def webhook(_: Request):\r\n    return JSONResponse({'results': get_results()})\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"k8sgpt-robusta-bridge-code","namespace":"k8sgpt"}}
    name: k8sgpt-robusta-bridge-code
    namespace: k8sgpt
