    proxy.py: "import hashlib\r\nimport logging\r\nimport os\r\nimport re\r\nimport
      time\r\nimport asyncio\r\nfrom collections import defaultdict\r\nfrom datetime
      import datetime, timezone\r\n\r\nimport httpx\r\nfrom fastapi import FastAPI,
      Request\r\nfrom fastapi.responses import JSONResponse, PlainTextResponse\r\n\r\nlogging.basicConfig(level=logging.INFO,
      format=\"%(asctime)s %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"llm-proxy-v3\")\r\napp
      = FastAPI(title=\"K8sGPT LLM Proxy v3\")\r\n\r\n# ── Provider configuration
      ───────────────────────────────────────────\r\nPROVIDERS = {\r\n    \"groq\":
      {\r\n        \"chat_url\": \"https://api.groq.com/openai/v1/chat/completions\",\r\n
      \       \"models_url\": \"https://api.groq.com/openai/v1/models\",\r\n        \"key\":
      os.environ.get(\"GROQ_API_KEY\", \"\"),\r\n        \"rate_type\": \"global\",\r\n
      \       \"dead_until\": 0,\r\n        \"cooldown_until\": 0,\r\n    },\r\n    \"cerebras\":
      {\r\n        \"chat_url\": \"https://api.cerebras.ai/v1/chat/completions\",\r\n
      \       \"models_url\": \"https://api.cerebras.ai/v1/models\",\r\n        \"key\":
      os.environ.get(\"CEREBRAS_API_KEY\", \"\"),\r\n        \"rate_type\": \"global\",\r\n
      \       \"dead_until\": 0,\r\n        \"cooldown_until\": 0,\r\n    },\r\n    \"sambanova\":
      {\r\n        \"chat_url\": \"https://api.sambanova.ai/v1/chat/completions\",\r\n
      \       \"models_url\": \"https://api.sambanova.ai/v1/models\",\r\n        \"key\":
      os.environ.get(\"SAMBANOVA_API_KEY\", \"\"),\r\n        \"rate_type\": \"per_model\",\r\n
      \       \"dead_until\": 0,\r\n        \"cooldown_until\": 0,\r\n    },\r\n    \"google\":
      {\r\n        \"chat_url\": \"https://generativelanguage.googleapis.com/v1beta/openai/chat/completions\",\r\n
      \       \"models_url\": None,\r\n        \"key\": os.environ.get(\"GOOGLE_AI_KEY\",
      \"\"),\r\n        \"rate_type\": \"per_model\",\r\n        \"dead_until\": 0,\r\n
      \       \"cooldown_until\": 0,\r\n    },\r\n    \"openrouter\": {\r\n        \"chat_url\":
      \"https://openrouter.ai/api/v1/chat/completions\",\r\n        \"models_url\":
      \"https://openrouter.ai/api/v1/models\",\r\n        \"key\": os.environ.get(\"OPENROUTER_API_KEY\",
      \"\"),\r\n        \"rate_type\": \"global_daily\",\r\n        \"dead_until\":
      0,\r\n        \"cooldown_until\": 0,\r\n        \"daily_budget\": 50,\r\n        \"daily_used\":
      0,\r\n        \"daily_reset\": 0,\r\n    },\r\n}\r\n\r\nEXCLUDE_PATTERNS = [\r\n
      \   \"whisper\", \"prompt-guard\", \"compound\", \"orpheus\", \"embedding\",\r\n
      \   \"tts\", \"image\", \"safeguard\", \"deepseek-r1\",\r\n    \"auto\",  #
      exclude openrouter/auto\r\n]\r\n\r\nQUALITY = {\r\n    # ── Native providers
      (primary tier q=50-95) ──\r\n    \"llama-3.3-70b-versatile\": 95, \"openai/gpt-oss-120b\":
      92,\r\n    \"qwen/qwen3-32b\": 88, \"moonshotai/kimi-k2-instruct\": 87,\r\n
      \   \"meta-llama/llama-4-scout-17b-16e-instruct\": 83,\r\n    \"openai/gpt-oss-20b\":
      80, \"llama-3.1-8b-instant\": 55,\r\n    \"qwen-3-235b-a22b-instruct-2507\":
      93, \"gpt-oss-120b\": 90,\r\n    \"zai-glm-4.7\": 70, \"llama3.1-8b\": 50,\r\n
      \   \"Meta-Llama-3.3-70B-Instruct\": 90, \"DeepSeek-V3.2\": 89,\r\n    \"DeepSeek-V3.1\":
      88, \"DeepSeek-V3.1-cb\": 87,\r\n    \"DeepSeek-V3-0324\": 86, \"Llama-4-Maverick-17B-128E-Instruct\":
      84,\r\n    \"MiniMax-M2.5\": 82, \"gemma-3-12b-it\": 65, \"Meta-Llama-3.1-8B-Instruct\":
      52,\r\n    \"gemini-2.5-flash\": 86, \"gemini-2.5-flash-lite\": 80, \"gemini-2.0-flash\":
      78,\r\n    # ── OpenRouter free tier (fallback tier q=30-49) ──\r\n    # Budget:
      only 50 req/day → scores below native providers\r\n    # so OpenRouter is used
      only when natives are exhausted\r\n    \"nousresearch/hermes-3-llama-3.1-405b:free\":
      49,\r\n    \"nvidia/nemotron-3-super-120b-a12b:free\": 48,\r\n    \"openai/gpt-oss-120b:free\":
      47,\r\n    \"meta-llama/llama-3.3-70b-instruct:free\": 46,\r\n    \"qwen/qwen3-coder:free\":
      45,\r\n    \"qwen/qwen3-next-80b-a3b-instruct:free\": 44,\r\n    \"minimax/minimax-m2.5:free\":
      43,\r\n    \"openai/gpt-oss-20b:free\": 42,\r\n    \"google/gemma-4-31b-it:free\":
      41,\r\n    \"google/gemma-4-26b-a4b-it:free\": 40,\r\n    \"z-ai/glm-4.5-air:free\":
      39,\r\n    \"arcee-ai/trinity-large-preview:free\": 38,\r\n    \"google/gemma-3-27b-it:free\":
      37,\r\n    \"cognitivecomputations/dolphin-mistral-24b-venice-edition:free\":
      36,\r\n    \"nvidia/nemotron-nano-12b-v2-vl:free\": 35,\r\n    \"nvidia/nemotron-nano-9b-v2:free\":
      34,\r\n    \"google/gemma-3-12b-it:free\": 33,\r\n    \"google/gemma-3-4b-it:free\":
      32,\r\n    \"google/gemma-3n-e4b-it:free\": 31,\r\n    \"google/gemma-3n-e2b-it:free\":
      30,\r\n}\r\nDEFAULT_QUALITY = 60\r\n\r\n\r\nclass Slot:\r\n    __slots__ = (\"provider\",
      \"model\", \"quality\", \"ready_at\", \"ok\", \"fail\")\r\n\r\n    def __init__(self,
      provider, model, quality):\r\n        self.provider = provider\r\n        self.model
      = model\r\n        self.quality = quality\r\n        self.ready_at = 0.0\r\n
      \       self.ok = 0\r\n        self.fail = 0\r\n\r\n    def available(self,
      now):\r\n        prov = PROVIDERS[self.provider]\r\n        if prov[\"dead_until\"]
      > now:\r\n            return False\r\n        if prov[\"rate_type\"] in (\"global\",
      \"global_daily\") and prov[\"cooldown_until\"] > now:\r\n            return
      False\r\n        # OpenRouter daily budget check\r\n        if prov[\"rate_type\"]
      == \"global_daily\":\r\n            _reset_daily_if_needed(prov, now)\r\n            if
      prov.get(\"daily_used\", 0) >= prov.get(\"daily_budget\", 50):\r\n                return
      False\r\n        return self.ready_at <= now\r\n\r\n\r\ndef _reset_daily_if_needed(prov,
      now):\r\n    \"\"\"Reset daily counter at midnight UTC.\"\"\"\r\n    today =
      int(now // 86400)\r\n    if prov.get(\"daily_reset\", 0) != today:\r\n        prov[\"daily_used\"]
      = 0\r\n        prov[\"daily_reset\"] = today\r\n\r\n\r\nslots = []\r\n\r\nKNOWN_MODELS
      = {\r\n    \"groq\": [\r\n        \"llama-3.3-70b-versatile\", \"openai/gpt-oss-120b\",
      \"qwen/qwen3-32b\",\r\n        \"moonshotai/kimi-k2-instruct\", \"meta-llama/llama-4-scout-17b-16e-instruct\",\r\n
      \       \"openai/gpt-oss-20b\", \"llama-3.1-8b-instant\",\r\n    ],\r\n    \"cerebras\":
      [\"qwen-3-235b-a22b-instruct-2507\", \"gpt-oss-120b\", \"llama3.1-8b\", \"zai-glm-4.7\"],\r\n
      \   \"sambanova\": [\r\n        \"Meta-Llama-3.3-70B-Instruct\", \"DeepSeek-V3.2\",
      \"DeepSeek-V3.1\",\r\n        \"DeepSeek-V3.1-cb\", \"DeepSeek-V3-0324\", \"Llama-4-Maverick-17B-128E-Instruct\",\r\n
      \       \"MiniMax-M2.5\", \"gpt-oss-120b\", \"gemma-3-12b-it\", \"Meta-Llama-3.1-8B-Instruct\",\r\n
      \   ],\r\n    \"google\": [\"gemini-2.5-flash\", \"gemini-2.5-flash-lite\",
      \"gemini-2.0-flash\"],\r\n    \"openrouter\": [\r\n        \"nousresearch/hermes-3-llama-3.1-405b:free\",\r\n
      \       \"nvidia/nemotron-3-super-120b-a12b:free\",\r\n        \"openai/gpt-oss-120b:free\",\r\n
      \       \"meta-llama/llama-3.3-70b-instruct:free\",\r\n        \"qwen/qwen3-coder:free\",\r\n
      \       \"qwen/qwen3-next-80b-a3b-instruct:free\",\r\n        \"minimax/minimax-m2.5:free\",\r\n
      \       \"openai/gpt-oss-20b:free\",\r\n        \"google/gemma-4-31b-it:free\",\r\n
      \       \"google/gemma-4-26b-a4b-it:free\",\r\n        \"z-ai/glm-4.5-air:free\",\r\n
      \       \"arcee-ai/trinity-large-preview:free\",\r\n        \"google/gemma-3-27b-it:free\",\r\n
      \       \"cognitivecomputations/dolphin-mistral-24b-venice-edition:free\",\r\n
      \       \"nvidia/nemotron-nano-12b-v2-vl:free\",\r\n        \"nvidia/nemotron-nano-9b-v2:free\",\r\n
      \       \"google/gemma-3-12b-it:free\",\r\n        \"google/gemma-3-4b-it:free\",\r\n
      \       \"google/gemma-3n-e4b-it:free\",\r\n        \"google/gemma-3n-e2b-it:free\",\r\n
      \   ],\r\n}\r\n\r\n\r\ndef build_slots():\r\n    global slots\r\n    slots =
      []\r\n    for prov_name, models in KNOWN_MODELS.items():\r\n        if not PROVIDERS[prov_name][\"key\"]:\r\n
      \           continue\r\n        for m in models:\r\n            slots.append(Slot(prov_name,
      m, QUALITY.get(m, DEFAULT_QUALITY)))\r\n    slots.sort(key=lambda s: -s.quality)\r\n
      \   log.info(\"Built %d model slots across %d providers\", len(slots), len(KNOWN_MODELS))\r\n\r\n\r\n#
      ── Cache ────────────────────────────────────────────────────────────\r\nCACHE
      = {}\r\nCACHE_TTL = 3600\r\nCACHE_MAX = 200\r\nstart_time = time.time()\r\n\r\n\r\ndef
