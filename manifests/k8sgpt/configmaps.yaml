  data:
    bridge.py: "import hashlib\r\nimport logging\r\nimport os\r\nimport threading\r\nimport
      time\r\nfrom datetime import datetime, timezone\r\n\r\nimport requests as req\r\nfrom
      fastapi import FastAPI, Request\r\nfrom fastapi.responses import JSONResponse\r\n\r\nlogging.basicConfig(level=logging.INFO,
      format='%(asctime)s %(levelname)s %(message)s')\r\nlog = logging.getLogger('k8sgpt-bridge')\r\napp
      = FastAPI(title='K8sGPT Slack Bridge v3')\r\n\r\nSLACK_WEBHOOK = os.environ.get('SLACK_WEBHOOK',
      '')\r\nSLACK_API_TOKEN = os.environ.get('SLACK_API_TOKEN', '')\r\nSLACK_CHANNEL
      = os.environ.get('SLACK_CHANNEL', '')\r\nK8S_API = 'https://kubernetes.default.svc'\r\nTOKEN_PATH
      = '/var/run/secrets/kubernetes.io/serviceaccount/token'\r\nCA_PATH = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'\r\nRESULT_NAMESPACE
      = 'k8sgpt'\r\nPOLL_INTERVAL = 60\r\nPOSTED_TTL = 4 * 3600\r\nSTALE_CYCLES =
      6\r\n\r\n# v3: Auto-silencer config\r\nAUTO_SILENCE_THRESHOLD = 3\r\nAUTO_SILENCE_DURATION
