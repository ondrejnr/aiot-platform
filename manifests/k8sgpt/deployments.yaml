    template:
      metadata:
        labels:
          app: k8sgpt
      spec:
        containers:
        - args:
          - serve
          env:
          - name: K8SGPT_MODEL
            value: llama-3.3-70b-versatile
          - name: K8SGPT_BACKEND
            value: openai
          - name: K8SGPT_MAX_TOKENS
            value: "2048"
          - name: K8SGPT_TOP_K
            value: "10"
          - name: XDG_CONFIG_HOME
            value: /k8sgpt-data/.config
          - name: XDG_CACHE_HOME
            value: /k8sgpt-data/.cache
          - name: K8SGPT_TOP_P
            value: "0"
          - name: K8SGPT_PASSWORD
            valueFrom:
              secretKeyRef:
                key: openai-api-key
                name: k8sgpt-openai
          - name: K8SGPT_BASEURL
            value: http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080/v1
          image: ghcr.io/k8sgpt-ai/k8sgpt:v0.4.3
          imagePullPolicy: IfNotPresent
