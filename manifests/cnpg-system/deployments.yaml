        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        serviceAccount: cnpg-manager
        serviceAccountName: cnpg-manager
        terminationGracePeriodSeconds: 10
        volumes:
        - emptyDir: {}
