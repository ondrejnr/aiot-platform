                fleet-local;--keep=100;pipelinerun,taskrun;false gitea;--keep=100;pipelinerun,taskrun;false
                gitea-bootstrap;--keep=100;pipelinerun,taskrun;false headlamp;--keep=100;pipelinerun,taskrun;false
