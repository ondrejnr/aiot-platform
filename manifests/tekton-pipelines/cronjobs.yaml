      blockOwnerDeletion: true
      controller: true
      kind: TektonConfig
      name: config
  spec:
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 2
    jobTemplate:
      metadata:
      spec:
        backoffLimit: 1
        template:
          metadata:
          spec:
            containers:
            - args:
              - -s
              - aiot;--keep=100;pipelinerun,taskrun;false auth;--keep=100;pipelinerun,taskrun;false
                backrest;--keep=100;pipelinerun,taskrun;false build-service;--keep=100;pipelinerun,taskrun;false
                cattle-capi-system;--keep=100;pipelinerun,taskrun;false cattle-fleet-clusters-system;--keep=100;pipelinerun,taskrun;false
                cattle-fleet-local-system;--keep=100;pipelinerun,taskrun;false cattle-fleet-system;--keep=100;pipelinerun,taskrun;false
                cattle-global-data;--keep=100;pipelinerun,taskrun;false cattle-impersonation-system;--keep=100;pipelinerun,taskrun;false
                cattle-local-user-passwords;--keep=100;pipelinerun,taskrun;false cattle-system;--keep=100;pipelinerun,taskrun;false
                cattle-turtles-system;--keep=100;pipelinerun,taskrun;false cattle-ui-plugin-system;--keep=100;pipelinerun,taskrun;false
                cert-manager;--keep=100;pipelinerun,taskrun;false chef;--keep=100;pipelinerun,taskrun;false
                chef-webhook;--keep=100;pipelinerun,taskrun;false cluster-fleet-local-local-1a3d67d0a899;--keep=100;pipelinerun,taskrun;false
                default;--keep=100;pipelinerun,taskrun;false default-tenant;--keep=100;pipelinerun,taskrun;false
                dr-ops;--keep=100;pipelinerun,taskrun;false emqx;--keep=100;pipelinerun,taskrun;false
                enterprise-contract-service;--keep=100;pipelinerun,taskrun;false etcd-backup;--keep=100;pipelinerun,taskrun;false
