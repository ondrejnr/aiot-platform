                k8sgpt;--keep=100;pipelinerun,taskrun;false k8up-system;--keep=100;pipelinerun,taskrun;false
                knative-serving;--keep=100;pipelinerun,taskrun;false konflux-cli;--keep=100;pipelinerun,taskrun;false
                konflux-info;--keep=100;pipelinerun,taskrun;false konflux-operator;--keep=100;pipelinerun,taskrun;false
                konflux-ui;--keep=100;pipelinerun,taskrun;false kyverno;--keep=100;pipelinerun,taskrun;false
                local;--keep=100;pipelinerun,taskrun;false local-path-storage;--keep=100;pipelinerun,taskrun;false
                mattermost;--keep=100;pipelinerun,taskrun;false monitoring;--keep=100;pipelinerun,taskrun;false
                namespace-lister;--keep=100;pipelinerun,taskrun;false opentelemetry-operator-system;--keep=100;pipelinerun,taskrun;false
                p-sqf5p;--keep=100;pipelinerun,taskrun;false p-wpbsz;--keep=100;pipelinerun,taskrun;false
                pipelines-as-code;--keep=100;pipelinerun,taskrun;false piraeus-datastore;--keep=100;pipelinerun,taskrun;false
                registry;--keep=100;pipelinerun,taskrun;false release-service;--keep=100;pipelinerun,taskrun;false
                robusta;--keep=100;pipelinerun,taskrun;false semaphore;--keep=100;pipelinerun,taskrun;false
                signoz;--keep=100;pipelinerun,taskrun;false tekton-operator;--keep=100;pipelinerun,taskrun;false
                tekton-pipelines;--keep=100;pipelinerun,taskrun;false user-b2zsr;--keep=100;pipelinerun,taskrun;false
                victoriametrics;--keep=100;pipelinerun,taskrun;false zabbix;--keep=100;pipelinerun,taskrun;false
              command:
              - /bin/sh
              - -c
              - "\n\tfunction prune() {\n\t\tnamespace=$1\n\t\tflags=$2\n\t\tresources=$3\n\t\tprune_per_resource=$4\n\t\tupdated_flags=$(echo
                $flags | tr ',' ' ')\n\t\tfor resource in ${resources//,/ }; do\n\t\t\techo
                \"\"\t\n\t\t\tif [[ \"$prune_per_resource\" == \"true\" ]]; then\n\t\t\t\tparent_resource=$(echo
                $resource | sed \"s/run$//\")\n\t\t\t\tresource_names=$(tkn $parent_resource
                list --namespace=$namespace --no-headers --output=jsonpath={.items[*].metadata.name})\n\t\t\t\tif
                [ $? -ne 0 ]; then\n\t\t\t\t\techo \"error on getting list of '$parent_resource'\"\n\t\t\t\t\terror_status=1\n\t\t\t\t\tcontinue\n\t\t\t\tfi\n\t\t\t\tif
                [[ \"$resource_names\" == \"\" ]]; then\n\t\t\t\t\techo \"there is
                no '$parent_resource' available in '$namespace'\"\n\t\t\t\t\tcontinue\n\t\t\t\tfi\n\t\t\t\tfor
                resource_name in $resource_names; do\n\t\t\t\t\techo \"\"\n\t\t\t\t\ttarget_cmd=\"tkn
                $resource delete --$parent_resource=\\\"$resource_name\\\" $updated_flags
                --namespace=$namespace --force\"\n\t\t\t\t\techo \"\\$ ${target_cmd}\"\n\t\t\t\t\teval
                $target_cmd\n\t\t\t\t\tif [ $? -ne 0 ]; then\n\t\t\t\t\t\terror_status=1\n\t\t\t\t\tfi\n\t\t\t\tdone\n\t\t\telse\n\t\t\t\ttarget_cmd=\"tkn
                $resource delete $updated_flags --namespace=$namespace --force\"\n\t\t\t\techo
                \"\\$ ${target_cmd}\"\n\t\t\t\teval $target_cmd\n\t\t\t\tif [ $? -ne
                0 ]; then\n\t\t\t\t\terror_status=1\n\t\t\t\tfi\n\t\t\tfi\n\t\tdone\n\t}\n\t\n\terror_status=0\n\tfor
                c in $*; do\n\t\tnamespace=$(echo $c | cut -d ';' -f 1)\n\t\tflags=$(echo
                $c | cut -d ';' -f 2)\n\t\tresources=$(echo $c | cut -d ';' -f 3)\n\t\tprune_per_resource=$(echo
                $c | cut -d ';' -f 4)\n\t\tprune $namespace $flags $resources $prune_per_resource\n\tdone\n\texit
                $error_status\n\t"
              image: ghcr.io/tektoncd/plumbing/tkn@sha256:233de6c8b8583a34c2379fa98d42dba739146c9336e8d41b66030484357481ed
              imagePullPolicy: IfNotPresent
              name: tkn-pruner
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                  - ALL
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: FallbackToLogsOnError
            dnsPolicy: ClusterFirst
            restartPolicy: Never
            schedulerName: default-scheduler
            securityContext:
              fsGroup: 65532
              runAsNonRoot: true
              runAsUser: 65532
              seccompProfile:
                type: RuntimeDefault
            serviceAccount: tekton-resource-pruner
            serviceAccountName: tekton-resource-pruner
            terminationGracePeriodSeconds: 30
        ttlSecondsAfterFinished: 3600
    schedule: 0 8 * * *
    successfulJobsHistoryLimit: 2
    suspend: false
  status: {}
