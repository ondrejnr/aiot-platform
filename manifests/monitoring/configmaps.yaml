bel{cluster=\\\"$cluster\\\", namespace=~\\\"$namespace\\\", workload=~\\\".+\\\"}, workload)\",\"refresh\":2,\"sort\":1,\"type\":\"query\"},{\"allValue\":\".+\",\"datasource\":{\"type\":\"prometheus\",\"uid\":\"${datasource}\"},\"hide\":0,\"includeAll\":true,\"label\":\"workload_type\",\"name\":\"type\",\"query\":\"label_values(namespace_workload_pod:kube_pod_owner:relabel{cluster=\\\"$cluster\\\", namespace=~\\\"$namespace\\\", workload=~\\\"$workload\\\"}, workload_type)\",\"refresh\":2,\"sort\":1,\"type\":\"query\"}]},\"time\":{\"from\":\"now-1h\",\"to\":\"now\"},\"timezone\": \"utc\",\"title\":\"Kubernetes / Networking / Workload\",\"uid\":\"728bf77cc1166d2f3133bf25846876cc\"}"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app":"kube-prometheus-stack-grafana","app.kubernetes.io/instance":"prometheus","app.kubernetes.io/managed-by":"Helm","app.kubernetes.io/part-of":"kube-prometheus-stack","app.kubernetes.io/version":"83.4.1","chart":"kube-prometheus-stack-83.4.1","grafana_dashboard":"1","heritage":"Helm","release":"prometheus"},"name":"prometheus-kube-prometheus-workload-total","namespace":"monitoring"}}
