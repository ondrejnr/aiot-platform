apiVersion: v1
items:
- apiVersion: v1
  data:
    collect.py: "#!/usr/bin/env python3\r\n\"\"\"\r\nCluster metrics collector - queries
      Prometheus and stores in PostgreSQL.\r\nRuns as a long-lived Deployment, collecting
      every INTERVAL seconds.\r\nCollects per-node resource metrics + cluster-wide
      K8s health metrics.\r\n\"\"\"\r\n\r\nimport os\r\nimport sys\r\nimport time\r\nimport
      json\r\nimport urllib.request\r\nimport urllib.parse\r\nimport psycopg2\r\nfrom
      datetime import datetime\r\n\r\nPROMETHEUS_URL = os.environ.get(\"PROMETHEUS_URL\",
      \"http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090\")\r\nDB_HOST
      = os.environ.get(\"DB_HOST\", \"postgres.aiot.svc.cluster.local\")\r\nDB_PORT
      = os.environ.get(\"DB_PORT\", \"5432\")\r\nDB_NAME = os.environ.get(\"DB_NAME\",
      \"aiot\")\r\nDB_USER = os.environ.get(\"DB_USER\", \"aiot\")\r\nDB_PASSWORD
      = os.environ.get(\"DB_PASSWORD\", \"aiot123\")\r\nINTERVAL = int(os.environ.get(\"COLLECT_INTERVAL\",
      \"300\"))  # seconds between collections\r\n\r\n# --- Prometheus query helpers
      ---\r\n\r\ndef prom_query(query):\r\n    \"\"\"Execute instant query against
      Prometheus.\"\"\"\r\n    url = f\"{PROMETHEUS_URL}/api/v1/query?query={urllib.parse.quote(query)}\"\r\n
      \   try:\r\n        req = urllib.request.Request(url, headers={\"Accept\": \"application/json\"})\r\n
      \       with urllib.request.urlopen(req, timeout=30) as resp:\r\n            data
      = json.loads(resp.read().decode())\r\n            if data[\"status\"] == \"success\":\r\n
      \               return data[\"data\"][\"result\"]\r\n    except Exception as
      e:\r\n        print(f\"WARN: Prometheus query failed: {query[:80]}... -> {e}\",
      file=sys.stderr)\r\n    return []\r\n\r\ndef prom_value(results, label_filters=None,
      default=None):\r\n    \"\"\"Extract single scalar value from Prometheus result.\"\"\"\r\n
      \   for r in results:\r\n        if label_filters:\r\n            if all(r[\"metric\"].get(k)
      == v for k, v in label_filters.items()):\r\n                return float(r[\"value\"][1])\r\n
      \       else:\r\n            return float(r[\"value\"][1])\r\n    return default\r\n\r\ndef
      prom_by_node(results, node_key=\"instance\"):\r\n    \"\"\"Group results by
      node, returning {node: value}.\"\"\"\r\n    out = {}\r\n    for r in results:\r\n
      \       node = r[\"metric\"].get(node_key, \"unknown\")\r\n        out[node]
      = float(r[\"value\"][1])\r\n    return out\r\n\r\n# --- Metric collection ---\r\n\r\ndef
      collect_node_metrics():\r\n    \"\"\"Collect per-node metrics from node-exporter
      & kube-state-metrics.\"\"\"\r\n    \r\n    # Node name mapping: instance ->
      nodename\r\n    uname = prom_query('node_uname_info')\r\n    instance_to_node
      = {}\r\n    for r in uname:\r\n        inst = r[\"metric\"].get(\"instance\",
      \"\")\r\n        name = r[\"metric\"].get(\"nodename\", inst)\r\n        instance_to_node[inst]
      = name\r\n\r\n    # CPU usage per node (100 - idle%)\r\n    cpu = prom_query(\r\n
      \       '100 - (avg by (instance)(irate(node_cpu_seconds_total{mode=\"idle\"}[5m]))
      * 100)'\r\n    )\r\n    cpu_by_inst = prom_by_node(cpu)\r\n\r\n    # Memory
      usage percent\r\n    mem = prom_query(\r\n        '100 * (1 - node_memory_MemAvailable_bytes
      / node_memory_MemTotal_bytes)'\r\n    )\r\n    mem_by_inst = prom_by_node(mem)\r\n\r\n
      \   # Memory available bytes\r\n    mem_avail = prom_query('node_memory_MemAvailable_bytes')\r\n
      \   mem_avail_by_inst = prom_by_node(mem_avail)\r\n\r\n    # Disk usage percent
      (root filesystem)\r\n    disk = prom_query(\r\n        '100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"}
      / '\r\n        'node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"}
      * 100)'\r\n    )\r\n    disk_by_inst = prom_by_node(disk)\r\n\r\n    # Disk
      IO rates\r\n    disk_read = prom_query('sum by (instance)(irate(node_disk_read_bytes_total[5m]))')\r\n
      \   disk_read_by_inst = prom_by_node(disk_read)\r\n\r\n    disk_write = prom_query('sum
      by (instance)(irate(node_disk_written_bytes_total[5m]))')\r\n    disk_write_by_inst
      = prom_by_node(disk_write)\r\n\r\n    # Network rates\r\n    net_rx = prom_query(\r\n
      \       'sum by (instance)(irate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))'\r\n
      \   )\r\n    net_rx_by_inst = prom_by_node(net_rx)\r\n\r\n    net_tx = prom_query(\r\n
      \       'sum by (instance)(irate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))'\r\n
      \   )\r\n    net_tx_by_inst = prom_by_node(net_tx)\r\n\r\n    # Network errors\r\n
      \   net_err = prom_query(\r\n        'sum by (instance)(irate(node_network_receive_errs_total[5m])
      + '\r\n        'irate(node_network_transmit_errs_total[5m]))'\r\n    )\r\n    net_err_by_inst
      = prom_by_node(net_err)\r\n\r\n    # Load averages\r\n    load1 = prom_query('node_load1')\r\n
      \   load1_by_inst = prom_by_node(load1)\r\n    \r\n    load5 = prom_query('node_load5')\r\n
      \   load5_by_inst = prom_by_node(load5)\r\n    \r\n    load15 = prom_query('node_load15')\r\n
      \   load15_by_inst = prom_by_node(load15)\r\n\r\n    # Pods running per node\r\n
      \   pods_running = prom_query(\r\n        'count by (node)(kube_pod_info{pod!=\"\"})'\r\n
      \   )\r\n    pods_run_by_node = prom_by_node(pods_running, node_key=\"node\")\r\n\r\n
      \   # Pods pending per node\r\n    pods_pending = prom_query(\r\n        'count
      by (node)(kube_pod_status_phase{phase=\"Pending\"} == 1)'\r\n    )\r\n    pods_pend_by_node
      = prom_by_node(pods_pending, node_key=\"node\")\r\n\r\n    # Pod restarts in
      last 5m per node\r\n    restarts = prom_query(\r\n        'sum by (node)(increase(kube_pod_container_status_restarts_total[5m]))'\r\n
      \   )\r\n    restarts_by_node = prom_by_node(restarts, node_key=\"node\")\r\n\r\n
      \   # OOMKilled containers in last 5m per node\r\n    oom = prom_query(\r\n
      \       'sum by (node)(increase(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}[5m]))'\r\n
      \   )\r\n    oom_by_node = prom_by_node(oom, node_key=\"node\")\r\n\r\n    #
      CPU throttled percent per node\r\n    throttled = prom_query(\r\n        'avg
      by (node)('\r\n        'rate(container_cpu_cfs_throttled_periods_total{container!=\"\"}[5m])
      / '\r\n        'rate(container_cpu_cfs_periods_total{container!=\"\"}[5m]) *
      100)'\r\n    )\r\n    throttled_by_node = prom_by_node(throttled, node_key=\"node\")\r\n\r\n
      \   # Build per-node rows\r\n    nodes = {}\r\n    for inst, nodename in instance_to_node.items():\r\n
      \       nodes[nodename] = {\r\n            \"node_name\": nodename,\r\n            \"cpu_usage_percent\":
      cpu_by_inst.get(inst),\r\n            \"memory_usage_percent\": mem_by_inst.get(inst),\r\n
      \           \"memory_available_bytes\": int(mem_avail_by_inst.get(inst, 0))
      or None,\r\n            \"disk_usage_percent\": disk_by_inst.get(inst),\r\n
      \           \"disk_io_read_bytes_rate\": disk_read_by_inst.get(inst),\r\n            \"disk_io_write_bytes_rate\":
      disk_write_by_inst.get(inst),\r\n            \"network_rx_bytes_rate\": net_rx_by_inst.get(inst),\r\n
      \           \"network_tx_bytes_rate\": net_tx_by_inst.get(inst),\r\n            \"network_errors_rate\":
      net_err_by_inst.get(inst),\r\n            \"load_avg_1m\": load1_by_inst.get(inst),\r\n
      \           \"load_avg_5m\": load5_by_inst.get(inst),\r\n            \"load_avg_15m\":
      load15_by_inst.get(inst),\r\n            \"pods_running\": int(pods_run_by_node.get(nodename,
      0)) or None,\r\n            \"pods_pending\": int(pods_pend_by_node.get(nodename,
      0)) or None,\r\n            \"pod_restarts_5m\": int(restarts_by_node.get(nodename,
      0)) or None,\r\n            \"oomkill_count_5m\": int(oom_by_node.get(nodename,
      0)) or None,\r\n            \"container_cpu_throttled_percent\": throttled_by_node.get(nodename),\r\n
      \       }\r\n    \r\n    return nodes\r\n\r\ndef collect_cluster_metrics():\r\n
      \   \"\"\"Collect cluster-wide metrics (stored as node_name='_cluster_').\"\"\"\r\n
      \   \r\n    # API server request latency p99\r\n    api_lat = prom_query(\r\n
      \       'histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!=\"WATCH\"}[5m]))
      by (le)) * 1000'\r\n    )\r\n    \r\n    # API server request rate\r\n    api_rate
      = prom_query(\r\n        'sum(rate(apiserver_request_total[5m]))'\r\n    )\r\n\r\n
      \   # etcd leader changes in 1h\r\n    etcd_leaders = prom_query(\r\n        'sum(increase(etcd_server_leader_changes_seen_total[1h]))'\r\n
      \   )\r\n\r\n    # etcd DB size\r\n    etcd_db = prom_query(\r\n        'max(etcd_mvcc_db_total_size_in_bytes)'\r\n
      \   )\r\n\r\n    # CoreDNS errors rate\r\n    dns_err = prom_query(\r\n        'sum(rate(coredns_dns_responses_total{rcode=~\"SERVFAIL|NXDOMAIN\"}[5m]))'\r\n
      \   )\r\n\r\n    # Failed jobs\r\n    failed_jobs = prom_query(\r\n        'count(kube_job_status_failed{condition=\"true\"}
      == 1)'\r\n    )\r\n\r\n    return {\r\n        \"node_name\": \"_cluster_\",\r\n
      \       \"api_server_latency_p99_ms\": prom_value(api_lat),\r\n        \"api_server_request_rate\":
      prom_value(api_rate),\r\n        \"etcd_leader_changes_1h\": int(prom_value(etcd_leaders,
      default=0)),\r\n        \"etcd_db_size_bytes\": int(prom_value(etcd_db, default=0))
      or None,\r\n        \"coredns_errors_rate\": prom_value(dns_err),\r\n        \"failed_jobs_count\":
      int(prom_value(failed_jobs, default=0)),\r\n    }\r\n\r\n# --- Database insertion
      ---\r\n\r\ndef insert_metrics(node_rows, cluster_row):\r\n    \"\"\"Insert all
      metric rows into PostgreSQL.\"\"\"\r\n    conn = psycopg2.connect(\r\n        host=DB_HOST,
      port=DB_PORT, dbname=DB_NAME,\r\n        user=DB_USER, password=DB_PASSWORD,\r\n
      \       connect_timeout=10\r\n    )\r\n    conn.autocommit = True\r\n    cur
      = conn.cursor()\r\n\r\n    cols = [\r\n        \"node_name\", \"cpu_usage_percent\",
      \"memory_usage_percent\",\r\n        \"memory_available_bytes\", \"disk_usage_percent\",\r\n
      \       \"disk_io_read_bytes_rate\", \"disk_io_write_bytes_rate\",\r\n        \"network_rx_bytes_rate\",
      \"network_tx_bytes_rate\", \"network_errors_rate\",\r\n        \"load_avg_1m\",
      \"load_avg_5m\", \"load_avg_15m\",\r\n        \"pods_running\", \"pods_pending\",
      \"pod_restarts_5m\",\r\n        \"oomkill_count_5m\", \"container_cpu_throttled_percent\",\r\n
      \       \"api_server_latency_p99_ms\", \"api_server_request_rate\",\r\n        \"etcd_leader_changes_1h\",
      \"etcd_db_size_bytes\",\r\n        \"coredns_errors_rate\", \"pvc_usage_percent\",
      \"failed_jobs_count\"\r\n    ]\r\n\r\n    placeholders = \", \".join([\"%s\"]
      * len(cols))\r\n    col_names = \", \".join(cols)\r\n    sql = f\"INSERT INTO
      cluster_metrics ({col_names}) VALUES ({placeholders})\"\r\n\r\n    rows_inserted
      = 0\r\n\r\n    # Insert per-node rows\r\n    for nodename, metrics in node_rows.items():\r\n
      \       values = [metrics.get(c) for c in cols]\r\n        cur.execute(sql,
      values)\r\n        rows_inserted += 1\r\n\r\n    # Insert cluster-wide row\r\n
      \   values = [cluster_row.get(c) for c in cols]\r\n    cur.execute(sql, values)\r\n
      \   rows_inserted += 1\r\n\r\n    cur.close()\r\n    conn.close()\r\n    return
      rows_inserted\r\n\r\n# --- Main ---\r\n\r\ndef collect_once():\r\n    \"\"\"Run
      one collection cycle.\"\"\"\r\n    start = time.time()\r\n    print(f\"[{datetime.utcnow().isoformat()}]
      Collecting cluster metrics...\")\r\n    \r\n    node_metrics = collect_node_metrics()\r\n
      \   print(f\"  Collected metrics for {len(node_metrics)} nodes: {list(node_metrics.keys())}\")\r\n
      \   \r\n    cluster_metrics = collect_cluster_metrics()\r\n    print(f\"  Collected
      cluster-wide metrics\")\r\n\r\n    rows = insert_metrics(node_metrics, cluster_metrics)\r\n
      \   elapsed = time.time() - start\r\n    print(f\"  Inserted {rows} rows in
      {elapsed:.1f}s\")\r\n\r\ndef main():\r\n    print(f\"Cluster metrics collector
      starting (interval={INTERVAL}s)\")\r\n    print(f\"  Prometheus: {PROMETHEUS_URL}\")\r\n
      \   print(f\"  PostgreSQL: {DB_HOST}:{DB_PORT}/{DB_NAME}\")\r\n    sys.stdout.flush()\r\n\r\n
      \   while True:\r\n        try:\r\n            collect_once()\r\n        except
      Exception as e:\r\n            print(f\"ERROR: Collection failed: {e}\", file=sys.stderr)\r\n
      \       sys.stdout.flush()\r\n        time.sleep(INTERVAL)\r\n\r\nif __name__
      == \"__main__\":\r\n    main()\r\n"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"collect.py":"#!/usr/bin/env python3\r\n\"\"\"\r\nCluster metrics collector - queries Prometheus and stores in PostgreSQL.\r\nRuns as a long-lived Deployment, collecting every INTERVAL seconds.\r\nCollects per-node resource metrics + cluster-wide K8s health metrics.\r\n\"\"\"\r\n\r\nimport os\r\nimport sys\r\nimport time\r\nimport json\r\nimport urllib.request\r\nimport urllib.parse\r\nimport psycopg2\r\nfrom datetime import datetime\r\n\r\nPROMETHEUS_URL = os.environ.get(\"PROMETHEUS_URL\", \"http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090\")\r\nDB_HOST = os.environ.get(\"DB_HOST\", \"postgres.aiot.svc.cluster.local\")\r\nDB_PORT = os.environ.get(\"DB_PORT\", \"5432\")\r\nDB_NAME = os.environ.get(\"DB_NAME\", \"aiot\")\r\nDB_USER = os.environ.get(\"DB_USER\", \"aiot\")\r\nDB_PASSWORD = os.environ.get(\"DB_PASSWORD\", \"aiot123\")\r\nINTERVAL = int(os.environ.get(\"COLLECT_INTERVAL\", \"300\"))  # seconds between collections\r\n\r\n# --- Prometheus query helpers ---\r\n\r\ndef prom_query(query):\r\n    \"\"\"Execute instant query against Prometheus.\"\"\"\r\n    url = f\"{PROMETHEUS_URL}/api/v1/query?query={urllib.parse.quote(query)}\"\r\n    try:\r\n        req = urllib.request.Request(url, headers={\"Accept\": \"application/json\"})\r\n        with urllib.request.urlopen(req, timeout=30) as resp:\r\n            data = json.loads(resp.read().decode())\r\n            if data[\"status\"] == \"success\":\r\n                return data[\"data\"][\"result\"]\r\n    except Exception as e:\r\n        print(f\"WARN: Prometheus query failed: {query[:80]}... -\u003e {e}\", file=sys.stderr)\r\n    return []\r\n\r\ndef prom_value(results, label_filters=None, default=None):\r\n    \"\"\"Extract single scalar value from Prometheus result.\"\"\"\r\n    for r in results:\r\n        if label_filters:\r\n            if all(r[\"metric\"].get(k) == v for k, v in label_filters.items()):\r\n                return float(r[\"value\"][1])\r\n        else:\r\n            return float(r[\"value\"][1])\r\n    return default\r\n\r\ndef prom_by_node(results, node_key=\"instance\"):\r\n    \"\"\"Group results by node, returning {node: value}.\"\"\"\r\n    out = {}\r\n    for r in results:\r\n        node = r[\"metric\"].get(node_key, \"unknown\")\r\n        out[node] = float(r[\"value\"][1])\r\n    return out\r\n\r\n# --- Metric collection ---\r\n\r\ndef collect_node_metrics():\r\n    \"\"\"Collect per-node metrics from node-exporter \u0026 kube-state-metrics.\"\"\"\r\n    \r\n    # Node name mapping: instance -\u003e nodename\r\n    uname = prom_query('node_uname_info')\r\n    instance_to_node = {}\r\n    for r in uname:\r\n        inst = r[\"metric\"].get(\"instance\", \"\")\r\n        name = r[\"metric\"].get(\"nodename\", inst)\r\n        instance_to_node[inst] = name\r\n\r\n    # CPU usage per node (100 - idle%)\r\n    cpu = prom_query(\r\n        '100 - (avg by (instance)(irate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)'\r\n    )\r\n    cpu_by_inst = prom_by_node(cpu)\r\n\r\n    # Memory usage percent\r\n    mem = prom_query(\r\n        '100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'\r\n    )\r\n    mem_by_inst = prom_by_node(mem)\r\n\r\n    # Memory available bytes\r\n    mem_avail = prom_query('node_memory_MemAvailable_bytes')\r\n    mem_avail_by_inst = prom_by_node(mem_avail)\r\n\r\n    # Disk usage percent (root filesystem)\r\n    disk = prom_query(\r\n        '100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / '\r\n        'node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} * 100)'\r\n    )\r\n    disk_by_inst = prom_by_node(disk)\r\n\r\n    # Disk IO rates\r\n    disk_read = prom_query('sum by (instance)(irate(node_disk_read_bytes_total[5m]))')\r\n    disk_read_by_inst = prom_by_node(disk_read)\r\n\r\n    disk_write = prom_query('sum by (instance)(irate(node_disk_written_bytes_total[5m]))')\r\n    disk_write_by_inst = prom_by_node(disk_write)\r\n\r\n    # Network rates\r\n    net_rx = prom_query(\r\n        'sum by (instance)(irate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))'\r\n    )\r\n    net_rx_by_inst = prom_by_node(net_rx)\r\n\r\n    net_tx = prom_query(\r\n        'sum by (instance)(irate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))'\r\n    )\r\n    net_tx_by_inst = prom_by_node(net_tx)\r\n\r\n    # Network errors\r\n    net_err = prom_query(\r\n        'sum by (instance)(irate(node_network_receive_errs_total[5m]) + '\r\n        'irate(node_network_transmit_errs_total[5m]))'\r\n    )\r\n    net_err_by_inst = prom_by_node(net_err)\r\n\r\n    # Load averages\r\n    load1 = prom_query('node_load1')\r\n    load1_by_inst = prom_by_node(load1)\r\n    \r\n    load5 = prom_query('node_load5')\r\n    load5_by_inst = prom_by_node(load5)\r\n    \r\n    load15 = prom_query('node_load15')\r\n    load15_by_inst = prom_by_node(load15)\r\n\r\n    # Pods running per node\r\n    pods_running = prom_query(\r\n        'count by (node)(kube_pod_info{pod!=\"\"})'\r\n    )\r\n    pods_run_by_node = prom_by_node(pods_running, node_key=\"node\")\r\n\r\n    # Pods pending per node\r\n    pods_pending = prom_query(\r\n        'count by (node)(kube_pod_status_phase{phase=\"Pending\"} == 1)'\r\n    )\r\n    pods_pend_by_node = prom_by_node(pods_pending, node_key=\"node\")\r\n\r\n    # Pod restarts in last 5m per node\r\n    restarts = prom_query(\r\n        'sum by (node)(increase(kube_pod_container_status_restarts_total[5m]))'\r\n    )\r\n    restarts_by_node = prom_by_node(restarts, node_key=\"node\")\r\n\r\n    # OOMKilled containers in last 5m per node\r\n    oom = prom_query(\r\n        'sum by (node)(increase(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}[5m]))'\r\n    )\r\n    oom_by_node = prom_by_node(oom, node_key=\"node\")\r\n\r\n    # CPU throttled percent per node\r\n    throttled = prom_query(\r\n        'avg by (node)('\r\n        'rate(container_cpu_cfs_throttled_periods_total{container!=\"\"}[5m]) / '\r\n        'rate(container_cpu_cfs_periods_total{container!=\"\"}[5m]) * 100)'\r\n    )\r\n    throttled_by_node = prom_by_node(throttled, node_key=\"node\")\r\n\r\n    # Build per-node rows\r\n    nodes = {}\r\n    for inst, nodename in instance_to_node.items():\r\n        nodes[nodename] = {\r\n            \"node_name\": nodename,\r\n            \"cpu_usage_percent\": cpu_by_inst.get(inst),\r\n            \"memory_usage_percent\": mem_by_inst.get(inst),\r\n            \"memory_available_bytes\": int(mem_avail_by_inst.get(inst, 0)) or None,\r\n            \"disk_usage_percent\": disk_by_inst.get(inst),\r\n            \"disk_io_read_bytes_rate\": disk_read_by_inst.get(inst),\r\n            \"disk_io_write_bytes_rate\": disk_write_by_inst.get(inst),\r\n            \"network_rx_bytes_rate\": net_rx_by_inst.get(inst),\r\n            \"network_tx_bytes_rate\": net_tx_by_inst.get(inst),\r\n            \"network_errors_rate\": net_err_by_inst.get(inst),\r\n            \"load_avg_1m\": load1_by_inst.get(inst),\r\n            \"load_avg_5m\": load5_by_inst.get(inst),\r\n            \"load_avg_15m\": load15_by_inst.get(inst),\r\n            \"pods_running\": int(pods_run_by_node.get(nodename, 0)) or None,\r\n            \"pods_pending\": int(pods_pend_by_node.get(nodename, 0)) or None,\r\n            \"pod_restarts_5m\": int(restarts_by_node.get(nodename, 0)) or None,\r\n            \"oomkill_count_5m\": int(oom_by_node.get(nodename, 0)) or None,\r\n            \"container_cpu_throttled_percent\": throttled_by_node.get(nodename),\r\n        }\r\n    \r\n    return nodes\r\n\r\ndef collect_cluster_metrics():\r\n    \"\"\"Collect cluster-wide metrics (stored as node_name='_cluster_').\"\"\"\r\n    \r\n    # API server request latency p99\r\n    api_lat = prom_query(\r\n        'histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!=\"WATCH\"}[5m])) by (le)) * 1000'\r\n    )\r\n    \r\n    # API server request rate\r\n    api_rate = prom_query(\r\n        'sum(rate(apiserver_request_total[5m]))'\r\n    )\r\n\r\n    # etcd leader changes in 1h\r\n    etcd_leaders = prom_query(\r\n        'sum(increase(etcd_server_leader_changes_seen_total[1h]))'\r\n    )\r\n\r\n    # etcd DB size\r\n    etcd_db = prom_query(\r\n        'max(etcd_mvcc_db_total_size_in_bytes)'\r\n    )\r\n\r\n    # CoreDNS errors rate\r\n    dns_err = prom_query(\r\n        'sum(rate(coredns_dns_responses_total{rcode=~\"SERVFAIL|NXDOMAIN\"}[5m]))'\r\n    )\r\n\r\n    # Failed jobs\r\n    failed_jobs = prom_query(\r\n        'count(kube_job_status_failed{condition=\"true\"} == 1)'\r\n    )\r\n\r\n    return {\r\n        \"node_name\": \"_cluster_\",\r\n        \"api_server_latency_p99_ms\": prom_value(api_lat),\r\n        \"api_server_request_rate\": prom_value(api_rate),\r\n        \"etcd_leader_changes_1h\": int(prom_value(etcd_leaders, default=0)),\r\n        \"etcd_db_size_bytes\": int(prom_value(etcd_db, default=0)) or None,\r\n        \"coredns_errors_rate\": prom_value(dns_err),\r\n        \"failed_jobs_count\": int(prom_value(failed_jobs, default=0)),\r\n    }\r\n\r\n# --- Database insertion ---\r\n\r\ndef insert_metrics(node_rows, cluster_row):\r\n    \"\"\"Insert all metric rows into PostgreSQL.\"\"\"\r\n    conn = psycopg2.connect(\r\n        host=DB_HOST, port=DB_PORT, dbname=DB_NAME,\r\n        user=DB_USER, password=DB_PASSWORD,\r\n        connect_timeout=10\r\n    )\r\n    conn.autocommit = True\r\n    cur = conn.cursor()\r\n\r\n    cols = [\r\n        \"node_name\", \"cpu_usage_percent\", \"memory_usage_percent\",\r\n        \"memory_available_bytes\", \"disk_usage_percent\",\r\n        \"disk_io_read_bytes_rate\", \"disk_io_write_bytes_rate\",\r\n        \"network_rx_bytes_rate\", \"network_tx_bytes_rate\", \"network_errors_rate\",\r\n        \"load_avg_1m\", \"load_avg_5m\", \"load_avg_15m\",\r\n        \"pods_running\", \"pods_pending\", \"pod_restarts_5m\",\r\n        \"oomkill_count_5m\", \"container_cpu_throttled_percent\",\r\n        \"api_server_latency_p99_ms\", \"api_server_request_rate\",\r\n        \"etcd_leader_changes_1h\", \"etcd_db_size_bytes\",\r\n        \"coredns_errors_rate\", \"pvc_usage_percent\", \"failed_jobs_count\"\r\n    ]\r\n\r\n    placeholders = \", \".join([\"%s\"] * len(cols))\r\n    col_names = \", \".join(cols)\r\n    sql = f\"INSERT INTO cluster_metrics ({col_names}) VALUES ({placeholders})\"\r\n\r\n    rows_inserted = 0\r\n\r\n    # Insert per-node rows\r\n    for nodename, metrics in node_rows.items():\r\n        values = [metrics.get(c) for c in cols]\r\n        cur.execute(sql, values)\r\n        rows_inserted += 1\r\n\r\n    # Insert cluster-wide row\r\n    values = [cluster_row.get(c) for c in cols]\r\n    cur.execute(sql, values)\r\n    rows_inserted += 1\r\n\r\n    cur.close()\r\n    conn.close()\r\n    return rows_inserted\r\n\r\n# --- Main ---\r\n\r\ndef collect_once():\r\n    \"\"\"Run one collection cycle.\"\"\"\r\n    start = time.time()\r\n    print(f\"[{datetime.utcnow().isoformat()}] Collecting cluster metrics...\")\r\n    \r\n    node_metrics = collect_node_metrics()\r\n    print(f\"  Collected metrics for {len(node_metrics)} nodes: {list(node_metrics.keys())}\")\r\n    \r\n    cluster_metrics = collect_cluster_metrics()\r\n    print(f\"  Collected cluster-wide metrics\")\r\n\r\n    rows = insert_metrics(node_metrics, cluster_metrics)\r\n    elapsed = time.time() - start\r\n    print(f\"  Inserted {rows} rows in {elapsed:.1f}s\")\r\n\r\ndef main():\r\n    print(f\"Cluster metrics collector starting (interval={INTERVAL}s)\")\r\n    print(f\"  Prometheus: {PROMETHEUS_URL}\")\r\n    print(f\"  PostgreSQL: {DB_HOST}:{DB_PORT}/{DB_NAME}\")\r\n    sys.stdout.flush()\r\n\r\n    while True:\r\n        try:\r\n            collect_once()\r\n        except Exception as e:\r\n            print(f\"ERROR: Collection failed: {e}\", file=sys.stderr)\r\n        sys.stdout.flush()\r\n        time.sleep(INTERVAL)\r\n\r\nif __name__ == \"__main__\":\r\n    main()\r\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"cluster-metrics-collector","namespace":"monitoring"}}
    name: cluster-metrics-collector
    namespace: monitoring
