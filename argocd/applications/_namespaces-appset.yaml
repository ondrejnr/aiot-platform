apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespaces
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - { name: ai-enricher }
          - { name: ai-enricher-build }
          - { name: aiot }
          - { name: backrest }
          - { name: build-service }
          - { name: cattle-capi-system }
          - { name: cattle-fleet-clusters-system }
          - { name: cattle-fleet-local-system }
          - { name: cattle-global-data }
          - { name: cattle-impersonation-system }
          - { name: cattle-local-user-passwords }
          - { name: cattle-ui-plugin-system }
          - { name: chef }
          - { name: chef-webhook }
          - { name: cluster-twin }
          - { name: default }
          - { name: default-tenant }
          - { name: dr-ops }
          - { name: emqx }
          - { name: enterprise-contract-service }
          - { name: etcd-backup }
          - { name: fleet-default }
          - { name: fleet-local }
          - { name: gitea-bootstrap }
          - { name: habitat-demo }
          - { name: helloweb }
          - { name: inspec-scans }
          - { name: integration-service }
          - { name: istio-system }
          - { name: knative-serving }
          - { name: konflux-cli }
          - { name: konflux-info }
          - { name: konflux-operator }
          - { name: konflux-ui }
          - { name: kubeflow }
          - { name: kube-node-lease }
          - { name: kube-public }
          - { name: namespace-lister }
          - { name: openshift-pipelines }
          - { name: pipelines-as-code }
          - { name: platform-meta }
          - { name: registry }
          - { name: release-service }
          - { name: semaphore }
          - { name: tekton-pipelines }
          - { name: tf-demo }
          - { name: vui }
  template:
    metadata:
      name: 'ns-{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ondrejnr/aiot-platform.git
        targetRevision: main
        path: namespaces/{{name}}
        directory:
          recurse: false
          include: '{configmaps.yaml,services.yaml,ingresses.yaml,deployments.yaml,statefulsets.yaml,daemonsets.yaml,cronjobs.yaml,jobs.yaml,pdb.yaml,hpa.yaml,networkpolicies.yaml,certificates.yaml,issuers.yaml,podmonitors.yaml,servicemonitors.yaml,pvcs.yaml,rbac.yaml,roles.yaml,rolebindings.yaml,serviceaccounts.yaml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{name}}'
      syncPolicy:
        automated: { prune: false, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
