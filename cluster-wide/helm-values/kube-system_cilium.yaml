bpf:
  hostLegacyRouting: false
cni:
  customConf: false
  exclusive: true
  uninstall: false
encryption:
  enabled: false
hubble:
  enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
    - dns
    - drop
    - tcp
    - flow
    - port-distribution
    - icmp
    - http
  relay:
    enabled: true
  ui:
    enabled: true
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4MaskSize: 24
    clusterPoolIPv4PodCIDRList:
    - 10.245.0.0/16
k8sServiceHost: 10.132.0.2
k8sServicePort: 6443
kubeProxyReplacement: true
operator:
  replicas: 2
  unmanagedPodWatcher:
    restart: false
policyEnforcementMode: default
routingMode: tunnel
tunnelPort: 8473
tunnelProtocol: vxlan
