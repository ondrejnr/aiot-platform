apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc-piraeus
  namespace: default
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: piraeus-storage
  resources:
    requests:
      storage: 10Gi
---
