apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-kafka-bridge
  namespace: aiot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-kafka-bridge
  template:
    metadata:
      labels:
        app: mqtt-kafka-bridge
    spec:
      containers:
      - name: bridge
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - "pip install --quiet 'paho-mqtt>=2.0.0' 'kafka-python-ng>=2.0.0' && python -u /app/bridge.py"
        env:
        - name: MQTT_HOST
          value: emqx.aiot.svc.cluster.local
        - name: MQTT_PORT
          value: "1883"
        - name: KAFKA_BOOTSTRAP
          value: "redpanda-0.redpanda-headless.redpanda.svc.cluster.local:9092,redpanda-1.redpanda-headless.redpanda.svc.cluster.local:9092,redpanda-2.redpanda-headless.redpanda.svc.cluster.local:9092"
        - name: KAFKA_TOPIC
          value: telemetry
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - mountPath: /app
          name: code
      volumes:
      - name: code
        configMap:
          name: mqtt-kafka-bridge
