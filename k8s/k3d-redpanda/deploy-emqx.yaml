apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: aiot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
      - name: emqx
        image: emqx/emqx:5.3.0
        ports:
        - containerPort: 1883
        - containerPort: 8083
        - containerPort: 18083
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
