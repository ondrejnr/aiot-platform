apiVersion: v1
data:
  bridge.py: |
    import json, time, logging
    from kafka import KafkaProducer
    import paho.mqtt.client as mqtt

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger("mqtt-kafka-bridge")

    MQTT_HOST = "emqx.aiot.svc.cluster.local"
    MQTT_PORT = 1883
    KAFKA_BROKER = "redpanda-0.redpanda-headless.redpanda.svc.cluster.local:9092,redpanda-1.redpanda-headless.redpanda.svc.cluster.local:9092,redpanda-2.redpanda-headless.redpanda.svc.cluster.local:9092"

    producer = KafkaProducer(
        bootstrap_servers=KAFKA_BROKER.split(","),
        value_serializer=lambda x: json.dumps(x).encode("utf-8")
    )

    def on_connect(client, userdata, flags, rc):
        log.info(f"Connected to MQTT broker rc={rc}")
        client.subscribe("sensors/#")
        client.subscribe("telemetry/#")
        client.subscribe("factory/#")

    def on_message(client, userdata, msg):
        try:
            payload = json.loads(msg.payload.decode("utf-8"))
        except:
            payload = {"raw": msg.payload.decode("utf-8")}

        data = {
            "topic": msg.topic,
            "payload": payload,
            "timestamp": time.time()
        }
        producer.send("telemetry", data)
        log.info(f"MQTT->Kafka: {msg.topic} -> {str(data)[:80]}")

    client = mqtt.Client()
    client.on_connect = on_connect
    client.on_message = on_message
    client.connect(MQTT_HOST, MQTT_PORT, 60)
    log.info("MQTT-Kafka bridge started")
    client.loop_forever()
kind: ConfigMap
metadata:
  annotations:
  name: mqtt-kafka-bridge
  namespace: aiot
