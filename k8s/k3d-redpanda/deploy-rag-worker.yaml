apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: aiot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
    spec:
      containers:
      - name: rag-worker
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - "pip install flask qdrant-client requests --quiet && python -u /code/worker.py"
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 7000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /code
          name: code
      volumes:
      - name: code
        configMap:
          name: rag-worker-code
