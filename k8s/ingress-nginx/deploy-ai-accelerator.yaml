apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-accelerator
  namespace: ingress-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-accelerator
  template:
    metadata:
      labels:
        app: ai-accelerator
    spec:
      containers:
      - name: ai-accelerator
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - pip install flask requests --quiet && python /app/app.py
        env:
        - name: TWIN_URL
          value: http://digital-twin.aiot.svc.cluster.local:8001
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /app
          name: code
      volumes:
      - name: code
        configMap:
          name: ai-accelerator-code
