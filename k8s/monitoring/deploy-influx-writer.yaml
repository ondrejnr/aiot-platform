apiVersion: apps/v1
kind: Deployment
metadata:
  name: influx-writer
  namespace: monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: influx-writer
  template:
    metadata:
      labels:
        app: influx-writer
    spec:
      containers:
      - name: influx-writer
        image: python:3.11-slim
        command: ["sh", "-c", "pip install --quiet kafka-python-ng influxdb-client lz4 && python -u /app/influx_writer.py"]
        env:
        - name: INFLUX_TOKEN
          value: "C1zsCuBkq9Q2aS6RHPyovme6hu6VxRGT36zpYEpw36V7IuXoPecVTMIhkFvvyJrDq_LKAEnKQshgaIION5Mrfw=="
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /app
          name: code
      volumes:
      - name: code
        configMap:
          name: influx-writer-code
