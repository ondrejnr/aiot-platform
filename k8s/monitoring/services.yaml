apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
  selector:
    app: influxdb
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-proxy
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: influxdb-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  type: NodePort
  ports:
  - port: 8428
    targetPort: 8428
    nodePort: 30428
  selector:
    app: victoriametrics
---
apiVersion: v1
kind: Service
metadata:
  name: vm-proxy
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: vm-proxy
