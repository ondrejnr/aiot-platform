apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: influxdb
  ports:
  - port: 8086
    targetPort: 8086
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-proxy
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: influxdb-proxy
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: victoriametrics
  ports:
  - port: 8428
    targetPort: 8428
    nodePort: 30428
---
apiVersion: v1
kind: Service
metadata:
  name: vm-proxy
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: vm-proxy
  ports:
  - port: 8080
    targetPort: 8080
