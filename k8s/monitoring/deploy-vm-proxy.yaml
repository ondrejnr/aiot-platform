apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-proxy
  namespace: monitoring
  labels:
    app: vm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm-proxy
  template:
    metadata:
      labels:
        app: vm-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 30m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: config
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: vm-json-proxy
