apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb-proxy
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb-proxy
  template:
    metadata:
      labels:
        app: influxdb-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - mountPath: /etc/nginx/conf.d/default.conf
          name: config
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: influxdb-proxy-config
