apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
      - name: influxdb
        image: influxdb:2.7
        env:
        - name: DOCKER_INFLUXDB_INIT_MODE
          value: upgrade
        - name: DOCKER_INFLUXDB_INIT_USERNAME
          value: admin
        - name: DOCKER_INFLUXDB_INIT_PASSWORD
          value: AioT2026Admin
        - name: DOCKER_INFLUXDB_INIT_ORG
          value: aiot
        - name: DOCKER_INFLUXDB_INIT_BUCKET
          value: aiot-metrics
        - name: DOCKER_INFLUXDB_INIT_RETENTION
          value: 30d
        - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          value: "C1zsCuBkq9Q2aS6RHPyovme6hu6VxRGT36zpYEpw36V7IuXoPecVTMIhkFvvyJrDq_LKAEnKQshgaIION5Mrfw=="
        ports:
        - containerPort: 8086
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        volumeMounts:
        - mountPath: /var/lib/influxdb2
          name: influx-data
      volumes:
      - name: influx-data
        emptyDir: {}
