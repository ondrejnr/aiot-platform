apiVersion: v1
data:
  influx_writer.py: |
    import json
    import os
    import time
    import sys
    from influxdb_client import InfluxDBClient, Point, WritePrecision
    from influxdb_client.client.write_api import SYNCHRONOUS
    from kafka import KafkaConsumer

    KAFKA = "redpanda.aiot.svc.cluster.local:9092"
    INFLUX_URL = "http://influxdb.monitoring.svc.cluster.local:8086"
    INFLUX_TOKEN = os.environ.get("INFLUX_TOKEN", "")
    INFLUX_ORG = "aiot"
    TOPIC = "telemetry"
    BATCH_SIZE = 500
    FLUSH_INTERVAL = 2.0

    print(f"[INFLUX-WRITER] Starting (batch={BATCH_SIZE})...", flush=True)
    print(f"[INFLUX-WRITER] Kafka: {KAFKA}", flush=True)
    print(f"[INFLUX-WRITER] InfluxDB: {INFLUX_URL}", flush=True)

    client = InfluxDBClient(url=INFLUX_URL, token=INFLUX_TOKEN, org=INFLUX_ORG)
    write_api = client.write_api(write_options=SYNCHRONOUS)
    print("[INFLUX-WRITER] InfluxDB connected", flush=True)

    consumer = KafkaConsumer(
        TOPIC,
        bootstrap_servers=KAFKA,
        value_deserializer=lambda m: json.loads(m.decode("utf-8")),
        auto_offset_reset="latest",
        group_id="influx-writer-group-v2",
        consumer_timeout_ms=-1,
        max_poll_records=500,
        fetch_max_bytes=10485760
    )
    print("[INFLUX-WRITER] Kafka consumer connected, waiting...", flush=True)

    count = 0
    batch_metrics = []
    batch_machine = []
    batch_raw = []
    batch_alerts = []
    last_flush = time.time()

    def flush_batches():
        global batch_metrics, batch_machine, batch_raw, batch_alerts
        try:
            if batch_metrics:
                write_api.write(bucket="aiot-metrics", record=batch_metrics)
            if batch_machine:
                write_api.write(bucket="machine-telemetry", record=batch_machine)
            if batch_raw:
                write_api.write(bucket="mqtt-raw", record=batch_raw)
            if batch_alerts:
                write_api.write(bucket="alerts", record=batch_alerts)
        except Exception as e:
            print(f"[INFLUX-WRITER] FLUSH ERROR: {e}", flush=True)
        batch_metrics = []
        batch_machine = []
        batch_raw = []
        batch_alerts = []

    for msg in consumer:
        try:
            data = msg.value
            topic = data.get("topic", "unknown")
            payload = data.get("payload", {})
            now = time.time_ns()
            count += 1

            machine_id = payload.get("machine_id", payload.get("sensor_id", "unknown"))
            machine_type = payload.get("machine_type", "sensor")
            status = payload.get("status", "unknown")
            location = payload.get("location", "unknown")

            p = Point("iot_sensors") \
                .tag("machine_id", machine_id) \
                .tag("machine_type", machine_type) \
                .tag("status", status) \
                .tag("location", location) \
                .tag("topic", topic) \
                .time(now, WritePrecision.NS)

            numeric_fields = ["temperature", "vibration", "pressure", "humidity",
                              "rpm", "anomaly_score", "value", "voltage",
                              "power_consumption", "uptime_hours"]

            has_field = False
            for field in numeric_fields:
                if field in payload:
                    val = payload[field]
                    if isinstance(val, (int, float)):
                        p = p.field(field, float(val))
                        has_field = True

            if has_field:
                batch_metrics.append(p)

                p2 = Point("machine_data") \
                    .tag("machine_id", machine_id) \
                    .tag("machine_type", machine_type) \
                    .tag("status", status) \
                    .time(now, WritePrecision.NS)
                for field in numeric_fields:
                    if field in payload:
                        val = payload[field]
                        if isinstance(val, (int, float)):
                            p2 = p2.field(field, float(val))
                batch_machine.append(p2)

            p3 = Point("mqtt_message") \
                .tag("topic", topic) \
                .tag("machine_id", machine_id) \
                .field("raw", json.dumps(payload)) \
                .time(now, WritePrecision.NS)
            batch_raw.append(p3)

            anomaly = payload.get("anomaly_score", 0)
            if anomaly > 0.5 or status not in ("normal", "unknown"):
                p4 = Point("alert") \
                    .tag("machine_id", machine_id) \
                    .tag("machine_type", machine_type) \
                    .tag("severity", "critical" if anomaly > 0.8 else "warning") \
                    .field("anomaly_score", float(anomaly)) \
                    .field("status", status) \
                    .time(now, WritePrecision.NS)
                batch_alerts.append(p4)

            if len(batch_metrics) >= BATCH_SIZE or (time.time() - last_flush) > FLUSH_INTERVAL:
                flush_batches()
                last_flush = time.time()
                if count % 500 == 0:
                    print(f"[INFLUX-WRITER] Processed {count} messages", flush=True)

        except Exception as e:
            import traceback
            print(f"[INFLUX-WRITER] ERROR: {e}", flush=True)
            traceback.print_exc()
            sys.stdout.flush()
kind: ConfigMap
metadata:
  name: influx-writer-code
