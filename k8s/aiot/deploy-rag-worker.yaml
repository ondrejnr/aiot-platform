apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
  name: rag-worker
  namespace: aiot
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rag-worker
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-10T14:28:07Z"
      labels:
        app: rag-worker
    spec:
      containers:
      - args:
        - pip install qdrant-client requests redis flask --quiet && python /worker/worker.py
        command:
        - /bin/sh
        - -c
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        name: rag-worker
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /worker
          name: worker
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: instance-worker-03
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: rag-worker-code
        name: worker
