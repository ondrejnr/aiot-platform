apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"apps/v1","kind":"Deployment","metadata":{"annotations":{},"name":"ngrok-proxy","namespace":"aiot"},"spec":{"replicas":1,"selector":{"matchLabels":{"app":"ngrok-proxy"}},"template":{"metadata":{"labels":{"app":"ngrok-proxy"}},"spec":{"containers":[{"args":["pip install fastapi uvicorn requests --quiet \u0026\u0026 uvicorn proxy:app --host 0.0.0.0 --port 8090"],"command":["/bin/sh","-c"],"env":[{"name":"NGROK_TARGET","value":"http://rag-api-svc.aiot.svc.cluster.local:7000"}],"image":"python:3.11-slim","name":"ngrok-proxy","ports":[{"containerPort":8090}],"resources":{"limits":{"cpu":"200m","memory":"128Mi"},"requests":{"cpu":"50m","memory":"64Mi"}},"volumeMounts":[{"mountPath":"/code","name":"code"}],"workingDir":"/code"}],"volumes":[{"configMap":{"name":"ngrok-proxy-code"},"name":"code"}]}}}}
  name: ngrok-proxy
  namespace: aiot
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ngrok-proxy
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
