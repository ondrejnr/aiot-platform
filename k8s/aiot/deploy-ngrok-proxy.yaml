      labels:
        app: ngrok-proxy
    spec:
      containers:
      - args:
        - pip install fastapi uvicorn requests --quiet && uvicorn proxy:app --host
          0.0.0.0 --port 8090
        command:
        - /bin/sh
        - -c
        env:
        - name: NGROK_TARGET
