apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
  name: qdrant
  namespace: aiot
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: qdrant
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - image: qdrant/qdrant:v1.7.4
        imagePullPolicy: IfNotPresent
        name: qdrant
        ports:
        - containerPort: 6333
          protocol: TCP
        - containerPort: 6334
          protocol: TCP
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /qdrant/storage
          name: qdrant-storage
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: instance-worker-03
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: qdrant-storage
        persistentVolumeClaim:
          claimName: qdrant-pvc-longhorn
