            command:
            - sh
            - -c
            env:
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  key: password
                  name: pg-credentials
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: pg-credentials
            image: postgres:16
            imagePullPolicy: IfNotPresent
            name: cleanup
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
