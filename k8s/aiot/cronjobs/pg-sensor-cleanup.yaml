spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 2
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      backoffLimit: 3
      template:
        metadata:
          creationTimestamp: null
        spec:
          containers:
          - args:
            - |
              echo "=== Cleanup start ==="
              PGPASSWORD="$PG_PASS" psql -h postgres.aiot.svc.cluster.local -U "$PG_USER" -d aiot -c "DELETE FROM sensor_data WHERE ts < NOW() - INTERVAL '2 hours';"
              PGPASSWORD="$PG_PASS" psql -h postgres.aiot.svc.cluster.local -U "$PG_USER" -d aiot -c "VACUUM sensor_data;"
              PGPASSWORD="$PG_PASS" psql -h postgres.aiot.svc.cluster.local -U "$PG_USER" -d aiot -c "SELECT count(*) AS remaining_rows, pg_size_pretty(pg_total_relation_size('sensor_data')) AS size FROM sensor_data;"
