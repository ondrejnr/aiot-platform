data:
  indexer.py: |
    import json, time, logging, hashlib, math
    from kafka import KafkaConsumer
    from qdrant_client import QdrantClient
    from qdrant_client.models import Distance, VectorParams, PointStruct

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger("qdrant-indexer")

    KAFKA_BROKER = "redpanda.aiot.svc.cluster.local:9092"
    QDRANT_URL = "http://qdrant.aiot.svc.cluster.local:6333"
    VECTOR_SIZE = 64
    BATCH_SIZE = 100
    COLLECTION = "sensor_history"

    def safe_deserialize(x):
        try:
            return json.loads(x.decode("utf-8"))
        except Exception:
            return None

    def simple_embed(text):
        vec = []
        for i in range(VECTOR_SIZE):
            h = hashlib.md5(f"{text}{i}".encode()).hexdigest()
            vec.append((int(h[:8], 16) / 0xFFFFFFFF) * 2 - 1)
        norm = math.sqrt(sum(x*x for x in vec))
        return [x/norm for x in vec] if norm > 0 else vec

    qdrant = QdrantClient(url=QDRANT_URL, timeout=30)

    # Robustné vytvorenie collection s retry
    for attempt in range(10):
        try:
            collections = [c.name for c in qdrant.get_collections().collections]
            if COLLECTION not in collections:
                qdrant.create_collection(
                    collection_name=COLLECTION,
                    vectors_config=VectorParams(size=VECTOR_SIZE, distance=Distance.COSINE)
                )
                log.info(f"Collection {COLLECTION} created")
            else:
                log.info(f"Collection {COLLECTION} exists")
            break
        except Exception as e:
            log.warning(f"Collection setup attempt {attempt+1}/10: {e}")
            time.sleep(5)
    else:
        log.error("Failed to setup collection after 10 attempts")
        import sys; sys.exit(1)

    consumer = KafkaConsumer(
        "telemetry",
        bootstrap_servers=KAFKA_BROKER,
        value_deserializer=safe_deserialize,
        group_id="qdrant-indexer-group4",
        auto_offset_reset="latest",
        max_poll_records=BATCH_SIZE
    )

    log.info(f"Qdrant indexer started — batch={BATCH_SIZE}, offset=latest")
    point_id = int(time.time() * 1000)
    count = 0
    batch_points = []

    for msg in consumer:
        data = msg.value
        if data is None:
            continue
        try:
            payload = data.get("payload", {})
            topic = data.get("topic", "unknown")
            sid = payload.get("sensor_id") or payload.get("machine_id", "unknown")
            loc = payload.get("location") or payload.get("machine_type", "unknown")
            val = payload.get("value") or payload.get("temperature", 0)
            unit = payload.get("unit") or payload.get("status", "")

            text = f"Sensor {sid} at {loc} reported {val} {unit} on topic {topic}"
            embedding = simple_embed(text)

            batch_points.append(PointStruct(
                id=point_id, vector=embedding,
                payload={"text": text, "data": payload, "topic": topic, "timestamp": time.time()}
            ))
            point_id += 1

            if len(batch_points) >= BATCH_SIZE:
                qdrant.upsert(collection_name=COLLECTION, points=batch_points)
                count += len(batch_points)
                if count % 1000 == 0:
                    log.info(f"Indexed {count} points (batch={BATCH_SIZE})")
                batch_points = []

        except Exception as e:
            log.error(f"Error: {e}")
            batch_points = []
