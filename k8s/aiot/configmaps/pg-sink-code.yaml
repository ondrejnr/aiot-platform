    import os, json, time, logging
    from datetime import datetime, timezone
    from kafka import KafkaConsumer
    import redis

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("pg-sink")

    KAFKA       = os.getenv("KAFKA_BOOTSTRAP", "redpanda.aiot.svc.cluster.local:9092")
    TOPIC       = os.getenv("KAFKA_TOPIC", "telemetry")
    REDIS_HOST  = os.getenv("REDIS_HOST", "redis-master.aiot.svc.cluster.local")
    REDIS_PORT  = int(os.getenv("REDIS_PORT", "6379"))
    REDIS_DB    = int(os.getenv("REDIS_DB", "7"))
    QUEUE_KEY   = os.getenv("QUEUE_KEY", "sensor:write_buffer")
    BATCH       = int(os.getenv("BATCH_SIZE", "200"))
    FLUSH_S     = int(os.getenv("FLUSH_INTERVAL", "2"))
    MAX_QUEUE   = int(os.getenv("MAX_QUEUE_LEN", "500000"))

    def parse_msg(raw):
        try:
            d = json.loads(raw)
        except Exception:
            return None
        payload = d.get("payload", d)
        topic = d.get("topic", payload.get("topic", ""))
        ts_val = d.get("timestamp", payload.get("timestamp", time.time()))
        machine_id = payload.get("machine_id", "unknown")
        machine_type = payload.get("machine_type", machine_id.rsplit("-", 1)[0] if "-" in machine_id else "unknown")
        status = payload.get("status", "UNKNOWN").upper()
        violations = payload.get("violations", [])
        try:
            ts = datetime.fromtimestamp(float(ts_val), tz=timezone.utc).isoformat()
        except Exception:
            ts = datetime.now(timezone.utc).isoformat()
        return json.dumps({
            "ts": ts,
            "machine_id": machine_id,
            "machine_type": machine_type,
            "location": payload.get("location"),
            "status": status,
            "temperature": payload.get("temperature"),
            "vibration": payload.get("vibration"),
            "pressure": payload.get("pressure"),
            "rpm": payload.get("rpm"),
            "humidity": payload.get("humidity"),
            "anomaly_score": payload.get("anomaly_score"),
            "power_consumption": payload.get("power_consumption"),
            "uptime_hours": payload.get("uptime_hours"),
            "violations_count": len(violations),
            "violations_json": json.dumps(violations) if violations else None,
            "topic": topic,
        })

    def main():
        log.info("pg-sink v5: Kafka -> Redis buffer")
        log.info("Kafka: %s topic=%s", KAFKA, TOPIC)
        log.info("Redis: %s:%d db=%d key=%s", REDIS_HOST, REDIS_PORT, REDIS_DB, QUEUE_KEY)

        r = redis.Redis(host=REDIS_HOST, port=REDIS_PORT, db=REDIS_DB)
        r.ping()
        log.info("Redis connected!")

        consumer = KafkaConsumer(
            TOPIC,
            bootstrap_servers=KAFKA,
            group_id="pg-sink-v5-redis",
            auto_offset_reset="latest",
            value_deserializer=lambda m: m.decode("utf-8", errors="replace"),
            consumer_timeout_ms=FLUSH_S * 1000,
        )
        log.info("Kafka connected!")

        total = 0
        while True:
            batch = []
            deadline = time.time() + FLUSH_S
            try:
                for msg in consumer:
                    row = parse_msg(msg.value)
                    if row:
                        batch.append(row)
                    if len(batch) >= BATCH or time.time() >= deadline:
                        break
            except StopIteration:
                pass

            if batch:
                qlen = r.llen(QUEUE_KEY)
                if qlen > MAX_QUEUE:
                    log.warning("Queue too long (%d), dropping %d msgs", qlen, len(batch))
                    continue
                pipe = r.pipeline()
                for item in batch:
                    pipe.rpush(QUEUE_KEY, item)
                pipe.execute()
                total += len(batch)
                if total % 1000 < len(batch):
                    log.info("Buffered %d (queue: %d, total: %d)", len(batch), qlen + len(batch), total)

    if __name__ == "__main__":
        main()
