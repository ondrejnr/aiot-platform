    #!/usr/bin/env python3
    """Redis -> MongoDB Flusher (same pattern as redis-pg-flusher)"""
    import os, json, time, logging
    from datetime import datetime, timezone
    import redis
    from pymongo import MongoClient, InsertOne
    from pymongo.errors import BulkWriteError

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("mongo-flusher")

    MONGO_URI   = os.getenv("MONGO_URI", "mongodb://aiot_admin:aiot_password@mongodb.aiot.svc.cluster.local:27017/aiot?authSource=admin")
    MONGO_DB    = os.getenv("MONGO_DB", "aiot")
    COLLECTION  = os.getenv("MONGO_COLLECTION", "sensor_data")
    REDIS_HOST  = os.getenv("REDIS_HOST", "redis-master.aiot.svc.cluster.local")
    REDIS_PORT  = int(os.getenv("REDIS_PORT", "6379"))
    REDIS_DB    = int(os.getenv("REDIS_DB", "8"))
    QUEUE_KEY   = os.getenv("QUEUE_KEY", "mongo:write_buffer")
    FLUSH_INTERVAL = float(os.getenv("FLUSH_INTERVAL", "1.0"))
    BATCH_SIZE  = int(os.getenv("BATCH_SIZE", "1000"))

    def connect_mongo():
        client = MongoClient(MONGO_URI)
        db = client[MONGO_DB]
        col = db[COLLECTION]
        # Create indexes
        col.create_index([("ts", -1)])
        col.create_index([("machine_id", 1)])
        col.create_index([("machine_type", 1)])
        col.create_index([("status", 1)])
        col.create_index([("ts", -1), ("machine_id", 1)])
        col.create_index([("ts", 1)], expireAfterSeconds=86400, name="ttl_24h")
        return col

    def flush_batch(r, col):
        pipe = r.pipeline()
        pipe.lrange(QUEUE_KEY, 0, BATCH_SIZE - 1)
        pipe.ltrim(QUEUE_KEY, BATCH_SIZE, -1)
        results = pipe.execute()
        items = results[0]
        if not items:
            return 0

        ops = []
        for raw in items:
            try:
                d = json.loads(raw)
                ts_str = d.get("ts", datetime.now(timezone.utc).isoformat())
                try:
                    ts = datetime.fromisoformat(ts_str)
                except:
                    ts = datetime.now(timezone.utc)

                doc = {
                    "ts": ts,
                    "machine_id": d.get("machine_id", ""),
                    "machine_type": d.get("machine_type", ""),
                    "location": d.get("location"),
                    "status": d.get("status", ""),
                    "temperature": d.get("temperature"),
                    "vibration": d.get("vibration"),
                    "pressure": d.get("pressure"),
                    "rpm": d.get("rpm"),
                    "humidity": d.get("humidity"),
                    "anomaly_score": d.get("anomaly_score"),
                    "power_consumption": d.get("power_consumption"),
                    "uptime_hours": d.get("uptime_hours"),
                    "violations_count": d.get("violations_count", 0),
                    "violations": json.loads(d["violations"]) if d.get("violations") else [],
                    "topic": d.get("topic", ""),
                }
                ops.append(InsertOne(doc))
            except Exception as e:
                log.error("Parse error: %s", e)

        if ops:
            try:
                result = col.bulk_write(ops, ordered=False)
                return result.inserted_count
            except BulkWriteError as e:
                log.warning("Bulk write error: %s", str(e)[:200])
                return len(ops)
        return 0

    def main():
        log.info("Redis->MongoDB Flusher starting")
        log.info("Redis: %s:%d db=%d key=%s", REDIS_HOST, REDIS_PORT, REDIS_DB, QUEUE_KEY)
        log.info("MongoDB: %s db=%s col=%s", MONGO_URI.split("@")[1].split("/")[0], MONGO_DB, COLLECTION)
        log.info("Batch=%d interval=%.1fs", BATCH_SIZE, FLUSH_INTERVAL)

        r = redis.Redis(host=REDIS_HOST, port=REDIS_PORT, db=REDIS_DB, decode_responses=True)
        col = connect_mongo()
        log.info("Connected!")

        total = 0
        while True:
            try:
                qlen = r.llen(QUEUE_KEY)
                if qlen > 0:
                    flushed = flush_batch(r, col)
                    total += flushed
                    if flushed > 0:
                        log.info("Flushed %d docs (queue: %d, total: %d)", flushed, qlen - flushed, total)
                time.sleep(FLUSH_INTERVAL)
            except Exception as e:
                log.error("Flush error: %s", e)
                try:
                    col = connect_mongo()
                except:
                    time.sleep(5)

    if __name__ == "__main__":
        main()
