    from fastapi import FastAPI, Request
    import requests as req
    import json, hashlib, math, time, os, re
    import redis

    app = FastAPI(title="Cerebrus AIoT Gateway")
    bank = redis.Redis(host="redis-master.aiot.svc.cluster.local", port=6379, db=5, decode_responses=True)
    cache = redis.Redis(host="redis-master.aiot.svc.cluster.local", port=6379, db=6, decode_responses=True)

    QDRANT_URL = "http://qdrant.aiot.svc.cluster.local:6333"
    CEREBRAS_URL = "https://api.cerebras.ai/v1/chat/completions"
    CEREBRAS_KEY = os.environ.get("CEREBRAS_API_KEY", "")
    CEREBRAS_MODEL = "llama3.1-8b"
    VECTOR_SIZE = 64
    LLM_CACHE_TTL = 300
    BANK_CACHE_TTL = 60
    RATE_LIMIT_RPM = 30
    RATE_LIMIT_KEY = "llm:rate_counter"

    SYSTEM_PROMPT = """You are Cerebrus AIoT - industrial IoT monitoring assistant.
    You monitor a factory with 6 machine types: pump, motor, generator, turbine, compressor, conveyor.
    Locations: hall-A, hall-B, hall-C, basement, outdoor-1, outdoor-2.
    Answer in SAME LANGUAGE as user question. Be precise with numbers.
    Units: temperature=°C, vibration=mm/s, pressure=bar, rpm=RPM.
    IMPORTANT: When answering about averages, maximums, or statistics by machine type,
    use ONLY the pre-calculated STATISTICS section — do NOT recalculate from individual machine data.
    The STATISTICS section contains accurate aggregated values from ALL machines."""

    SIMPLE_KW = ["summary","status","overview","suhrn","prehlad","how many","kolko","pocet","total","celkom",
                 "critical","kritick","warning","varov","alarm","list","zoznam","stav","factory"]
    COMPLEX_KW = ["why","preco","cause","pricina","recommend","odporuc","predict","trend","analyze","analyz",
                  "compare","porovnaj","explain","vysvetli","what if","should","plan","optimiz","improve",
                  "priemern","average","najvy","highest","max","min","lowest","top","worst","best"]
    MACH_RE = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)[-_]?\d+', re.I)
    TYPE_RE = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)', re.I)

    def fast_embed(text):
        b = text.encode()
        raw = b''
        for salt in (b'\x00', b'\x01', b'\x02', b'\x03'):
            raw += hashlib.sha256(salt + b).digest()
            if len(raw) >= VECTOR_SIZE * 4: break
        vec = []
        for i in range(VECTOR_SIZE):
            val = (raw[i*2] << 8 | raw[i*2+1]) / 65535.0 * 2 - 1
            vec.append(val)
        norm = sum(x*x for x in vec) ** 0.5
        return [x/norm for x in vec] if norm > 0 else vec

    def is_complex(q):
        return any(k in q.lower() for k in COMPLEX_KW)

    def is_simple(q):
        ql = q.lower()
        if MACH_RE.search(ql) and not is_complex(q): return True
        return any(k in ql for k in SIMPLE_KW) and not is_complex(q)

    def check_rate():
        try:
            c = cache.get(RATE_LIMIT_KEY)
            if c and int(c) >= RATE_LIMIT_RPM: return False
            p = cache.pipeline(); p.incr(RATE_LIMIT_KEY); p.expire(RATE_LIMIT_KEY, 60); p.execute()
            return True
        except: return True

    def get_cache(q):
        try: return cache.get(f"llm:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}")
        except: return None

    def set_cache(q, r, ttl=None):
        try: cache.setex(f"llm:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}", ttl or LLM_CACHE_TTL, r)
        except: pass

    def machine_detail(mid):
        raw = bank.get(f"bank:machines:{mid}")
        if not raw: return None
        m = json.loads(raw); mt = m.get("metrics",{})
        viols = "; ".join([f"{v['metric']}={v['value']}" for v in m.get("violations",[])])
        line = f"{mid} ({m.get('machine_type','')}) [{m.get('status','')}] T={mt.get('temperature','-')}C V={mt.get('vibration','-')}mm/s P={mt.get('pressure','-')}bar RPM={mt.get('rpm','-')}"
        if viols: line += f" VIOLATIONS: {viols}"
        return line

    def bank_answer(query):
        q = query.lower()
        try:
            raw = bank.get("bank:summary")
            if not raw: return None
            s = json.loads(raw)
            total,ok,warn,crit = s.get("total",0),s.get("ok",0),s.get("warning",0),s.get("critical",0)
            crit_list,warn_list = s.get("critical_machines",[]),s.get("warning_machines",[])
            m = MACH_RE.search(q)
            if m:
                mid = m.group(0).replace("_","-")
                return machine_detail(mid) or f"Machine {mid} not found."
            if any(k in q for k in ["summary","status","overview","suhrn","prehlad","total","celkom","factory","stav"]):
                return f"Factory: {total} machines | OK: {ok} | Warning: {warn} | Critical: {crit}\nTop critical: {', '.join(crit_list[:10])}"
            if any(k in q for k in ["critical","kritick","alarm"]):
                return f"Critical ({crit}):\n" + "\n".join(f"  {n}" for n in crit_list[:20])
            if any(k in q for k in ["warning","varov","warn"]):
                return f"Warning ({warn}):\n" + "\n".join(f"  {n}" for n in warn_list[:20])
            if any(k in q for k in ["how many","kolko","pocet"]):
                return f"Total {total}: {ok} OK, {warn} warning, {crit} critical."
        except: pass
        return None

    def compute_type_stats():
        """Compute ACCURATE statistics from ALL machines in bank"""
        type_data = {}
        try:
            all_keys = bank.keys("bank:machines:*")
            if not all_keys: return {}
            pipe = bank.pipeline()
            for k in all_keys:
                pipe.get(k)
            results = pipe.execute()
            for raw_m in results:
                if not raw_m: continue
                try:
                    md = json.loads(raw_m)
                    mt = md.get("machine_type","")
                    if mt not in type_data:
                        type_data[mt] = {"temps":[],"vibs":[],"rpms":[],"pressures":[],"statuses":{},"machines":[],"count":0}
                    td = type_data[mt]
                    td["count"] += 1
                    metrics = md.get("metrics",{})
                    mid = md.get("machine_id","?")
                    temp = metrics.get("temperature")
                    vib = metrics.get("vibration")
                    rpm_val = metrics.get("rpm")
                    pres = metrics.get("pressure")
                    if temp is not None: td["temps"].append((float(temp), mid))
                    if vib is not None: td["vibs"].append((float(vib), mid))
                    if rpm_val is not None: td["rpms"].append((float(rpm_val), mid))
                    if pres is not None: td["pressures"].append((float(pres), mid))
                    st = md.get("status","OK")
                    td["statuses"][st] = td["statuses"].get(st,0) + 1
                except: continue
        except: pass
        return type_data

    def bank_context_full(query):
        ctx = []
        q = query.lower()
        try:
            raw = bank.get("bank:summary")
            if not raw: return "No data available."
            s = json.loads(raw)
            ctx.append(f"FACTORY OVERVIEW: {s.get('total',0)} machines | OK:{s.get('ok',0)} WARNING:{s.get('warning',0)} CRITICAL:{s.get('critical',0)}")

            # Specific machine query
            m = MACH_RE.search(q)
            if m:
                mid = m.group(0).replace("_","-")
                detail = machine_detail(mid)
                if detail: ctx.append(f"\nMACHINE DETAIL:\n{detail}")
                hist = bank.lrange(f"bank:history:{mid}", 0, 9)
                if hist:
                    ctx.append("HISTORY (last 10):")
                    for e in hist:
                        d = json.loads(e)
                        ctx.append(f"  T={d.get('temperature','-')} V={d.get('vibration','-')} P={d.get('pressure','-')} RPM={d.get('rpm','-')} [{d.get('status','')}]")
                return "\n".join(ctx)

            # PRE-CALCULATED STATISTICS from ALL machines
            type_data = compute_type_stats()
            if type_data:
                ctx.append("\n=== PRE-CALCULATED STATISTICS (from ALL machines — use these numbers!) ===")
                for mtype in ["turbine","generator","compressor","motor","pump","conveyor"]:
                    td = type_data.get(mtype)
                    if not td: continue
                    line = f"\n{mtype.upper()} ({td['count']} machines):"
                    ctx.append(line)
                    if td["temps"]:
                        vals = [t[0] for t in td["temps"]]
                        avg_t = sum(vals)/len(vals)
                        max_t = max(td["temps"], key=lambda x: x[0])
                        min_t = min(td["temps"], key=lambda x: x[0])
                        ctx.append(f"  Temperature: avg={avg_t:.1f}C  max={max_t[0]:.1f}C ({max_t[1]})  min={min_t[0]:.1f}C ({min_t[1]})")
                    if td["vibs"]:
                        vals = [v[0] for v in td["vibs"]]
                        avg_v = sum(vals)/len(vals)
                        max_v = max(td["vibs"], key=lambda x: x[0])
                        ctx.append(f"  Vibration:   avg={avg_v:.2f}mm/s  max={max_v[0]:.2f}mm/s ({max_v[1]})")
                    if td["rpms"]:
                        vals = [r[0] for r in td["rpms"]]
                        avg_r = sum(vals)/len(vals)
                        max_r = max(td["rpms"], key=lambda x: x[0])
                        ctx.append(f"  RPM:         avg={avg_r:.0f}  max={max_r[0]:.0f} ({max_r[1]})")
                    if td["pressures"]:
                        vals = [p[0] for p in td["pressures"]]
                        avg_p = sum(vals)/len(vals)
                        ctx.append(f"  Pressure:    avg={avg_p:.1f}bar")
                    ctx.append(f"  Status:      {td['statuses']}")

                    # Top 3 hottest
                    if td["temps"]:
                        top3 = sorted(td["temps"], key=lambda x: x[0], reverse=True)[:3]
                        ctx.append(f"  Top 3 hottest: {', '.join(f'{mid}={t:.1f}C' for t,mid in top3)}")

            # Critical machines details
            crit_list = s.get("critical_machines",[])
            if crit_list:
                ctx.append(f"\n=== CRITICAL MACHINES (top 10 of {len(crit_list)}) ===")
                for mid2 in crit_list[:10]:
                    d = machine_detail(mid2)
                    if d: ctx.append(d)

        except Exception as e:
            ctx.append(f"Error: {e}")
        return "\n".join(ctx)[:15000]

    def qdrant_search(query, limit=20):
        try:
            vec = fast_embed(query)
            r = req.post(f"{QDRANT_URL}/collections/sensor_history/points/search",
                json={"vector": vec, "limit": limit, "with_payload": True}, timeout=10)
            if r.status_code == 200:
                return [p["payload"] for p in r.json().get("result",[])]
        except: pass
        return []

    def call_llm(context, query):
        try:
            r = req.post(CEREBRAS_URL, headers={"Authorization": f"Bearer {CEREBRAS_KEY}"},
                json={"model": CEREBRAS_MODEL,
                      "messages": [{"role":"system","content":SYSTEM_PROMPT},
                                   {"role":"user","content":f"REAL-TIME SENSOR DATA:\n{context}\n\nUSER QUESTION: {query}"}],
                      "max_tokens": 2000, "temperature": 0.1}, timeout=30)
            if r.status_code == 200: return r.json()["choices"][0]["message"]["content"]
            elif r.status_code == 429: return "Rate limit exceeded."
            else: return f"LLM Error ({r.status_code})"
        except Exception as e: return f"LLM Error: {e}"

    def generate(query):
        cached = get_cache(query)
        if cached: return cached
        if is_simple(query):
            ans = bank_answer(query)
            if ans: set_cache(query, ans, BANK_CACHE_TTL); return ans
        if not check_rate():
            ans = bank_answer(query)
            return (ans + "\n(Rate limited)") if ans else "Rate limit: 30/min."
        ctx = bank_context_full(query)
        qdrant_results = qdrant_search(query, limit=15)
        if qdrant_results:
            ctx += "\n\nHISTORICAL DATA:\n"
            for p in qdrant_results[:10]:
                ctx += f"  {p.get('text','')}\n"
        ans = call_llm(ctx, query)
        if ans and "Error" not in ans: set_cache(query, ans)
        return ans

    @app.get("/")
    def root(): return {"service":"Cerebrus AIoT","version":"7.0-PRECOMPUTED-STATS"}
    @app.get("/health")
    def health():
        try:
            r=req.get(f"{QDRANT_URL}/collections/sensor_history",timeout=5); info=r.json().get("result",{})
            return {"status":"healthy","qdrant_points":info.get("points_count",0),"bank_machines":len(bank.keys("bank:machines:*"))}
        except Exception as e: return {"status":"degraded","error":str(e)}
    @app.get("/v1/models")
    def models(): return {"object":"list","data":[{"id":"cerebrus-aiot","object":"model"}]}
    @app.post("/v1/chat/completions")
    async def chat(request:Request):
        body=await request.json(); msgs=body.get("messages",[]); um=[m for m in msgs if m.get("role")=="user"]
        q=um[-1]["content"].strip() if um else "summary"
        content = generate(q)
        return {"id":f"cerebrus-{int(time.time())}","object":"chat.completion","model":"cerebrus-aiot",
                "choices":[{"index":0,"message":{"role":"assistant","content":content},"finish_reason":"stop"}],
                "usage":{"prompt_tokens":0,"completion_tokens":0,"total_tokens":0}}
