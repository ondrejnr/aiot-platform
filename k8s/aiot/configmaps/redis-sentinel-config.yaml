apiVersion: v1
data:
  redis-master.conf: |
    bind 0.0.0.0
    port 6379
    save 60 1000
    save 300 100
    save 900 1
    maxmemory 400mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    min-replicas-to-write 0
    min-replicas-max-lag 10
  redis-slave.conf: |
    bind 0.0.0.0
    port 6379
    replicaof redis-0.redis-headless.aiot.svc.cluster.local 6379
    save 60 1000
    save 300 100
    maxmemory 400mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
  sentinel-entrypoint.sh: |
    #!/bin/sh
    cp /config/sentinel.conf /tmp/sentinel.conf
    exec redis-sentinel /tmp/sentinel.conf
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster redis-0.redis-headless.aiot.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
  slave-entrypoint.sh: |
    #!/bin/sh
    # Počkaj kým master je ready
    until redis-cli -h redis-0.redis-headless.aiot.svc.cluster.local ping 2>/dev/null; do
      echo "Waiting for master..."
      sleep 2
    done
    exec redis-server /config/redis-slave.conf
