    from fastapi import FastAPI, Request
    from fastapi.responses import StreamingResponse
    import requests as req
    import json, hashlib, time, os, re, logging
    import redis

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger("groq-proxy")

    app = FastAPI(title="Groq AIoT Gateway v2")
    bank = redis.Redis(host="redis-master.aiot.svc.cluster.local", port=6379, db=5, decode_responses=True)
    cache = redis.Redis(host="redis-master.aiot.svc.cluster.local", port=6379, db=6, decode_responses=True)

    GROQ_URL = "https://api.groq.com/openai/v1/chat/completions"
    GROQ_KEY = os.environ.get("GROQ_API_KEY", "")
    GROQ_MODEL = "llama-3.1-8b-instant"
    MODEL_NAME = "groq-aiot"
    QDRANT_URL = "http://qdrant.aiot.svc.cluster.local:6333"
    VECTOR_SIZE = 64
    LLM_CACHE_TTL = 300
    BANK_CACHE_TTL = 600
    RATE_LIMIT_RPM = 30
    RATE_LIMIT_KEY = "groq:rate_counter"

    SIMPLE_KW = ["summary","status","overview","suhrn","prehlad","how many","kolko","pocet","total","celkom","critical","kritick","warning","varov","alarm","list","zoznam","stav","factory","tovarena","machines","stroje","show","ukaz"]
    COMPLEX_KW = ["why","preco","cause","pricina","recommend","odporuc","predict","trend","analyze","analyz","compare","porovnaj","explain","vysvetli","what if","should","plan","optimiz","improve","suggest","navrhn","priemern","average","najvy","highest","max","min","lowest","top","worst","best","forecast","root cause"]
    MACH_RE = re.compile(r'(pump|turbine|motor|compressor|conveyor|generator)[-_]?\d+', re.I)
    JUNK_RE = re.compile(r'(follow.?up|suggest.*question|### task|relevant question|generate.*title|generate.*tag|broad tags)', re.I)

    stats = {"queries":0,"bank_hits":0,"cache_hits":0,"llm_calls":0,"blocked":0,"start_time":time.time()}

    SYSTEM_PROMPT = """You are Groq AIoT - industrial IoT assistant (Groq Cloud).
    Factory: 6 types: pump, motor, generator, turbine, compressor, conveyor.
    Locations: hall-A, hall-B, hall-C, basement, outdoor-1, outdoor-2.
    Answer in SAME LANGUAGE as user. Be precise. Units: temperature=C, vibration=mm/s, pressure=bar, rpm=RPM.
    Use ONLY the pre-calculated STATISTICS section for averages/max/min."""

    FOLLOWUP_ANSWERS = ["What is the factory status?","Show me critical machines","Which machines have warnings?","How many machines are running?","Show turbine-0340 details"]

    def is_junk(q): return bool(JUNK_RE.search(q))
    def is_complex(q): return any(k in q.lower() for k in COMPLEX_KW)
    def is_simple(q):
        if is_complex(q): return False
        ql = q.lower()
        if MACH_RE.search(ql): return True
        return any(k in ql for k in SIMPLE_KW)

    def get_ck(q): return f"groq:cache:{hashlib.sha256(q.lower().strip().encode()).hexdigest()[:16]}"

    def check_rate():
        try:
            c = cache.get(RATE_LIMIT_KEY)
            if c and int(c) >= RATE_LIMIT_RPM: return False
            p = cache.pipeline(); p.incr(RATE_LIMIT_KEY); p.expire(RATE_LIMIT_KEY, 60); p.execute()
            return True
        except: return True

    def answer_from_bank(q):
        ql = q.lower()
        try:
            raw = bank.get("bank:summary")
            if not raw: return None
            s = json.loads(raw)
            m = MACH_RE.search(ql)
            if m:
                mid = m.group(0).replace("_","-")
                mraw = bank.get(f"bank:machines:{mid}")
                if not mraw: return f"Stroj {mid} sa nenasiel."
                md = json.loads(mraw); mt = md.get("metrics",{})
                lines = [f"{mid} | typ: {md.get('machine_type','-')} | stav: {md.get('status','-')}",
                         f"Teplota: {mt.get('temperature','-')}C | Vibracie: {mt.get('vibration','-')}mm/s | Tlak: {mt.get('pressure','-')}bar | RPM: {mt.get('rpm','-')}"]
                for v in md.get("violations",[]): lines.append(f"Porusenie: {v['metric']}={v['value']}")
                hist = bank.lrange(f"bank:history:{mid}", 0, 4)
                if hist:
                    lines.append("Historia (poslednych 5):")
                    for e in hist:
                        d = json.loads(e); lines.append(f"  T={d.get('temperature','-')} V={d.get('vibration','-')} P={d.get('pressure','-')} [{d.get('status','-')}]")
                return "\n".join(lines)
            total,ok,warn,crit = s.get("total",0),s.get("ok",0),s.get("warning",0),s.get("critical",0)
            if any(k in ql for k in ["summary","status","overview","suhrn","prehlad","total","celkom","factory","tovarena","stav"]):
                cn = ", ".join(s.get("critical_machines",[])[:10])
                return f"Tovarena — prehlad:\nCelkom: {total} strojov | OK: {ok} | Warning: {warn} | Critical: {crit}\nTop critical: {cn}{'...' if crit>10 else ''}"
            if any(k in ql for k in ["critical","kritick","alarm"]):
                return f"Kriticke stroje ({crit}):\n" + "\n".join(f"  {n}" for n in s.get("critical_machines",[])[:20])
            if any(k in ql for k in ["warning","varov","warn"]):
                return f"Warning stroje ({warn}):\n" + "\n".join(f"  {n}" for n in s.get("warning_machines",[])[:20])
            if any(k in ql for k in ["how many","kolko","pocet"]):
                return f"Celkom {total} strojov: {ok} OK, {warn} warning, {crit} critical."
        except Exception as e: log.error(f"Bank error: {e}")
        return None

    def compute_type_stats():
        type_data = {}
        try:
            all_keys = bank.keys("bank:machines:*")
            if not all_keys: return {}
            pipe = bank.pipeline()
            for k in all_keys: pipe.get(k)
            results = pipe.execute()
            for raw_m in results:
                if not raw_m: continue
                try:
                    md = json.loads(raw_m); mt = md.get("machine_type","")
                    if mt not in type_data:
                        type_data[mt] = {"temps":[],"vibs":[],"rpms":[],"pressures":[],"statuses":{},"count":0}
                    td = type_data[mt]; td["count"] += 1
                    metrics = md.get("metrics",{}); mid = md.get("machine_id","?")
                    for key,lst in [("temperature","temps"),("vibration","vibs"),("rpm","rpms"),("pressure","pressures")]:
                        v = metrics.get(key)
                        if v is not None: td[lst].append((float(v), mid))
                    st = md.get("status","OK"); td["statuses"][st] = td["statuses"].get(st,0) + 1
                except: continue
        except: pass
        return type_data

    def bank_context_for_llm(query):
        ctx = []; q = query.lower()
        try:
            raw = bank.get("bank:summary")
            if not raw: return "No data."
            s = json.loads(raw)
            ctx.append(f"FACTORY: {s.get('total',0)} machines | OK:{s.get('ok',0)} WARNING:{s.get('warning',0)} CRITICAL:{s.get('critical',0)}")
            m = MACH_RE.search(q)
            if m:
                mid = m.group(0).replace("_","-")
                mraw = bank.get(f"bank:machines:{mid}")
                if mraw:
                    md = json.loads(mraw); mt = md.get("metrics",{})
                    ctx.append(f"\nMACHINE: {mid} type={md.get('machine_type','-')} status={md.get('status','-')} T={mt.get('temperature','-')} V={mt.get('vibration','-')} P={mt.get('pressure','-')} RPM={mt.get('rpm','-')}")
                return "\n".join(ctx)
            type_data = compute_type_stats()
            if type_data:
                ctx.append("\n=== STATISTICS ===")
                for mtype in ["turbine","generator","compressor","motor","pump","conveyor"]:
                    td = type_data.get(mtype)
                    if not td: continue
                    ctx.append(f"\n{mtype.upper()} ({td['count']}):")
                    for label,lst,unit,fmt in [("Temp","temps","C",".1f"),("Vib","vibs","mm/s",".2f"),("RPM","rpms","",".0f"),("Press","pressures","bar",".1f")]:
                        if td[lst]:
                            vals = [t[0] for t in td[lst]]
                            avg = sum(vals)/len(vals)
                            mx = max(td[lst], key=lambda x: x[0])
                            ctx.append(f"  {label}: avg={avg:{fmt}}{unit} max={mx[0]:{fmt}}{unit}({mx[1]})")
                    ctx.append(f"  Status: {td['statuses']}")
            crit_list = s.get("critical_machines",[])
            if crit_list:
                ctx.append(f"\nCRITICAL ({len(crit_list)}):")
                for mid2 in crit_list[:10]:
                    mraw = bank.get(f"bank:machines:{mid2}")
                    if mraw:
                        md = json.loads(mraw); mt = md.get("metrics",{})
                        ctx.append(f"  {mid2} T={mt.get('temperature','-')} V={mt.get('vibration','-')} P={mt.get('pressure','-')}")
        except Exception as e: ctx.append(f"Error: {e}")
        return "\n".join(ctx)[:12000]

    def fast_embed(text):
        b = text.encode(); raw = b''
        for salt in (b'\x00', b'\x01', b'\x02', b'\x03'): raw += hashlib.sha256(salt + b).digest()
        vec = []
        for i in range(VECTOR_SIZE): val = (raw[i*2] << 8 | raw[i*2+1]) / 65535.0 * 2 - 1; vec.append(val)
        norm = sum(x*x for x in vec) ** 0.5
        return [x/norm for x in vec] if norm > 0 else vec

    def call_groq(context, query):
        try:
            r = req.post(GROQ_URL, headers={"Authorization": f"Bearer {GROQ_KEY}", "Content-Type": "application/json"},
                json={"model":GROQ_MODEL,"messages":[{"role":"system","content":SYSTEM_PROMPT},{"role":"user","content":f"DATA:\n{context}\n\nQUESTION: {query}"}],"max_tokens":2000,"temperature":0.1}, timeout=30)
            if r.status_code == 200: return r.json()["choices"][0]["message"]["content"]
            elif r.status_code == 429: return "Rate limit. Skuste znova."
            else: return f"LLM Error ({r.status_code})"
        except Exception as e: return f"LLM Error: {e}"

    def resolve_query(q):
        ck = get_ck(q)
        cached = cache.get(ck)
        if cached: stats["cache_hits"] += 1; log.info(f"[CACHE] '{q[:50]}'"); return cached, "cache"
        if is_simple(q):
            ba = answer_from_bank(q)
            if ba: stats["bank_hits"] += 1; cache.setex(ck, BANK_CACHE_TTL, ba); log.info(f"[BANK] '{q[:50]}' 0 tokenov"); return ba, "bank"
        if not check_rate(): return "Rate limit 30/min.", "rate_limited"
        stats["llm_calls"] += 1
        ctx = bank_context_for_llm(q)
        ans = call_groq(ctx, q)
        if ans and "Error" not in ans: cache.setex(ck, LLM_CACHE_TTL, ans)
        log.info(f"[LLM] '{q[:50]}' Groq API"); return ans, "llm"

    def make_stream(content):
        rid = f"groq-{int(time.time())}"
        async def gen():
            for i in range(0, len(content), 20):
                chunk = content[i:i+20]
                yield f"data: {json.dumps({'id':rid,'object':'chat.completion.chunk','model':MODEL_NAME,'choices':[{'index':0,'delta':{'content':chunk},'finish_reason':None}]})}\n\n"
            yield f"data: {json.dumps({'id':rid,'object':'chat.completion.chunk','model':MODEL_NAME,'choices':[{'index':0,'delta':{},'finish_reason':'stop'}]})}\n\n"
            yield "data: [DONE]\n\n"
        return StreamingResponse(gen(), media_type="text/event-stream")

    @app.get("/")
    def root(): return {"service":"Groq AIoT v2","mode":"bank-first"}
    @app.get("/health")
    def health():
        try: return {"status":"healthy","machines":len(bank.keys("bank:machines:*"))}
        except: return {"status":"degraded"}
    @app.get("/v1/models")
    def models(): return {"object":"list","data":[{"id":MODEL_NAME,"object":"model","owned_by":"groq-v2"}]}
    @app.get("/stats")
    def stats_ep(): return {**stats,"uptime_s":int(time.time()-stats["start_time"]),"efficiency":f"{((stats['bank_hits']+stats['cache_hits'])/max(stats['queries'],1)*100):.1f}%"}

    @app.post("/v1/chat/completions")
    async def chat(request: Request):
        body = await request.json()
        msgs = body.get("messages",[])
        stream = body.get("stream", False)
        um = [m for m in msgs if m.get("role") == "user"]
        q = um[-1]["content"].strip() if um else "summary"
        stats["queries"] += 1
        if is_junk(q):
            stats["blocked"] += 1; content = "\n".join(FOLLOWUP_ANSWERS)
            if stream: return make_stream(content)
            return {"id":f"groq-{int(time.time())}","object":"chat.completion","model":MODEL_NAME,"choices":[{"index":0,"message":{"role":"assistant","content":content},"finish_reason":"stop"}],"usage":{"prompt_tokens":0,"completion_tokens":0,"total_tokens":0}}
        content, source = resolve_query(q)
        if stream: return make_stream(content)
        return {"id":f"groq-{int(time.time())}","object":"chat.completion","model":MODEL_NAME,"choices":[{"index":0,"message":{"role":"assistant","content":content},"finish_reason":"stop"}],"usage":{"prompt_tokens":0,"completion_tokens":0,"total_tokens":0}}

    log.info("Groq AIoT v2 started")
