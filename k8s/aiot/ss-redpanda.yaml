apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
  name: redpanda
  namespace: aiot
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: redpanda
  serviceName: redpanda-headless
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: redpanda
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          # Extract ordinal from hostname (redpanda-0, redpanda-1, etc.)
          ORDINAL=${HOSTNAME##*-}

          # Build seed list (all nodes)
          SEEDS=""
          for i in $(seq 0 3); do
            if [ $i -gt 0 ]; then SEEDS="${SEEDS},"; fi
            SEEDS="${SEEDS}redpanda-${i}.redpanda-headless.aiot.svc.cluster.local:33145"
          done

          rpk redpanda start \
            --overprovisioned \
            --smp 1 \
            --memory 512M \
            --reserve-memory 0M \
            --node-id ${ORDINAL} \
            --check=false \
            --kafka-addr 0.0.0.0:9092 \
            --advertise-kafka-addr ${HOSTNAME}.redpanda-headless.aiot.svc.cluster.local:9092 \
            --rpc-addr 0.0.0.0:33145 \
            --advertise-rpc-addr ${HOSTNAME}.redpanda-headless.aiot.svc.cluster.local:33145 \
            --pandaproxy-addr 0.0.0.0:8082 \
            --advertise-pandaproxy-addr ${HOSTNAME}.redpanda-headless.aiot.svc.cluster.local:8082 \
            --seeds ${SEEDS} \
            --set redpanda.default_topic_replications=3 \
            --set redpanda.default_topic_partitions=4 \
            --set redpanda.auto_create_topics_enabled=true \
            --set redpanda.group_min_session_timeout_ms=250 \
            --set redpanda.log_segment_size=134217728 \
            --set redpanda.compacted_log_segment_size=67108864
        image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /v1/status/ready
            port: 9644
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 5
        name: redpanda
        ports:
        - containerPort: 9092
          name: kafka
          protocol: TCP
        - containerPort: 33145
          name: rpc
          protocol: TCP
        - containerPort: 9644
          name: admin
          protocol: TCP
        - containerPort: 8082
          name: pandaproxy
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /v1/status/ready
            port: 9644
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/redpanda/data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: longhorn
      volumeMode: Filesystem
    status:
      phase: Pending
