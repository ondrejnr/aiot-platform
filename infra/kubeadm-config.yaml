apiVersion: kubeadm.k8s.io/v1beta4
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: 0.0.0.0          # override per-host on master
  bindPort: 6443
nodeRegistration:
  criSocket: unix:///var/run/containerd/containerd.sock
  imagePullPolicy: IfNotPresent
  kubeletExtraArgs:
    - name: node-ip
      value: ""                      # auto-detect; override per-host if needed
---
apiVersion: kubeadm.k8s.io/v1beta4
kind: ClusterConfiguration
kubernetesVersion: v1.32.13
clusterName: aiot
imageRepository: registry.k8s.io
controlPlaneEndpoint: ""             # set to PUBLIC_IP:6443 if HA
apiServer:
  certSANs:
    - 35.241.255.137
    - 10.132.0.11
    - aiot-master
    - kubernetes
    - kubernetes.default
    - kubernetes.default.svc
    - kubernetes.default.svc.cluster.local
  extraArgs:
    - name: audit-log-path
      value: /var/log/kubernetes/audit.log
    - name: audit-log-maxage
      value: "30"
    - name: audit-log-maxbackup
      value: "5"
    - name: audit-log-maxsize
      value: "100"
controllerManager:
  extraArgs:
    - name: bind-address
      value: 0.0.0.0
scheduler:
  extraArgs:
    - name: bind-address
      value: 0.0.0.0
networking:
  dnsDomain: cluster.local
  podSubnet: 10.244.0.0/16           # Flannel default
  serviceSubnet: 10.96.0.0/12
etcd:
  local:
    dataDir: /var/lib/etcd
caCertificateValidityPeriod: 87600h0m0s
certificateValidityPeriod: 8760h0m0s
encryptionAlgorithm: RSA-2048
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
serializeImagePulls: false
maxParallelImagePulls: 4
shutdownGracePeriod: 30s
shutdownGracePeriodCriticalPods: 10s
evictionHard:
  memory.available: 500Mi
  nodefs.available: 10%
  imagefs.available: 10%
evictionSoft:
  memory.available: 1Gi
evictionSoftGracePeriod:
  memory.available: 1m30s
systemReserved:
  cpu: 200m
  memory: 500Mi
  ephemeral-storage: 2Gi
kubeReserved:
  cpu: 200m
  memory: 500Mi
  ephemeral-storage: 2Gi
---
apiVersion: kubeproxy.config.k8s.io/v1alpha1
kind: KubeProxyConfiguration
mode: "iptables"                       # Flannel relies on standard kube-proxy iptables mode
