apiVersion: v1
items:
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      annotations: {}
      name: dns-backup
      namespace: dr-ops
    spec:
      concurrencyPolicy: Forbid
      failedJobsHistoryLimit: 3
      jobTemplate:
        metadata:
          creationTimestamp: null
        spec:
          backoffLimit: 1
          template:
            metadata:
              creationTimestamp: null
            spec:
              containers:
                - command:
                    - /bin/sh
                    - /scripts/backup.sh
                  env:
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          key: token
                          name: github-pat
                    - name: GITHUB_USERNAME
                      valueFrom:
                        secretKeyRef:
                          key: username
                          name: github-pat
                    - name: GITHUB_EMAIL
                      valueFrom:
                        secretKeyRef:
                          key: email
                          name: github-pat
                    - name: CF_TOKEN
                      valueFrom:
                        secretKeyRef:
                          key: token
                          name: cloudflare-api-token
                  image: alpine/k8s:1.32.3
                  imagePullPolicy: IfNotPresent
                  name: backup
                  resources: {}
                  terminationMessagePath: /dev/termination-log
                  terminationMessagePolicy: File
                  volumeMounts:
                    - mountPath: /scripts
                      name: scripts
              dnsPolicy: ClusterFirst
              restartPolicy: OnFailure
              schedulerName: default-scheduler
              securityContext: {}
              terminationGracePeriodSeconds: 30
              volumes:
                - configMap:
                    defaultMode: 493
                    name: dns-backup-script
                  name: scripts
      schedule: 30 1 * * *
      successfulJobsHistoryLimit: 2
      suspend: false
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      annotations: {}
      name: manifest-backup
      namespace: dr-ops
    spec:
      concurrencyPolicy: Forbid
      failedJobsHistoryLimit: 3
      jobTemplate:
        metadata:
          creationTimestamp: null
        spec:
          backoffLimit: 1
          template:
            metadata:
              creationTimestamp: null
            spec:
              containers:
                - command:
                    - /bin/sh
                    - /scripts/backup.sh
                  env:
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          key: token
                          name: github-pat
                    - name: GITHUB_USERNAME
                      valueFrom:
                        secretKeyRef:
                          key: username
                          name: github-pat
                    - name: GITHUB_EMAIL
                      valueFrom:
                        secretKeyRef:
                          key: email
                          name: github-pat
                  image: alpine/k8s:1.32.3
                  imagePullPolicy: IfNotPresent
                  name: backup
                  resources: {}
                  terminationMessagePath: /dev/termination-log
                  terminationMessagePolicy: File
                  volumeMounts:
                    - mountPath: /scripts
                      name: scripts
              dnsPolicy: ClusterFirst
              restartPolicy: OnFailure
              schedulerName: default-scheduler
              securityContext: {}
              serviceAccount: manifest-backup
              serviceAccountName: manifest-backup
              terminationGracePeriodSeconds: 30
              volumes:
                - configMap:
                    defaultMode: 493
                    name: manifest-backup-script
                  name: scripts
      schedule: 15 1 * * *
      successfulJobsHistoryLimit: 2
      suspend: false
kind: List
metadata:
  resourceVersion: ""
