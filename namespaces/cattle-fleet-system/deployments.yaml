apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      name: fleet-controller
      namespace: cattle-fleet-system
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: fleet-controller
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app: fleet-controller
            fleet.cattle.io/shard-default: "true"
            fleet.cattle.io/shard-id: ""
        spec:
          containers:
            - command:
                - fleetcontroller
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: CATTLE_ELECTION_LEASE_DURATION
                  value: 30s
                - name: CATTLE_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: CATTLE_ELECTION_RENEW_DEADLINE
                  value: 25s
                - name: BUNDLE_RECONCILER_WORKERS
                  value: "50"
                - name: BUNDLEDEPLOYMENT_RECONCILER_WORKERS
                  value: "50"
                - name: CLUSTER_RECONCILER_WORKERS
                  value: "50"
                - name: CLUSTERGROUP_RECONCILER_WORKERS
                  value: "50"
                - name: IMAGESCAN_RECONCILER_WORKERS
                  value: "50"
                - name: SCHEDULE_RECONCILER_WORKERS
                  value: "50"
                - name: CONTENT_RECONCILER_WORKERS
                  value: "50"
              image: rancher/fleet:v0.14.3
              imagePullPolicy: IfNotPresent
              name: fleet-controller
              ports:
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /tmp
                  name: tmp
            - command:
                - fleetcontroller
                - cleanup
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: CATTLE_ELECTION_LEASE_DURATION
                  value: 30s
                - name: CATTLE_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: CATTLE_ELECTION_RENEW_DEADLINE
                  value: 25s
              image: rancher/fleet:v0.14.3
              imagePullPolicy: IfNotPresent
              name: fleet-cleanup
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
            - command:
                - fleetcontroller
                - agentmanagement
                - --disable-bootstrap
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: FLEET_PROPAGATE_DEBUG_SETTINGS_TO_AGENTS
                  value: "true"
                - name: FLEET_DEBUG_DISABLE_SECURITY_CONTEXT
                  value: "false"
                - name: CATTLE_ELECTION_LEASE_DURATION
                  value: 30s
                - name: CATTLE_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: CATTLE_ELECTION_RENEW_DEADLINE
                  value: 25s
                - name: FLEET_AGENT_REPLICA_COUNT
                  value: "1"
                - name: FLEET_AGENT_ELECTION_LEASE_DURATION
                  value: 30s
                - name: FLEET_AGENT_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: FLEET_AGENT_ELECTION_RENEW_DEADLINE
                  value: 25s
              image: rancher/fleet:v0.14.3
              imagePullPolicy: IfNotPresent
              name: fleet-agentmanagement
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          nodeSelector:
            kubernetes.io/os: linux
            workload-zone: build
          priorityClassName: rancher-critical
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          serviceAccount: fleet-controller
          serviceAccountName: fleet-controller
          terminationGracePeriodSeconds: 30
          tolerations:
            - effect: NoSchedule
              key: cattle.io/os
              operator: Equal
              value: linux
          volumes:
            - emptyDir: {}
              name: tmp
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      name: gitjob
      namespace: cattle-fleet-system
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: gitjob
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app: gitjob
            fleet.cattle.io/shard-default: "true"
            fleet.cattle.io/shard-id: ""
        spec:
          containers:
            - args:
                - fleetcontroller
                - gitjob
                - --gitjob-image
                - rancher/fleet:v0.14.3
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: CATTLE_ELECTION_LEASE_DURATION
                  value: 30s
                - name: CATTLE_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: CATTLE_ELECTION_RENEW_DEADLINE
                  value: 25s
                - name: GITREPO_SYNC_PERIOD
                  value: 2h
                - name: GITREPO_RECONCILER_WORKERS
                  value: "50"
              image: rancher/fleet:v0.14.3
              imagePullPolicy: IfNotPresent
              name: gitjob
              ports:
                - containerPort: 8081
                  name: metrics
                  protocol: TCP
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /tmp
                  name: tmp
          dnsPolicy: ClusterFirst
          nodeSelector:
            kubernetes.io/os: linux
            workload-zone: build
          priorityClassName: rancher-critical
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          serviceAccount: gitjob
          serviceAccountName: gitjob
          terminationGracePeriodSeconds: 30
          tolerations:
            - effect: NoSchedule
              key: cattle.io/os
              operator: Equal
              value: linux
          volumes:
            - emptyDir: {}
              name: tmp
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      name: helmops
      namespace: cattle-fleet-system
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: helmops
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app: helmops
            fleet.cattle.io/shard-default: "true"
            fleet.cattle.io/shard-id: ""
        spec:
          containers:
            - args:
                - fleetcontroller
                - helmops
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: CATTLE_ELECTION_LEASE_DURATION
                  value: 30s
                - name: CATTLE_ELECTION_RETRY_PERIOD
                  value: 10s
                - name: CATTLE_ELECTION_RENEW_DEADLINE
                  value: 25s
                - name: HELMOPS_RECONCILER_WORKERS
                  value: "50"
              image: rancher/fleet:v0.14.3
              imagePullPolicy: IfNotPresent
              name: helmops
              ports:
                - containerPort: 8081
                  name: metrics
                  protocol: TCP
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /tmp
                  name: tmp
          dnsPolicy: ClusterFirst
          nodeSelector:
            kubernetes.io/os: linux
            workload-zone: build
          priorityClassName: rancher-critical
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          serviceAccount: helmops
          serviceAccountName: helmops
          terminationGracePeriodSeconds: 30
          tolerations:
            - effect: NoSchedule
              key: cattle.io/os
              operator: Equal
              value: linux
          volumes:
            - emptyDir: {}
              name: tmp
kind: List
metadata:
  resourceVersion: ""
