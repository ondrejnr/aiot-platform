apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        control-plane: controller-manager
        konflux.konflux-ci.dev/component: integration
        konflux.konflux-ci.dev/owner: konflux-integration-service
      name: integration-service-controller-manager
      namespace: integration-service
      ownerReferences:
        - apiVersion: konflux.konflux-ci.dev/v1alpha1
          blockOwnerDeletion: true
          controller: true
          kind: KonfluxIntegrationService
          name: konflux-integration-service
          uid: 9d9ad16b-1e8b-4d51-bef5-3253a210a783
    spec:
      progressDeadlineSeconds: 2147483647
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          control-plane: controller-manager
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            kubectl.kubernetes.io/default-container: manager
          creationTimestamp: null
          labels:
            control-plane: controller-manager
        spec:
          containers:
            - args:
                - --metrics-bind-address=:8080
                - --leader-elect
                - --lease-duration=30s
                - --leader-renew-deadline=15s
                - --leader-elector-retry-period=5s
              command:
                - /manager
              env:
                - name: CONSOLE_URL
                  value: https://konflux.35.241.255.137.nip.io/ns/{{ .Namespace }}/pipelinerun/{{ .PipelineRunName }}
              image: quay.io/konflux-ci/integration-service:ef2610ecd344292fb85e01321f7b613c7e621ec5
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 15
                periodSeconds: 20
                successThreshold: 1
                timeoutSeconds: 1
              name: manager
              ports:
                - containerPort: 9443
                  name: webhook-server
                  protocol: TCP
                - containerPort: 8081
                  name: probes
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /readyz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                limits:
                  cpu: 200m
                  memory: 256Mi
                requests:
                  cpu: 30m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /tmp/k8s-webhook-server/serving-certs
                  name: cert
                  readOnly: true
          dnsPolicy: ClusterFirst
          nodeSelector:
            workload-zone: build
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsNonRoot: true
          serviceAccount: integration-service-controller-manager
          serviceAccountName: integration-service-controller-manager
          terminationGracePeriodSeconds: 10
          volumes:
            - name: cert
              secret:
                defaultMode: 420
                secretName: webhook-server-cert
kind: List
metadata:
  resourceVersion: ""
