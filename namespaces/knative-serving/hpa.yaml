apiVersion: v1
items:
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: activator
        app.kubernetes.io/name: knative-serving
        app.kubernetes.io/version: 1.12.4
      name: activator
      namespace: knative-serving
    spec:
      maxReplicas: 20
      metrics:
        - resource:
            name: cpu
            target:
              averageUtilization: 100
              type: Utilization
          type: Resource
      minReplicas: 1
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: activator
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/component: webhook
        app.kubernetes.io/name: knative-serving
        app.kubernetes.io/version: 1.12.4
      name: webhook
      namespace: knative-serving
    spec:
      maxReplicas: 5
      metrics:
        - resource:
            name: cpu
            target:
              averageUtilization: 100
              type: Utilization
          type: Resource
      minReplicas: 1
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: webhook
kind: List
metadata:
  resourceVersion: ""
