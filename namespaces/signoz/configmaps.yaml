apiVersion: v1
data:
  init-certs.sh: '#!/bin/bash'
  setup.sh: "#!/bin/bash\n\n# Execute entrypoint as usual after obtaining ZOO_SERVER_ID\n\
    # check ZOO_SERVER_ID in persistent volume via myid\n# if not present, set based\
    \ on POD hostname\nif [[ -f \"/bitnami/zookeeper/data/myid\" ]]; then\n    export\
    \ ZOO_SERVER_ID=\"$(cat /bitnami/zookeeper/data/myid)\"\nelse\n    HOSTNAME=\"\
    $(hostname -s)\"\n    if [[ $HOSTNAME =~ (.*)-([0-9]+)$ ]]; then\n        ORD=${BASH_REMATCH[2]}\n\
    \        export ZOO_SERVER_ID=\"$((ORD + 1 ))\"\n    else\n        echo \"Failed\
    \ to get index from hostname $HOSTNAME\"\n        exit 1\n    fi\nfi\nexec /entrypoint.sh\
    \ /run.sh"
