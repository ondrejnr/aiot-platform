apiVersion: v1
data:
  wait-until-ready.sh: "#!/bin/bash\n\n# Delay between attempts in seconds\nDELAY=10\n\
    # Default host and port\nHOST=\"localhost\"\nPORT=\"8123\"\n\necho \"Waiting for\
    \ Clickhouse to become ready...\"\n\nwhile true; do\n    response=$(wget --spider\
    \ -S \"http://${HOST}:${PORT}/ping\" 2>&1)\n    exit_code=$?\n    \n    if [ $exit_code\
    \ -eq 0 ]; then\n        echo \"Clickhouse is ready!\"\n        exit 0\n    else\n\
    \        echo \"Clickhouse is not ready yet. Retrying in ${DELAY} seconds...\"\
    \n        sleep $DELAY\n    fi\ndone\n"
