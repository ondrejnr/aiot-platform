---
apiVersion: v1
data:
  otel-agent-config.yaml: "\nexporters:\n  otlp:\n    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}\n\
    \    headers:\n      signoz-access-token: ${env:SIGNOZ_API_KEY}\n    tls:\n  \
    \    insecure: true\n      insecure_skip_verify: false\nextensions:\n  health_check:\n\
    \    endpoint: 0.0.0.0:13133\n  pprof:\n    endpoint: localhost:1777\n  zpages:\n\
    \    endpoint: localhost:55679\nprocessors:\n  batch:\n    send_batch_size: 10000\n\
    \    timeout: 200ms\n  k8sattributes:\n    extract:\n      annotations: []\n \
    \     labels: []\n      metadata:\n      - k8s.namespace.name\n      - k8s.deployment.name\n\
    \      - k8s.statefulset.name\n      - k8s.daemonset.name\n      - k8s.cronjob.name\n\
    \      - k8s.job.name\n      - k8s.node.name\n      - k8s.node.uid\n      - k8s.pod.name\n\
    \      - k8s.pod.uid\n      - k8s.pod.start_time\n    filter:\n      node_from_env_var:\
    \ K8S_NODE_NAME\n    passthrough: false\n    pod_association:\n    - sources:\n\
    \      - from: resource_attribute\n        name: k8s.pod.ip\n    - sources:\n\
    \      - from: resource_attribute\n        name: k8s.pod.uid\n    - sources:\n\
    \      - from: connection\n  resourcedetection:\n    detectors:\n    - k8snode\n\
    \    - env\n    - system\n    k8snode:\n      auth_type: serviceAccount\n    \
    \  node_from_env_var: K8S_NODE_NAME\n    override: false\n    system:\n      resource_attributes:\n\
    \        host.id:\n          enabled: false\n        host.name:\n          enabled:\
    \ false\n        os.type:\n          enabled: true\n    timeout: 2s\nreceivers:\n\
    \  filelog/k8s:\n    exclude:\n    - /var/log/pods/signoz_k8s-infra*-signoz-*/*/*.log\n\
    \    - /var/log/pods/signoz_k8s-infra*-k8s-infra-*/*/*.log\n    - /var/log/pods/kube-system_*/*/*.log\n\
    \    - /var/log/pods/*_hotrod*_*/*/*.log\n    - /var/log/pods/*_locust*_*/*/*.log\n\
    \    include:\n    - /var/log/pods/*/*/*.log\n    include_file_name: false\n \
    \   include_file_path: true\n    operators:\n    - id: container-parser\n    \
    \  type: container\n    start_at: end\n  hostmetrics:\n    collection_interval:\
    \ 30s\n    root_path: /hostfs\n    scrapers:\n      cpu: {}\n      disk:\n   \
    \     exclude:\n          devices:\n          - ^ram\\d+$\n          - ^zram\\\
    d+$\n          - ^loop\\d+$\n          - ^fd\\d+$\n          - ^hd[a-z]\\d+$\n\
    \          - ^sd[a-z]\\d+$\n          - ^vd[a-z]\\d+$\n          - ^xvd[a-z]\\\
    d+$\n          - ^nvme\\d+n\\d+p\\d+$\n          match_type: regexp\n      filesystem:\n\
    \        exclude_fs_types:\n          fs_types:\n          - autofs\n        \
    \  - binfmt_misc\n          - bpf\n          - cgroup2?\n          - configfs\n\
    \          - debugfs\n          - devpts\n          - devtmpfs\n          - fusectl\n\
    \          - hugetlbfs\n          - iso9660\n          - mqueue\n          - nsfs\n\
    \          - overlay\n          - proc\n          - procfs\n          - pstore\n\
    \          - rpc_pipefs\n          - securityfs\n          - selinuxfs\n     \
    \     - squashfs\n          - sysfs\n          - tracefs\n          match_type:\
    \ strict\n        exclude_mount_points:\n          match_type: regexp\n      \
    \    mount_points:\n          - /dev/*\n          - /proc/*\n          - /sys/*\n\
    \          - /run/credentials/*\n          - /run/k3s/containerd/*\n         \
    \ - /var/lib/docker/*\n          - /var/lib/containers/storage/*\n          -\
    \ /var/lib/kubelet/*\n          - /snap/*\n      load: {}\n      memory: {}\n\
    \      network:\n        exclude:\n          interfaces:\n          - ^veth.*$\n\
    \          - ^docker.*$\n          - ^br-.*$\n          - ^flannel.*$\n      \
    \    - ^cali.*$\n          - ^cbr.*$\n          - ^cni.*$\n          - ^dummy.*$\n\
    \          - ^tailscale.*$\n          - ^lo$\n          match_type: regexp\n \
    \ kubeletstats:\n    auth_type: serviceAccount\n    collection_interval: 30s\n\
    \    endpoint: ${env:K8S_HOST_IP}:10250\n    extra_metadata_labels:\n    - container.id\n\
    \    - k8s.volume.type\n    insecure_skip_verify: true\n    metric_groups:\n \
    \   - container\n    - pod\n    - node\n    - volume\n    metrics:\n      container.cpu.usage:\n\
    \        enabled: true\n      container.uptime:\n        enabled: true\n     \
    \ k8s.container.cpu_limit_utilization:\n        enabled: true\n      k8s.container.cpu_request_utilization:\n\
    \        enabled: true\n      k8s.container.memory_limit_utilization:\n      \
    \  enabled: true\n      k8s.container.memory_request_utilization:\n        enabled:\
    \ true\n      k8s.node.cpu.usage:\n        enabled: true\n      k8s.node.uptime:\n\
    \        enabled: true\n      k8s.pod.cpu.usage:\n        enabled: true\n    \
    \  k8s.pod.cpu_limit_utilization:\n        enabled: true\n      k8s.pod.cpu_request_utilization:\n\
    \        enabled: true\n      k8s.pod.memory_limit_utilization:\n        enabled:\
    \ true\n      k8s.pod.memory_request_utilization:\n        enabled: true\n   \
    \   k8s.pod.uptime:\n        enabled: true\n  otlp:\n    protocols:\n      grpc:\n\
    \        endpoint: 0.0.0.0:4317\n        max_recv_msg_size_mib: 4\n      http:\n\
    \        endpoint: 0.0.0.0:4318\nservice:\n  extensions:\n  - health_check\n \
    \ - zpages\n  - pprof\n  pipelines:\n    logs:\n      exporters:\n      - otlp\n\
    \      processors:\n      - resourcedetection\n      - k8sattributes\n      -\
    \ batch\n      receivers:\n      - otlp\n      - filelog/k8s\n    metrics:\n \
    \     exporters:\n      - otlp\n      processors:\n      - resourcedetection\n\
    \      - k8sattributes\n      - batch\n      receivers:\n      - otlp\n      -\
    \ hostmetrics\n      - kubeletstats\n    traces:\n      exporters:\n      - otlp\n\
    \      processors:\n      - resourcedetection\n      - k8sattributes\n      -\
    \ batch\n      receivers:\n      - otlp\n  telemetry:\n    logs:\n      encoding:\
    \ json"
