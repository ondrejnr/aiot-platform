apiVersion: v1
data:
  01-clickhouse-01-listen.xml: "<yandex>\n    <!-- Listen wildcard address to allow\
    \ accepting connections from other containers and host network. -->\n    <listen_host>::</listen_host>\n\
    \    <listen_host>0.0.0.0</listen_host>\n    <listen_try>1</listen_try>\n</yandex>\n"
  01-clickhouse-02-logger.xml: "<yandex>\n    <logger>\n        <!-- Possible levels:\
    \ https://github.com/pocoproject/poco/blob/devel/Foundation/include/Poco/Logger.h#L105\
    \ -->\n        <level>information</level>\n        <formatting>\n          <type>json</type>\n\
    \        </formatting>\n        <log>/var/log/clickhouse-server/clickhouse-server.log</log>\n\
    \        <errorlog>/var/log/clickhouse-server/clickhouse-server.err.log</errorlog>\n\
    \        <size>1000M</size>\n        <count>10</count>\n        <!-- Default behavior\
    \ is autodetection (log to console if not daemon mode and is tty) -->\n      \
    \  <console>1</console>\n    </logger>\n</yandex>\n"
  01-clickhouse-03-query_log.xml: "<yandex>\n    <query_log replace=\"1\">\n     \
    \   <database>system</database>\n        <table>query_log</table>\n        <engine>Engine\
    \ = MergeTree PARTITION BY event_date ORDER BY event_time TTL event_date + interval\
    \ 30 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </query_log>\n</yandex>\n"
  01-clickhouse-04-part_log.xml: "<yandex>\n    <part_log replace=\"1\">\n       \
    \ <database>system</database>\n        <table>part_log</table>\n        <engine>Engine\
    \ = MergeTree PARTITION BY event_date ORDER BY event_time TTL event_date + interval\
    \ 30 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </part_log>\n</yandex>\n"
  01-clickhouse-05-trace_log.xml: "<yandex>\n    <trace_log replace=\"1\">\n     \
    \   <database>system</database>\n        <table>trace_log</table>\n        <engine>Engine\
    \ = MergeTree PARTITION BY event_date ORDER BY event_time TTL event_date + interval\
    \ 7 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </trace_log>\n</yandex>"
  01-clickhouse-06-asynchronous_insert_log.xml: "<yandex>\n    <asynchronous_insert_log\
    \ replace=\"1\">\n        <database>system</database>\n        <table>asynchronous_insert_log</table>\n\
    \        <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time\
    \ TTL event_date + interval 7 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </asynchronous_insert_log>\n</yandex>\n"
  01-clickhouse-07-asynchronous_metric_log.xml: "<yandex>\n    <asynchronous_metric_log\
    \ replace=\"1\">\n        <database>system</database>\n        <table>asynchronous_metric_log</table>\n\
    \        <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time\
    \ TTL event_date + interval 30 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </asynchronous_metric_log>\n</yandex>\n"
  01-clickhouse-08-backup_log.xml: "<yandex>\n    <backup_log replace=\"1\">\n   \
    \     <database>system</database>\n        <table>backup_log</table>\n       \
    \ <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time TTL event_date\
    \ + interval 7 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </backup_log>\n</yandex>\n"
  01-clickhouse-09-blob_storage_log.xml: "<yandex>\n    <blob_storage_log replace=\"\
