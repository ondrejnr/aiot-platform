apiVersion: v1
data:
  config.yaml: "#\n# Template parameters available:\n#   WATCH_NAMESPACES=\n#   CH_USERNAME_PLAIN=\n\
    #   CH_PASSWORD_PLAIN=\n#   CH_CREDENTIALS_SECRET_NAMESPACE=\n#   CH_CREDENTIALS_SECRET_NAME=clickhouse-operator\n\
    \n################################################\n##\n## Watch Section\n##\n\
    ################################################\nwatch:\n  # List of namespaces\
    \ where clickhouse-operator watches for events.\n  # Concurrently running operators\
    \ should watch on different namespaces.\n  #namespaces: [\"dev\", \"test\"]\n\
    \  namespaces: []\n\nclickhouse:\n  configuration:\n    ################################################\n\
    \    ##\n    ## Configuration Files Section\n    ##\n    ################################################\n\
    \    file:\n      path:\n        # Path to the folder where ClickHouse configuration\
    \ files common for all instances within a CHI are located.\n        common: config.d\n\
    \        # Path to the folder where ClickHouse configuration files unique for\
    \ each instance (host) within a CHI are located.\n        host: conf.d\n     \
    \   # Path to the folder where ClickHouse configuration files with users' settings\
    \ are located.\n        # Files are common for all instances within a CHI.\n \
    \       user: users.d\n    ################################################\n\
    \    ##\n    ## Configuration Users Section\n    ##\n    ################################################\n\
    \    user:\n      # Default settings for user accounts, created by the operator.\n\
    \      # NB. These are not access credentials or settings for 'default' user account,\n\
    \      # it is a template for filling out missing fields for all user accounts\
    \ to be created by the operator, except:\n      # 1. 'default' account, which\
    \ DOES NOT use provided password, but uses all the rest of the fields\n      #\
    \ Password for 'default' account as to be provided explicitly, if to be used\n\
    \      # 2. CHOP account, which DOES NOT use profile, quota, password and regexp,\
    \ but uses network IPs - extending them\n      # Password for CHOP account is\
    \ used from `clickhouse.access.password` section\n      default:\n        # Default\
    \ values for ClickHouse user configuration\n        # 1. user/profile - string\n\
    \        # 2. user/quota - string\n        # 3. user/networks/ip - multiple strings\n\
    \        # 4. user/password - string\n        profile: \"default\"\n        quota:\
    \ \"default\"\n        networksIP:\n          - \"::1\"\n          - \"127.0.0.1\"\
    \n        password: \"default\"\n    ################################################\n\
    \    ##\n    ## Configuration Network Section\n    ##\n    ################################################\n\
    \    network:\n      # Default host_regexp to limit network connectivity from\
    \ outside\n      hostRegexpTemplate: \"(chi-{chi}-[^.]+\\\\d+-\\\\d+|clickhouse\\\
    \\-{chi})\\\\.{namespace}\\\\.svc\\\\.cluster\\\\.local$\"\n\n  ################################################\n\
    \  ##\n  ## Configuration Restart Policy Section\n  ## Configuration restart policy\
    \ describes what configuration changes require ClickHouse restart\n  ##\n  ################################################\n\
    \  configurationRestartPolicy:\n    rules:\n      - version: \"*\"\n        rules:\n\
    \          - settings/*: \"yes\"\n          - settings/dictionaries_config: \"\
    no\"\n          - settings/logger: \"no\"\n          - settings/macros/*: \"no\"\
    \n          - settings/max_server_memory_*: \"no\"\n          - settings/max_*_to_drop:\
    \ \"no\"\n          - settings/max_concurrent_queries: \"no\"\n          - settings/models_config:\
    \ \"no\"\n          - settings/user_defined_executable_functions_config: \"no\"\
    \n\n          - zookeeper/*: \"yes\"\n\n          - files/config.d/*.xml: \"yes\"\
    \n          - files/config.d/*dict*.xml: \"no\"\n\n          - profiles/default/background_*_pool_size:\
    \ \"yes\"\n          - profiles/default/max_*_for_server: \"yes\"\n      - version:\
    \ \"21.*\"\n        rules:\n          - settings/logger: \"yes\"\n\n  #################################################\n\
    \  ##\n  ## Access to ClickHouse instances\n  ##\n  ################################################\n\
    \  access:\n    # Possible values for `scheme` are:\n    # 1. http\n    # 2. https\n\
    \    scheme: \"\"\n    # ClickHouse credentials (username, password and port)\
    \ to be used by the operator to connect to ClickHouse instances.\n    # Used for:\n\
    \    # 1. Metrics requests\n    # 2. Schema maintenance\n    # 3. DROP DNS CACHE\n\
    \    # User with these credentials can be specified in additional ClickHouse .xml\
    \ config files,\n    # located in `clickhouse.configuration.file.path.user` folder\n\
    \    username: \"\"\n    password: \"\"\n    rootCA: \"\"\n\n    # Location of\
    \ the k8s Secret with username and password to be used by the operator to connect\
    \ to ClickHouse instances.\n    # Can be used instead of explicitly specified\
    \ username and password which are:\n    # clickhouse.access.username\n    # clickhouse.access.password\n\
    \    # Secret should have two keys:\n    # 1. username\n    # 2. password\n  \
    \  secret:\n      # Empty `namespace` means that k8s secret would be looked in\
    \ the same namespace where operator's pod is running.\n      namespace: \"\"\n\
    \      # Empty `name` means no k8s Secret would be looked for\n      name: \"\
    signoz-clickhouse-operator\"\n    # Port where to connect to ClickHouse instances\
    \ to\n    port: 8123\n\n    # Timeouts used to limit connection and queries from\
    \ the operator to ClickHouse instances\n    # Specified in seconds.\n    timeouts:\n\
    \      connect: 2\n      query: 5\n\n  metrics:\n    timeouts:\n      collect:\
    \ 9\n\n################################################\n##\n## Templates Section\n\
    ##\n################################################\ntemplate:\n  chi:\n    #\
    \ Path to the folder where ClickHouseInstallation .yaml manifests are located.\n\
    \    # Manifests are applied in sorted alpha-numeric order.\n    path: templates.d\n\
    \n################################################\n##\n## Reconcile Section\n\
    ##\n################################################\nreconcile:\n  runtime:\n\
    \    # Max number of concurrent CHI reconciles in progress\n    reconcileCHIsThreadsNumber:\
    \ 10\n    # Max number of concurrent shard reconciles in progress\n    reconcileShardsThreadsNumber:\
    \ 1\n    # The maximum percentage of cluster shards that may be reconciled in\
    \ parallel\n    reconcileShardsMaxConcurrencyPercent: 50\n\n  statefulSet:\n \
    \   create:\n      # What to do in case created StatefulSet is not in 'Ready'\
    \ after `reconcile.statefulSet.update.timeout` seconds\n      # Possible options:\n\
    \      # 1. abort - do nothing, just break the process and wait for an admin to\
    \ assist\n      # 2. delete - delete newly created problematic StatefulSet\n \
    \     # 3. ignore - ignore an error, pretend nothing happened and move on to the\
    \ next StatefulSet\n      onFailure: ignore\n\n    update:\n      # How many seconds\
    \ to wait for created/updated StatefulSet to be 'Ready'\n      timeout: 900\n\
    \      # How many seconds to wait between checks/polls for created/updated StatefulSet\
    \ status\n      pollInterval: 5\n      # What to do in case updated StatefulSet\
    \ is not in 'Ready' after `reconcile.statefulSet.update.timeout` seconds\n   \
    \   # Possible options:\n      # 1. abort - do nothing, just break the process\
    \ and wait for an admin to assist\n      # 2. rollback - delete Pod and rollback\
    \ StatefulSet to previous Generation.\n      # Pod would be recreated by StatefulSet\
    \ based on rollback-ed configuration\n      # 3. ignore - ignore an error, pretend\
    \ nothing happened and move on to the next StatefulSet\n      onFailure: abort\n\
    \n  host:\n    # Whether reconciler should wait for a host:\n    # - to be excluded\
    \ from a cluster\n    # OR\n    # - to be included into a cluster\n    # respectfully\n\
    \    wait:\n      exclude: true\n      include: false\n\n################################################\n\
    ##\n## Annotations management\n##\n################################################\n\
    annotation:\n  # Applied when:\n  #  1. Propagating annotations from the CHI's\
    \ `metadata.annotations` to child objects' `metadata.annotations`,\n  #  2. Propagating\
    \ annotations from the CHI Template's `metadata.annotations` to CHI's `metadata.annotations`,\n\
    \  # Include annotations from the following list:\n  # Applied only when not empty.\
    \ Empty list means \"include all, no selection\"\n  include: []\n  # Exclude annotations\
    \ from the following list:\n  exclude: []\n\n################################################\n\
    ##\n## Labels management\n##\n################################################\n\
    label:\n  # Applied when:\n  #  1. Propagating labels from the CHI's `metadata.labels`\
    \ to child objects' `metadata.labels`,\n  #  2. Propagating labels from the CHI\
    \ Template's `metadata.labels` to CHI's `metadata.labels`,\n  # Include labels\
    \ from the following list:\n  # Applied only when not empty. Empty list means\
    \ \"include all, no selection\"\n  include: []\n  # Exclude labels from the following\
    \ list:\n  # Applied only when not empty. Empty list means \"nothing to exclude,\
    \ no selection\"\n  exclude: []\n  # Whether to append *Scope* labels to StatefulSet\
    \ and Pod.\n  # Full list of available *scope* labels check in 'labeler.go'\n\
    \  #  LabelShardScopeIndex\n  #  LabelReplicaScopeIndex\n  #  LabelCHIScopeIndex\n\
    \  #  LabelCHIScopeCycleSize\n  #  LabelCHIScopeCycleIndex\n  #  LabelCHIScopeCycleOffset\n\
    \  #  LabelClusterScopeIndex\n  #  LabelClusterScopeCycleSize\n  #  LabelClusterScopeCycleIndex\n\
    \  #  LabelClusterScopeCycleOffset\n  appendScope: \"no\"\n\n################################################\n\
    ##\n## StatefulSet management\n##\n################################################\n\
    statefulSet:\n  revisionHistoryLimit: 0\n\n################################################\n\
    ##\n## Pod management\n##\n################################################\n\
    pod:\n  # Grace period for Pod termination.\n  # How many seconds to wait between\
    \ sending\n  # SIGTERM and SIGKILL during Pod termination process.\n  # Increase\
    \ this number is case of slow shutdown.\n  terminationGracePeriod: 30\n\n################################################\n\
    ##\n## Log parameters\n##\n################################################\n\
    logger:\n  logtostderr: \"true\"\n  alsologtostderr: \"false\"\n  v: \"1\"\n \
    \ stderrthreshold: \"\"\n  vmodule: \"\"\n  log_backtrace_at: \"\"\n"
