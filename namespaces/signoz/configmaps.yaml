metadata:
  annotations:
    meta.helm.sh/release-name: k8s-infra
    meta.helm.sh/release-namespace: signoz
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/instance: k8s-infra
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: k8s-infra
    app.kubernetes.io/version: 0.139.0
    helm.sh/chart: k8s-infra-0.15.0
  name: k8s-infra-otel-agent
  namespace: signoz
---
apiVersion: v1
data:
  otel-deployment-config.yaml: "exporters:\n  otlp:\n    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}\n\
    \    headers:\n      signoz-access-token: ${env:SIGNOZ_API_KEY}\n    tls:\n  \
    \    insecure: true\n      insecure_skip_verify: false\nextensions:\n  health_check:\n\
    \    endpoint: 0.0.0.0:13133\n  pprof:\n    endpoint: localhost:1777\n  zpages:\n\
    \    endpoint: localhost:55679\nprocessors:\n  batch:\n    send_batch_size: 10000\n\
    \    timeout: 1s\n  k8sattributes:\n    extract:\n      metadata:\n      - k8s.namespace.name\n\
    \      - k8s.deployment.name\n      - k8s.statefulset.name\n      - k8s.daemonset.name\n\
    \      - k8s.cronjob.name\n      - k8s.job.name\n      - k8s.node.name\n     \
    \ - k8s.node.uid\n      - k8s.pod.name\n      - k8s.pod.uid\n      - k8s.pod.start_time\n\
    \    passthrough: false\n    pod_association:\n    - sources:\n      - from: resource_attribute\n\
    \        name: k8s.pod.ip\n    - sources:\n      - from: resource_attribute\n\
    \        name: k8s.pod.uid\n    - sources:\n      - from: connection\n  resourcedetection:\n\
    \    detectors:\n    - env\n    override: false\n    timeout: 2s\n  resource/clickhouse:\n\
    \    attributes:\n    - key: host.name\n      value: signoz-clickhouse\n     \
    \ action: upsert\nreceivers:\n  k8s_cluster:\n    allocatable_types_to_report:\n\
    \    - cpu\n    - memory\n    collection_interval: 30s\n    metrics:\n      k8s.node.condition:\n\
    \        enabled: true\n      k8s.pod.status_reason:\n        enabled: true\n\
    \    node_conditions_to_report:\n    - Ready\n    - MemoryPressure\n    - DiskPressure\n\
    \    - PIDPressure\n    - NetworkUnavailable\n    resource_attributes:\n     \
    \ container.runtime:\n        enabled: true\n      container.runtime.version:\n\
    \        enabled: true\n      k8s.container.status.last_terminated_reason:\n \
    \       enabled: true\n      k8s.kubelet.version:\n        enabled: true\n   \
    \   k8s.pod.qos_class:\n        enabled: true\n  k8s_events:\n    auth_type: serviceAccount\n\
    \  prometheus:\n    config:\n      scrape_configs:\n      - job_name: clickhouse\n\
    \        scrape_interval: 30s\n        static_configs:\n        - targets:\n \
    \         - chi-signoz-clickhouse-cluster-0-0-0.chi-signoz-clickhouse-cluster-0-0.signoz.svc.cluster.local:9363\n\
    service:\n  extensions:\n  - health_check\n  - zpages\n  - pprof\n  pipelines:\n\
    \    logs:\n      exporters:\n      - otlp\n      processors:\n      - k8sattributes\n\
    \      - resourcedetection\n      - batch\n      receivers:\n      - k8s_events\n\
    \    metrics/internal:\n      exporters:\n      - otlp\n      processors:\n  \
    \    - k8sattributes\n      - resourcedetection\n      - batch\n      receivers:\n\
    \      - k8s_cluster\n    metrics/clickhouse:\n      exporters:\n      - otlp\n\
    \      processors:\n      - resource/clickhouse\n      - batch\n      receivers:\n\
    \      - prometheus\n  telemetry:\n    logs:\n      encoding: json"
