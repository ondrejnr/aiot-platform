    \    <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time TTL\
    \ event_date + interval 30 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </session_log>\n</yandex>\n"
  01-clickhouse-15-zookeeper_log.xml: "<yandex>\n    <zookeeper_log replace=\"1\"\
    >\n        <database>system</database>\n        <table>zookeeper_log</table>\n\
    \        <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time\
    \ TTL event_date + interval 30 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </zookeeper_log>\n</yandex>\n"
  01-clickhouse-16-processors_profile_log.xml: "<yandex>\n    <processors_profile_log\
    \ replace=\"1\">\n        <database>system</database>\n        <table>processors_profile_log</table>\n\
    \        <engine>Engine = MergeTree PARTITION BY event_date ORDER BY event_time\
    \ TTL event_date + interval 7 day</engine>\n        <flush_interval_milliseconds>7500</flush_interval_milliseconds>\n\
    \    </processors_profile_log>\n</yandex>\n"
  chop-generated-remote_servers.xml: "<yandex>\n    <remote_servers>\n        <!--\
    \ User-specified clusters -->\n        <cluster>\n            <shard>\n      \
    \          <internal_replication>False</internal_replication>\n              \
    \  <replica>\n                    <host>chi-signoz-clickhouse-cluster-0-0</host>\n\
    \                    <port>9000</port>\n                    <secure>0</secure>\n\
    \                </replica>\n            </shard>\n        </cluster>\n      \
    \  <!-- Autogenerated clusters -->\n        <all-replicated>\n            <shard>\n\
    \                <internal_replication>true</internal_replication>\n         \
    \       <replica>\n                    <host>chi-signoz-clickhouse-cluster-0-0</host>\n\
    \                    <port>9000</port>\n                    <secure>0</secure>\n\
    \                </replica>\n            </shard>\n        </all-replicated>\n\
    \        <all-sharded>\n            <shard>\n                <internal_replication>false</internal_replication>\n\
    \                <replica>\n                    <host>chi-signoz-clickhouse-cluster-0-0</host>\n\
    \                    <port>9000</port>\n                    <secure>0</secure>\n\
    \                </replica>\n            </shard>\n        </all-sharded>\n  \
    \  </remote_servers>\n</yandex>\n"
  chop-generated-settings.xml: "<yandex>\n    <format_schema_path>/etc/clickhouse-server/config.d/</format_schema_path>\n\
    \    <max_server_memory_usage>7516192768</max_server_memory_usage>\n    <prometheus>\n\
    \        <endpoint>/metrics</endpoint>\n        <port>9363</port>\n    </prometheus>\n\
    \    <user_defined_executable_functions_config>/etc/clickhouse-server/functions/custom-functions.xml</user_defined_executable_functions_config>\n\
    \    <user_scripts_path>/var/lib/clickhouse/user_scripts/</user_scripts_path>\n\
    </yandex>\n"
  crash.xml: "<clickhouse>\n  <send_crash_reports replace=\"replace\">\n    <enabled>false</enabled>\n\
    \  </send_crash_reports>\n</clickhouse>\n"
  events.proto: "syntax = \"proto3\";\nmessage Event {\n  string uuid = 1;\n  string\
    \ event = 2;\n  string properties = 3;\n  string timestamp = 4;\n  uint64 team_id\
    \ = 5;\n  string distinct_id = 6;\n  string created_at = 7;\n  string elements_chain\
    \ = 8;\n}\n    \n"
  formatting.xml: "<clickhouse>\n  <logger>\n    <formatting replace=\"replace\">\n\
    \      <type>json</type>\n      <names>\n        <date_time>date_time</date_time>\n\
    \        <thread_name>thread_name</thread_name>\n        <thread_id>thread_id</thread_id>\n\
    \        <level>level</level>\n        <query_id>query_id</query_id>\n       \
    \ <logger_name>logger_name</logger_name>\n        <message>message</message>\n\
    \        <source_file>source_file</source_file>\n        <source_line>source_line</source_line>\n\
    \      </names>\n    </formatting>\n  </logger>\n</clickhouse>\n"
  load.xml: "<clickhouse>\n  <async_load_databases replace=\"replace\">false</async_load_databases>\n\
    </clickhouse>\n"
  system_log.xml: "<clickhouse>\n  <text_log>\n    <ttl>event_date + INTERVAL 3 DAY\
    \ DELETE</ttl>\n  </text_log>\n  <latency_log>\n    <ttl>event_date + INTERVAL\
    \ 3 DAY DELETE</ttl>\n  </latency_log>\n  <error_log>\n    <ttl>event_date + INTERVAL\
    \ 7 DAY DELETE</ttl>\n  </error_log>\n  <query_metric_log>\n    <ttl>event_date\
    \ + INTERVAL 3 DAY DELETE</ttl>\n  </query_metric_log>\n</clickhouse>\n"
