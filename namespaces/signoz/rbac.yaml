apiVersion: v1
items:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      annotations:
        meta.helm.sh/release-name: signoz
        meta.helm.sh/release-namespace: signoz
      labels:
        app.kubernetes.io/component: operator
        app.kubernetes.io/instance: signoz
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/version: 24.1.2
        clickhouse.altinity.com/chop: 0.21.2
        helm.sh/chart: clickhouse-24.1.18
      name: signoz-clickhouse-operator
      namespace: signoz
    rules:
      - apiGroups:
          - ""
        resources:
          - configmaps
          - services
          - persistentvolumeclaims
          - secrets
        verbs:
          - get
          - list
          - patch
          - update
          - watch
          - create
          - delete
      - apiGroups:
          - ""
        resources:
          - endpoints
        verbs:
          - get
          - list
          - watch
      - apiGroups:
          - ""
        resources:
          - events
        verbs:
          - create
      - apiGroups:
          - ""
        resources:
          - persistentvolumes
          - pods
        verbs:
          - get
          - list
          - patch
          - update
          - watch
      - apiGroups:
          - apps
        resources:
          - statefulsets
        verbs:
          - get
          - list
          - patch
          - update
          - watch
          - create
          - delete
      - apiGroups:
          - apps
        resources:
          - replicasets
        verbs:
          - get
          - patch
          - update
          - delete
      - apiGroups:
          - apps
        resourceNames:
          - signoz-clickhouse-operator
        resources:
          - deployments
        verbs:
          - get
          - patch
          - update
          - delete
      - apiGroups:
          - policy
        resources:
          - poddisruptionbudgets
        verbs:
          - get
          - list
          - patch
          - update
          - watch
          - create
          - delete
      - apiGroups:
          - clickhouse.altinity.com
        resources:
          - clickhouseinstallations
        verbs:
          - get
          - patch
          - update
          - delete
      - apiGroups:
          - clickhouse.altinity.com
        resources:
          - clickhouseinstallations
          - clickhouseinstallationtemplates
          - clickhouseoperatorconfigurations
        verbs:
          - get
          - list
          - watch
      - apiGroups:
          - clickhouse.altinity.com
        resources:
          - clickhouseinstallations/finalizers
          - clickhouseinstallationtemplates/finalizers
          - clickhouseoperatorconfigurations/finalizers
        verbs:
          - update
      - apiGroups:
          - clickhouse.altinity.com
        resources:
          - clickhouseinstallations/status
          - clickhouseinstallationtemplates/status
          - clickhouseoperatorconfigurations/status
        verbs:
          - get
          - update
          - patch
          - create
          - delete
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
          - list
      - apiGroups:
          - apiextensions.k8s.io
        resources:
          - customresourcedefinitions
        verbs:
          - get
          - list
kind: List
metadata:
  resourceVersion: ""
