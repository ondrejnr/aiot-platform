apiVersion: v1
items:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      annotations:
        meta.helm.sh/release-name: rancher-turtles
        meta.helm.sh/release-namespace: cattle-turtles-system
      labels:
        app.kubernetes.io/component: rbac
        app.kubernetes.io/created-by: rancher-turtles
        app.kubernetes.io/instance: leader-election-role
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: role
        app.kubernetes.io/part-of: rancher-turtles
      name: rancher-turtles-leader-election-role
      namespace: cattle-turtles-system
    rules:
      - apiGroups:
          - ""
        resources:
          - configmaps
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - coordination.k8s.io
        resources:
          - leases
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - ""
        resources:
          - events
        verbs:
          - create
          - patch
kind: List
metadata:
  resourceVersion: ""
---
apiVersion: v1
items:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      annotations:
        meta.helm.sh/release-name: rancher-turtles
        meta.helm.sh/release-namespace: cattle-turtles-system
      labels:
        app.kubernetes.io/component: rbac
        app.kubernetes.io/created-by: rancher-turtles
        app.kubernetes.io/instance: leader-election-rolebinding
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: rolebinding
        app.kubernetes.io/part-of: rancher-turtles
      name: rancher-turtles-leader-election-rolebinding
      namespace: cattle-turtles-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: rancher-turtles-leader-election-role
    subjects:
      - kind: ServiceAccount
        name: rancher-turtles-manager
        namespace: cattle-turtles-system
kind: List
metadata:
  resourceVersion: ""
