apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        meta.helm.sh/release-name: k8up
        meta.helm.sh/release-namespace: k8up-system
      labels:
        app.kubernetes.io/instance: k8up
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: k8up
        helm.sh/chart: k8up-4.9.0
      name: k8up
      namespace: k8up-system
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app.kubernetes.io/instance: k8up
          app.kubernetes.io/name: k8up
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app.kubernetes.io/instance: k8up
            app.kubernetes.io/name: k8up
        spec:
          containers:
            - args:
                - operator
              env:
                - name: BACKUP_IMAGE
                  value: ghcr.io/k8up-io/k8up:v2.15.0
                - name: BACKUP_ENABLE_LEADER_ELECTION
                  value: "true"
                - name: BACKUP_SKIP_WITHOUT_ANNOTATION
                  value: "true"
                - name: BACKUP_OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
              image: ghcr.io/k8up-io/k8up:v2.15.0
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /metrics
                  port: http
                  scheme: HTTP
                initialDelaySeconds: 30
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              name: k8up-operator
              ports:
                - containerPort: 8080
                  name: http
                  protocol: TCP
              resources:
                limits:
                  memory: 256Mi
                requests:
                  cpu: 20m
                  memory: 128Mi
              securityContext: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: k8up
          serviceAccountName: k8up
          terminationGracePeriodSeconds: 30
kind: List
metadata:
  resourceVersion: ""
