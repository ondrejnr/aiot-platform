apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiot-tb
  namespace: kubeflow-user-example-com
  ownerReferences:
  - apiVersion: tensorboard.kubeflow.org/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: Tensorboard
    name: aiot-tb
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: aiot-tb
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-04-17T04:47:48Z'
      labels:
        app: aiot-tb
    spec:
      affinity: {}
      containers:
      - args:
        - --logdir=/tensorboard_logs/
        - --bind_all
        command:
        - /usr/local/bin/tensorboard
        image: tensorflow/tensorflow:2.5.1
        imagePullPolicy: IfNotPresent
        name: tensorboard
        ports:
        - containerPort: 6006
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tensorboard_logs/
          name: tbpd
          readOnly: true
        workingDir: /
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: oci-test-node1
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: ml-training
      volumes:
      - name: tbpd
        persistentVolumeClaim:
          claimName: mlflow-artifacts-lp
