apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ml-workshop
  namespace: kubeflow-user-example-com
  ownerReferences:
  - apiVersion: kubeflow.org/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: Notebook
    name: ml-workshop
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      statefulset: ml-workshop
  serviceName: ''
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-04-17T04:47:47Z'
      labels:
        app: ml-workshop
        notebook-name: ml-workshop
        statefulset: ml-workshop
    spec:
      containers:
      - env:
        - name: NB_PREFIX
          value: /notebook/kubeflow-user-example-com/ml-workshop
        image: kubeflownotebookswg/jupyter-scipy:v1.9.2
        imagePullPolicy: IfNotPresent
        name: ml-workshop
        ports:
        - containerPort: 8888
          name: notebook-port
          protocol: TCP
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: '1'
            memory: 2Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /home/jovyan
          name: workspace
        - mountPath: /home/jovyan/shared-config
          name: config
        workingDir: /home/jovyan
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 100
      serviceAccount: default-editor
      serviceAccountName: default-editor
      terminationGracePeriodSeconds: 30
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: ml-workshop-workspace
      - name: config
        persistentVolumeClaim:
          claimName: kubeflow-config
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
