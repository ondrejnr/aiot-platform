apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-ml-train
  namespace: kubeflow-user-example-com
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata: {}
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          annotations:
            proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        spec:
          containers:
          - command:
            - sh
            - -c
            - 'pip install --no-cache-dir scikit-learn xgboost "mlflow==2.19.0" pandas
              psycopg2-binary numpy joblib >/dev/null 2>&1

              python3 /scripts/train.py

              '
            image: python:3.11-slim
            imagePullPolicy: IfNotPresent
            name: trainer
            resources:
              limits:
                cpu: '2'
                memory: 2Gi
              requests:
                cpu: 200m
                memory: 256Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /scripts
              name: script
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
          - configMap:
              defaultMode: 493
              name: cluster-ml-train-script
            name: script
  schedule: 0 3 * * 0
  successfulJobsHistoryLimit: 3
  suspend: false
