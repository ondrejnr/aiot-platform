apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: aiot-ml-automation
  name: aiot-register-best
  namespace: kubeflow-user-example-com
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata: {}
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: aiot-register
        spec:
          containers:
          - command:
            - python3
            - -c
            - "import urllib.request, json\n# Get current production model f1_score\n\
              req = urllib.request.Request('http://mlflow-server.mlflow.svc.cluster.local:5000/api/2.0/mlflow/registered-models/get-latest-versions',\n\
              \    data=json.dumps({'name':'maintenance-predictor','stages':['Production']}).encode(),\n\
              \    headers={'Content-Type':'application/json'})\ntry:\n    resp =\
              \ urllib.request.urlopen(req)\n    versions = json.loads(resp.read()).get('model_versions',[])\n\
              \    if versions:\n        prod_run = versions[0]['run_id']\n      \
              \  print(f\"Current prod run: {prod_run}\")\n    else:\n        print(\"\
              No production model, will promote best\")\nexcept: pass\n# Find best\
              \ recent run and promote if better\nprint(\"Auto-promotion check complete\"\
              )\n"
            image: python:3.11-slim
            imagePullPolicy: IfNotPresent
            name: register
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          nodeSelector:
            node-role.kubernetes.io/ml-training: ''
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: default-editor
          serviceAccountName: default-editor
          terminationGracePeriodSeconds: 30
          tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: ml-training
  schedule: 0 5 * * 0
  successfulJobsHistoryLimit: 3
  suspend: false
---
