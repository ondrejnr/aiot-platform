              \  raise\r\nimport urllib.request, json, datetime, os\r\nts = datetime.datetime.utcnow().strftime('%Y%m%d-%H%M%S')\r\
              \nwith open('/var/run/secrets/kubernetes.io/serviceaccount/token') as\
              \ f:\r\n    token = f.read().strip()\r\nns = open('/var/run/secrets/kubernetes.io/serviceaccount/namespace').read().strip()\r\
              \ndata = json.dumps({\r\n    'display_name': f'retrain-weekly-{ts}',\r\
              \n    'experiment_id': 'f5b72cfc-b4a2-42fa-9799-5a1e5610e7d0',\r\n \
              \   'pipeline_version_reference': {\r\n        'pipeline_id': '502326a7-82c0-45be-93cc-4563c7f893c2',\r\
              \n        'pipeline_version_id': 'becf9e28-e13d-413b-8790-1a78e4133e53'\r\
              \n    },\r\n    'runtime_config': {'parameters': {'epochs': 20}}\r\n\
              }).encode()\r\nreq = urllib.request.Request(\r\n    'http://ml-pipeline.kubeflow.svc.cluster.local:8888/apis/v2beta1/runs',\r\
              \n    data=data,\r\n    headers={\r\n        'Content-Type': 'application/json',\r\
              \n        'kubeflow-userid': 'user@example.com',\r\n        'kubeflow-userid-prefix':\
              \ '',\r\n        'Authorization': f'Bearer {token}',\r\n    }\r\n)\r\
              \ntry:\r\n    resp = urllib.request.urlopen(req)\r\n    result = json.loads(resp.read())\r\
              \n    print(f\"Pipeline run created: {result.get('run_id')}\")\r\nexcept\
              \ urllib.error.HTTPError as e:\r\n    print(f\"HTTP {e.code}: {e.read().decode()}\"\
              )\r\n    raise\r\n"
