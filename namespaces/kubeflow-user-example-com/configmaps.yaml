apiVersion: v1
data:
  serve.py: "#!/usr/bin/env python3\r\n\"\"\"Predictive Maintenance Inference Server.\"\
    \"\"\r\nimport os, logging, tempfile\r\nimport mlflow, mlflow.pyfunc\r\nimport\
    \ mlflow.artifacts\r\nimport numpy as np\r\nimport pandas as pd\r\nimport psycopg2\r\
    \nfrom fastapi import FastAPI, HTTPException\r\nfrom pydantic import BaseModel\r\
    \nfrom typing import List, Optional\r\n\r\nlogging.basicConfig(level=logging.INFO)\r\
    \nlog = logging.getLogger(\"inference\")\r\n\r\napp = FastAPI(title=\"Maintenance\
    \ Predictor\")\r\n\r\nMODEL = None\r\nFEATURES = [\"temperature\",\"vibration\"\
    ,\"pressure\",\"rpm\",\"humidity\",\r\n            \"anomaly_score\",\"machine_type_enc\"\
    ,\"machine_id_enc\"]\r\nMACHINE_TYPE_MAP = {}\r\nMACHINE_ID_MAP = {}\r\n\r\ndef\
    \ load_model():\r\n    global MODEL\r\n    uri = os.environ.get(\"MLFLOW_TRACKING_URI\"\
    ,\"http://mlflow-server.mlflow.svc.cluster.local:5000\")\r\n    mlflow.set_tracking_uri(uri)\r\
    \n    model_name = os.environ.get(\"MODEL_NAME\",\"maintenance-predictor\")\r\n\
    \    stage = os.environ.get(\"MODEL_STAGE\",\"Production\")\r\n    log.info(f\"\
    Loading model {model_name}/{stage} from {uri}\")\r\n    try:\r\n        client\
    \ = mlflow.tracking.MlflowClient()\r\n        versions = client.get_latest_versions(model_name,\
    \ stages=[stage])\r\n        if not versions:\r\n            log.error(f\"No model\
    \ versions found for stage {stage}\")\r\n            return\r\n        mv = versions[0]\r\
    \n        log.info(f\"Found model v{mv.version} run_id={mv.run_id} source={mv.source}\"\
    )\r\n        # Download model via MLflow artifact proxy REST API\r\n        import\
    \ tempfile, urllib.request, json\r\n        source = mv.source  # e.g. /mlflow/artifacts/3/{run_id}/artifacts/model\r\
    \n        prefix = \"/mlflow/artifacts/\"\r\n        relative = source[len(prefix):]\
    \ if source.startswith(prefix) else source\r\n        base_url = f\"{uri}/api/2.0/mlflow-artifacts/artifacts\"\
    \r\n        # List files in model directory\r\n        list_url = f\"{base_url}?path={relative}\"\
    \r\n        log.info(f\"Listing artifacts at {list_url}\")\r\n        req = urllib.request.Request(list_url)\r\
    \n        resp = urllib.request.urlopen(req, timeout=30)\r\n        data = json.loads(resp.read())\r\
    \n        files = [f[\"path\"] for f in data.get(\"files\", [])]\r\n        log.info(f\"\
    Found {len(files)} artifact files: {files}\")\r\n        # Download each file\r\
    \n        dst = tempfile.mkdtemp()\r\n        model_dir = os.path.join(dst, \"\
    model\")\r\n        os.makedirs(model_dir, exist_ok=True)\r\n        for f in\
    \ files:\r\n            fname = os.path.basename(f)\r\n            file_url =\
    \ f\"{base_url}/{relative}/{fname}\"\r\n            log.info(f\"Downloading {fname}\"\
    )\r\n            urllib.request.urlretrieve(file_url, os.path.join(model_dir,\
    \ fname))\r\n        log.info(f\"Downloaded {len(files)} files to {model_dir}\"\
    )\r\n        MODEL = mlflow.pyfunc.load_model(model_dir)\r\n        log.info(\"\
    Model loaded successfully\")\r\n    except Exception as e:\r\n        log.error(f\"\
    Failed to load model: {e}\", exc_info=True)\r\n\r\ndef init_encoders():\r\n  \
    \  global MACHINE_TYPE_MAP, MACHINE_ID_MAP\r\n    try:\r\n        conn = psycopg2.connect(\r\
    \n            host=os.environ.get(\"DB_HOST\",\"postgres.aiot.svc.cluster.local\"\
    ),\r\n            dbname=os.environ.get(\"DB_NAME\",\"aiot\"),\r\n           \
    \ user=os.environ.get(\"DB_USER\",\"aiot\"),\r\n            password=os.environ.get(\"\
    DB_PASSWORD\",\"aiot123\"))\r\n        cur = conn.cursor()\r\n        cur.execute(\"\
    SELECT DISTINCT machine_type FROM sensor_data ORDER BY machine_type\")\r\n   \
    \     for i,row in enumerate(cur.fetchall()):\r\n            MACHINE_TYPE_MAP[row[0]]\
    \ = i\r\n        cur.execute(\"SELECT DISTINCT machine_id FROM sensor_data ORDER\
    \ BY machine_id\")\r\n        for i,row in enumerate(cur.fetchall()):\r\n    \
    \        MACHINE_ID_MAP[row[0]] = i\r\n        conn.close()\r\n        log.info(f\"\
    Encoders: {len(MACHINE_TYPE_MAP)} types, {len(MACHINE_ID_MAP)} machines\")\r\n\
    \    except Exception as e:\r\n        log.warning(f\"Could not init encoders:\
    \ {e}\")\r\n\r\nclass PredictRequest(BaseModel):\r\n    instances: Optional[List[dict]]\
    \ = None\r\n    machine_id: Optional[str] = None\r\n    machine_type: Optional[str]\
    \ = None\r\n    temperature: Optional[float] = None\r\n    vibration: Optional[float]\
    \ = None\r\n    pressure: Optional[float] = None\r\n    rpm: Optional[float] =\
    \ None\r\n    humidity: Optional[float] = None\r\n    anomaly_score: Optional[float]\
    \ = 0.0\r\n\r\nclass PredictResponse(BaseModel):\r\n    predictions: list\r\n\r\
    \n@app.on_event(\"startup\")\r\ndef startup():\r\n    load_model()\r\n    init_encoders()\r\
    \n\r\n@app.get(\"/health\")\r\n@app.get(\"/v1/models/maintenance-predictor\")\r\
    \ndef health():\r\n    return {\"status\":\"ready\",\"model_loaded\": MODEL is\
    \ not None}\r\n\r\n@app.post(\"/v1/models/maintenance-predictor:predict\")\r\n\
    @app.post(\"/predict\")\r\ndef predict(req: PredictRequest):\r\n    if MODEL is\
    \ None:\r\n        raise HTTPException(503, \"Model not loaded\")\r\n    if req.instances:\r\
    \n        rows = []\r\n        for inst in req.instances:\r\n            rows.append(_encode(inst))\r\
    \n        df = pd.DataFrame(rows, columns=FEATURES)\r\n    else:\r\n        row\
    \ = _encode(req.dict())\r\n        df = pd.DataFrame([row], columns=FEATURES)\r\
    \n    preds = MODEL.predict(df)\r\n    return PredictResponse(predictions=preds.tolist())\r\
    \n\r\n@app.get(\"/predict/latest\")\r\ndef predict_latest():\r\n    if MODEL is\
    \ None:\r\n        raise HTTPException(503, \"Model not loaded\")\r\n    try:\r\
    \n        conn = psycopg2.connect(\r\n            host=os.environ.get(\"DB_HOST\"\
    ,\"postgres.aiot.svc.cluster.local\"),\r\n            dbname=os.environ.get(\"\
    DB_NAME\",\"aiot\"),\r\n            user=os.environ.get(\"DB_USER\",\"aiot\"),\r\
    \n            password=os.environ.get(\"DB_PASSWORD\",\"aiot123\"))\r\n      \
    \  df = pd.read_sql(\"SELECT machine_id, machine_type, temperature, vibration,\
    \ pressure, rpm, humidity, anomaly_score FROM sensor_data WHERE temperature IS\
    \ NOT NULL ORDER BY ts DESC LIMIT 10\", conn)\r\n        conn.close()\r\n    except\
    \ Exception as e:\r\n        raise HTTPException(500, str(e))\r\n    for c in\
    \ [\"machine_type\",\"machine_id\"]:\r\n        enc = MACHINE_TYPE_MAP if c==\"\
    machine_type\" else MACHINE_ID_MAP\r\n        df[c+\"_enc\"] = df[c].map(enc).fillna(0).astype(int)\r\
    \n    X = df[FEATURES].fillna(0)\r\n    preds = MODEL.predict(X)\r\n    results\
    \ = []\r\n    for i, row in df.iterrows():\r\n        results.append({\"machine_id\"\
