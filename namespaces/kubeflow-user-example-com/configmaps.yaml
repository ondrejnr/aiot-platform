apiVersion: v1
data:
  train.py: "#!/usr/bin/env python3\n\"\"\"\nCluster Metrics Anomaly Detection & Capacity\
    \ Forecasting\n- Trains IsolationForest for anomaly detection\n- Trains XGBoost\
    \ for CPU/RAM capacity forecasting (next 1h)\n- Logs both models + metrics to\
    \ MLflow\n\"\"\"\nimport os, sys, json, warnings\nwarnings.filterwarnings(\"ignore\"\
    )\n\nimport pandas as pd\nimport numpy as np\nimport psycopg2\nfrom datetime import\
    \ datetime, timedelta\n\nfrom sklearn.ensemble import IsolationForest\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.metrics import mean_absolute_error, mean_squared_error\nimport xgboost\
    \ as xgb\nimport mlflow\nimport mlflow.sklearn\nimport mlflow.xgboost\nimport\
    \ joblib\n\n# Config\nPG_DSN = \"host=postgres.aiot.svc dbname=aiot user=aiot\
    \ password=aiot123\"\nMLFLOW_URI = \"http://mlflow-server.mlflow.svc:5000\"\n\
    EXPERIMENT = \"cluster-capacity-model\"\nMIN_ROWS = 50  # minimum rows needed\
    \ to train\n\ndef load_data():\n    conn = psycopg2.connect(PG_DSN)\n    df =\
    \ pd.read_sql(\"\"\"\n        SELECT ts, node_name, cpu_usage_percent, memory_usage_percent,\n\
    \               memory_available_bytes, disk_usage_percent,\n               disk_io_read_bytes_rate,\
    \ disk_io_write_bytes_rate,\n               network_rx_bytes_rate, network_tx_bytes_rate,\n\
    \               load_avg_1m, load_avg_5m, load_avg_15m,\n               pods_running\n\
    \        FROM cluster_metrics\n        WHERE cpu_usage_percent IS NOT NULL\n \
    \         AND ts > NOW() - INTERVAL '14 days'\n        ORDER BY ts\n    \"\"\"\
    , conn)\n    conn.close()\n    df[\"ts\"] = pd.to_datetime(df[\"ts\"])\n    return\
    \ df\n\ndef add_features(df):\n    \"\"\"Add time-based and rolling features per\
    \ node\"\"\"\n    df = df.sort_values([\"node_name\", \"ts\"])\n    df[\"hour\"\
    ] = df[\"ts\"].dt.hour\n    df[\"day_of_week\"] = df[\"ts\"].dt.dayofweek\n  \
    \  df[\"minute_of_day\"] = df[\"ts\"].dt.hour * 60 + df[\"ts\"].dt.minute\n\n\
    \    for col in [\"cpu_usage_percent\", \"memory_usage_percent\", \"load_avg_1m\"\
    ]:\n        if col in df.columns:\n            df[f\"{col}_rolling_mean_12\"]\
    \ = df.groupby(\"node_name\")[col].transform(\n                lambda x: x.rolling(12,\
    \ min_periods=1).mean()\n            )\n            df[f\"{col}_rolling_std_12\"\
    ] = df.groupby(\"node_name\")[col].transform(\n                lambda x: x.rolling(12,\
    \ min_periods=1).std().fillna(0)\n            )\n            df[f\"{col}_diff\"\
    ] = df.groupby(\"node_name\")[col].diff().fillna(0)\n\n    # Target: next value\
    \ (1 step = 5 min ahead)\n    for target_col in [\"cpu_usage_percent\", \"memory_usage_percent\"\
    ]:\n        df[f\"{target_col}_next\"] = df.groupby(\"node_name\")[target_col].shift(-12)\
    \  # 1 hour ahead\n\n    return df\n\ndef train_anomaly_model(df, mlflow_run):\n\
    \    \"\"\"Train IsolationForest on all node metrics\"\"\"\n    feature_cols =\
    \ [\"cpu_usage_percent\", \"memory_usage_percent\", \"load_avg_1m\",\n       \
    \             \"load_avg_5m\", \"load_avg_15m\", \"disk_io_read_bytes_rate\",\n\
    \                    \"disk_io_write_bytes_rate\", \"network_rx_bytes_rate\",\n\
    \                    \"network_tx_bytes_rate\", \"pods_running\"]\n    feature_cols\
    \ = [c for c in feature_cols if c in df.columns]\n    X = df[feature_cols].dropna()\n\
    \n    if len(X) < MIN_ROWS:\n        print(f\"  Anomaly: only {len(X)} rows, need\
    \ {MIN_ROWS}. Skipping.\")\n        return\n\n    scaler = StandardScaler()\n\
    \    X_scaled = scaler.fit_transform(X)\n\n    model = IsolationForest(contamination=0.05,\
    \ random_state=42, n_estimators=100)\n    model.fit(X_scaled)\n\n    scores =\
    \ model.decision_function(X_scaled)\n    anomalies = (model.predict(X_scaled)\
    \ == -1).sum()\n\n    mlflow.log_param(\"anomaly_features\", len(feature_cols))\n\
    \    mlflow.log_param(\"anomaly_samples\", len(X))\n    mlflow.log_metric(\"anomaly_count\"\
    , int(anomalies))\n    mlflow.log_metric(\"anomaly_pct\", round(anomalies / len(X)\
    \ * 100, 2))\n    mlflow.log_metric(\"anomaly_score_mean\", round(float(scores.mean()),\
    \ 4))\n\n    mlflow.sklearn.log_model(model, \"anomaly_model\")\n    joblib.dump(scaler,\
    \ \"/tmp/anomaly_scaler.pkl\")\n    mlflow.log_artifact(\"/tmp/anomaly_scaler.pkl\"\
    )\n\n    print(f\"  Anomaly model: {len(X)} samples, {anomalies} anomalies ({anomalies/len(X)*100:.1f}%)\"\
    )\n\ndef train_forecast_model(df, target_col, mlflow_run):\n    \"\"\"Train XGBoost\
    \ to predict target_col 1 hour ahead\"\"\"\n    target = f\"{target_col}_next\"\
    \n    feature_cols = [\"cpu_usage_percent\", \"memory_usage_percent\", \"load_avg_1m\"\
    ,\n                    \"load_avg_5m\", \"load_avg_15m\", \"disk_usage_percent\"\
    ,\n                    \"pods_running\", \"hour\", \"day_of_week\", \"minute_of_day\"\
    ,\n                    f\"cpu_usage_percent_rolling_mean_12\", f\"cpu_usage_percent_rolling_std_12\"\
    ,\n                    f\"cpu_usage_percent_diff\",\n                    f\"memory_usage_percent_rolling_mean_12\"\
    , f\"memory_usage_percent_rolling_std_12\",\n                    f\"memory_usage_percent_diff\"\
    ]\n    feature_cols = [c for c in feature_cols if c in df.columns]\n\n    data\
    \ = df[feature_cols + [target]].dropna()\n    if len(data) < MIN_ROWS:\n     \
    \   print(f\"  Forecast {target_col}: only {len(data)} rows, need {MIN_ROWS}.\
    \ Skipping.\")\n        return\n\n    X = data[feature_cols]\n    y = data[target]\n\
    \    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2,\
    \ shuffle=False)\n\n    model = xgb.XGBRegressor(\n        n_estimators=100, max_depth=6,\
    \ learning_rate=0.1,\n        random_state=42, objective=\"reg:squarederror\"\n\
    \    )\n    model.fit(X_train, y_train, eval_set=[(X_test, y_test)], verbose=False)\n\
    \n    preds = model.predict(X_test)\n    mae = mean_absolute_error(y_test, preds)\n\
    \    rmse = np.sqrt(mean_squared_error(y_test, preds))\n\n    short = target_col.replace(\"\
    _usage_percent\", \"\")\n    mlflow.log_metric(f\"{short}_forecast_mae\", round(mae,\
    \ 4))\n    mlflow.log_metric(f\"{short}_forecast_rmse\", round(rmse, 4))\n   \
    \ mlflow.log_param(f\"{short}_forecast_samples\", len(data))\n    mlflow.xgboost.log_model(model,\
    \ f\"{short}_forecast_model\")\n\n    print(f\"  Forecast {short}: MAE={mae:.2f}%,\
    \ RMSE={rmse:.2f}% ({len(data)} samples)\")\n\ndef main():\n    print(\"=\" *\
    \ 50)\n    print(\"Cluster ML Training Pipeline\")\n    print(\"=\" * 50)\n\n\
    \    mlflow.set_tracking_uri(MLFLOW_URI)\n    mlflow.set_experiment(EXPERIMENT)\n\
    \n    print(\"\\n1. Loading data from PostgreSQL...\")\n    df = load_data()\n\
    \    print(f\"   Loaded {len(df)} rows, {df['node_name'].nunique()} nodes\")\n\
    \    print(f\"   Date range: {df['ts'].min()} to {df['ts'].max()}\")\n\n    if\
    \ len(df) < MIN_ROWS:\n        print(f\"\\nNot enough data yet ({len(df)} < {MIN_ROWS}).\
    \ Collect more metrics first.\")\n        print(\"CronJob runs every 5min \xD7\
    \ 6 nodes = 72 rows/hour. Need ~1 hour of data.\")\n        sys.exit(0)\n\n  \
    \  print(\"\\n2. Feature engineering...\")\n    df = add_features(df)\n\n    print(\"\
    \\n3. Training models...\")\n    with mlflow.start_run(run_name=f\"cluster-train-{datetime.now().strftime('%Y%m%d-%H%M')}\"\
    ) as run:\n        mlflow.log_param(\"total_rows\", len(df))\n        mlflow.log_param(\"\
    nodes\", df[\"node_name\"].nunique())\n        mlflow.log_param(\"date_range_start\"\
    , str(df[\"ts\"].min()))\n        mlflow.log_param(\"date_range_end\", str(df[\"\
    ts\"].max()))\n\n        train_anomaly_model(df, run)\n        train_forecast_model(df,\
    \ \"cpu_usage_percent\", run)\n        train_forecast_model(df, \"memory_usage_percent\"\
    , run)\n\n        print(f\"\\n   MLflow run: {run.info.run_id}\")\n\n    print(\"\
    \\n4. Done!\")\n    print(f\"   View results: mlflow.35.241.255.137.nip.io/#/experiments\"\
    )\n\nif __name__ == \"__main__\":\n    main()\n"
