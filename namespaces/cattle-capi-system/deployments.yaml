apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        cluster.x-k8s.io/provider: cluster-api
        clusterctl.cluster.x-k8s.io: ""
        control-plane: controller-manager
      name: capi-controller-manager
      namespace: cattle-capi-system
      ownerReferences:
        - apiVersion: operator.cluster.x-k8s.io/v1alpha2
          kind: CAPIProvider
          name: cluster-api
          uid: 1fa4147a-e321-47ad-9b04-c720426244d0
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          cluster.x-k8s.io/provider: cluster-api
          control-plane: controller-manager
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            cluster.x-k8s.io/provider: cluster-api
            control-plane: controller-manager
        spec:
          containers:
            - args:
                - --leader-elect
                - --diagnostics-address=:8443
                - --insecure-diagnostics=false
                - --feature-gates=MachinePool=true,ClusterResourceSet=true,ClusterTopology=true,RuntimeSDK=false,MachineSetPreflightChecks=true,MachineWaitForVolumeDetachConsiderVolumeAttachments=true,PriorityQueue=false
              command:
                - /manager
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.name
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.uid
              image: rancher/cluster-api-controller:v1.10.6
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: healthz
                  scheme: HTTP
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              name: manager
              ports:
                - containerPort: 9443
                  name: webhook-server
                  protocol: TCP
                - containerPort: 9440
                  name: healthz
                  protocol: TCP
                - containerPort: 8443
                  name: metrics
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /readyz
                  port: healthz
                  scheme: HTTP
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources: {}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                runAsGroup: 65532
                runAsUser: 65532
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: FallbackToLogsOnError
              volumeMounts:
                - mountPath: /tmp/k8s-webhook-server/serving-certs
                  name: cert
                  readOnly: true
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: capi-manager
          serviceAccountName: capi-manager
          terminationGracePeriodSeconds: 10
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/master
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
          topologySpreadConstraints:
            - labelSelector:
                matchLabels:
                  cluster.x-k8s.io/provider: cluster-api
                  control-plane: controller-manager
              maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
          volumes:
            - name: cert
              secret:
                defaultMode: 420
                secretName: capi-webhook-service-cert
kind: List
metadata:
  resourceVersion: ""
