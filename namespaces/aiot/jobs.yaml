          \ grafana mattermost\"\nfor DB in $DBS; do\n  mkdir -p \"$BACKUP_DIR/$DB\"\
          \n  echo \"==> Dumping $DB\"\n  pg_dump -Fc -Z6 -d \"postgresql://$PGUSER:$PGPASSWORD@$PGHOST:5432/$DB\"\
          \ -f \"$BACKUP_DIR/$DB/$DB-$TS.dump\"\n  ls -lh \"$BACKUP_DIR/$DB/$DB-$TS.dump\"\
          \ndone\necho \"==> Pruning >${RETENTION_DAYS}d\"\nfind \"$BACKUP_DIR\" -type\
          \ f -name '*.dump' -mtime +${RETENTION_DAYS} -print -delete\necho \"==>\
          \ Disk usage:\"\ndu -sh \"$BACKUP_DIR\"/*\necho \"==> Backup complete\"\n"
        env:
        - name: PGHOST
          value: postgres.aiot.svc.cluster.local
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: username
              name: pg-ha-superuser
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: pg-ha-superuser
        - name: RETENTION_DAYS
          value: '30'
        - name: BACKUP_DIR
          value: /backups
        image: postgres:16
        imagePullPolicy: IfNotPresent
        name: backup
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /backups
          name: backups
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: backups
        persistentVolumeClaim:
          claimName: postgres-backup-data
