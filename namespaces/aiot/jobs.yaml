        job-name: pg-sensor-cleanup-29609760
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - 'set -e

          H="postgres.aiot.svc.cluster.local"

          U="aiot_admin"

          D="aiot"

          echo "Deleting sensor_data older than 10 days..."

          psql -h "$H" -U "$U" -d "$D" -c "DELETE FROM sensor_data WHERE ts < NOW()
          - INTERVAL ''10 days'';"

          echo "VACUUM..."

          psql -h "$H" -U "$U" -d "$D" -c "VACUUM sensor_data;"

          echo "Done"

          '
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: PGPASSWORD
              name: pg-credentials
        image: postgres:16
        imagePullPolicy: IfNotPresent
        name: cleanup
