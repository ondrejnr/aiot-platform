  - apiVersion: batch/v1
    kind: Job
    metadata:
      annotations:
        batch.kubernetes.io/cronjob-scheduled-timestamp: "2026-04-27T02:05:00Z"
      labels:
        batch.kubernetes.io/controller-uid: 79f5bef6-d407-47a4-8b59-e2c7c286f2c7
        batch.kubernetes.io/job-name: pg-partition-mgr-29620925
        controller-uid: 79f5bef6-d407-47a4-8b59-e2c7c286f2c7
        job-name: pg-partition-mgr-29620925
      name: pg-partition-mgr-29620925
      namespace: aiot
      ownerReferences:
        - apiVersion: batch/v1
          blockOwnerDeletion: true
          controller: true
          kind: CronJob
          name: pg-partition-mgr
          uid: a7f57470-8465-4966-8a54-8a1390b57d37
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 2
      completionMode: NonIndexed
      completions: 1
      manualSelector: false
      parallelism: 1
      podReplacementPolicy: TerminatingOrFailed
      selector:
        matchLabels:
          batch.kubernetes.io/controller-uid: 79f5bef6-d407-47a4-8b59-e2c7c286f2c7
      suspend: false
      template:
        metadata:
          creationTimestamp: null
          labels:
            batch.kubernetes.io/controller-uid: 79f5bef6-d407-47a4-8b59-e2c7c286f2c7
            batch.kubernetes.io/job-name: pg-partition-mgr-29620925
            controller-uid: 79f5bef6-d407-47a4-8b59-e2c7c286f2c7
            job-name: pg-partition-mgr-29620925
        spec:
          containers:
            - command:
                - /bin/bash
                - -c
                - |
                  set -e
                  H="postgres.aiot.svc.cluster.local"
                  U="aiot"
                  D="aiot"
                  echo "=== Partition manager ==="
                  # Drop partitions older than 2 hours
                  psql -h "$H" -U "$U" -d "$D" -t -A -c "
                    SELECT tablename FROM pg_tables
                    WHERE schemaname='public'
                      AND tablename ~ '^sensor_data_20'
                    ORDER BY tablename;" | while read -r part; do
                    ts=$(echo "$part" | sed 's/sensor_data_//' | sed 's/_/ /g' | head -c13)
                    if [ -n "$ts" ]; then
                      cutoff=$(date -u -d '2 hours ago' '+%Y %m %d %H')
                      if [[ "$ts" < "$cutoff" ]]; then
                        echo "DROP $part"
                        psql -h "$H" -U "$U" -d "$D" -c "DROP TABLE IF EXISTS $part;"
                      fi
                    fi
                  done
                  # Create 4 future hourly partitions
                  for i in 0 1 2 3; do
                    start=$(date -u -d "+${i} hours" '+%Y-%m-%d %H:00:00')
                    end=$(date -u -d "+$((i+1)) hours" '+%Y-%m-%d %H:00:00')
                    name="sensor_data_$(date -u -d "+${i} hours" '+%Y_%m_%d_%H')"
                    psql -h "$H" -U "$U" -d "$D" -c "
                      CREATE TABLE IF NOT EXISTS $name
                      PARTITION OF sensor_data
                      FOR VALUES FROM ('$start') TO ('$end');" 2>/dev/null || true
                    echo "Ensured partition $name"
                  done
                  echo "=== Done ==="
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: password
                      name: pg-ha-app
                - name: PGOPTIONS
                  value: -c statement_timeout=0
              image: postgres:16
              imagePullPolicy: IfNotPresent
              name: partition
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
