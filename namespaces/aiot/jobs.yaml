apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    batch.kubernetes.io/cronjob-scheduled-timestamp: '2026-04-19T13:05:00Z'
  labels:
    batch.kubernetes.io/controller-uid: 232a9dc1-8c1e-4540-92ef-21fc64e3f998
    batch.kubernetes.io/job-name: pg-partition-mgr-29610065
    controller-uid: 232a9dc1-8c1e-4540-92ef-21fc64e3f998
    job-name: pg-partition-mgr-29610065
  name: pg-partition-mgr-29610065
  namespace: aiot
  ownerReferences:
  - apiVersion: batch/v1
    blockOwnerDeletion: true
    controller: true
    kind: CronJob
    name: pg-partition-mgr
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 2
  completionMode: NonIndexed
  completions: 1
  manualSelector: false
  parallelism: 1
  podReplacementPolicy: TerminatingOrFailed
  selector:
    matchLabels:
      batch.kubernetes.io/controller-uid: 232a9dc1-8c1e-4540-92ef-21fc64e3f998
  suspend: false
  template:
    metadata:
      labels:
        batch.kubernetes.io/controller-uid: 232a9dc1-8c1e-4540-92ef-21fc64e3f998
        batch.kubernetes.io/job-name: pg-partition-mgr-29610065
        controller-uid: 232a9dc1-8c1e-4540-92ef-21fc64e3f998
        job-name: pg-partition-mgr-29610065
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - "set -e\nH=\"postgres.aiot.svc.cluster.local\"\nU=\"aiot_admin\"\nD=\"aiot\"\
          \necho \"=== Partition manager ===\"\n# Drop partitions older than 2 hours\n\
          psql -h \"$H\" -U \"$U\" -d \"$D\" -t -A -c \"\n  SELECT tablename FROM\
          \ pg_tables\n  WHERE schemaname='public'\n    AND tablename ~ '^sensor_data_20'\n\
          \  ORDER BY tablename;\" | while read -r part; do\n  ts=$(echo \"$part\"\
          \ | sed 's/sensor_data_//' | sed 's/_/ /g' | head -c13)\n  if [ -n \"$ts\"\
          \ ]; then\n    cutoff=$(date -u -d '2 hours ago' '+%Y %m %d %H')\n    if\
          \ [[ \"$ts\" < \"$cutoff\" ]]; then\n      echo \"DROP $part\"\n      psql\
          \ -h \"$H\" -U \"$U\" -d \"$D\" -c \"DROP TABLE IF EXISTS $part;\"\n   \
          \ fi\n  fi\ndone\n# Create 4 future hourly partitions\nfor i in 0 1 2 3;\
          \ do\n  start=$(date -u -d \"+${i} hours\" '+%Y-%m-%d %H:00:00')\n  end=$(date\
          \ -u -d \"+$((i+1)) hours\" '+%Y-%m-%d %H:00:00')\n  name=\"sensor_data_$(date\
          \ -u -d \"+${i} hours\" '+%Y_%m_%d_%H')\"\n  psql -h \"$H\" -U \"$U\" -d\
          \ \"$D\" -c \"\n    CREATE TABLE IF NOT EXISTS $name\n    PARTITION OF sensor_data\n\
          \    FOR VALUES FROM ('$start') TO ('$end');\" 2>/dev/null || true\n  echo\
          \ \"Ensured partition $name\"\ndone\necho \"=== Done ===\"\n"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: PGPASSWORD
              name: pg-credentials
        - name: PGOPTIONS
          value: -c statement_timeout=0
        image: postgres:16
        imagePullPolicy: IfNotPresent
        name: partition
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
