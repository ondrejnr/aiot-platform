        instrumentation.opentelemetry.io/inject-python: 'true'
        kubectl.kubernetes.io/restartedAt: '2026-04-15T20:08:12Z'
      labels:
        app: sensor-simulator
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - pip install paho-mqtt && python /code/sim.py
        image: 10.132.0.2:30500/aiot/aiot-python-runtime:latest
        imagePullPolicy: IfNotPresent
        name: sensor-simulator
        ports:
        - containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /code
          name: code
      dnsPolicy: ClusterFirst
      nodeSelector:
        node-role.kubernetes.io/worker: ''
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: sensor-sim
        name: code
