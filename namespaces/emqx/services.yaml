apiVersion: v1
kind: Service
metadata:
  name: emqx
  namespace: emqx
spec:
  clusterIP: 10.99.78.109
  clusterIPs:
  - 10.99.78.109
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: mqtt
    port: 1883
    protocol: TCP
    targetPort: 1883
  - name: ws
    port: 8083
    protocol: TCP
    targetPort: 8083
  - name: wss
    port: 8084
    protocol: TCP
    targetPort: 8084
  - name: dashboard
    port: 18083
    protocol: TCP
    targetPort: 18083
  selector:
    app: emqx
  sessionAffinity: None
  type: ClusterIP
