apiVersion: v1
items:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
        argocd.argoproj.io/sync-wave: "0"
      name: chains-secret-admin
      namespace: openshift-pipelines
    rules:
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - list
          - create
          - get
          - update
          - patch
          - delete
