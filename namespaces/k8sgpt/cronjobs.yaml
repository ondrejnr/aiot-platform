apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-health-report
  namespace: k8sgpt
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata: {}
    spec:
      activeDeadlineSeconds: 300
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - sh
            - -c
            - pip install --no-cache-dir --quiet requests && python3 /code/report.py
            env:
            - name: LLM_PROXY_URL
              value: http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080
            - name: BRIDGE_URL
              value: http://k8sgpt-robusta-bridge.k8sgpt.svc.cluster.local:8090
            - name: MM_WEBHOOK_URL
              value: https://mm.35.241.255.137.nip.io/hooks/jzjdqjnck7y6ubjdauce6gm5cr
            image: python:3.11-slim
            imagePullPolicy: IfNotPresent
            name: report
            resources:
              limits:
                cpu: 500m
                memory: 256Mi
              requests:
                cpu: 25m
                memory: 64Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /code
              name: code
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: k8sgpt-enrichment
          serviceAccountName: k8sgpt-enrichment
          terminationGracePeriodSeconds: 30
          volumes:
          - configMap:
              defaultMode: 420
              name: k8sgpt-health-report-code
            name: code
      ttlSecondsAfterFinished: 120
  schedule: 0 7 * * *
  successfulJobsHistoryLimit: 3
  suspend: false
