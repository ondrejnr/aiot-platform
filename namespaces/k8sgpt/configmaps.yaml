apiVersion: v1
data:
  detector.py: "#!/usr/bin/env python3\r\n\"\"\"AIoT AI Anomaly Detector \u2014 queries\
    \ Prometheus for metric anomalies,\r\nuses Z-score detection, sends anomalies\
    \ to LLM for analysis, posts to MM.\"\"\"\r\nimport json, os, time, math, urllib.request,\
    \ urllib.error, logging\r\nfrom collections import defaultdict\r\n\r\nlogging.basicConfig(level=logging.INFO,\
    \ format=\"%(asctime)s %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"\
    anomaly-detector\")\r\n\r\nPROM = os.environ.get(\"PROMETHEUS_URL\", \"http://victoriametrics.victoriametrics.svc.cluster.local:8428\"\
    )\r\nPROXY = os.environ.get(\"LLM_PROXY_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080\"\
    )\r\nMM_WEBHOOK = os.environ.get(\"MM_WEBHOOK_URL\", \"\")\r\nCHECK_INTERVAL =\
    \ int(os.environ.get(\"CHECK_INTERVAL\", \"1800\"))  # 30 min\r\nZ_THRESHOLD =\
    \ float(os.environ.get(\"Z_THRESHOLD\", \"5.0\"))\r\n# Cooldown per anomaly key\
    \ to avoid spam (seconds)\r\nANOMALY_COOLDOWN = int(os.environ.get(\"ANOMALY_COOLDOWN\"\
    , \"7200\"))  # 2h\r\n# Max anomalies to batch per LLM call\r\nMAX_BATCH = 5\r\
    \n\r\n# Track seen anomalies to avoid duplicates\r\nseen_anomalies = {}  # key\
    \ -> last_reported_ts\r\n\r\n# Prometheus queries for anomaly detection\r\nQUERIES\
    \ = {\r\n    \"cpu_spike\": {\r\n        \"query\": 'topk(10, rate(container_cpu_usage_seconds_total{namespace!~\"\
    kube-system|istio-system|knative-serving|cert-manager\"}[5m]))',\r\n        \"\
    range_query\": 'rate(container_cpu_usage_seconds_total{{namespace=\"{ns}\",pod=\"\
    {pod}\"}}[5m])',\r\n        \"unit\": \"cores\",\r\n        \"desc\": \"CPU usage\
    \ spike\",\r\n    },\r\n    \"memory_growth\": {\r\n        \"query\": 'topk(10,\
    \ container_memory_working_set_bytes{namespace!~\"kube-system|istio-system|knative-serving|cert-manager\"\
    } / 1048576)',\r\n        \"range_query\": 'container_memory_working_set_bytes{{namespace=\"\
    {ns}\",pod=\"{pod}\"}} / 1048576',\r\n        \"unit\": \"MiB\",\r\n        \"\
    desc\": \"Memory anomaly\",\r\n    },\r\n    \"restart_burst\": {\r\n        \"\
    query\": 'topk(10, increase(kube_pod_container_status_restarts_total[1h]))',\r\
    \n        \"range_query\": 'increase(kube_pod_container_status_restarts_total{{namespace=\"\
    {ns}\",pod=\"{pod}\"}}[1h])',\r\n        \"unit\": \"restarts/h\",\r\n       \
    \ \"desc\": \"Restart burst\",\r\n    },\r\n    \"error_rate\": {\r\n        \"\
    query\": 'topk(10, sum by (namespace, pod) (increase(kube_pod_container_status_last_terminated_reason{reason=~\"\
    Error|OOMKilled|CrashLoopBackOff\"}[1h])))',\r\n        \"range_query\": None,\r\
    \n        \"unit\": \"errors/h\",\r\n        \"desc\": \"Error/OOM events\",\r\
    \n    },\r\n}\r\n\r\ndef prom_query(query):\r\n    try:\r\n        url = f\"{PROM}/api/v1/query?query={urllib.request.quote(query)}\"\
    \r\n        r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\
    \n        if data.get(\"status\") == \"success\":\r\n            return data.get(\"\
    data\", {}).get(\"result\", [])\r\n    except Exception as e:\r\n        log.warning(\"\
    Prometheus query failed: %s\", e)\r\n    return []\r\n\r\ndef prom_range(query,\
    \ hours=6, step=\"5m\"):\r\n    try:\r\n        end = int(time.time())\r\n   \
    \     start = end - hours * 3600\r\n        url = (f\"{PROM}/api/v1/query_range?\"\
    \r\n               f\"query={urllib.request.quote(query)}&start={start}&end={end}&step={step}\"\
    )\r\n        r = urllib.request.urlopen(url, timeout=15)\r\n        data = json.loads(r.read())\r\
    \n        if data.get(\"status\") == \"success\":\r\n            results = data.get(\"\
    data\", {}).get(\"result\", [])\r\n            if results:\r\n               \
    \ # Return list of float values\r\n                return [float(v[1]) for v in\
    \ results[0].get(\"values\", []) if v[1] != \"NaN\"]\r\n    except Exception as\
    \ e:\r\n        log.debug(\"Range query failed: %s\", e)\r\n    return []\r\n\r\
    \ndef zscore(values):\r\n    \"\"\"Calculate Z-score of the latest value vs historical\
    \ mean/std.\"\"\"\r\n    if len(values) < 10:\r\n        return 0.0\r\n    mean\
    \ = sum(values[:-1]) / len(values[:-1])\r\n    variance = sum((x - mean) ** 2\
    \ for x in values[:-1]) / len(values[:-1])\r\n    std = math.sqrt(variance) if\
    \ variance > 0 else 0.001\r\n    return (values[-1] - mean) / std\r\n\r\ndef detect_anomalies():\r\
    \n    anomalies = []\r\n    now = time.time()\r\n    for qname, qcfg in QUERIES.items():\r\
    \n        results = prom_query(qcfg[\"query\"])\r\n        for r in results:\r\
    \n            metric = r.get(\"metric\", {})\r\n            ns = metric.get(\"\
    namespace\", \"?\")\r\n            pod = metric.get(\"pod\", metric.get(\"container\"\
    , \"?\"))\r\n            val = float(r.get(\"value\", [0, 0])[1])\r\n        \
    \    if val == 0:\r\n                continue\r\n            key = f\"{qname}:{ns}/{pod}\"\
    \r\n            # Check cooldown\r\n            if key in seen_anomalies and (now\
    \ - seen_anomalies[key]) < ANOMALY_COOLDOWN:\r\n                continue\r\n \
    \           # For range queries, compute Z-score\r\n            if qcfg.get(\"\
    range_query\"):\r\n                rq = qcfg[\"range_query\"].format(ns=ns, pod=pod)\r\
    \n                hist = prom_range(rq, hours=6)\r\n                if hist and\
    \ len(hist) >= 10:\r\n                    z = zscore(hist)\r\n               \
    \     if z >= Z_THRESHOLD:  # only positive spikes, drops are normal\r\n     \
    \                   anomalies.append({\r\n                            \"type\"\
    : qname, \"desc\": qcfg[\"desc\"],\r\n                            \"namespace\"\
    : ns, \"pod\": pod,\r\n                            \"value\": round(val, 2), \"\
    unit\": qcfg[\"unit\"],\r\n                            \"zscore\": round(z, 1),\r\
    \n                        })\r\n                        seen_anomalies[key] =\
    \ now\r\n            else:\r\n                # No range query \u2014 just check\
    \ if value > 0 (error events)\r\n                if val >= 1:\r\n            \
    \        anomalies.append({\r\n                        \"type\": qname, \"desc\"\
    : qcfg[\"desc\"],\r\n                        \"namespace\": ns, \"pod\": pod,\r\
    \n                        \"value\": round(val, 2), \"unit\": qcfg[\"unit\"],\r\
    \n                        \"zscore\": 0,\r\n                    })\r\n       \
    \             seen_anomalies[key] = now\r\n    return anomalies[:MAX_BATCH]\r\n\
    \r\ndef build_prompt(anomalies):\r\n    lines = []\r\n    for a in anomalies:\r\
    \n        lines.append(f\"- {a['desc']}: {a['namespace']}/{a['pod']} = {a['value']}\
    \ {a['unit']}\"\r\n                     + (f\" (Z={a['zscore']})\" if a['zscore']\
    \ else \"\"))\r\n    prompt = (\r\n        \"You are a Kubernetes operations expert.\
    \ Analyze these metric anomalies detected in the last check.\\n\"\r\n        \"\
    For each anomaly, provide:\\n\"\r\n        \"1) Likely cause (1 sentence)\\n\"\
    \r\n        \"2) Severity: critical/warning/info\\n\"\r\n        \"3) Recommended\
    \ action (1 sentence)\\n\"\r\n        \"Be concise. Use Mattermost markdown. Max\
    \ 300 words.\\n\\n\"\r\n        \"Anomalies:\\n\" + \"\\n\".join(lines)\r\n  \
    \  )\r\n    return prompt\r\n\r\ndef send_to_llm(prompt):\r\n    data = json.dumps({\r\
    \n        \"model\": \"any\",\r\n        \"messages\": [{\"role\": \"system\"\
    , \"content\": \"You diagnose Kubernetes metric anomalies concisely.\"},\r\n \
    \                    {\"role\": \"user\", \"content\": prompt}],\r\n        \"\
    max_tokens\": 500,\r\n        \"temperature\": 0.2,\r\n    }).encode()\r\n   \
    \ req = urllib.request.Request(f\"{PROXY}/v1/chat/completions\", data=data,\r\n\
    \                                headers={\"Content-Type\": \"application/json\"\
    })\r\n    try:\r\n        r = urllib.request.urlopen(req, timeout=90)\r\n    \
    \    resp = json.loads(r.read())\r\n        text = resp.get(\"choices\", [{}])[0].get(\"\
    message\", {}).get(\"content\", \"\")\r\n        proxy = resp.get(\"_proxy\",\
    \ {})\r\n        return text, proxy\r\n    except Exception as e:\r\n        return\
    \ f\"LLM error: {e}\", {}\r\n\r\ndef post_to_mm(text):\r\n    if not MM_WEBHOOK:\r\
    \n        log.info(\"No MM webhook:\\n%s\", text)\r\n        return\r\n    data\
    \ = json.dumps({\"text\": text}).encode()\r\n    req = urllib.request.Request(MM_WEBHOOK,\
    \ data=data, headers={\"Content-Type\": \"application/json\"})\r\n    try:\r\n\
    \        urllib.request.urlopen(req, timeout=10)\r\n        log.info(\"Posted\
    \ anomaly report to MM\")\r\n    except Exception as e:\r\n        log.error(\"\
    MM post failed: %s\", e)\r\n\r\ndef check_once():\r\n    anomalies = detect_anomalies()\r\
    \n    if not anomalies:\r\n        log.info(\"No anomalies detected\")\r\n   \
    \     return\r\n    log.info(\"Detected %d anomalies, sending to LLM...\", len(anomalies))\r\
    \n    prompt = build_prompt(anomalies)\r\n    log.info(\"Prompt ~%d tokens\",\
    \ len(prompt) // 4)\r\n    result = send_to_llm(prompt)\r\n    if isinstance(result,\
    \ tuple):\r\n        text, proxy = result\r\n        header = f\"### :rotating_light:\
    \ AIoT Anomaly Alert\\n_{len(anomalies)} anomalies detected_\\n\\n\"\r\n     \
    \   footer = f\"\\n\\n---\\n_Analyzed by AI ({proxy.get('backend','?')}/{proxy.get('model','?')})_\"\
    \r\n        post_to_mm(header + text + footer)\r\n    else:\r\n        log.error(\"\
    LLM: %s\", result)\r\n\r\ndef main():\r\n    log.info(\"AIoT Anomaly Detector\
    \ starting (interval=%ds, z_threshold=%.1f)\", CHECK_INTERVAL, Z_THRESHOLD)\r\n\
    \    while True:\r\n        try:\r\n            check_once()\r\n        except\
    \ Exception as e:\r\n            log.error(\"Check failed: %s\", e)\r\n      \
    \  time.sleep(CHECK_INTERVAL)\r\n\r\nif __name__ == \"__main__\":\r\n    main()\r\
    \n"
kind: ConfigMap
metadata:
  name: k8sgpt-anomaly-detector-code
  namespace: k8sgpt
---
apiVersion: v1
data:
  report.py: "#!/usr/bin/env python3\r\n\"\"\"AIoT Daily Health Report \u2014 collects\
    \ cluster health, K8sGPT results, proxy stats,\r\npod restarts, and sends a compact\
    \ AI-summarized report to Mattermost.\"\"\"\r\nimport json, os, time, urllib.request,\
    \ urllib.error, ssl, logging\r\n\r\nlogging.basicConfig(level=logging.INFO, format=\"\
    %(asctime)s %(levelname)s %(message)s\")\r\nlog = logging.getLogger(\"health-report\"\
    )\r\n\r\nPROXY = os.environ.get(\"LLM_PROXY_URL\", \"http://k8sgpt-llm-proxy.k8sgpt.svc.cluster.local:8080\"\
    )\r\nBRIDGE = os.environ.get(\"BRIDGE_URL\", \"http://k8sgpt-robusta-bridge.k8sgpt.svc.cluster.local:8090\"\
    )\r\nMM_WEBHOOK = os.environ.get(\"MM_WEBHOOK_URL\", \"\")\r\nK8S_API = \"https://kubernetes.default.svc\"\
    \r\nTOKEN_PATH = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\r\nCA_PATH\
    \ = \"/var/run/secrets/kubernetes.io/serviceaccount/ca.crt\"\r\n\r\ndef _k8s_ctx():\r\
    \n    ctx = ssl.create_default_context(cafile=CA_PATH)\r\n    with open(TOKEN_PATH)\
    \ as f:\r\n        token = f.read().strip()\r\n    return ctx, token\r\n\r\ndef\
    \ k8s_get(path):\r\n    ctx, token = _k8s_ctx()\r\n    req = urllib.request.Request(f\"\
    {K8S_API}{path}\",\r\n                                headers={\"Authorization\"\
    : f\"Bearer {token}\"})\r\n    try:\r\n        r = urllib.request.urlopen(req,\
    \ context=ctx, timeout=15)\r\n        return json.loads(r.read())\r\n    except\
    \ Exception as e:\r\n        return {\"error\": str(e)}\r\n\r\ndef http_get(url):\r\
    \n    try:\r\n        r = urllib.request.urlopen(url, timeout=10)\r\n        return\
    \ json.loads(r.read())\r\n    except Exception as e:\r\n        return {\"error\"\
    : str(e)}\r\n\r\ndef http_post_json(url, data):\r\n    req = urllib.request.Request(url,\
    \ data=json.dumps(data).encode(),\r\n                                headers={\"\
    Content-Type\": \"application/json\"})\r\n    try:\r\n        r = urllib.request.urlopen(req,\
    \ timeout=60)\r\n        return json.loads(r.read())\r\n    except urllib.error.HTTPError\
    \ as e:\r\n        return {\"error\": f\"{e.code}: {e.read().decode()[:200]}\"\
    }\r\n    except Exception as e:\r\n        return {\"error\": str(e)}\r\n\r\n\
    def collect_data():\r\n    data = {}\r\n    # K8sGPT results via K8s API\r\n \
    \   results = k8s_get(\"/apis/core.k8sgpt.ai/v1alpha1/namespaces/k8sgpt/results\"\
    )\r\n    if isinstance(results, dict) and \"items\" in results:\r\n        rlist\
    \ = []\r\n        for r in results[\"items\"]:\r\n            spec = r.get(\"\
    spec\", {})\r\n            rlist.append(f\"{spec.get('kind','?')}/{spec.get('name','?')}\"\
    )\r\n        data[\"k8sgpt_results\"] = \"\\n\".join(rlist) if rlist else \"No\
    \ issues\"\r\n    else:\r\n        data[\"k8sgpt_results\"] = \"Unable to fetch\"\
    \r\n    # Proxy health\r\n    data[\"proxy_health\"] = http_get(f\"{PROXY}/health\"\
    )\r\n    # Bridge stats\r\n    data[\"bridge_stats\"] = http_get(f\"{BRIDGE}/stats\"\
    )\r\n    # Pod restarts via K8s API \u2014 check all namespaces\r\n    restarts\
    \ = []\r\n    pods_all = k8s_get(\"/api/v1/pods?limit=500\")\r\n    if isinstance(pods_all,\
    \ dict) and \"items\" in pods_all:\r\n        for p in pods_all[\"items\"]:\r\n\
    \            ns = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\n      \
    \      name = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n            for\
    \ cs in p.get(\"status\", {}).get(\"containerStatuses\", []):\r\n            \
    \    rc = cs.get(\"restartCount\", 0)\r\n                if rc > 0:\r\n      \
    \              restarts.append(f\"{ns}/{name}: {rc} restarts\")\r\n    data[\"\
    pod_restarts\"] = \"\\n\".join(restarts[-15:]) if restarts else \"none\"\r\n \
    \   # Nodes\r\n    nodes_data = k8s_get(\"/api/v1/nodes\")\r\n    if isinstance(nodes_data,\
    \ dict) and \"items\" in nodes_data:\r\n        nlist = []\r\n        for n in\
    \ nodes_data[\"items\"]:\r\n            name = n[\"metadata\"][\"name\"]\r\n \
    \           ready = \"Ready\" if any(c[\"type\"] == \"Ready\" and c[\"status\"\
    ] == \"True\"\r\n                                  for c in n.get(\"status\",\
    \ {}).get(\"conditions\", [])) else \"NotReady\"\r\n            nlist.append(f\"\
    {name}: {ready}\")\r\n        data[\"nodes\"] = \"\\n\".join(nlist)\r\n    else:\r\
    \n        data[\"nodes\"] = \"Unable to fetch\"\r\n    # Not-ready pods\r\n  \
    \  not_ready = []\r\n    if isinstance(pods_all, dict) and \"items\" in pods_all:\r\
    \n        for p in pods_all[\"items\"]:\r\n            phase = p.get(\"status\"\
    , {}).get(\"phase\", \"\")\r\n            if phase not in (\"Running\", \"Succeeded\"\
    ):\r\n                ns = p.get(\"metadata\", {}).get(\"namespace\", \"?\")\r\
    \n                name = p.get(\"metadata\", {}).get(\"name\", \"?\")\r\n    \
    \            not_ready.append(f\"{ns}/{name}: {phase}\")\r\n    data[\"not_ready\"\
    ] = \"\\n\".join(not_ready[:10]) if not_ready else \"none\"\r\n    return data\r\
    \n\r\ndef build_prompt(data):\r\n    sections = []\r\n    sections.append(f\"\
    K8sGPT issues:\\n{data['k8sgpt_results'][:600]}\")\r\n    ph = data.get(\"proxy_health\"\
    , {})\r\n    if isinstance(ph, dict) and \"providers\" in ph:\r\n        prov_summary\
    \ = \", \".join(f\"{k}: {v.get('available',0)}/{v.get('models',0)}\"\r\n     \
    \                            + (f\" daily:{v.get('daily_used',0)}/{v.get('daily_budget',0)}\"\
    \ if 'daily_budget' in v else \"\")\r\n                                 for k,\
    \ v in ph[\"providers\"].items())\r\n        sections.append(f\"LLM Proxy: {ph.get('slots_total',0)}\
    \ slots, {ph.get('slots_available',0)} avail, cache={ph.get('cache_size',0)}.\
    \ Providers: {prov_summary}\")\r\n    bs = data.get(\"bridge_stats\", {})\r\n\
    \    if isinstance(bs, dict):\r\n        sections.append(f\"Bridge: watched={bs.get('watched',0)},\
    \ posted={bs.get('posted',0)}, stale_suppressed={bs.get('stale_suppressed',0)},\
    \ errors={bs.get('errors',0)}, auto_silenced={bs.get('auto_silenced',0)}\")\r\n\
    \    pr = data.get(\"pod_restarts\", \"none\")\r\n    sections.append(f\"Pod restarts:\
    \ {pr[:400]}\")\r\n    not_ready = data.get(\"not_ready\", \"none\")\r\n    sections.append(f\"\
    Not-ready pods: {not_ready[:400]}\")\r\n    sections.append(f\"Nodes: {data.get('nodes',\
    \ '')[:300]}\")\r\n    prompt = (\r\n        \"You are an AIoT cluster operations\
    \ expert. Generate a concise daily health report \"\r\n        \"using the data\
    \ below. Use emoji status indicators. Highlight issues that need attention. \"\
    \r\n        \"Keep output under 400 words. Format for Mattermost markdown.\\n\\\
    n\"\r\n        + \"\\n\\n\".join(sections)\r\n    )\r\n    return prompt\r\n\r\
    \ndef send_to_llm(prompt):\r\n    resp = http_post_json(f\"{PROXY}/v1/chat/completions\"\
    , {\r\n        \"model\": \"any\",\r\n        \"messages\": [{\"role\": \"system\"\
    , \"content\": \"You generate concise operational health reports.\"},\r\n    \
    \                 {\"role\": \"user\", \"content\": prompt}],\r\n        \"max_tokens\"\
    : 800,\r\n        \"temperature\": 0.2,\r\n    })\r\n    if \"error\" in resp:\r\
    \n        return f\"LLM error: {resp['error']}\"\r\n    choices = resp.get(\"\
    choices\", [])\r\n    text = choices[0].get(\"message\", {}).get(\"content\",\
    \ \"\") if choices else \"No response\"\r\n    proxy_info = resp.get(\"_proxy\"\
    , {})\r\n    return text, proxy_info\r\n\r\ndef post_to_mm(text):\r\n    if not\
    \ MM_WEBHOOK:\r\n        log.warning(\"No MM_WEBHOOK_URL set, printing to stdout\"\
    )\r\n        print(text)\r\n        return\r\n    http_post_json(MM_WEBHOOK, {\"\
    text\": text})\r\n    log.info(\"Posted to Mattermost\")\r\n\r\ndef main():\r\n\
    \    log.info(\"Collecting cluster data...\")\r\n    data = collect_data()\r\n\
    \    log.info(\"Building prompt...\")\r\n    prompt = build_prompt(data)\r\n \
    \   log.info(\"Prompt size: ~%d tokens\", len(prompt) // 4)\r\n    log.info(\"\
    Sending to LLM...\")\r\n    result = send_to_llm(prompt)\r\n    if isinstance(result,\
    \ tuple):\r\n        text, proxy_info = result\r\n        header = f\"### :chart_with_upwards_trend:\
