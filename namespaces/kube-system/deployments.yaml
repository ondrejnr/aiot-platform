                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 10
              name: hubble-relay
              ports:
                - containerPort: 4245
                  name: grpc
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                grpc:
                  port: 4222
                  service: ""
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 3
              resources: {}
              securityContext:
                capabilities:
                  drop:
