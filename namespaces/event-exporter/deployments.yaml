apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      name: event-exporter
      namespace: event-exporter
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: event-exporter
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            kubectl.kubernetes.io/restartedAt: "2026-04-20T10:02:48Z"
          creationTimestamp: null
          labels:
            app: event-exporter
        spec:
          containers:
            - args:
                - -conf=/data/config.yaml
              image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
              imagePullPolicy: IfNotPresent
              name: event-exporter
              ports:
                - containerPort: 2112
                  name: metrics
                  protocol: TCP
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /data
                  name: cfg
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: event-exporter
          serviceAccountName: event-exporter
          terminationGracePeriodSeconds: 30
          volumes:
            - configMap:
                defaultMode: 420
                name: event-exporter-cfg
              name: cfg
kind: List
metadata:
  resourceVersion: ""
