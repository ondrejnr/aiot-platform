apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        app: helloweb
        argocd.argoproj.io/instance: helloweb
      name: helloweb
      namespace: helloweb
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: helloweb
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app: helloweb
        spec:
          containers:
            - image: nginxdemos/hello:plain-text
              imagePullPolicy: IfNotPresent
              name: helloweb
              ports:
                - containerPort: 80
                  protocol: TCP
              resources:
                limits:
                  cpu: 50m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 16Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
kind: List
metadata:
  resourceVersion: ""
