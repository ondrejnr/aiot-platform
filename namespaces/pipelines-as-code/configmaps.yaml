  - apiVersion: v1
    data:
      application-name: Local Konflux
      auto-configure-new-github-repo: "false"
      auto-configure-repo-namespace-template: ""
      auto-configure-repo-repository-template: ""
      bitbucket-cloud-additional-source-ip: ""
      bitbucket-cloud-check-source-ip: "true"
      custom-console-name: Local Konflux
      custom-console-url: https://konflux.35.241.255.137.nip.io
      custom-console-url-namespace: https://konflux.35.241.255.137.nip.io/ns/{{ namespace }}
      custom-console-url-pr-details: https://konflux.35.241.255.137.nip.io/ns/{{ namespace }}/applications/hello-aiot/pipelineruns/{{ pr }}
      custom-console-url-pr-tasklog: https://konflux.35.241.255.137.nip.io/ns/{{ namespace }}/applications/hello-aiot/pipelineruns/{{ pr }}/logs/{{ task }}
      default-max-keep-runs: "5"
      enable-cancel-in-progress-on-pull-requests: "true"
      enable-cancel-in-progress-on-push: "false"
      error-detection-from-container-logs: "true"
      error-detection-max-number-of-lines: "50"
      error-detection-simple-regexp: ^(?P<filename>[^:]*):(?P<line>[0-9]+):(?P<column>[0-9]+)?([ ]*)?(?P<error>.*)
      error-log-snippet: "true"
      error-log-snippet-number-of-lines: "3"
      hub-catalog-type: artifacthub
      hub-url: https://artifacthub.io
      max-keep-run-upper-limit: "20"
      remember-ok-to-test: "false"
      remote-tasks: "true"
      require-ok-to-test-sha: "false"
      secret-auto-create: "true"
      secret-github-app-scope-extra-repos: ""
      secret-github-app-token-scoped: "true"
      skip-push-event-for-pr-commits: "true"
      tekton-dashboard-url: ""
    kind: ConfigMap
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/part-of: pipelines-as-code
        app.kubernetes.io/version: v0.42.0
      name: pipelines-as-code
      namespace: pipelines-as-code
  - apiVersion: v1
    data:
      _example: |
        ################################
        #                              #
        #    EXAMPLE CONFIGURATION     #
        #                              #
        ################################
        # This block is not actually functional configuration,
        # but serves to illustrate the available configuration
        # options and document them in a way that is accessible
        # to users that `kubectl edit` this config map.
        #
        # These sample configuration options may be copied out of
        # this example block and unindented to be in the data block
        # to actually change the configuration.
        # metrics.backend-destination field specifies the system metrics destination.
        # It supports either prometheus (the default) or stackdriver.
        # Note: Using Stackdriver will incur additional charges.
        metrics.backend-destination: prometheus
        # metrics.stackdriver-project-id field specifies the Stackdriver project ID. This
        # field is optional. When running on GCE, application default credentials will be
        # used and metrics will be sent to the cluster's project if this field is
        # not provided.
        metrics.stackdriver-project-id: "<your stackdriver project id>"
        # metrics.allow-stackdriver-custom-metrics indicates whether it is allowed
        # to send metrics to Stackdriver using "global" resource type and custom
        # metric type. Setting this flag to "true" could cause extra Stackdriver
        # charge.  If metrics.backend-destination is not Stackdriver, this is
        # ignored.
        metrics.allow-stackdriver-custom-metrics: "false"
    kind: ConfigMap
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/part-of: pipelines-as-code
        app.kubernetes.io/version: v0.42.0
      name: pipelines-as-code-config-observability
      namespace: pipelines-as-code
