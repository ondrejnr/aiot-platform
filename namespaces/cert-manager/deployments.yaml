apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        app: cert-manager
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: cert-manager
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: cert-manager
        app.kubernetes.io/version: v1.19.4
        helm.sh/chart: cert-manager-v1.19.4
      name: cert-manager
      namespace: cert-manager
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app.kubernetes.io/component: controller
          app.kubernetes.io/instance: cert-manager
          app.kubernetes.io/name: cert-manager
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            prometheus.io/path: /metrics
            prometheus.io/port: "9402"
            prometheus.io/scrape: "true"
          creationTimestamp: null
          labels:
            app: cert-manager
            app.kubernetes.io/component: controller
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: cert-manager
            app.kubernetes.io/version: v1.19.4
            helm.sh/chart: cert-manager-v1.19.4
        spec:
          containers:
            - args:
                - --v=2
                - --cluster-resource-namespace=$(POD_NAMESPACE)
                - --leader-election-namespace=kube-system
                - --acme-http01-solver-image=quay.io/jetstack/cert-manager-acmesolver:v1.19.4
                - --max-concurrent-challenges=60
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
              image: quay.io/jetstack/cert-manager-controller:v1.19.4
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 8
                httpGet:
                  path: /livez
                  port: http-healthz
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 15
              name: cert-manager-controller
              ports:
                - containerPort: 9402
                  name: http-metrics
                  protocol: TCP
                - containerPort: 9403
                  name: http-healthz
                  protocol: TCP
              resources:
                limits:
                  cpu: 120m
                  memory: 120Mi
                requests:
                  cpu: 90m
                  memory: 90Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          enableServiceLinks: false
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: cert-manager
          serviceAccountName: cert-manager
          terminationGracePeriodSeconds: 30
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        app: cainjector
        app.kubernetes.io/component: cainjector
        app.kubernetes.io/instance: cert-manager
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: cainjector
        app.kubernetes.io/version: v1.19.4
        helm.sh/chart: cert-manager-v1.19.4
      name: cert-manager-cainjector
      namespace: cert-manager
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app.kubernetes.io/component: cainjector
          app.kubernetes.io/instance: cert-manager
          app.kubernetes.io/name: cainjector
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            prometheus.io/path: /metrics
            prometheus.io/port: "9402"
            prometheus.io/scrape: "true"
          creationTimestamp: null
          labels:
            app: cainjector
            app.kubernetes.io/component: cainjector
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: cainjector
            app.kubernetes.io/version: v1.19.4
            helm.sh/chart: cert-manager-v1.19.4
        spec:
          containers:
            - args:
                - --v=2
                - --leader-election-namespace=kube-system
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
              image: quay.io/jetstack/cert-manager-cainjector:v1.19.4
              imagePullPolicy: IfNotPresent
              name: cert-manager-cainjector
              ports:
                - containerPort: 9402
                  name: http-metrics
                  protocol: TCP
              resources:
                limits:
                  cpu: 120m
                  memory: 512Mi
                requests:
                  cpu: 90m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          enableServiceLinks: false
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: cert-manager-cainjector
          serviceAccountName: cert-manager-cainjector
          terminationGracePeriodSeconds: 30
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations: {}
      labels:
        app: webhook
        app.kubernetes.io/component: webhook
        app.kubernetes.io/instance: cert-manager
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: webhook
        app.kubernetes.io/version: v1.19.4
        helm.sh/chart: cert-manager-v1.19.4
      name: cert-manager-webhook
      namespace: cert-manager
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app.kubernetes.io/component: webhook
          app.kubernetes.io/instance: cert-manager
          app.kubernetes.io/name: webhook
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            prometheus.io/path: /metrics
            prometheus.io/port: "9402"
            prometheus.io/scrape: "true"
          creationTimestamp: null
          labels:
            app: webhook
            app.kubernetes.io/component: webhook
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: webhook
            app.kubernetes.io/version: v1.19.4
            helm.sh/chart: cert-manager-v1.19.4
        spec:
          containers:
            - args:
                - --v=2
                - --secure-port=10250
                - --dynamic-serving-ca-secret-namespace=$(POD_NAMESPACE)
                - --dynamic-serving-ca-secret-name=cert-manager-webhook-ca
                - --dynamic-serving-dns-names=cert-manager-webhook
                - --dynamic-serving-dns-names=cert-manager-webhook.$(POD_NAMESPACE)
                - --dynamic-serving-dns-names=cert-manager-webhook.$(POD_NAMESPACE).svc
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
              image: quay.io/jetstack/cert-manager-webhook:v1.19.4
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /livez
                  port: healthcheck
                  scheme: HTTP
                initialDelaySeconds: 60
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              name: cert-manager-webhook
              ports:
                - containerPort: 10250
                  name: https
                  protocol: TCP
                - containerPort: 6080
                  name: healthcheck
                  protocol: TCP
                - containerPort: 9402
                  name: http-metrics
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: healthcheck
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                limits:
                  cpu: 120m
                  memory: 120Mi
                requests:
                  cpu: 90m
                  memory: 90Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          enableServiceLinks: false
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: cert-manager-webhook
          serviceAccountName: cert-manager-webhook
          terminationGracePeriodSeconds: 30
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        ignore-check.kube-linter.io/readiness-port: Keeping upstream configs
      labels:
        app.kubernetes.io/instance: trust-manager
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: trust-manager
        app.kubernetes.io/version: v0.21.0
        helm.sh/chart: trust-manager-v0.21.0
      name: trust-manager
      namespace: cert-manager
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: trust-manager
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          creationTimestamp: null
          labels:
            app: trust-manager
            app.kubernetes.io/instance: trust-manager
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: trust-manager
            app.kubernetes.io/version: v0.21.0
            helm.sh/chart: trust-manager-v0.21.0
        spec:
          automountServiceAccountToken: true
          containers:
            - args:
                - --log-format=text
                - --log-level=1
                - --metrics-port=9402
                - --readiness-probe-port=6060
                - --readiness-probe-path=/readyz
                - --leader-elect=true
                - --leader-election-lease-duration=15s
                - --leader-election-renew-deadline=10s
                - --trust-namespace=cert-manager
                - --webhook-host=0.0.0.0
                - --webhook-port=6443
                - --webhook-certificate-dir=/tls
                - --default-package-location=/packages/cert-manager-package-debian.json
              image: quay.io/jetstack/trust-manager:v0.21.0
              imagePullPolicy: IfNotPresent
              name: trust-manager
              ports:
                - containerPort: 6443
                  name: webhook
                  protocol: TCP
                - containerPort: 9402
                  name: metrics
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /readyz
                  port: 6060
                  scheme: HTTP
                initialDelaySeconds: 3
                periodSeconds: 7
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                limits:
                  cpu: 100m
                  memory: 250Mi
                requests:
                  cpu: 10m
                  memory: 50Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /tls
                  name: tls
                  readOnly: true
                - mountPath: /packages
                  name: packages
                  readOnly: true
          dnsPolicy: ClusterFirst
          initContainers:
            - args:
                - /copyandmaybepause
                - /debian-package
                - /packages
              image: quay.io/jetstack/trust-pkg-debian-bookworm:20230311-deb12u1.4
              imagePullPolicy: IfNotPresent
              name: cert-manager-package-debian
              resources:
                limits:
                  cpu: 100m
                  memory: 250Mi
                requests:
                  cpu: 10m
                  memory: 50Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /packages
                  name: packages
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext: {}
          serviceAccount: trust-manager
          serviceAccountName: trust-manager
          terminationGracePeriodSeconds: 30
          volumes:
            - emptyDir:
                sizeLimit: 50M
              name: packages
            - name: tls
              secret:
                defaultMode: 420
                secretName: trust-manager-tls
kind: List
metadata:
  resourceVersion: ""
