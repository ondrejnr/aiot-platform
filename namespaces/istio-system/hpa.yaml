apiVersion: v1
items:
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      labels:
        app: istio-ingressgateway
        install.operator.istio.io/owning-resource: installed-state-installed-state
        install.operator.istio.io/owning-resource-namespace: istio-system
        istio: ingressgateway
        istio.io/rev: default
        operator.istio.io/component: IngressGateways
        operator.istio.io/managed: Reconcile
        operator.istio.io/version: 1.22.1
        release: istio
      name: istio-ingressgateway
      namespace: istio-system
    spec:
      maxReplicas: 5
      metrics:
        - resource:
            name: cpu
            target:
              averageUtilization: 80
              type: Utilization
          type: Resource
      minReplicas: 1
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: istio-ingressgateway
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      labels:
        app: istiod
        install.operator.istio.io/owning-resource: installed-state-installed-state
        install.operator.istio.io/owning-resource-namespace: istio-system
        istio.io/rev: default
        operator.istio.io/component: Pilot
        operator.istio.io/managed: Reconcile
        operator.istio.io/version: 1.22.1
        release: istio
      name: istiod
      namespace: istio-system
    spec:
      maxReplicas: 5
      metrics:
        - resource:
            name: cpu
            target:
              averageUtilization: 80
              type: Utilization
          type: Resource
      minReplicas: 1
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: istiod
kind: List
metadata:
  resourceVersion: ""
