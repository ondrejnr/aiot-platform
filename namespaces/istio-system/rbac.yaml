apiVersion: v1
items:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      labels:
        install.operator.istio.io/owning-resource: installed-state-installed-state
        install.operator.istio.io/owning-resource-namespace: istio-system
        istio.io/rev: default
        operator.istio.io/component: IngressGateways
        operator.istio.io/managed: Reconcile
        operator.istio.io/version: 1.22.1
        release: istio
      name: istio-ingressgateway-sds
      namespace: istio-system
    rules:
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
          - watch
          - list
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      labels:
        app: istiod
        install.operator.istio.io/owning-resource: installed-state-installed-state
        install.operator.istio.io/owning-resource-namespace: istio-system
        istio.io/rev: default
        operator.istio.io/component: Pilot
        operator.istio.io/managed: Reconcile
        operator.istio.io/version: 1.22.1
        release: istio
      name: istiod
      namespace: istio-system
    rules:
      - apiGroups:
          - networking.istio.io
        resources:
          - gateways
        verbs:
          - create
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - create
          - get
          - watch
          - list
          - update
          - delete
      - apiGroups:
          - ""
        resources:
          - configmaps
        verbs:
          - delete
      - apiGroups:
          - coordination.k8s.io
        resources:
          - leases
        verbs:
          - get
          - update
          - patch
          - create
kind: List
metadata:
  resourceVersion: ""
