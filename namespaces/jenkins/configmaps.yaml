    \ \"kubernetes\"\n      namespace: \"jenkins\"\n      restrictedPssSecurityContext:\
    \ false\n      serverUrl: \"https://kubernetes.default\"\n      credentialsId:\
    \ \"\"\n      podLabels:\n      - key: \"jenkins/jenkins-jenkins-agent\"\n   \
