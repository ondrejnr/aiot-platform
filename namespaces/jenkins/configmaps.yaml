    \n                  value: \"http://jenkins.jenkins.svc.cluster.local:8080/\"\n\
    \            image: \"jenkins/inbound-agent:3355.v388858a_47b_33-18\"\n      \
    \      privileged: \"false\"\n            resourceLimitCpu: 512m\n           \
    \ resourceLimitMemory: 512Mi\n            resourceRequestCpu: 512m\n         \
    \   resourceRequestMemory: 512Mi\n            ttyEnabled: false\n            workingDir:\
