apiVersion: v1
data:
  Dockerfile.patch: "FROM ghcr.io/pluralsh/console:0.12.13 AS upstream\n\nFROM hexpm/elixir:1.18.4-erlang-27.2-alpine-3.21.7\
    \ AS builder\nWORKDIR /work\nCOPY --from=upstream /opt/app /opt/app\nCOPY features.ex\
    \ /work/features.ex\nRUN PA=\"\" && for d in $(find /opt/app/lib -maxdepth 2 -type\
    \ d -name ebin); do PA=\"$PA -pa $d\"; done && \\\n    mkdir -p /out && \\\n \
    \   elixirc $PA -o /out /work/features.ex && \\\n    ls -la /out\n\nFROM ghcr.io/pluralsh/console:0.12.13\n\
    USER root\nCOPY --from=builder /out/Elixir.Console.Features.beam /opt/app/lib/console-0.12.13+dirty/ebin/Elixir.Console.Features.beam\n\
    USER 65532\n"
  features.ex: "defmodule Console.Features do\n  use GenServer\n  require Logger\n\
    \  alias Console.Plural.{Account, Features}\n\n  def start_link(_opts \\\\ :ok),\n\
    \    do: GenServer.start_link(__MODULE__, :ok, name: __MODULE__)\n\n  def start(),\
    \ do: GenServer.start_link(__MODULE__, :ok)\n\n  def init(_), do: {:ok, {Features.everything(),\
    \ Account.enterprise()}}\n\n  def available?(_feature), do: true\n\n  def expiry(),\
    \ do: nil\n\n  def cluster_max(), do: :infinity\n\n  def fetch(), do: Features.everything()\n\
    \n  def account(), do: Account.enterprise()\n\n  def handle_call(:fetch, _, state),\n\
    \    do: {:reply, Features.everything(), state}\n\n  def handle_call(:account,\
    \ _, state),\n    do: {:reply, Account.enterprise(), state}\n\n  def handle_info(:poll,\
    \ state), do: {:noreply, state}\n  def handle_info(_msg, state), do: {:noreply,\
    \ state}\n\n  def check_license(_license_key \\\\ nil) do\n    account = Account.enterprise()\n\
    \    {account.availableFeatures, account}\n  end\nend"
kind: ConfigMap
metadata:
  name: plural-patch
  namespace: jenkins
