    \          label: \"jenkins-jenkins-agent \"\n          nodeUsageMode: \"NORMAL\"\
    \n          podRetention: Never\n          showRawYaml: true\n          serviceAccount:\
    \ \"default\"\n          slaveConnectTimeoutStr: \"100\"\n          yamlMergeStrategy:\
    \ override\n          inheritYamlMergeStrategy: false\n  slaveAgentPort: 50000\n\
    security:\n  apiToken:\n    creationOfLegacyTokenEnabled: false\n    tokenGenerationOnCreationEnabled:\
