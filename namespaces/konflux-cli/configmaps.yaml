      create-tenant.sh: "#!/bin/bash -e\n\n# Script to create a new Konflux tenant namespace with all required resources\n\nusage() {\n    cat <<EOF\nUsage: $(basename \"$0\") -n <namespace> -u <admin-user>\n\nCreate a new Konflux tenant namespace with all required resources.\n\nRequired arguments:\n  -n, --namespace    Name of the tenant namespace to create\n  -u, --admin-user   Name of the admin user (e.g., user1@konflux.dev)\n\nExample:\n  $(basename \"$0\") -n my-tenant -u user1@konflux.dev\nEOF\n    exit 1\n}\n\n# Parse arguments\nwhile [[ $# -gt 0 ]]; do\n    case $1 in\n        -n|--namespace)\n            NAMESPACE=\"$2\"\n            shift 2\n            ;;\n        -u|--admin-user)\n            ADMIN_USER=\"$2\"\n            shift 2\n            ;;\n        -h|--help)\n            usage\n            ;;\n        *)\n            echo \"Unknown option: $1\"\n            usage\n            ;;\n    esac\ndone\n\n# Validate required arguments\nif [[ -z \"${NAMESPACE}\" ]]; then\n    echo \"Error: Namespace is required\"\n    usage\nfi\n\nif [[ -z \"${ADMIN_USER}\" ]]; then\n    echo \"Error: Admin user is required\"\n    usage\nfi\n\necho \"\U0001F3D7️  Creating Konflux tenant namespace: ${NAMESPACE}\"\n\n# Create the namespace with tenant label\necho \"\U0001F4E6 Creating namespace...\"\nkubectl apply -f - <<EOF\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: ${NAMESPACE}\n  labels:\n    konflux-ci.dev/type: tenant\nEOF\n\n# Create the konflux-integration-runner ServiceAccount\necho \"\U0001F464 Creating konflux-integration-runner ServiceAccount...\"\nkubectl apply -f - <<EOF\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: konflux-integration-runner\n  namespace: ${NAMESPACE}\nEOF\n\n# Create RoleBinding for konflux-integration-runner ServiceAccount\necho \"\U0001F517 Creating RoleBinding for konflux-integration-runner...\"\nkubectl apply -f - <<EOF\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: konflux-integration-runner\n  namespace: ${NAMESPACE}\nroleRef:\n  apiGroup: rbac.authorization.k8s.io\n  kind: ClusterRole\n  name: konflux-integration-runner\nsubjects:\n- kind: ServiceAccount\n  name: konflux-integration-runner\n  namespace: ${NAMESPACE}\nEOF\n\n# Create RoleBinding for admin user\necho \"\U0001F451 Creating RoleBinding for admin user: ${ADMIN_USER}...\"\nkubectl apply -f - <<EOF\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: ${ADMIN_USER%%@*}-konflux-admin\n  namespace: ${NAMESPACE}\nroleRef:\n  apiGroup: rbac.authorization.k8s.io\n  kind: ClusterRole\n  name: konflux-admin-user-actions\nsubjects:\n- kind: User\n  name: ${ADMIN_USER}\n  apiGroup: rbac.authorization.k8s.io\nEOF\n\necho \"✅ Tenant namespace '${NAMESPACE}' created successfully!\"\necho \"\"\necho \"Resources created:\"\necho \"  - Namespace: ${NAMESPACE} (with label konflux-ci.dev/type: tenant)\"\necho \"  - ServiceAccount: konflux-integration-runner\"\necho \"  - RoleBinding: konflux-integration-runner -> ClusterRole/konflux-integration-runner\"\necho \"  - RoleBinding: ${ADMIN_USER%%@*}-konflux-admin -> ClusterRole/konflux-admin-user-actions\"\n"
    kind: ConfigMap
    metadata:
      labels:
        konflux.konflux-ci.dev/component: cli
        konflux.konflux-ci.dev/owner: konflux-cli
      name: create-tenant
      namespace: konflux-cli
      ownerReferences:
        - apiVersion: konflux.konflux-ci.dev/v1alpha1
          blockOwnerDeletion: true
          controller: true
          kind: KonfluxCLI
          name: konflux-cli
          uid: 70c4dc73-f7b7-4ad0-b167-4459d5192661
