apiVersion: v1
items:
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/instance: vui
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: vui
        app.kubernetes.io/version: 0.4.1
        helm.sh/chart: vui-1.0.6
      name: vui-report-cronjob
      namespace: default
    spec:
      concurrencyPolicy: Allow
      failedJobsHistoryLimit: 0
      jobTemplate:
        metadata:
          creationTimestamp: null
        spec:
          template:
            metadata:
              creationTimestamp: null
            spec:
              containers:
                - command:
                    - python3
                    - watchdog.py
                  env:
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                          apiVersion: v1
                          fieldPath: metadata.name
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                          apiVersion: v1
                          fieldPath: metadata.namespace
                  envFrom:
                    - configMapRef:
                        name: vui-watchdog-config
                    - configMapRef:
                        name: vui-helm-config
                    - secretRef:
                        name: vui-watchdog-secret
                  image: docker.io/dserio83/velero-watchdog:0.1.8
                  imagePullPolicy: IfNotPresent
                  name: velero-watchdog-report
                  resources: {}
                  terminationMessagePath: /dev/termination-log
                  terminationMessagePolicy: File
              dnsPolicy: ClusterFirst
              restartPolicy: Never
              schedulerName: default-scheduler
              securityContext: {}
              serviceAccount: vui-readonly-sa
              serviceAccountName: vui-readonly-sa
              terminationGracePeriodSeconds: 30
      schedule: 0 8 * * *
      successfulJobsHistoryLimit: 0
      suspend: false
kind: List
metadata:
  resourceVersion: ""
