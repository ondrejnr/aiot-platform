apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-metrics-collector
  namespace: monitoring
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata: {}
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - sh
            - -c
            - apk add --no-cache postgresql-client >/dev/null 2>&1 && python3 /scripts/collect.py
            image: python:3.11-alpine
            imagePullPolicy: IfNotPresent
            name: collector
            resources:
              limits:
                cpu: 200m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /scripts
              name: script
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
          - configMap:
              defaultMode: 493
              name: metrics-collector-script
            name: script
  schedule: '*/5 * * * *'
  successfulJobsHistoryLimit: 3
  suspend: false
