apiVersion: v1
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        field.cattle.io/publicEndpoints: '[{"port":30500,"protocol":"TCP","serviceName":"registry:internal-registry","allNodes":true}]'
      name: internal-registry
      namespace: registry
    spec:
      progressDeadlineSeconds: 600
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: registry
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          annotations:
            kubectl.kubernetes.io/restartedAt: "2026-04-15T15:49:55Z"
          creationTimestamp: null
          labels:
            app: registry
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - aiot-worker-01
          containers:
            - env:
                - name: REGISTRY_STORAGE_DELETE_ENABLED
                  value: "true"
              image: registry:2
              imagePullPolicy: IfNotPresent
              name: registry
              ports:
                - containerPort: 5000
                  protocol: TCP
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /var/lib/registry
                  name: data
          dnsPolicy: ClusterFirst
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          restartPolicy: Always
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
            - hostPath:
                path: /data/registry
                type: Directory
              name: data
kind: List
metadata:
  resourceVersion: ""
