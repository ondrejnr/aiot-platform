apiVersion: v1
data:
  Dockerfile: 'FROM python:3.11-slim

    RUN apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev
    curl && rm -rf /var/lib/apt/lists/*

    RUN pip install --no-cache-dir fastapi "uvicorn[standard]" flask requests redis
    paho-mqtt psycopg2-binary numpy qdrant-client

    WORKDIR /app

    CMD ["python"]

    '
