apiVersion: v1
items:
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
        field.cattle.io/publicEndpoints: '[{"port":30500,"protocol":"TCP","serviceName":"registry:internal-registry","allNodes":true}]'
      name: internal-registry
      namespace: registry
    spec:
      clusterIP: 10.109.36.84
      clusterIPs:
        - 10.109.36.84
      externalTrafficPolicy: Cluster
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - nodePort: 30500
          port: 5000
          protocol: TCP
          targetPort: 5000
      selector:
        app: registry
      sessionAffinity: None
      type: NodePort
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      name: internal-registry-http
      namespace: registry
    spec:
      clusterIP: 10.105.21.16
      clusterIPs:
        - 10.105.21.16
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: 5000
      selector:
        app: registry
      sessionAffinity: None
