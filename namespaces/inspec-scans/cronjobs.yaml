apiVersion: batch/v1
kind: CronJob
metadata:
  name: inspec-weekly-scan
  namespace: inspec-scans
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  jobTemplate:
    metadata: {}
    spec:
      backoffLimit: 0
      template:
        metadata: {}
        spec:
          containers:
          - args:
            - "set +e\nAUTOMATE_URL=\"https://chef-automate.chef.svc.cluster.local:8443/data-collector/v0/\"\
              \n\nNODES=\"\naiot-master|10.132.0.2|ondrejko2_gulkas|aiot-master.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000002\n\
              aiot-worker-01|10.132.0.3|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000003\n\
              aiot-worker-02|10.132.0.4|root|aiot-gcp.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000004\n\
              oci-e5-node1|172.16.200.10|opc|oci-e5-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000010\n\
              oci-e5-node2|172.16.200.11|opc|oci-e5-node2.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000011\n\
              oci-test-node1|172.16.200.12|opc|oci-test-node1.pem|a1b2c3d4-e5f6-7890-abcd-ef0000000012\n\
              \"\n\nPROFILES=\"\nlinux-baseline|https://github.com/dev-sec/linux-baseline\n\
              ssh-baseline|https://github.com/dev-sec/ssh-baseline\nos-hardening|https://github.com/dev-sec/cis-dil-benchmark\n\
              \"\n\nfor nodeline in $(echo \"$NODES\" | grep -v '^$'); do\n  NODE=$(echo\
              \ $nodeline | cut -d'|' -f1)\n  IP=$(echo $nodeline | cut -d'|' -f2)\n\
              \  USR=$(echo $nodeline | cut -d'|' -f3)\n  KEY=$(echo $nodeline | cut\
              \ -d'|' -f4)\n  UUID=$(echo $nodeline | cut -d'|' -f5)\n\n  for profline\
              \ in $(echo \"$PROFILES\" | grep -v '^$'); do\n    PNAME=$(echo $profline\
              \ | cut -d'|' -f1)\n    PURL=$(echo $profline | cut -d'|' -f2)\n\n \
              \   echo \"\"\n    echo \"==============================================================\"\
              \n    echo \"SCAN: $NODE -> $PNAME\"\n    echo \"==============================================================\"\
              \n\n    cat > /shared/config.json <<EOF\n{\n  \"reporter\": {\n    \"\
              cli\": {},\n    \"automate\": {\n      \"url\": \"$AUTOMATE_URL\",\n\
              \      \"token\": \"$TOKEN\",\n      \"insecure\": true,\n      \"node_uuid\"\
              : \"$UUID\",\n      \"node_name\": \"$NODE\",\n      \"environment\"\
              : \"production\"\n    }\n  }\n}\nEOF\n\n    inspec exec $PURL \\\n \
              \     -t ssh://$USR@$IP \\\n      -i /keys/$KEY \\\n      --sudo \\\n\
              \      --chef-license=accept-silent \\\n      --waiver-file /waivers/waivers.yaml\
              \ \\\n      --config /shared/config.json \\\n      --reporter cli 2>&1\
              \ | tail -5\n  done\ndone\n"
            command:
            - sh
            - -c
            env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: token
                  name: automate-token
            image: chef/inspec:5.22.65
            imagePullPolicy: IfNotPresent
            name: inspec
            resources:
              limits:
                cpu: '2'
                memory: 2Gi
              requests:
                cpu: 200m
                memory: 512Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /keys
              name: ssh-keys
              readOnly: true
            - mountPath: /waivers
              name: waivers
              readOnly: true
            - mountPath: /shared
              name: shared
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
          - name: ssh-keys
            secret:
              defaultMode: 256
              secretName: ssh-keys
          - configMap:
              defaultMode: 420
              name: inspec-waivers
            name: waivers
          - emptyDir: {}
            name: shared
      ttlSecondsAfterFinished: 604800
  schedule: 0 3 * * 1
  successfulJobsHistoryLimit: 2
  suspend: false
