apiVersion: v1
data:
  waivers.yaml: "# InSpec waiver file for Kubernetes nodes\n# Reason: These controls\
    \ conflict with standard k8s/cloud-VM operation.\n# Expiration ensures periodic\
    \ review.\n# Docs: https://docs.chef.io/inspec/waivers/\n\n# ============ linux-baseline\
    \ ============\n# k8s pod networking requires IPv4 forwarding on every node\n\
    sysctl-01:\n  justification: \"Kubernetes CNI (flannel) requires net.ipv4.ip_forward=1\
    \ for pod-to-pod routing\"\n  expiration_date: 2027-04-18\n  run: false\n\n# OCI\
    \ / GCP cloud defaults \u2014 not hardening concern on private VPC behind cloud\
    \ LB\nsysctl-14:\n  justification: \"Cloud VM behind private VPC; ICMP redirect\
    \ acceptance not a threat vector here\"\n  expiration_date: 2027-04-18\n  run:\
    \ false\nsysctl-15:\n  justification: \"Same as sysctl-14 \u2014 secure_redirects\
    \ not relevant in flat VPC\"\n  expiration_date: 2027-04-18\n  run: false\nsysctl-16:\n\
    \  justification: \"Send redirects default on OCI; no multi-homed routing risk\
    \ on k8s worker\"\n  expiration_date: 2027-04-18\n  run: false\nsysctl-17:\n \
    \ justification: \"log_martians off by default; k8s already logs via kube-proxy/flannel;\
    \ low value\"\n  expiration_date: 2027-04-18\n  run: false\nsysctl-20:\n  justification:\
    \ \"IPv6 redirects \u2014 cluster is IPv4-only; IPv6 stack not used\"\n  expiration_date:\
    \ 2027-04-18\n  run: false\nsysctl-21:\n  justification: \"IPv6 router solicitations\
    \ \u2014 IPv4-only cluster\"\n  expiration_date: 2027-04-18\n  run: false\nsysctl-22:\n\
    \  justification: \"IPv6 not used\"\n  expiration_date: 2027-04-18\n  run: false\n\
    sysctl-23:\n  justification: \"IPv6 not used\"\n  expiration_date: 2027-04-18\n\
    \  run: false\nsysctl-24:\n  justification: \"IPv6 not used\"\n  expiration_date:\
    \ 2027-04-18\n  run: false\nsysctl-25:\n  justification: \"IPv6 not used\"\n \
    \ expiration_date: 2027-04-18\n  run: false\nsysctl-26:\n  justification: \"IPv6\
    \ autoconf \u2014 IPv4-only cluster\"\n  expiration_date: 2027-04-18\n  run: false\n\
    sysctl-27:\n  justification: \"IPv6 not used\"\n  expiration_date: 2027-04-18\n\
    \  run: false\nsysctl-28:\n  justification: \"IPv6 not used\"\n  expiration_date:\
    \ 2027-04-18\n  run: false\nsysctl-30:\n  justification: \"kernel.sysrq needed\
    \ for cloud console debugging on crashed nodes\"\n  expiration_date: 2027-04-18\n\
    \  run: false\n\n# Mount options \u2014 containerd/kubelet need exec on /var/lib/containerd,\
    \ /var/lib/kubelet\nos-14:\n  justification: \"containerd and kubelet require\
    \ exec on /var/* mountpoints\"\n  expiration_date: 2027-04-18\n  run: false\n\
    os-15:\n  justification: \"Same \u2014 nosuid would break container runtime helpers\"\
    \n  expiration_date: 2027-04-18\n  run: false\nos-16:\n  justification: \"Same\
    \ \u2014 nodev required for container volume mounts\"\n  expiration_date: 2027-04-18\n\
    \  run: false\n\n# Password aging for root\nos-05:\n  justification: \"SSH key-only\
    \ auth enforced; password aging not primary security control\"\n  expiration_date:\
    \ 2027-04-18\n  run: false\n\n# auditd \u2014 using Signoz/otel + Falco instead\n\
    package-08:\n  justification: \"Cluster uses Signoz/OpenTelemetry for audit trail;\
    \ auditd redundant\"\n  expiration_date: 2027-04-18\n  run: false\n\n# ============\
    \ ssh-baseline ============\n# Most dev-sec/ssh-baseline failures are cipher-suite\
    \ opinions; cluster uses\n# crypto-policy DEFAULT which is FIPS-compatible and\
    \ maintained by RHEL.\nsshd-08:\n  justification: \"Using system crypto-policy\
    \ DEFAULT instead of hardcoded cipher list\"\n  expiration_date: 2027-04-18\n\
    \  run: false\nsshd-09:\n  justification: \"Same \u2014 crypto-policy manages\
    \ MACs\"\n  expiration_date: 2027-04-18\n  run: false\nsshd-10:\n  justification:\
    \ \"Same \u2014 crypto-policy manages KexAlgorithms\"\n  expiration_date: 2027-04-18\n\
    \  run: false\nsshd-11:\n  justification: \"crypto-policy manages HostKeyAlgorithms\"\
    \n  expiration_date: 2027-04-18\n  run: false\n\n# ============ cis-dil-benchmark\
