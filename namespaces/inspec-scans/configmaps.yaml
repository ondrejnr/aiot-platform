    \  justification: \"Same\"\n  expiration_date: 2027-04-18\n  run: false\ncis-dil-benchmark-1.1.17:\n\
    \  justification: \"Same\"\n  expiration_date: 2027-04-18\n  run: false\n\n# 1.1.1.x\
    \ \u2014 Disable filesystem modules (cramfs, freevxfs, jffs2, hfs, hfsplus, squashfs,\
    \ udf, vfat)\n# Oracle Linux and CentOS need these modules loadable for normal\
    \ operation\ncis-dil-benchmark-1.1.1.1:\n  justification: \"cramfs required by\
    \ some container images\"\n  expiration_date: 2027-04-18\n  run: false\ncis-dil-benchmark-1.1.1.6:\n\
