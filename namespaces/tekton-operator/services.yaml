apiVersion: v1
items:
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app: tekton-pipelines-controller
        version: v0.79.0
      name: tekton-operator
      namespace: tekton-operator
    spec:
      clusterIP: 10.100.237.150
      clusterIPs:
        - 10.100.237.150
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: http-metrics
          port: 9090
          protocol: TCP
          targetPort: 9090
      selector:
        app: tekton-operator
        name: tekton-operator
      sessionAffinity: None
      type: ClusterIP
  - apiVersion: v1
    kind: Service
    metadata:
      annotations: {}
      labels:
        app: tekton-operator
        name: tekton-operator-webhook
        operator.tekton.dev/release: devel
        version: devel
      name: tekton-operator-webhook
      namespace: tekton-operator
    spec:
      clusterIP: 10.105.135.255
      clusterIPs:
        - 10.105.135.255
      internalTrafficPolicy: Cluster
      ipFamilies:
        - IPv4
      ipFamilyPolicy: SingleStack
      ports:
        - name: https-webhook
          port: 443
          protocol: TCP
          targetPort: 8443
      selector:
        app: tekton-operator
        name: tekton-operator-webhook
      sessionAffinity: None
      type: ClusterIP
kind: List
metadata:
  resourceVersion: ""
